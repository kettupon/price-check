                            </div>

                            {/* Save Button */}
                            <button onClick={handleSave} disabled={pSaving || !isFormValid}
                                className="w-full py-4 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-2xl font-bold text-base shadow-lg shadow-green-200 active:scale-95 transition-transform disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                                <CheckCircle2 size={20} />
                                {pSaving ? 'กำลังบันทึก...' : 'บันทึกข้อมูล'}
                            </button>
                        </div>

                        {/* Nickname Change Request Modal */}
                        {showNicknameRequest && (
                            <div className="absolute inset-0 bg-black/50 z-[70] flex items-center justify-center p-6" onClick={() => setShowNicknameRequest(false)}>
                                <div className="bg-white rounded-2xl w-full max-w-sm p-5 space-y-4 shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <h3 className="font-bold text-gray-800">ขอเปลี่ยนชื่อแสดง</h3>
                                    <div>
                                        <p className="text-xs text-gray-500 mb-1">ชื่อปัจจุบัน: <span className="font-bold">{profile?.nickname}</span></p>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 block">ชื่อใหม่ที่ต้องการ <span className="text-red-500">*</span></label>
                                        <input type="text" value={reqNickname} onChange={e => setReqNickname(e.target.value)} placeholder="ชื่อใหม่"
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm border-2 border-transparent focus:border-green-400 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 block">เหตุผลที่ต้องการเปลี่ยน <span className="text-red-500">*</span></label>
                                        <textarea value={reqReason} onChange={e => setReqReason(e.target.value)} placeholder="เหตุผล..." rows={2}
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm border-2 border-transparent focus:border-green-400 outline-none resize-none" />
                                    </div>
                                    <button onClick={handleNicknameRequest} disabled={reqSubmitting || !reqNickname.trim() || !reqReason.trim()}
                                        className="w-full py-3 bg-green-500 text-white rounded-xl font-bold text-sm disabled:opacity-50 active:scale-95 transition-transform">
                                        {reqSubmitting ? 'กำลังส่ง...' : 'ส่งคำขอ'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const [appFont, setAppFont] = useState('sans');
            const [showSettingsModal, setShowSettingsModal] = useState(false);
            const [currentView, setCurrentView] = useState('feed');
            const [showShippingInFeed, setShowShippingInFeed] = useState(false);
            const [showVolumeInFeed, setShowVolumeInFeed] = useState(false);
            const [pdpaAccepted, setPdpaAccepted] = useState(() => localStorage.getItem('pdpa_consent') === 'true');
            const [profileTab, setProfileTab] = useState('posts');
            const [adminNews, setAdminNews] = useState([]); // ── NEW: admin news from Firebase
            const [viewedNewsIds, setViewedNewsIds] = useState([]); // ── NEW: track viewed news
            const [unreadAdminNewsCount, setUnreadAdminNewsCount] = useState(0); // ── NEW: count of unread admin news
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [deals, setDeals] = useState([]);
            const [groupedDeals, setGroupedDeals] = useState([]);
            const [feedLoaded, setFeedLoaded] = useState(false);
            const [feedLimit, setFeedLimit] = useState(10);
            const [searchQuery, setSearchQuery] = useState('');
            const [debouncedSearchQuery, setDebouncedSearchQuery] = useState('');
            const lastSearchTermRef = useRef('');
            const searchResultCountRef = useRef(0);
            const searchCache = useRef({});
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [showAllVariants, setShowAllVariants] = useState(false);
            const [zoomedImage, setZoomedImage] = useState(null);
            const [expandedComments, setExpandedComments] = useState({});
            const [commentCounts, setCommentCounts] = useState({});

            // ── NEW: active category filter for search page ──
            const [activeCategoryFilter, setActiveCategoryFilter] = useState(null); // null = all
            const [activeBrandFilter, setActiveBrandFilter] = useState(null); // null = all
            const [searchFilterMode, setSearchFilterMode] = useState('all'); // 'all' | 'category' | 'brand'
            const [categoryLimit, setCategoryLimit] = useState(10);
            const [brandLimit, setBrandLimit] = useState(10);
            const searchSentinelRef = useRef(null);
            const tipoffCameraRefs = useRef([]);
            const tipoffGalleryRefs = useRef([]);

            useEffect(() => {
                if (currentView !== 'search' || (searchQuery || '').length >= 2) return;
                const observer = new IntersectionObserver((entries) => {
                    if (entries[0].isIntersecting) {
                        setCategoryLimit(prev => prev + 10);
                        setBrandLimit(prev => prev + 10);
                    }
                }, { threshold: 0, rootMargin: '100px' });
                const current = searchSentinelRef.current;
                if (current) observer.observe(current);
                return () => { if (current) observer.unobserve(current); };
            }, [currentView, searchQuery, categoryLimit, brandLimit]);

            const uniqueProductsWithBrand = useMemo(() => {
                const map = new Map();
                deals.forEach(d => {
                    if (!map.has(d.name)) map.set(d.name, d.brand || '');
                });
                return Array.from(map.entries()).map(([name, brand]) => ({ name, brand })).sort((a, b) => a.name.localeCompare(b.name, 'th'));
            }, [deals]);

            const [stores, setStores] = useState([]);
            const [selectedStore, setSelectedStore] = useState(null);
            const [selectedStoreForDetail, setSelectedStoreForDetail] = useState(null);
            const [storeSearchQuery, setStoreSearchQuery] = useState('');
            const [selectedBrandForDetail, setSelectedBrandForDetail] = useState(null);
            const [brandSearchQuery, setBrandSearchQuery] = useState('');
            const [selectedCategoryForDetail, setSelectedCategoryForDetail] = useState(null);
            const [categorySearchQuery, setCategorySearchQuery] = useState('');
            const [isDescriptionExpanded, setIsDescriptionExpanded] = useState(false);
            const [variantGroups, setVariantGroups] = useState([]);
            const [selectedDealDetail, setSelectedDealDetail] = useState(null);
            const [categories, setCategories] = useState([]); // ── NEW: real categories from Firestore
            const [isItemLocked, setIsItemLocked] = useState(false); // ── NEW: lock name/brand/unit for reporting existing items

            // Auth State
            const [currentUser, setCurrentUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [showLoginModal, setShowLoginModal] = useState(false);

            // Report State
            const [showReportModal, setShowReportModal] = useState(false);
            const [reportText, setReportText] = useState('');
            const [reportImages, setReportImages] = useState([]);
            const [isSubmittingReport, setIsSubmittingReport] = useState(false);

            // Per-post report state
            const [postReportDeal, setPostReportDeal] = useState(null);
            const [postReportReason, setPostReportReason] = useState(null);
            const [postReportText, setPostReportText] = useState('');
            const [isSubmittingPostReport, setIsSubmittingPostReport] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);

            // ── Lazy Auth & Top Toast state ──
            const [showTopToast, setShowTopToast] = useState(false);
            const [topToastMessage, setTopToastMessage] = useState({ title: '', isSuccess: false });

            // Profile state
            const [showProfileModal, setShowProfileModal] = useState(false);
            const [profileForceOpen, setProfileForceOpen] = useState(false);

            // ── Tip-off (ฝากบอกต่อ) state ──
            const [showTipoffModal, setShowTipoffModal] = useState(false);
            const [tipoffImages, setTipoffImages] = useState([]); // [{file, preview}]
            const [tipoffItemName, setTipoffItemName] = useState('');
            const [tipoffStore, setTipoffStore] = useState('');
            const [tipoffPrice, setTipoffPrice] = useState('');
            const [isSubmittingTipoff, setIsSubmittingTipoff] = useState(false);
            const [myTipoffs, setMyTipoffs] = useState([]);
            const [tipoffRefImages, setTipoffRefImages] = useState([]); // reference images for pre-fill
            const [selectedTipoffView, setSelectedTipoffView] = useState(null);

            const compressImage = (file, maxDim = 800) => new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > maxDim || h > maxDim) {
                            if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
                            else { w = Math.round(w * maxDim / h); h = maxDim; }
                        }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        canvas.toBlob(resolve, 'image/jpeg', 0.8);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });

            const handleSubmitTipoff = async () => {
                // LAZY_AUTH_GATE
                if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }
                const activeUser = auth.currentUser;

                if (tipoffImages.length === 0) { alert('กรุณาถ่ายหรือเลือกรูปอย่างน้อย 1 รูป'); return; }
                setIsSubmittingTipoff(true);
                try {
                    const autoId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
                    const imageUrls = [];
                    for (let i = 0; i < tipoffImages.length; i++) {
                        const compressed = await compressImage(tipoffImages[i].file);
                        const fileRef = storageRef(storage, `tipoffs/${activeUser.uid}/${autoId}/img_${i}.jpg`);
                        await uploadBytes(fileRef, compressed);
                        const url = await getDownloadURL(fileRef);
                        imageUrls.push(url);
                    }
                    await addDoc(collection(db, "tipoffs"), {
                        userId: activeUser.uid,
                        userDisplayName: profile?.nickname || activeUser.displayName || (activeUser.isAnonymous ? 'ผู้เยี่ยมชม' : 'ผู้ใช้'),
                        imageUrls,
                        itemName: tipoffItemName.trim(),
                        store: tipoffStore.trim(),
                        price: parseFloat(tipoffPrice) || 0,
                        status: 'pending',
                        createdAt: Date.now(),
                        adminNote: ''
                    });
                    setTipoffImages([]); setTipoffItemName(''); setTipoffStore(''); setTipoffPrice('');
                    setShowTipoffModal(false);

                    if (activeUser.isAnonymous) {
                        setTopToastMessage({ title: 'บันทึกแล้ว! สมัครบัญชีเพื่อไม่ให้ข้อมูลหาย', isSuccess: false });
                        setShowTopToast(true);
                        setTimeout(() => setShowTopToast(false), 6000);
                    } else {
                        setToastMessage('ส่งแล้ว! Admin จะช่วยลงข้อมูลให้เร็วๆ นี้ 🙏');
                    }
                } catch (e) { alert('เกิดข้อผิดพลาด: ' + e.message); }
                setIsSubmittingTipoff(false);
            };

            // Fetch liked items
            const { likedItemIds, loadingLikes } = useUserLikes(currentUser);

            useEffect(() => {
                if (toastMessage) {
                    const t = setTimeout(() => setToastMessage(null), 3000);
                    return () => clearTimeout(t);
                }
            }, [toastMessage]);

            const pendingActionRef = useRef(null);
            const sentinelRef = useRef(null);

            // Infinite scroll observer
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    const first = entries[0];
                    if (first.isIntersecting && feedLoaded) {
                        setFeedLimit(prev => prev + 10);
                    }
                }, { threshold: 0.1 });

                const currentSentinel = sentinelRef.current;
                if (currentSentinel) {
                    observer.observe(currentSentinel);
                }

                return () => {
                    if (currentSentinel) {
                        observer.unobserve(currentSentinel);
                    }
                };
            }, [feedLoaded]);

            // Debounce search query (500ms) + log after debounce resolves
            useEffect(() => {
                const q = searchQuery.trim().toLowerCase();
                if (q.length < 2) { setDebouncedSearchQuery(''); return; }
                const timer = setTimeout(() => {
                    setDebouncedSearchQuery(q);
                    lastSearchTermRef.current = q;
                }, 500);
                return () => clearTimeout(timer);
            }, [searchQuery]);

            // ANALYTICS_GATE — log AFTER debounce resolves (not on keystrokes)
            useEffect(() => {
                if (!debouncedSearchQuery || debouncedSearchQuery.length < 2) return;
                addDoc(collection(db, "searchLogs"), {
                    query: debouncedSearchQuery,
                    userId: auth.currentUser?.uid || "guest",
                    isAnonymous: auth.currentUser?.isAnonymous ?? true,
                    timestamp: Date.now(),
                    resultCount: searchResultCountRef.current,
                    hasResults: searchResultCountRef.current > 0
                }).catch(() => { });
            }, [debouncedSearchQuery]);

            useEffect(() => {
                const unsubscribeAuth = onAuthStateChanged(auth, async (user) => {
                    setCurrentUser(user);
                    setAuthLoading(false);
                    // Execute pending action after upgrade
                    if (user && !user.isAnonymous && pendingActionRef.current) {
                        const action = pendingActionRef.current;
                        pendingActionRef.current = null;
                        action();
                    }
                    // Track user in Firestore
                    if (user) {
                        try {
                            await setDoc(doc(db, 'users', user.uid), {
                                displayName: user.displayName || (user.isAnonymous ? 'ผู้เยี่ยมชม' : 'ผู้ใช้'),
                                photoURL: user.photoURL || null,
                                email: user.email || null,
                                isAnonymous: user.isAnonymous || false,
                                lastSeen: Date.now(),
                                provider: user.providerData?.[0]?.providerId || 'anonymous'
                            }, { merge: true });
                        } catch (e) { console.error('Track user error:', e); }
                        // Profile completeness check for non-guest users
                        if (!user.isAnonymous) {
                            try {
                                const snap = await getDoc(doc(db, 'users', user.uid));
                                const data = snap.exists() ? snap.data() : {};
                                if (!data.nickname || !data.firstName || !data.lastName || !data.mobile || !data.province) {
                                    setShowProfileModal(true);
                                    setProfileForceOpen(true);
                                }
                            } catch (e) { console.error('Profile check error:', e); }
                        }
                    }
                });
                // Track page view
                try {
                    const today = new Date().toISOString().slice(0, 10);
                    setDoc(doc(db, 'analytics', today), { views: increment(1), date: today }, { merge: true });
                } catch (e) { console.error('Track pageview error:', e); }
                return () => unsubscribeAuth();
            }, []);

            const signingInRef = useRef(false);

            const handleUpgradeToGoogle = async () => {
                if (signingInRef.current) return;
                signingInRef.current = true;
                try {
                    if (!currentUser || !currentUser.isAnonymous) {
                        // Not a guest — just do normal sign in
                        try { await signInWithPopup(auth, googleProvider); setShowLoginModal(false); }
                        catch (error) {
                            if (error.code !== 'auth/cancelled-popup-request' && error.code !== 'auth/popup-closed-by-user') {
                                alert('เกิดข้อผิดพลาดในการเข้าสู่ระบบด้วย Google: ' + error.message);
                            }
                        }
                        return;
                    }
                    try {
                        const provider = new GoogleAuthProvider();
                        const result = await linkWithPopup(currentUser, provider);
                        const user = result.user;
                        try {
                            const q = query(collection(db, "items"), where("userId", "==", user.uid));
                            const snap = await getDocs(q);
                            const updates = snap.docs.map(d => updateDoc(doc(db, "items", d.id), {
                                userDisplayName: profile?.nickname || user.displayName || 'ผู้ใช้',
                                userPhotoURL: user.photoURL || null
                            }));
                            await Promise.all(updates);
                        } catch (e) { console.error('Batch update posts error:', e); }
                        setShowLoginModal(false);
                    } catch (error) {
                        if (error.code === 'auth/credential-already-in-use') {
                            const proceed = confirm('บัญชี Google นี้มีอยู่แล้ว โพสต์ที่โพสต์ในฐานะ Guest จะไม่ถูกย้าย\nต้องการเข้าสู่ระบบด้วยบัญชีที่มีอยู่แทนไหม?');
                            if (proceed) {
                                try { await signInWithPopup(auth, googleProvider); setShowLoginModal(false); }
                                catch (e2) {
                                    if (e2.code !== 'auth/cancelled-popup-request' && e2.code !== 'auth/popup-closed-by-user') {
                                        alert('เกิดข้อผิดพลาด: ' + e2.message);
                                    }
                                }
                            }
                        } else if (error.code !== 'auth/cancelled-popup-request' && error.code !== 'auth/popup-closed-by-user') {
                            alert('เกิดข้อผิดพลาด: ' + error.message);
                        }
                    }
                } finally {
                    signingInRef.current = false;
                }
            };

            const handleGoogleLogin = async () => {
                if (signingInRef.current) return;
                if (currentUser?.isAnonymous) {
                    return handleUpgradeToGoogle();
                }
                signingInRef.current = true;
                try { await signInWithPopup(auth, googleProvider); setShowLoginModal(false); }
                catch (error) {
                    if (error.code !== 'auth/cancelled-popup-request' && error.code !== 'auth/popup-closed-by-user') {
                        alert('เกิดข้อผิดพลาดในการเข้าสู่ระบบด้วย Google: ' + error.message);
                    }
                }
                finally { signingInRef.current = false; }
            };

            const handleGuestLogin = async () => {
                try { await signInAnonymously(auth); setShowLoginModal(false); }
                catch (error) { alert('เกิดข้อผิดพลาดในการเข้าสู่ระบบ'); }
            };

            const handleLogout = async () => {
                try { await signOut(auth); } catch (error) { console.error('Logout error:', error); }
            };

            const isGuestUser = currentUser?.isAnonymous === true;
            const isLoggedIn = currentUser !== null;
            const { profile, loading: profileLoading, saveProfile } = useUserProfile(currentUser);
            const userDisplayName = profile?.nickname || currentUser?.displayName || (isGuestUser ? 'ผู้เยี่ยมชม (Guest)' : 'ผู้ใช้');
            const userPhotoURL = profile?.photoURL || currentUser?.photoURL || null;

            const ImagePlaceholder = () => (
                <div className="w-full h-full flex flex-col items-center justify-center bg-gray-100/80 text-gray-400">
                    <ImageOff size={24} className="mb-1" />
                    <span className="text-[10px] font-bold">ไม่มีรูปภาพ</span>
                </div>
            );

            const StoreLogo = ({ storeId, size = 'sm' }) => {
                const meta = stores.find(s => s.id === storeId);
                const logoUrl = meta?.logoUrl;
                const sizeMap = { xs: 'w-5 h-5', sm: 'w-8 h-8', md: 'w-10 h-10', lg: 'w-16 h-16', xl: 'w-20 h-20' };
                const iconMap = { xs: 10, sm: 14, md: 18, lg: 24, xl: 32 };
                const box = sizeMap[size] || sizeMap.sm;
                const iconSz = iconMap[size] || 14;
                if (logoUrl) {
                    return (
                        <div className={`${box} rounded-lg bg-white border border-gray-100 flex items-center justify-center overflow-hidden flex-shrink-0 shadow-sm`}>
                            <img src={logoUrl} alt={storeId} className="w-full h-full object-contain p-0.5"
                                onError={e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                            <div style={{ display: 'none' }} className="w-full h-full items-center justify-center text-orange-400"><Store size={iconSz} /></div>
                        </div>
                    );
                }
                return (
                    <div className={`${box} rounded-lg bg-orange-50 border border-orange-100 flex items-center justify-center text-orange-400 flex-shrink-0 shadow-sm`}>
                        <Store size={iconSz} />
                    </div>
                );
            };

            // Store alias resolution
            const storeAliasMap = {};
            stores.forEach(s => {
                // Map ID itself (case-insensitive) to official ID for consistency
                storeAliasMap[s.id.toLowerCase().trim()] = s.id;
                if (s.aliases && s.aliases.length > 0) {
                    s.aliases.forEach(alias => { storeAliasMap[alias.toLowerCase().trim()] = s.id; });
                }
            });
            const resolveStoreName = (name) => {
                if (!name) return name;
                return storeAliasMap[name.toLowerCase().trim()] || name.trim();
            };

            // ── Helper: get categories for a product name ──
            const getCategoriesForProduct = (productName) => {
                return categories.filter(c => (c.items || []).includes(productName)).map(c => c.name);
            };

            const formatUnitDetail = (deal) => {
                const subMode = deal.subUnitMode || 'one';
                const qtyType = subMode === 'many' ? `${deal.unitQuantity} หน่วยซื้อ` : `${deal.unitQuantity} ${deal.unitType}`;
                if (subMode === 'many') {
                    const hasSize = deal.subUnitSize;
                    const countStr = `มี ${deal.subUnitCount || 0} ${deal.subUnit}`;
                    if (deal.subUnitEqual && hasSize) {
                        return `${qtyType} (${countStr} x ${deal.subUnitSize} ${deal.subUnitSizeType || ''})`;
                    } else if (!deal.subUnitEqual && hasSize) {
                        return `${qtyType} (${countStr} รวม ${deal.subUnitSize} ${deal.subUnitSizeType || ''})`;
                    } else {
                        return `${qtyType} (${countStr})`;
                    }
                } else if (subMode === 'one') {
                    if (deal.subUnitSize && (deal.subUnitCategory === 'volume' || deal.subUnitCategory === 'weight' || deal.subUnitCategory === 'custom')) {
                        return `${qtyType} (${deal.subUnitSize} ${deal.subUnitSizeType || ''})`;
                    }
                }
                return qtyType;
            };

            // Firebase Fetch
            useEffect(() => {
                const q = query(collection(db, "items"), orderBy("lastUpdated", "desc"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const fbDeals = snapshot.docs
                        .filter(doc => doc.data().deleted !== true && (doc.data().status || "active") !== "hidden")
                        .map(doc => {
                            const data = doc.data();
                            const numPrice = parseFloat(data.price) || 0;
                            const numCashback = data.cashbackUsed ? (parseFloat(data.cashbackAmount) || 0) : 0;
                            const totalPrice = Math.max(0, numPrice - numCashback);

                            const unitQty = parseInt(data.unitQuantity) || 1;

                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        const canvas = document.createElement('canvas');

                                                                            }`}><Clock size={10} /> {new Date(news.createdAt).toLocaleString('th-TH')}</div>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })
                                                )}
                                            </div>
                                        )}

                                        {/* ฝากบอกต่อ Tab */}
                                        {profileTab === 'tipoffs' && (
                                            <div className="space-y-3">
                                                <div className="flex items-center gap-2 text-orange-600 text-sm font-bold mb-4"><Camera size={16} /> ฝากบอกต่อของฉัน ({myTipoffs.length})</div>
                                                {myTipoffs.length === 0 ? (
                                                    <div className="text-center py-12">
                                                        <Camera size={40} className="mx-auto text-gray-200 mb-3" />
                                                        <p className="text-sm text-gray-500 font-bold">ยังไม่มีรายการ</p>
                                                        {!isLoggedIn ? (
                                                            <div className="mt-4 px-6">
                                                                <p className="text-xs text-gray-400 mb-3">เข้าสู่ระบบเพื่อส่งรูปฝากบอกต่อ</p>
                                                                <button onClick={handleGoogleLogin} className="w-full px-4 py-2.5 bg-white border-2 border-gray-200 hover:bg-gray-50 text-gray-700 text-xs font-bold rounded-full transition-colors flex items-center justify-center gap-2">
                                                                    <svg className="w-4 h-4" viewBox="0 0 24 24">
                                                                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                                                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                                                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                                                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                                                                    </svg>
                                                                    เข้าสู่ระบบด้วย Google
                                                                </button>
                                                            </div>
                                                        ) : (
                                                            <p className="text-xs text-gray-400 mt-1">แตะปุ่มกล้องที่หน้า "เพิ่มดีล" เพื่อส่งรูป</p>
                                                        )}
                                                    </div>
                                                ) : (
                                                    myTipoffs.map(tip => {
                                                        const statusMap = { pending: { Icon: Clock, label: 'รอ admin', color: 'bg-yellow-50 text-yellow-700 border-yellow-200' }, approved: { Icon: CheckCircle, label: 'บอกต่อแล้ว', color: 'bg-green-50 text-green-700 border-green-200' }, rejected: { Icon: XCircle, label: 'ไม่ผ่าน', color: 'bg-red-50 text-red-700 border-red-200' } };
                                                        const st = statusMap[tip.status] || statusMap.pending;
                                                        const StatusIcon = st.Icon;
                                                        return (
                                                            <div key={tip.id} onClick={() => setSelectedTipoffView(tip)} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 hover:shadow-md transition-shadow cursor-pointer">
                                                                <div className="flex gap-3">
                                                                    <div className="w-16 h-16 rounded-xl overflow-hidden bg-gray-100 flex-shrink-0 border border-gray-200">
                                                                        {tip.imageUrls?.[0] ? <img src={tip.imageUrls[0]} className="w-full h-full object-cover" /> : <Camera size={20} className="m-auto mt-5 text-gray-300" />}
                                                                    </div>
                                                                    <div className="flex-1 min-w-0">
                                                                        <h4 className="font-bold text-sm text-gray-800 line-clamp-1">{tip.itemName || 'ไม่ระบุชื่อ'}</h4>
                                                                        {tip.store && <p className="text-[10px] text-gray-500 font-medium flex items-center gap-1 mt-0.5"><Store size={10} /> {tip.store}</p>}
                                                                        {tip.price > 0 && <p className="text-[10px] text-blue-600 font-bold mt-0.5">฿{tip.price}</p>}
                                                                        <div className="flex items-center gap-2 mt-1.5">
                                                                            <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full border flex flex-row items-center gap-1 ${st.color}`}><StatusIcon size={10} /> {st.label}</span>
                                                                            <span className="text-[9px] text-gray-400">{new Date(tip.createdAt).toLocaleDateString('th-TH', { day: 'numeric', month: 'short' })}</span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                                {tip.adminNote && (
                                                                    <div className={`mt-2 p-2.5 rounded-xl text-[11px] font-medium flex items-start gap-1.5 ${tip.status === 'rejected' ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-blue-50 text-blue-700 border border-blue-200'}`}>
                                                                        <MessageSquare size={12} className="flex-shrink-0 mt-0.5" />
                                                                        <div><span className="font-bold">Admin:</span> {tip.adminNote}</div>
                                                                    </div>
                                                                )}
                                                                {tip.status === 'pending' && (
                                                                    <button onClick={(e) => {
                                                                        e.stopPropagation();
                                                                        setTipoffRefImages(tip.imageUrls || []);
                                                                        if (tip.itemName) setItemName(tip.itemName);
                                                                        if (tip.store) setStore(tip.store);
                                                                        if (tip.price > 0) setPrice(String(tip.price));
                                                                        setCurrentView('add');
                                                                    }} className="mt-2 w-full py-2 bg-green-50 text-green-600 text-xs font-bold rounded-xl border border-green-200 hover:bg-green-100 transition-colors flex items-center justify-center gap-1">
                                                                        <Edit3 size={12} /> กรอกเอง
                                                                    </button>
                                                                )}
                                                            </div>
                                                        );
                                                    })
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </>
                            );
                        })()}
                    </div>
                );
            };
            // ── FEED: shipping toggle only, no dummy category tabs ──
            const renderFeed = () => {
                // Build the deduplicated feed list
                const feedItems = (() => {
                    const seenVG = new Set();
                    return groupedDeals.filter(deal => {
                        const status = deal.status || 'active';
                        if (status === 'hidden') return false;
                        if (status === 'expired') return false; // not in main feed

                        const vg = variantGroups.find(v => v.items && v.items.includes(deal.name));
                        if (vg && vg.items.length >= 2) {
                            if (seenVG.has(vg.id)) return false;
                            seenVG.add(vg.id);
                        }
                        return true;
                    });
                })();

                const visibleItems = feedItems.slice(0, feedLimit);
                const hasMore = feedItems.length > feedLimit;

                return (
                    <div className="flex-1 overflow-y-auto p-3 bg-gray-100 pb-24 animate-fade-in">
                        {/* Only shipping toggle remains */}
                        <div className="flex gap-2 mb-3 px-1">
                            <button
                                onClick={() => setShowShippingInFeed(v => !v)}
                                className={`whitespace-nowrap px-4 py-1.5 rounded-full text-[11px] font-bold shadow-sm transition-colors border flex items-center gap-1.5 ${showShippingInFeed ? 'bg-orange-500 text-white border-orange-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>
                                รวมค่าจัดส่ง
                            </button>
                            <button
                                onClick={() => setShowVolumeInFeed(v => !v)}
                                className={`whitespace-nowrap px-4 py-1.5 rounded-full text-[11px] font-bold transition-colors shadow-sm flex items-center gap-1.5 border ${showVolumeInFeed
                                    ? 'bg-blue-500 text-white border-blue-600'
                                    : 'bg-white text-blue-500 border-blue-300 hover:bg-blue-50'}`}>
                                แสดง ฿/หน่วย
                            </button>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                            {!feedLoaded ? (
                                Array.from({ length: 6 }).map((_, i) => (
                                    <div key={`sk-${i}`} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 animate-pulse">
                                        <div className="aspect-square bg-gray-200" />
                                        <div className="p-3 space-y-2">
                                            <div className="h-3 bg-gray-200 rounded-full w-3/4" />
                                            <div className="h-2.5 bg-gray-100 rounded-full w-1/2" />
                                            <div className="flex justify-between items-center mt-2">
                                                <div className="h-4 bg-gray-200 rounded-full w-1/3" />
                                                <div className="h-3 bg-gray-100 rounded-full w-1/4" />
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                visibleItems.map(deal => renderProductCard(deal, false))
                            )}
                        </div>

                        {/* Sentinel for infinite scroll */}
                        {feedLoaded && hasMore && (
                            <div ref={sentinelRef} className="py-8 flex justify-center items-center">
                                <div className="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                                <span className="ml-3 text-xs text-gray-400 font-medium italic">กำลังโหลดรายการเพิ่มเติม...</span>
                            </div>
                        )}

                        {feedLoaded && !hasMore && feedItems.length > 10 && (
                            <div className="text-center py-8 text-[10px] text-gray-400 font-medium italic">— คุณดูสินค้าทุกรายการแล้ว —</div>
                        )}
                    </div>
                );
            };

            // ── SEARCH: real category chips from Firestore, category badges on cards ──
            const renderSearch = () => {
                // Build filtered results using debounced query + cache
                const q = debouncedSearchQuery;
                let searchResults;
                const cacheKey = `${q}|${activeCategoryFilter || ''}|${activeBrandFilter || ''}`;
                if (searchCache.current[cacheKey]) {
                    searchResults = searchCache.current[cacheKey];
                } else {
                    searchResults = groupedDeals.filter(deal => {
                        const status = deal.status || 'active';
                        if (status === 'hidden') return false;

                        const textMatch = !q || (
                            (deal.name && deal.name.toLowerCase().includes(q)) ||
                            (deal.brand && deal.brand.toLowerCase().includes(q)) ||
                            (deal.tags && deal.tags.some(t => t.toLowerCase().includes(q)))
                        );
                        const catMatch = !activeCategoryFilter || (() => {
                            const cat = categories.find(c => c.name === activeCategoryFilter);
                            return cat ? (cat.items || []).includes(deal.name) : false;
                        })();
                        const brandMatch = !activeBrandFilter || (deal.brand && deal.brand === activeBrandFilter);
                        return textMatch && catMatch && brandMatch;
                    });
                    if (q) searchCache.current[cacheKey] = searchResults;
                }

                searchResultCountRef.current = searchResults.length;

                const isFiltering = debouncedSearchQuery || activeCategoryFilter || activeBrandFilter;
                const isTypingShort = searchQuery.length > 0 && searchQuery.length < 2 && !activeCategoryFilter && !activeBrandFilter;

                return (
                    <div className="flex-1 flex flex-col bg-gray-100 overflow-hidden animate-fade-in relative z-0 pb-20">
                        {/* Search bar */}
                        <div className="bg-white p-4 border-b border-gray-200 shadow-sm z-10">
                            <div className="relative">
                                <input
                                    type="text"
                                    placeholder="พิมพ์ค้นหาสินค้า, ยี่ห้อ, แท็ก..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full py-2.5 pl-10 pr-4 bg-gray-50 rounded-xl text-sm font-medium text-gray-800 focus:outline-none border-2 border-transparent focus:border-orange-500 transition-colors"
                                />
                                <Search className="absolute left-3 top-3 text-gray-400" size={18} />
                                {searchQuery && (
                                    <button onClick={() => setSearchQuery('')} className="absolute right-3 top-3 text-gray-400 hover:text-gray-600"><X size={18} /></button>
                                )}
                            </div>

                            {/* ── Filter mode tabs ── */}
                            <div className="flex gap-1 mt-3 pb-0.5">
                                <button
                                    onClick={() => { setSearchFilterMode('all'); setActiveCategoryFilter(null); setActiveBrandFilter(null); }}
                                    className={`whitespace-nowrap flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold transition-all flex-shrink-0 ${searchFilterMode === 'all' && !activeCategoryFilter && !activeBrandFilter
                                        ? 'bg-orange-500 text-white shadow-sm shadow-orange-200'
                                        : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                    <Grid size={11} /> ทั้งหมด
                                </button>
                                <button
                                    onClick={() => { setSearchFilterMode('category'); setActiveBrandFilter(null); }}
                                    className={`whitespace-nowrap flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold transition-all flex-shrink-0 ${searchFilterMode === 'category'
                                        ? 'bg-blue-600 text-white shadow-sm shadow-blue-200'
                                        : 'bg-white text-gray-600 border border-gray-200 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200'}`}>
                                    <Folder size={11} /> ค้นหาหมวดหมู่
                                </button>
                                <button
                                    onClick={() => { setSearchFilterMode('brand'); setActiveCategoryFilter(null); }}
                                    className={`whitespace-nowrap flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold transition-all flex-shrink-0 ${searchFilterMode === 'brand'
                                        ? 'bg-purple-600 text-white shadow-sm shadow-purple-200'
                                        : 'bg-white text-gray-600 border border-gray-200 hover:bg-purple-50 hover:text-purple-600 hover:border-purple-200'}`}>
                                    <Tag size={11} /> ค้นหายี่ห้อ
                                </button>
                                <button
                                    onClick={() => { setSearchFilterMode('shop'); setActiveCategoryFilter(null); setActiveBrandFilter(null); }}
                                    className={`whitespace-nowrap flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold transition-all flex-shrink-0 ${searchFilterMode === 'shop'
                                        ? 'bg-green-600 text-white shadow-sm shadow-green-200'
                                        : 'bg-white text-gray-600 border border-gray-200 hover:bg-green-50 hover:text-green-600 hover:border-green-200'}`}>
                                    <Store size={11} /> ค้นหาร้านค้า
                                </button>
                            </div>

                            {/* ── Category chips (shown in category mode) ── */}
                            {searchFilterMode === 'category' && categories.length > 0 && (() => {
                                const q = (searchQuery || '').trim().toLowerCase();
                                const filtered = q ? categories.filter(cat => cat.name.toLowerCase().includes(q)) : categories;
                                return filtered.length > 0 ? (
                                    <div className="flex gap-2 overflow-x-auto hide-scrollbar mt-2 pb-0.5">
                                        {filtered.map(cat => (
                                            <button
                                                key={cat.id}
                                                onClick={() => { setSelectedCategoryForDetail(cat.name); setCurrentView('category_detail'); }}
                                                className={`whitespace-nowrap flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold transition-all flex-shrink-0 bg-white text-gray-600 border border-gray-200 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200`}>
                                                <Folder size={11} /> {cat.name}
                                                <span className={`text-[9px] px-1 py-0.5 rounded-full ml-0.5 font-bold bg-gray-100 text-gray-400`}>
                                                    {(cat.items || []).length}
                                                </span>
                                            </button>
                                        ))}
                                    </div>
                                ) : null;
                            })()}

                            {/* ── Brand chips (shown in brand mode) ── */}
                            {searchFilterMode === 'brand' && (() => {
                                const uniqueBrands = [...new Set(deals.map(d => d.brand).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'th'));
                                const q = (searchQuery || '').trim().toLowerCase();
                                const filtered = q ? uniqueBrands.filter(b => b.toLowerCase().includes(q)) : uniqueBrands;
                                return filtered.length > 0 ? (
                                    <div className="flex gap-2 overflow-x-auto hide-scrollbar mt-2 pb-0.5">
                                        {filtered.map(brand => (
                                            <button
                                                key={brand}
                                                onClick={() => { setSelectedBrandForDetail(brand); setCurrentView('brand_detail'); }}
                                                className={`whitespace-nowrap flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold transition-all flex-shrink-0 bg-white text-gray-600 border border-gray-200 hover:bg-purple-50 hover:text-purple-600 hover:border-purple-200`}>
                                                <Tag size={11} /> {brand}
                                                <span className={`text-[9px] px-1 py-0.5 rounded-full ml-0.5 font-bold bg-gray-100 text-gray-400`}>
                                                    {deals.filter(d => d.brand === brand).length}
                                                </span>
                                            </button>
                                        ))}
                                    </div>
                                ) : null;
                            })()}

                            {/* ── Shop chips (shown in shop mode) ── */}
                            {searchFilterMode === 'shop' && (() => {
                                const q = (searchQuery || '').trim().toLowerCase();
                                const filtered = q ? stores.filter(s => (s.name || s.id || '').toLowerCase().includes(q)) : stores;
                                return filtered.length > 0 ? (
                                    <div className="flex gap-2 overflow-x-auto hide-scrollbar mt-2 pb-0.5">
                                        {filtered.map(store => (
                                            <button
                                                key={store.id}
                                                onClick={() => { setSelectedStoreForDetail(store); setCurrentView('store_detail'); }}
                                                className={`whitespace-nowrap flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold transition-all flex-shrink-0 bg-white text-gray-600 border border-gray-200 hover:bg-green-50 hover:text-green-600 hover:border-green-200`}>
                                                <Store size={11} /> {store.name || store.id}
                                                <span className={`text-[9px] px-1 py-0.5 rounded-full ml-0.5 font-bold bg-gray-100 text-gray-400`}>
                                                    {getStoreDeals(store.id).length}
                                                </span>
                                            </button>
                                        ))}
                                    </div>
                                ) : null;
                            })()}
                        </div>

                        <div className="flex-1 overflow-y-auto p-3">
                            {isTypingShort ? (
                                <div className="text-center py-10 flex flex-col items-center">
                                    <Search size={32} className="text-gray-300 mb-3" />
                                    <div className="text-gray-400 text-sm font-medium">พิมพ์อย่างน้อย 2 ตัวอักษร</div>
                                </div>
                            ) : searchQuery.length >= 2 && !debouncedSearchQuery ? (
                                <div className="text-center py-10 flex flex-col items-center">
                                    <div className="w-6 h-6 border-2 border-orange-400 border-t-transparent rounded-full animate-spin mb-3"></div>
                                    <div className="text-gray-400 text-xs font-medium">กำลังค้นหา...</div>
                                </div>
                            ) : isFiltering ? (
                                <div>
                                    <h3 className="text-xs font-bold text-gray-500 mb-3 ml-1 uppercase tracking-wider flex items-center gap-2">
                                        พบ {searchResults.length} รายการ
                                        {activeCategoryFilter && (
                                            <span className="flex items-center gap-1 bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-bold">
                                                <Folder size={10} /> {activeCategoryFilter}
                                                <button onClick={() => setActiveCategoryFilter(null)} className="ml-0.5 hover:text-red-500"><X size={10} /></button>
                                            </span>
                                        )}
                                        {activeBrandFilter && (
                                            <span className="flex items-center gap-1 bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full font-bold">
                                                <Tag size={10} /> {activeBrandFilter}
                                                <button onClick={() => setActiveBrandFilter(null)} className="ml-0.5 hover:text-red-500"><X size={10} /></button>
                                            </span>
                                        )}
                                    </h3>
                                    {searchResults.length > 0 ? (
                                        <div className="grid grid-cols-2 gap-3 pb-6">
                                            {(() => {
                                                const seenVG = new Set();
                                                return searchResults.map(deal => {
                                                    const vg = variantGroups.find(v => v.items && v.items.includes(deal.name));
                                                    if (vg && vg.items.length >= 2) {
                                                        if (seenVG.has(vg.id)) return null;
                                                        seenVG.add(vg.id);
                                                    }
                                                    return renderProductCard(deal, true);
                                                });
                                            })()}
                                        </div>
                                    ) : (
                                        <div className="text-center py-10 flex flex-col items-center">
                                            <AlertCircle size={40} className="text-gray-300 mb-3" />
                                            <div className="text-gray-500 text-sm font-medium">ไม่พบสินค้าที่คุณค้นหา</div>
                                            <div className="text-gray-400 text-xs mt-1">ลองเปลี่ยนคำค้นหา หรือเลือกหมวดหมู่อื่น</div>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                /* Empty state — no search, no filter */
                                <div className="flex flex-col items-center justify-center text-gray-400 py-8">
                                    <Search size={40} className="mb-4 text-gray-300" />
                                    <h2 className="text-lg font-bold text-gray-600 mb-2">ค้นหาสินค้า</h2>
                                    <p className="text-xs text-center text-gray-500 mb-6 leading-relaxed">
                                        ค้นหาสินค้าราคาถูกที่สุด<br />จากหลากหลายร้านค้ารอบตัวคุณ
                                    </p>
                                    {/* Show all categories + brands as a two-column visual grid when idle */}
                                    <div className="w-full grid grid-cols-2 gap-4">
                                        {/* LEFT: Categories */}
                                        {categories.length > 0 && (
                                            <div>
                                                <h3 className="text-xs font-bold text-gray-600 mb-3 text-left flex items-center gap-1.5"><Folder size={13} className="text-blue-500" /> หมวดหมู่ทั้งหมด</h3>
                                                <div className="space-y-2">
                                                    {categories.slice(0, categoryLimit).map(cat => (
                                                        <button
                                                            key={cat.id}
                                                            onClick={() => { setSelectedCategoryForDetail(cat.name); setCurrentView('category_detail'); }}
                                                            className="flex items-center gap-2.5 p-3 bg-white rounded-xl shadow-sm border border-gray-100 hover:border-blue-300 hover:shadow-md transition-all text-left active:scale-95 w-full">
                                                            <div className="w-8 h-8 bg-blue-50 rounded-lg flex items-center justify-center flex-shrink-0">
                                                                <Folder size={16} className="text-blue-500" />
                                                            </div>
                                                            <div className="min-w-0">
                                                                <div className="text-xs font-bold text-gray-800 truncate">{cat.name}</div>
                                                                <div className="text-[10px] text-gray-400">{(cat.items || []).length} รายการ</div>
                                                            </div>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* RIGHT: Brands */}
                                        {(() => {
                                            const uniqueBrands = [...new Set(deals.map(d => d.brand).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'th'));
                                            return uniqueBrands.length > 0 ? (
                                                <div>
                                                    <h3 className="text-xs font-bold text-gray-600 mb-3 text-left flex items-center gap-1.5"><Tag size={13} className="text-purple-500" /> ยี่ห้อ/แบรนด์</h3>
                                                    <div className="space-y-2">
                                                        {uniqueBrands.slice(0, brandLimit).map(brand => (
                                                            <button
