    <style>

    <script type="importmap">
      {

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            LayoutDashboard, Edit2, Image as ImageIcon, Save, X, Search, AlertCircle,
            RefreshCw, CheckSquare, Bell, Store, ArrowRight, Check, XCircle, Tag,
            Trash2, ToggleLeft, ToggleRight, Upload, Link2, ChevronDown, ChevronRight,
            User, MessageSquare, Plus, ZoomIn, ChevronLeft, FolderPlus, Clock, Sparkles,
            List, Package, Eye, EyeOff, Users, TrendingUp, BarChart3, Activity, Heart,
            Download, FileJson, FileSpreadsheet, Camera, Clipboard, CheckCircle, XSquare
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import {
            getFirestore, collection, onSnapshot, query, orderBy, limit, collectionGroup,
            doc, updateDoc, deleteDoc, setDoc, addDoc, getDocs, where, increment
        } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyByDvi-wyekFdKMiMv_Cb2yUq9yF0Tw3Uc",
            authDomain: "price-check-86915.firebaseapp.com",
            projectId: "price-check-86915",
            storageBucket: "price-check-86915.firebasestorage.app",
            messagingSenderId: "510258152666",
            appId: "1:510258152666:web:bc24bd3f34e704488e91e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        /* ─────────────────────────── helpers ─────────────────────────── */

        function LikeCountBadge({ itemId }) {
            const [likeCount, setLikeCount] = useState(null);
            useEffect(() => {
                if (!itemId) return;
                getDocs(collection(db, "items", itemId, "likes")).then(snapshot => {
                    setLikeCount(snapshot.size);
                }).catch(e => console.error(e));
            }, [itemId]);

            if (likeCount === null) return <span className="text-[10px] text-gray-400">กำลังโหลด...</span>;
            if (likeCount === 0) return null;
            return (
                <span className="flex items-center gap-1 text-[10px] text-red-500 font-bold bg-red-50 px-1.5 py-0.5 rounded border border-red-100">
                    <Heart size={10} className="fill-current" /> {likeCount} likes
                </span>
            );
        }

        function StoreLogo({ logoUrl, storeName, size = 'md', className = '' }) {
            const sizeMap = { xs: 'w-6 h-6', sm: 'w-8 h-8', md: 'w-10 h-10', lg: 'w-16 h-16', xl: 'w-20 h-20', '2xl': 'w-24 h-24' };
            const iconSizeMap = { xs: 12, sm: 14, md: 18, lg: 24, xl: 32, '2xl': 40 };
            const box = sizeMap[size] || sizeMap.md;
            const iconSz = iconSizeMap[size] || 18;
            if (logoUrl) {
                return (
                    <div className={`${box} rounded-xl bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm flex-shrink-0 ${className}`}>
                        <img src={logoUrl} alt={storeName} className="w-full h-full object-contain p-0.5"
                            onError={e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                        <div style={{ display: 'none' }} className="w-full h-full items-center justify-center bg-orange-50 text-orange-400"><Store size={iconSz} /></div>
                    </div>
                );
            }
            return (
                <div className={`${box} rounded-xl bg-orange-50 border border-orange-100 flex items-center justify-center text-orange-400 shadow-sm flex-shrink-0 ${className}`}>
                    <Store size={iconSz} />
                </div>
            );
        }

        function LogoUploadSection({ currentLogoUrl, onLogoChange }) {
            const fileInputRef = useRef(null);
            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new window.Image();
                    img.onload = () => {
                        const MAX = 400;
                        let w = img.width, h = img.height;
                        if (w > MAX || h > MAX) {
                            if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
                            else { w = Math.round(w * MAX / h); h = MAX; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
                        ctx.drawImage(img, 0, 0, w, h);
                        onLogoChange(canvas.toDataURL('image/png', 0.92));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            return (
                <div className="space-y-2">
                    <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">โลโก้ร้าน (Logo)</label>
                    <div className="flex items-start gap-4">
                        <div className="w-24 h-24 rounded-2xl border-2 border-dashed border-gray-200 bg-gray-50 flex items-center justify-center overflow-hidden flex-shrink-0 shadow-inner">
                            {currentLogoUrl ? <img src={currentLogoUrl} alt="logo preview" className="w-full h-full object-contain p-1" /> : (
                                <div className="flex flex-col items-center text-gray-300 gap-1"><Store size={28} /><span className="text-[9px] font-bold uppercase tracking-widest">No Logo</span></div>
                            )}
                        </div>
                        <div className="flex-1 space-y-2">
                            <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />
                            <button type="button" onClick={() => fileInputRef.current?.click()}
                                className="w-full py-2.5 border-2 border-dashed border-orange-300 bg-orange-50 hover:bg-orange-100 text-orange-600 font-bold text-xs rounded-xl flex items-center justify-center gap-2 transition-colors active:scale-95">
                                <Upload size={14} /> อัพโหลดโลโก้
                            </button>
                            {currentLogoUrl && (
                                <button type="button" onClick={() => onLogoChange('')}
                                    className="w-full py-2 text-xs font-bold text-red-400 hover:text-red-600 border border-red-100 rounded-xl hover:bg-red-50 transition-colors">
                                    ลบโลโก้
                                </button>
                            )}
                            <p className="text-[9px] text-gray-400 leading-relaxed">รองรับ PNG, JPG, WebP · ระบบจะปรับขนาดโดยอัตโนมัติ · รองรับทุก aspect ratio</p>
                        </div>
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════════════════
           Show User Added Toggle Bar
        ═══════════════════════════════════════════════════════════════ */
        function ShowUserAddedBar({ enabled, onToggle, count }) {
            return (
                <div className={`flex items-center justify-between px-4 py-2.5 rounded-xl border transition-all ${enabled ? 'bg-purple-50 border-purple-200' : 'bg-white border-gray-200'}`}>
                    <div className="flex items-center gap-2.5">
                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${enabled ? 'user-added-badge text-white' : 'bg-gray-100 text-gray-400'}`}>
                            <Clock size={16} />
                        </div>
                        <div>
                            <div className={`text-xs font-bold ${enabled ? 'text-purple-800' : 'text-gray-600'}`}>
                                แสดงโพสต์ผู้ใช้ล่าสุด
                                {enabled && count > 0 && (
                                    <span className="ml-2 bg-purple-600 text-white text-[9px] px-1.5 py-0.5 rounded-full">{count} รายการ</span>
                                )}
                            </div>
                            <div className={`text-[10px] ${enabled ? 'text-purple-500' : 'text-gray-400'}`}>
                                {enabled ? 'เรียงตามเวลาที่ผู้ใช้เพิ่มล่าสุด' : 'คลิกเพื่อกรองโพสต์ล่าสุดจากผู้ใช้'}
                            </div>
                        </div>
                    </div>
                    <button
                        onClick={onToggle}
                        className={`relative w-11 h-6 rounded-full transition-all duration-300 focus:outline-none ${enabled ? 'bg-purple-600' : 'bg-gray-300'}`}
                    >
                        <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow-md transition-all duration-300 ${enabled ? 'left-5' : 'left-0.5'}`} />
                    </button>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════════════════
           NEW: Category Items Modal — view + remove items from category
        ═══════════════════════════════════════════════════════════════ */
        function CategoryItemsModal({ category, allItems, onClose, onRemoveItem }) {
            const [search, setSearch] = useState('');
            const [removing, setRemoving] = useState(null);

            const items = (category.items || []);
            const filtered = search
                ? items.filter(name => name.toLowerCase().includes(search.toLowerCase()))
                : items;

            const handleRemove = async (productName) => {
                setRemoving(productName);
                await onRemoveItem(category.id, category.items, productName);
                setRemoving(null);
            };

            // Get product info from allItems for each name
            const getProductInfo = (name) => {
                return allItems.find(i => i.name === name);
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[130] flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl flex flex-col max-h-[88vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                        {/* Header */}
                        <div className="p-5 border-b border-gray-100 bg-gradient-to-r from-blue-600 to-blue-700 text-white flex justify-between items-start flex-shrink-0">
                            <div>
                                <h2 className="text-base font-bold flex items-center gap-2">
                                    <List size={18} className="text-blue-200" />
                                    รายการสินค้าในหมวด
                                </h2>
                                <p className="text-blue-200 font-bold text-lg mt-0.5">{category.name}</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-full">
                                    <span className="text-xs font-bold">{items.length} รายการ</span>
                                </div>
                                <button onClick={onClose} className="text-white/60 hover:text-white w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors">
                                    <X size={18} />
                                </button>
                            </div>
                        </div>

                        {/* Search */}
                        <div className="p-4 border-b border-gray-100 flex-shrink-0 bg-gray-50">
                            <div className="relative">
                                <input
                                    type="text"
                                    placeholder="ค้นหาสินค้าในหมวดหมู่นี้..."
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                    autoFocus
                                    className="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:outline-none font-medium shadow-sm"
                                />
                                <Search size={15} className="absolute left-3 top-3 text-gray-400" />
                                {search && (
                                    <button onClick={() => setSearch('')} className="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                                        <X size={14} />
                                    </button>
                                )}
                            </div>
                            {search && (
                                <p className="text-[10px] text-gray-400 mt-1.5 ml-1">พบ {filtered.length} จาก {items.length} รายการ</p>
                            )}
                        </div>

                        {/* Items list */}
                        <div className="overflow-y-auto flex-1 p-3 space-y-2">
                            {filtered.length === 0 ? (
                                <div className="text-center py-12 text-gray-400">
                                    <Package size={40} className="mx-auto mb-3 text-gray-200" />
                                    <p className="text-sm font-medium">{search ? 'ไม่พบสินค้าที่ค้นหา' : 'ยังไม่มีสินค้าในหมวดหมู่นี้'}</p>
                                </div>
                            ) : filtered.map((productName, idx) => {
                                const info = getProductInfo(productName);
                                const isRemoving = removing === productName;
                                return (
                                    <div
                                        key={productName}
                                        className={`flex items-center gap-3 p-3 rounded-xl border transition-all ${isRemoving ? 'opacity-50 scale-95 border-red-200 bg-red-50' : 'border-gray-100 bg-white hover:border-blue-200 hover:shadow-sm'}`}
                                    >
                                        {/* Product image */}
                                        <div className="w-10 h-10 rounded-lg bg-gray-100 flex-shrink-0 overflow-hidden border border-gray-200">
                                            {info?.masterImage || info?.image
                                                ? <img src={info.masterImage || info.image} className="w-full h-full object-cover" />
                                                : <div className="w-full h-full flex items-center justify-center text-gray-300"><Package size={16} /></div>
                                            }
                                        </div>

                                        {/* Info */}
                                        <div className="flex-1 min-w-0">
                                            <div className="font-bold text-sm text-gray-800 truncate">{productName}</div>
                                            {info?.brand && (
                                                <div className="text-[10px] text-gray-400 font-medium">{info.brand}</div>
                                            )}
                                            <div className="text-[10px] text-gray-400 mt-0.5 flex items-center gap-1">
                                                <span className="w-1.5 h-1.5 rounded-full bg-green-400 inline-block"></span>
                                                {info ? `฿${info.price}` : 'ไม่พบข้อมูลราคา'}
                                            </div>
                                        </div>

                                        {/* Remove button */}
                                        <button
                                            onClick={() => handleRemove(productName)}
                                            disabled={isRemoving}
                                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${isRemoving
                                                    ? 'bg-red-100 text-red-400 border-red-200 cursor-not-allowed'
                                                    : 'bg-white text-red-500 border-red-200 hover:bg-red-500 hover:text-white hover:border-red-500'
                                                }`}
                                        >
                                            {isRemoving ? (
                                                <RefreshCw size={12} className="animate-spin" />
                                            ) : (
                                                <X size={12} />
                                            )}
                                            {isRemoving ? 'กำลังลบ...' : 'ลบออก'}
                                        </button>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Footer */}
                        <div className="p-4 border-t border-gray-100 bg-gray-50 flex-shrink-0 flex items-center justify-between">
                            <p className="text-[10px] text-gray-400">
                                การลบออกจากหมวดหมู่ไม่ได้ลบสินค้า
                            </p>
                            <button
                                onClick={onClose}
                                className="px-5 py-2 bg-white border border-gray-200 text-gray-600 font-bold text-sm rounded-xl hover:bg-gray-100 transition-colors"
                            >
                                ปิด
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════════════════
           Category Assign Modal
        ═══════════════════════════════════════════════════════════════ */
        function AssignCategoryModal({ product, categories, onClose, onSave }) {
            const [search, setSearch] = useState('');
            const [selected, setSelected] = useState(() => {
                return categories.filter(c => (c.items || []).includes(product.name)).map(c => c.id);
            });
            const [newCatName, setNewCatName] = useState('');
            const [creating, setCreating] = useState(false);

            const filtered = search
                ? categories.filter(c => c.name.toLowerCase().includes(search.toLowerCase()))
                : categories;

            const toggle = (id) => setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const handleSave = () => onSave(product.name, selected, newCatName.trim());

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[120] flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl flex flex-col max-h-[88vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-5 border-b border-gray-100 bg-slate-900 text-white flex justify-between items-start flex-shrink-0">
                            <div>
                                <h2 className="text-base font-bold flex items-center gap-2">
                                    <FolderPlus size={18} className="text-orange-400" /> จัดหมวดหมู่สินค้า
                                </h2>
                                <p className="text-xs text-slate-400 mt-0.5 truncate max-w-[300px]">{product.name}</p>
                            </div>
                            <button onClick={onClose} className="text-white/60 hover:text-white mt-0.5"><X size={20} /></button>
                        </div>
                        <div className="p-4 border-b border-gray-100 flex-shrink-0">
                            <div className="relative">
                                <input type="text" placeholder="ค้นหาหมวดหมู่..." value={search} onChange={e => setSearch(e.target.value)} autoFocus
                                    className="w-full pl-9 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:outline-none font-medium" />
                                <Search size={15} className="absolute left-3 top-3 text-gray-400" />
                            </div>
                            {selected.length > 0 && (
                                <div className="mt-2 flex flex-wrap gap-1.5">
                                    {selected.map(id => {
                                        const cat = categories.find(c => c.id === id);
                                        return cat ? (
                                            <span key={id} className="inline-flex items-center gap-1 bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded-full">
                                                {cat.name}
                                                <button onClick={() => toggle(id)} className="hover:text-red-500"><X size={10} /></button>
                                            </span>
                                        ) : null;
                                    })}
                                </div>
                            )}
                        </div>
                        <div className="overflow-y-auto flex-1 divide-y divide-gray-50 p-2">
                            {filtered.length === 0 && !creating && (
                                <div className="text-center py-8 text-gray-400 text-sm italic">ไม่พบหมวดหมู่ที่ค้นหา</div>
                            )}
                            {filtered.map(cat => {
                                const isSelected = selected.includes(cat.id);
                                return (
                                    <button key={cat.id} onClick={() => toggle(cat.id)}
                                        className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-left ${isSelected ? 'bg-blue-50 border border-blue-200' : 'hover:bg-gray-50 border border-transparent'}`}>
                                        <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 transition-all ${isSelected ? 'bg-blue-600 border-blue-600' : 'border-gray-300'}`}>
                                            {isSelected && <Check size={12} className="text-white" strokeWidth={3} />}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className={`text-sm font-bold truncate ${isSelected ? 'text-blue-800' : 'text-gray-700'}`}>{cat.name}</div>
                                            <div className="text-[10px] text-gray-400">{(cat.items || []).length} รายการ</div>
                                        </div>
                                        {isSelected && <Check size={16} className="text-blue-500 flex-shrink-0" />}
                                    </button>
                                );
                            })}
                        </div>
                        <div className="p-4 border-t border-gray-100 bg-gray-50 flex-shrink-0 space-y-3">
                            {creating ? (
                                <div className="flex gap-2">
                                    <input type="text" value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder="ชื่อหมวดหมู่ใหม่..." autoFocus
                                        onKeyDown={e => { if (e.key === 'Enter' && newCatName.trim()) setCreating(false); if (e.key === 'Escape') { setCreating(false); setNewCatName(''); } }}
                                        className="flex-1 px-3 py-2 border border-blue-300 rounded-lg text-sm focus:border-blue-500 focus:outline-none font-medium" />
                                    <button onClick={() => { if (newCatName.trim()) setCreating(false); }} className="bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors"><Check size={16} /></button>
                                    <button onClick={() => { setCreating(false); setNewCatName(''); }} className="bg-gray-200 text-gray-600 px-3 py-2 rounded-lg text-sm font-bold hover:bg-gray-300 transition-colors"><X size={16} /></button>
                                </div>
                            ) : (
                                <button onClick={() => setCreating(true)} className="w-full py-2 border-2 border-dashed border-blue-300 bg-white hover:bg-blue-50 text-blue-600 font-bold text-xs rounded-xl flex items-center justify-center gap-2 transition-colors">
                                    <Plus size={14} /> สร้างหมวดหมู่ใหม่
                                </button>
                            )}
                            {newCatName.trim() && !creating && (
                                <div className="flex items-center gap-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">
                                    <FolderPlus size={14} className="text-blue-500 flex-shrink-0" />
                                    <span className="text-xs font-bold text-blue-700 flex-1">สร้างใหม่: <span className="text-blue-900">"{newCatName}"</span></span>
                                    <button onClick={() => setNewCatName('')} className="text-blue-400 hover:text-red-500"><X size={12} /></button>
                                </div>
                            )}
                            <div className="flex gap-2">

        /* ═══════════════════════════════════════════════════════════════
           Image Lightbox
        ═══════════════════════════════════════════════════════════════ */
        function ImageLightbox({ images, initialIndex = 0, onClose }) {
            const [current, setCurrent] = useState(initialIndex);
            const total = images.length;

            useEffect(() => {
                const handler = (e) => {
                    if (e.key === 'Escape') onClose();
                    if (e.key === 'ArrowRight') setCurrent(c => (c + 1) % total);
                    if (e.key === 'ArrowLeft') setCurrent(c => (c - 1 + total) % total);
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [total]);

            return (
                <div className="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center animate-fade-in" onClick={onClose}>
                    <div className="relative flex items-center justify-center w-full h-full p-4" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 z-10 w-10 h-10 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center transition-colors backdrop-blur-sm"><X size={20} /></button>
                        {total > 1 && <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-black/50 text-white text-xs font-bold px-3 py-1.5 rounded-full backdrop-blur-sm">{current + 1} / {total}</div>}
                        {total > 1 && <button onClick={() => setCurrent(c => (c - 1 + total) % total)} className="absolute left-4 w-10 h-10 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center transition-colors backdrop-blur-sm z-10"><ChevronLeft size={20} /></button>}
                        <img key={current} src={images[current]} alt={`report image ${current + 1}`} className="max-w-full max-h-[85vh] object-contain rounded-xl shadow-2xl animate-fade-in" />
                        {total > 1 && <button onClick={() => setCurrent(c => (c + 1) % total)} className="absolute right-4 w-10 h-10 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center transition-colors backdrop-blur-sm z-10"><ChevronDown size={20} className="rotate-[-90deg]" /></button>}
                        {total > 1 && (
                            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
                                {images.map((img, idx) => (
                                    <button key={idx} onClick={() => setCurrent(idx)} className={`w-12 h-12 rounded-lg overflow-hidden border-2 transition-all ${idx === current ? 'border-white scale-110' : 'border-white/30 opacity-60 hover:opacity-90'}`}>
                                        <img src={img} className="w-full h-full object-cover" />
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

                    const grouped = {};
                    const binned = [];
                    const activeRawItems = [];

                    fbDeals.forEach(deal => {
                        if (deal.deleted === true) { binned.push(deal); return; }
                        activeRawItems.push(deal);
                        const name = deal.name || 'Unknown';
                        const numPrice = parseFloat(deal.price) || 0;
                        const numCashback = deal.cashbackUsed ? (parseFloat(deal.cashbackAmount) || 0) : 0;
                        const totalPrice = Math.max(0, numPrice - numCashback);
                        const unitQty = parseInt(deal.unitQuantity) || 1;
                        const subUnit = deal.subUnit || deal.unitType || 'ชิ้น';
                        const subMode = deal.subUnitMode || 'one';
                        const subUnitCount = parseInt(deal.subUnitCount) || 1;
                        const subUnitSize = deal.subUnitSize || null;
                        const subUnitSizeType = deal.subUnitSizeType || 'ml';
                        const subUnitCategory = deal.subUnitCategory || null;
                        const subUnitEqual = deal.subUnitEqual;

                        const TO_BASE = { ml: 1, cc: 1, L: 1000, ลิตร: 1000, g: 1, kg: 1000, กก: 1000, กรัม: 1 };
                        const totalVolume = (() => {
                            if (subMode === 'one' && (subUnitCategory === 'volume' || subUnitCategory === 'weight')) {

                        const shipFee = (deal.shippingType === 'excluded') ? (parseFloat(deal.shippingFee) || 0) : 0;

                        const ppuWithShipping = itemsCount > 0 ? ((totalPrice + shipFee) / itemsCount) : null;
                        const ppuVolume = totalVolume > 0 ? (totalPrice / totalVolume) * 100 : null;
                        const ppuVolumeWithShipping = totalVolume > 0 ? ((totalPrice + shipFee) / totalVolume) * 100 : null;

                        deal.ppu = ppu;
                        deal.ppuVolume = ppuVolume;
                        deal.ppuWithShipping = ppuWithShipping;
                        deal.ppuVolumeWithShipping = ppuVolumeWithShipping;

                        if (!grouped[name]) {

                            grouped[name].postsCount += 1;
                            grouped[name].originalItems.push(deal);
                            grouped[name].lowestPrice = Math.min(grouped[name].lowestPrice, deal.price);

                            grouped[name].lowestPpu = grouped[name].lowestPpu === null ? ppu : Math.min(grouped[name].lowestPpu, ppu);

                const hrs = Math.floor(mins / 60);
                if (hrs < 24) return `${hrs} ชั่วโมงที่แล้ว`;

                            const { logs, clickLogs } = searchAnalytics;
                            const todayStart = new Date(); todayStart.setHours(0,0,0,0);
                            const uniqueQueries = [...new Set(logs.map(l => l.query))];
                            const noResultLogs = logs.filter(l => !l.hasResults);
                            const todayLogs = logs.filter(l => l.timestamp >= todayStart.getTime());
                            const uniqueSearchersToday = new Set(todayLogs.map(l => l.userId)).size;

                            // Group by query for tables
                            const qMap = {};
                            logs.forEach(l => {
                                if (!qMap[l.query]) qMap[l.query] = { count: 0, noResult: 0, userIds: new Set() };
                                qMap[l.query].count++;
                                qMap[l.query].userIds.add(l.userId || "guest");
                                if (!l.hasResults) qMap[l.query].noResult++;
                            });

                            const allKeywordsArr = Object.entries(qMap).sort((a,b) => b[1].count - a[1].count);
                            const totalKwLimit = showTop50Keywords ? 50 : 10;
                            const topKeywords = allKeywordsArr.slice(0, totalKwLimit);
                            const maxCount = allKeywordsArr.length > 0 ? allKeywordsArr[0][1].count : 1;

                            // No result
                            const noResultOnly = Object.entries(qMap).filter(([,v]) => v.noResult === v.count).sort((a,b) => b[1].count - a[1].count).slice(0, 10);

                            // Funnel
                            const clickMap = {};
                            clickLogs.forEach(c => { if (!clickMap[c.query]) clickMap[c.query] = 0; clickMap[c.query]++; });
                            const funnelData = Object.entries(clickMap).map(([q, clicks]) => ({
                                query: q, clicks, searches: qMap[q]?.count || clicks, ctr: Math.round((clicks / (qMap[q]?.count || clicks)) * 100)
                            })).sort((a,b) => b.searches - a.searches).slice(0, 10);

                            // 7-day SVG bar chart
                            const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
                            const dayMap = {};
                            for (let i = 6; i >= 0; i--) {
                                const d = new Date(Date.now() - i * 24*60*60*1000);
                                dayMap[d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit' })] = { count: 0, users: new Set() };
                            }
                            logs.filter(l => l.timestamp >= Date.now() - SEVEN_DAYS).forEach(l => {
                                const key = new Date(l.timestamp).toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit' });
                                if (dayMap[key] !== undefined) {
                                    dayMap[key].count++;
                                    if (l.userId) dayMap[key].users.add(l.userId);
                                }
                            });
                            const dayEntries = Object.entries(dayMap);
                            const maxDay = Math.max(...dayEntries.map(([,v]) => v.count), 1);

                            return (
                                <div className="space-y-6 animate-fade-in">
                                    {/* Summary Cards */}
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">

                                            <label className="font-bold text-gray-700 text-sm">เลือกรูปภาพหลัก (Master Thumbnail)</label>
                                            <div className="grid grid-cols-4 sm:grid-cols-5 gap-3">
                                                <button onClick={() => setMergeFinalImage('')} className={`aspect-square rounded-xl border-2 flex flex-col items-center justify-center text-xs gap-1 transition-all ${mergeFinalImage === '' ? 'border-orange-500 bg-orange-50 text-orange-600 font-bold' : 'border-dashed border-gray-300 text-gray-400 hover:bg-gray-50'}`}><X size={20} /> ไม่ระบุรูป</button>
                                                {(() => {
                                                    const selGroups = deals.filter(d => selectedForMerge.includes(d.id));
                                                    let imgs = [];
                                                    selGroups.forEach(g => { if (g.masterImage && !imgs.includes(g.masterImage)) imgs.push(g.masterImage); g.originalItems.forEach(item => { if (item.image && !imgs.includes(item.image)) imgs.push(item.image); }); });
                                                    return imgs.map((img, idx) => (
                                                        <div key={idx} onClick={() => setMergeFinalImage(img)} className={`aspect-square rounded-xl overflow-hidden border-4 cursor-pointer relative transition-all ${mergeFinalImage === img ? 'border-orange-500 shadow-md scale-105 z-10' : 'border-transparent hover:border-orange-200'}`}>
                                                            {mergeFinalImage === img && <div className="absolute top-1 right-1 bg-orange-500 text-white rounded-full p-0.5"><CheckSquare size={14} /></div>}
                                                            <img src={img} className="w-full h-full object-cover" />
                                                        </div>
                                                    ));
                                                })()}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-4 bg-slate-50 border-t border-gray-100 flex justify-end gap-3">
                                        <button onClick={() => setShowMergeModal(false)} className="px-6 py-2.5 rounded-lg text-gray-600 font-bold hover:bg-gray-200">ยกเลิก</button>
                                        <button onClick={handleMergeConfirm} className="px-6 py-2.5 rounded-lg bg-orange-600 text-white font-bold shadow-md hover:bg-orange-700 flex items-center gap-2"><Save size={18} /> ยืนยันการรวมข้อมูล</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── Push News Review modal ── */}
                        {showNewsReviewModal && newsToReview && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl flex flex-col animate-fade-in">
                                    <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-blue-50">
                                        <h2 className="text-lg font-bold flex items-center gap-2"><Eye size={22} className="text-blue-500" /> ตรวจสอบข่าวสารก่อนส่ง</h2>
                                        <button onClick={() => setShowNewsReviewModal(false)} className="text-gray-400 hover:text-gray-600"><X size={24} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto flex-1">
                                        <div className="bg-gradient-to-r from-blue-100 to-blue-50 border-2 border-blue-300 rounded-xl p-4 mb-4">
                                            <p className="text-sm text-gray-800 leading-relaxed whitespace-pre-wrap">{newsToReview.text}</p>
                                        </div>
                                        <div className="text-xs text-gray-500 bg-gray-50 p-3 rounded-lg flex items-center gap-2">
                                            <Clock size={14} />
                                            เวลาส่ง: {new Date(newsToReview.createdAt).toLocaleString('th-TH')}
                                        </div>
                                    </div>
                                    <div className="p-4 bg-slate-50 border-t border-gray-100 flex justify-end gap-3">
                                        <button onClick={() => setShowNewsReviewModal(false)} className="px-4 py-2.5 rounded-lg text-gray-600 font-bold hover:bg-gray-200">แก้ไข</button>
                                        <button onClick={async () => {
                                            try {
                                                // Save to Firebase
                                                await addDoc(collection(db, "adminNews"), {
                                                    text: newsToReview.text,
                                                    createdAt: Date.now()
                                                });
                                                setNewsText('');
                                                setShowNewsReviewModal(false);
                                                setNewsToReview(null);
                                            } catch (e) {
                                                alert("เกิดข้อผิดพลาดในการส่งข่าวสาร: " + e.message);
                                            }
                                        }} className="px-4 py-2.5 rounded-lg bg-blue-600 text-white font-bold shadow-md hover:bg-blue-700 flex items-center gap-2"><Check size={16} /> ยืนยันส่ง</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── Relate Store modal ── */}
                        {relatingStore && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                                    <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-blue-50">
                                        <h2 className="text-xl font-bold flex items-center gap-2 text-blue-700"><Link2 className="text-blue-500" /> เชื่อมร้านค้า</h2>
                                        <button onClick={() => { setRelatingStore(null); setRelateSearchQuery(''); }} className="text-gray-400 hover:text-gray-600"><X size={24} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto flex-1 flex flex-col gap-4">
                                        <div className="text-sm text-gray-600">
                                            เลือกชื่อร้านหลักสำหรับ <strong className="text-red-500 font-bold px-1 py-0.5 bg-red-50 rounded">"{relatingStore}"</strong>
                                            <p className="text-xs text-gray-500 mt-1">สินค้าทั้งหมดจะถูกย้ายไปร้านใหม่ และบันทึกชื่อนี้เป็นนามแฝง (Alias)</p>
                                        </div>
                                        <div className="relative">
                                            <input type="text" placeholder="ค้นหาร้านค้าที่ถูกต้อง..." value={relateSearchQuery} onChange={(e) => setRelateSearchQuery(e.target.value)} autoFocus
                                                className="w-full py-3 pl-10 pr-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-xl text-sm font-semibold text-gray-800 outline-none transition-all" />
                                            <Search className="absolute left-3 top-3.5 text-gray-400" size={18} />
                                        </div>
                                        <div className="flex-1 overflow-y-auto min-h-[200px] border border-gray-100 rounded-xl divide-y divide-gray-50">
                                            {allStoreNames.filter(s => s !== relatingStore && s.toLowerCase().includes(relateSearchQuery.toLowerCase())).map(targetStore => {
                                                const meta = stores.find(s => s.id === targetStore) || {};
                                                return (
                                                    <div key={targetStore} className="flex items-center justify-between p-3 hover:bg-blue-50 transition-colors">
                                                        <div className="flex items-center gap-3">
                                                            <StoreLogo logoUrl={meta.logoUrl} storeName={targetStore} size="sm" />
                                                            <div>
                                                                <div className="font-bold text-gray-800 text-sm flex items-center gap-2">{targetStore}{meta.isFamous && <span className="text-[10px] bg-orange-500 text-white px-1.5 py-0.5 rounded-sm">★</span>}</div>
                                                                {meta.province && <div className="text-[10px] text-gray-400">{meta.province}</div>}
                                                            </div>
                                                        </div>
                                                        <button onClick={() => { handleRelateStore(relatingStore, targetStore); setRelateSearchQuery(''); }} className="px-4 py-1.5 bg-white border border-blue-200 text-blue-600 font-bold text-xs rounded-lg hover:bg-blue-500 hover:text-white transition-colors shadow-sm">เชื่อมไปร้านนี้</button>
                                                    </div>
                                                );
                                            })}
                                            {allStoreNames.filter(s => s !== relatingStore && s.toLowerCase().includes(relateSearchQuery.toLowerCase())).length === 0 && <div className="text-center text-gray-400 py-8 text-sm italic">ไม่พบร้านค้าที่ค้นหา</div>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── Admin Comment Modal ── */}
                        {viewingCommentsItemId && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 animate-fade-in" onClick={() => setViewingCommentsItemId(null)}>
                                <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[80vh]" onClick={e => e.stopPropagation()}>
                                    <div className="p-5 border-b border-gray-100 flex justify-between items-center bg-blue-50">
                                        <h2 className="text-xl font-bold flex items-center gap-2 text-blue-700">
                                            <MessageSquare className="text-blue-500" /> จัดการความคิดเห็น
                                        </h2>
                                        <button onClick={() => setViewingCommentsItemId(null)} className="text-gray-400 hover:text-gray-600"><X size={24} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto flex-1 flex flex-col gap-4 bg-gray-50/50">
                                        {loadingAdminComments ? (
                                            <div className="text-center py-8 text-gray-400">กำลังโหลดความเห็น...</div>
                                        ) : adminComments.length === 0 ? (
                                            <div className="text-center py-8 text-gray-400 flex flex-col items-center gap-2">
                                                <MessageSquare size={32} className="opacity-20" />ไม่มีความคิดเห็น
                                            </div>
                                        ) : (
                                            <div className="space-y-4">
                                                {adminComments.map(c => (
                                                    <div key={c.id} className={`bg-white p-4 rounded-xl shadow-sm border ${c.deleted ? 'border-red-200 bg-red-50/30 opacity-70' : 'border-gray-200'}`}>
                                                        <div className="flex justify-between items-start gap-3">
                                                            <div className="flex gap-2">
                                                                {c.userPhotoURL ? <img src={c.userPhotoURL} className="w-8 h-8 rounded-full object-cover" /> : <div className="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-400"><User size={14} /></div>}
                                                                <div>
                                                                    <div className="text-xs font-bold text-gray-800 flex items-center gap-2">
                                                                        {c.userDisplayName}
                                                                        {c.deleted && <span className="text-[9px] bg-red-100 text-red-600 px-1.5 rounded">ถูกลบ (ซ่อนจากผู้ใช้)</span>}
                                                                    </div>
                                                                    <div className="text-[10px] text-gray-400 mt-0.5">{new Date(c.createdAt).toLocaleString('th-TH')}</div>
                                                                </div>
                                                            </div>
                                                            <button onClick={() => adminDeleteComment(c.id)} className="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-1.5 rounded-lg transition-colors" title="ลบถาวร">
                                                                <Trash2 size={14} />
                                                            </button>
                                                        </div>
                                                        <div className="mt-2 text-sm text-gray-700 pl-10 whitespace-pre-wrap">{c.text}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ── Variant Group Modal ── */}
                        {showVariantModal && editingVariantGroup && (
                            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4" onClick={() => setShowVariantModal(false)}>
                                <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl animate-fade-in flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                                    <div className="p-5 border-b border-gray-100 bg-slate-900 text-white flex justify-between items-center flex-shrink-0">
                                        <h2 className="text-lg font-bold flex items-center gap-2"><Tag size={20} className="text-orange-400" /> {editingVariantGroup.id ? 'แก้ไขกลุ่มรุ่นย่อย' : 'เพิ่มกลุ่มรุ่นย่อยใหม่'}</h2>
                                        <button onClick={() => setShowVariantModal(false)} className="text-white/60 hover:text-white"><X size={24} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto flex-1 space-y-5">
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">ชื่อกลุ่ม (Group Name)</label>
                                            <input type="text" value={editingVariantGroup.name} onChange={e => setEditingVariantGroup({ ...editingVariantGroup, name: e.target.value })}
                                                className="w-full border border-gray-200 p-3 rounded-xl font-bold text-slate-800 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 bg-gray-50 text-sm" placeholder="เช่น Downy น้ำยาปรับผ้านุ่ม" />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 flex justify-between items-center"><span>สินค้าในกลุ่ม ({editingVariantGroup.items.length})</span></label>
                                            <div className="bg-gray-50 border border-gray-200 rounded-xl p-3 mb-4 flex flex-wrap gap-2 min-h-[60px] max-h-[150px] overflow-y-auto">
                                                {editingVariantGroup.items.map(item => (
                                                    <span key={item} className="bg-white border text-blue-700 border-blue-200 px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm flex items-center gap-2">
                                                        {item}
                                                        <button onClick={() => setEditingVariantGroup({ ...editingVariantGroup, items: editingVariantGroup.items.filter(i => i !== item) })} className="text-blue-300 hover:text-red-500 hover:bg-red-50 rounded-full p-0.5 transition-colors"><X size={14} /></button>
                                                    </span>
                                                ))}
                                                {editingVariantGroup.items.length === 0 && <span className="text-gray-400 italic text-xs py-2 px-1">กรุณาเพิ่มสินค้าจากรายการด้านล่าง</span>}
                                            </div>
                                            <div className="relative mb-3">
                                                <input type="text" value={variantSearchQuery} onChange={e => setVariantSearchQuery(e.target.value)} placeholder="พิมพ์ค้นหาชื่อสินค้าเพื่อเพิ่มลงกลุ่ม..."
                                                    className="w-full border border-gray-200 p-2.5 pl-9 rounded-xl text-sm bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 font-medium" />
                                                <Search size={16} className="absolute left-3 top-3 text-gray-400" />
                                            </div>
                                            <div className="max-h-48 overflow-y-auto border border-gray-100 rounded-xl divide-y divide-gray-50 bg-white shadow-inner">
                                                {uniqueProductsWithBrand.filter(p => {
                                                    if (editingVariantGroup.items.includes(p.name)) return false;
                                                    const q = variantSearchQuery.toLowerCase().trim();
                                                    if (!q) return true;
                                                    return q.split(/\s+/).every(term => `${p.name} ${p.brand}`.toLowerCase().includes(term));
                                                }).slice(0, 50).map(p => (
                                                    <div key={p.name} className="flex justify-between items-center p-2.5 hover:bg-orange-50 transition-colors text-sm group cursor-pointer" onClick={() => setEditingVariantGroup({ ...editingVariantGroup, items: [...editingVariantGroup.items, p.name] })}>
                                                        <span className="font-medium text-gray-700 truncate mr-2 group-hover:text-orange-700">{p.name} {p.brand && <span className="text-[10px] text-gray-400 font-normal ml-1 border border-gray-200 rounded px-1">{p.brand}</span>}</span>
                                                        <button className="text-[10px] bg-orange-100 text-orange-600 px-2 py-1 rounded-md font-bold group-hover:bg-orange-500 group-hover:text-white transition-colors flex-shrink-0">+ เพิ่ม</button>
                                                    </div>
                                                ))}
                                                {uniqueProductsWithBrand.filter(p => { if (editingVariantGroup.items.includes(p.name)) return false; const q = variantSearchQuery.toLowerCase().trim(); if (!q) return true; return q.split(/\s+/).every(term => `${p.name} ${p.brand}`.toLowerCase().includes(term)); }).length === 0 && <div className="text-center p-6 text-xs text-gray-400 font-medium">ไม่พบสินค้าจากคำค้นหานี้</div>}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-4 border-t border-gray-100 bg-gray-50 flex justify-end gap-3 flex-shrink-0">
                                        <button onClick={() => setShowVariantModal(false)} className="px-5 py-2.5 text-sm font-bold text-gray-500 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors shadow-sm">ยกเลิก</button>
                                        <button onClick={async () => {
                                            if (!editingVariantGroup.name.trim()) return alert("กรุณาใส่ชื่อกลุ่ม");
                                            if (editingVariantGroup.items.length < 2) return alert("ต้องมีสินค้าอย่างน้อย 2 รายการในกลุ่ม");
                                            try {
                                                if (editingVariantGroup.id) { await updateDoc(doc(db, "variantGroups", editingVariantGroup.id), { name: editingVariantGroup.name.trim(), items: editingVariantGroup.items }); }
                                                else { await addDoc(collection(db, "variantGroups"), { name: editingVariantGroup.name.trim(), items: editingVariantGroup.items }); }
                                                setShowVariantModal(false);
                                            } catch (e) { alert("Error saving variant group: " + e.message); }
                                        }} className="px-5 py-2.5 text-sm font-bold text-white bg-orange-500 border border-orange-600 rounded-xl hover:bg-orange-600 transition-colors shadow-sm">
                                            {editingVariantGroup.id ? 'บันทึกการแก้ไข' : 'สร้างกลุ่ม'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Status Change Confirmation Modal */}
                        {statusConfirmModal && (() => {
                            const labels = { active: 'Active — แสดงปกติ', expired: 'Expired — หมดโปรโมชั่น', hidden: 'Hidden — ซ่อนจาก user' };
                            const colors = { active: '#1D9E75', expired: '#9CA3AF', hidden: '#374151' };
                            const { itemName, storeName, currentStatus, newStatus } = statusConfirmModal;
                            return (
                                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center animate-fade-in" onClick={() => setStatusConfirmModal(null)} onKeyDown={(e) => { if (e.key === 'Escape') setStatusConfirmModal(null); }} tabIndex={-1} ref={el => el?.focus()}>
                                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-[360px] mx-4 overflow-hidden animate-scale-in" onClick={e => e.stopPropagation()}>
                                        <div className="p-5 pb-4">
                                            <h3 className="font-bold text-gray-800 text-base mb-3">เปลี่ยนสถานะ?</h3>
                                            <div className="text-sm text-gray-600 mb-2">จาก <span className="font-bold text-gray-800">[{labels[currentStatus] || currentStatus}]</span> → <span className="font-bold" style={{ color: colors[newStatus] }}>[{labels[newStatus] || newStatus}]</span></div>
                                            <div className="text-xs text-gray-500 space-y-1 mt-3">
                                                <div>ชื่อสินค้า: <span className="font-bold text-gray-700">{itemName}</span></div>
                                                <div>ร้าน: <span className="font-bold text-gray-700">{storeName}</span></div>
                                            </div>
                                        </div>
                                        <div className="p-4 pt-0 flex gap-3">
                                            <button onClick={() => setStatusConfirmModal(null)} className="flex-1 py-2.5 rounded-xl text-sm font-bold text-gray-500 border border-gray-300 bg-white hover:bg-gray-50 transition-colors">ยกเลิก</button>
                                            <button onClick={confirmStatusChange} className="flex-1 py-2.5 rounded-xl text-sm font-bold text-white transition-colors shadow-sm" style={{ backgroundColor: colors[newStatus] }}>ยืนยัน</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>

</html>
