        const firebaseConfig = {

            authDomain: "price-check-86915.firebaseapp.com",

            appId: "1:510258152666:web:bc24bd3f34e704488e91e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();
        const UNIT_OPTIONS = {
            volume: ['ml','ลิตร','L','cc'],
            weight: ['g','กรัม','kg','กิโลกรัม'],
            count:  ['ชิ้น','แพ็ค','ถุง','กล่อง','อัน','ใบ','คู่']
        };
        const TO_BASE = {
            ml: 1, cc: 1, ลิตร: 1000, L: 1000,
            g: 1, กรัม: 1, kg: 1000, กิโลกรัม: 1000
        };
        const detectCategory = (u) => {
            if (['ml','cc','ลิตร','L'].includes(u)) return 'volume';
            if (['g','กรัม','kg','กิโลกรัม'].includes(u)) return 'weight';
            return 'count';
        };
        const QUICK_SIZES = {
            volume: [60,100,200,250,330,500,1000],
            weight: [50,100,200,500,1000]
        };
        const THAI_PROVINCES = [
            'กระบี่','กรุงเทพมหานคร','กาญจนบุรี','กาฬสินธุ์','กำแพงเพชร','ขอนแก่น','จันทบุรี','ฉะเชิงเทรา',
            'ชลบุรี','ชัยนาท','ชัยภูมิ','ชุมพร','เชียงราย','เชียงใหม่','ตรัง','ตราด','ตาก','นครนายก',
            'นครปฐม','นครพนม','นครราชสีมา','นครศรีธรรมราช','นครสวรรค์','นนทบุรี','นราธิวาส','น่าน',
            'บึงกาฬ','บุรีรัมย์','ปทุมธานี','ประจวบคีรีขันธ์','ปราจีนบุรี','ปัตตานี','พระนครศรีอยุธยา',
            'พะเยา','พังงา','พัทลุง','พิจิตร','พิษณุโลก','เพชรบุรี','เพชรบูรณ์','แพร่','ภูเก็ต',
            'มหาสารคาม','มุกดาหาร','แม่ฮ่องสอน','ยโสธร','ยะลา','ร้อยเอ็ด','ระนอง','ระยอง','ราชบุรี',
            'ลพบุรี','ลำปาง','ลำพูน','เลย','ศรีสะเกษ','สกลนคร','สงขลา','สตูล','สมุทรปราการ',
            'สมุทรสงคราม','สมุทรสาคร','สระแก้ว','สระบุรี','สิงห์บุรี','สุโขทัย','สุพรรณบุรี',
            'สุราษฎร์ธานี','สุรินทร์','หนองคาย','หนองบัวลำภู','อ่างทอง','อำนาจเจริญ','อุดรธานี',
            'อุตรดิตถ์','อุทัยธานี','อุบลราชธานี'
        ];

        const useUserProfile = (currentUser) => {
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!currentUser || currentUser.isAnonymous) { setProfile(null); setLoading(false); return; }
                const unsub = onSnapshot(doc(db, 'users', currentUser.uid), (snap) => {
                    setProfile(snap.exists() ? { id: snap.id, ...snap.data() } : null);
                    setLoading(false);
                });
                return () => unsub();
            }, [currentUser]);

            const saveProfile = async (data) => {
                if (!currentUser) return;
                await setDoc(doc(db, 'users', currentUser.uid), {
                    ...data,
                    updatedAt: Date.now(),
                    ...(!profile?.createdAt ? { createdAt: Date.now() } : {})
                }, { merge: true });
            };

            return { profile, loading, saveProfile };
        };

        const useLikes = (itemId, currentUser, setShowLoginModal) => {
            const [count, setCount] = useState(0);
            const [isLiked, setIsLiked] = useState(false);

            useEffect(() => {
                if (!itemId) return;
                const unsub = onSnapshot(collection(db, "items", itemId, "likes"), (snapshot) => {
                    setCount(snapshot.size);
                    if (currentUser && !currentUser.isAnonymous) {
                        setIsLiked(snapshot.docs.some(d => d.id === currentUser.uid));
                    } else {
                        setIsLiked(false);
                    }
                });
                return () => unsub();
            }, [itemId, currentUser]);

            const toggleLike = async () => {
                if (!currentUser || currentUser.isAnonymous) {
                    setShowLoginModal(true);
                    return;
                }
                const prevLiked = isLiked;
                const prevCount = count;
                setIsLiked(!prevLiked);
                setCount(prevCount + (prevLiked ? -1 : 1));
                try {
                    const ref = doc(db, "items", itemId, "likes", currentUser.uid);
                    if (prevLiked) await deleteDoc(ref);
                    else await setDoc(ref, { 
                        likedAt: new Date().toISOString(),
                        userId: currentUser.uid,
                        itemId: itemId
                    });
                } catch (e) {
                    console.error("Error toggling like:", e);
                    setIsLiked(prevLiked);
                    setCount(prevCount);
                }
            };
            return { count, isLiked, toggleLike };
        };

        const useUserLikes = (currentUser) => {
            const [likedItemIds, setLikedItemIds] = useState([]);
            const [loadingLikes, setLoadingLikes] = useState(true);

            useEffect(() => {
                if (!currentUser || currentUser.isAnonymous) {
                    setLikedItemIds([]);
                    setLoadingLikes(false);
                    return;
                }
                const q = query(
                    collectionGroup(db, 'likes'),
                    where('userId', '==', currentUser.uid),
                    orderBy('likedAt', 'desc')
                );
                const unsub = onSnapshot(q, (snapshot) => {
                    const ids = [];
                    snapshot.forEach(doc => {
                        if (doc.data().itemId) ids.push(doc.data().itemId);
                    });
                    setLikedItemIds(ids);
                    setLoadingLikes(false);
                }, (error) => {
                    console.error("Error fetching likes:", error);
                    setLoadingLikes(false);
                });
                return () => unsub();
            }, [currentUser]);

            return { likedItemIds, loadingLikes };
        };

        const useComments = (itemId) => {
            const [comments, setComments] = useState([]);
            const [loadingComments, setLoadingComments] = useState(true);

            useEffect(() => {
                if (!itemId) {
                    setComments([]);
                    setLoadingComments(false);
                    return;
                }
                const q = query(
                    collection(db, "items", itemId, "comments"),
                    orderBy("createdAt", "asc")
                );
                const unsub = onSnapshot(q, (snapshot) => {
                    const loaded = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (!data.deleted) {
                            loaded.push({ id: doc.id, ...data });
                        }
                    });
                    setComments(loaded.slice(-30)); // limit to 30 on client for ease
                    setLoadingComments(false);
                }, (err) => {
                    console.error("Error fetching comments:", err);
                    setLoadingComments(false);
                });
                return () => unsub();
            }, [itemId]);

            const addComment = async (text, currentUser) => {
                if (!currentUser || currentUser.isAnonymous) throw new Error('Not logged in');
                try {
                    await addDoc(collection(db, "items", itemId, "comments"), {
                        text,
                        userId: currentUser.uid,
                        userDisplayName: currentUser.displayName || 'ผู้ใช้',
                        userPhotoURL: currentUser.photoURL || null,
                        createdAt: new Date().toISOString(),
                        deleted: false
                    });
                    await updateDoc(doc(db, "items", itemId), { comments: increment(1) });
                } catch (e) {
                    console.error("Error adding comment:", e);
                    throw e;
                }
            };

            const deleteComment = async (commentId, userId, currentUser) => {
                if (!currentUser || currentUser.uid !== userId) throw new Error('Unauthorized');
                try {
                    await updateDoc(doc(db, "items", itemId, "comments", commentId), { deleted: true });
                    await updateDoc(doc(db, "items", itemId), { comments: increment(-1) });
                } catch (e) {
                    console.error("Error deleting comment:", e);
                    throw e;
                }
            };

            return { comments, loadingComments, addComment, deleteComment };
        };

        const CommentSection = ({ itemId, currentUser, setShowLoginModal, expanded, setExpanded }) => {
            const { comments, loadingComments, addComment, deleteComment } = useComments(expanded ? itemId : null);
            const [newComment, setNewComment] = useState('');
            const [submitting, setSubmitting] = useState(false);
            const listRef = useRef(null);

            useEffect(() => {
                if (expanded && listRef.current) {
                    listRef.current.scrollTop = listRef.current.scrollHeight;
                }
            }, [comments, expanded]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!newComment.trim() || submitting) return;
                if (!currentUser || currentUser.isAnonymous) {
                    setShowLoginModal(true);
                    return;
                }
                setSubmitting(true);
                try {
                    await addComment(newComment.trim(), currentUser);
                    setNewComment('');
                } catch (e) {
                    alert('เกิดข้อผิดพลาดในการส่งความเห็น: ' + e.message);
                }
                setSubmitting(false);
            };

            const handleDelete = async (commentId, userId) => {
                if (!confirm("ต้องการลบความคิดเห็นนี้หรือไม่?")) return;
                try {
                    await deleteComment(commentId, userId, currentUser);
                } catch (e) {
                    alert('ลบไม่สำเร็จ: ' + e.message);
                }
            };

            if (!expanded) return null;

            return (
                <div className="bg-gray-50 border-t border-gray-100 p-3 pt-4 flex flex-col mt-2">
                    {loadingComments ? (
                        <div className="text-center py-4 text-xs text-gray-400">กำลังโหลด...</div>
                    ) : (
                        <div ref={listRef} className="max-h-[300px] overflow-y-auto space-y-3 mb-3 pr-2 custom-scrollbar">
                            {comments.length === 0 ? (
                                <div className="text-center py-4 text-xs text-gray-400 italic">ยังไม่มีความคิดเห็น มาร่วมเป็นคนแรกเลย!</div>
                            ) : (
                                comments.map(c => (
                                    <div key={c.id} className="flex gap-2 group animate-fade-in">
                                        {c.userPhotoURL ? (
                                            <img src={c.userPhotoURL} alt={c.userDisplayName} className="w-6 h-6 rounded-full object-cover shadow-sm bg-white shrink-0 mt-0.5" />
                                        ) : (
                                            <div className="w-6 h-6 rounded-full bg-gray-200 flex items-center justify-center shrink-0 mt-0.5"><User size={12} className="text-gray-400" /></div>
                                        )}
                                        <div className="flex-1 min-w-0 bg-white p-2.5 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 relative">
                                            <div className="flex justify-between items-start gap-2 mb-1">
                                                <span className="font-bold text-[11px] text-gray-700 truncate">{c.userDisplayName}</span>
                                                <span className="text-[9px] text-gray-400 shrink-0">{new Date(c.createdAt).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}</span>
                                            </div>
                                            <p className="text-xs text-gray-800 whitespace-pre-wrap leading-relaxed break-words">{c.text}</p>
                                            
                                            {currentUser && currentUser.uid === c.userId && (
                                                <button onClick={() => handleDelete(c.id, c.userId)} className="absolute -right-2 -top-2 w-6 h-6 bg-white border border-gray-200 rounded-full flex items-center justify-center text-red-400 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-50 hover:text-red-600 shadow-sm">
                                                    <X size={12} />
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}

                    <form onSubmit={handleSubmit} className="flex gap-2 items-end pt-2 border-t border-gray-200">
                        {currentUser && !currentUser.isAnonymous && currentUser.photoURL ? (
                            <img src={currentUser.photoURL} className="w-8 h-8 rounded-full border border-gray-200 shrink-0" />
                        ) : (
                            <div className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center shrink-0"><User size={16} className="text-gray-400" /></div>
                        )}
                        <div className="flex-1 relative">
                            {(!currentUser || currentUser.isAnonymous) ? (
                                <div onClick={() => setShowLoginModal(true)} className="w-full bg-white border border-gray-200 rounded-2xl p-2.5 text-xs text-gray-400 cursor-pointer shadow-sm text-center font-bold pb-3">เข้าสู่ระบบเพื่อแสดงความเห็น</div>
                            ) : (
                                <textarea
                                    value={newComment}
                                    onChange={e => setNewComment(e.target.value)}
                                    placeholder="เพิ่มความเห็น..."
                                    className="w-full bg-white border border-gray-200 focus:border-green-400 focus:ring-2 focus:ring-green-100 rounded-2xl p-2.5 text-xs outline-none resize-none shadow-sm pb-8 custom-scrollbar min-h-[60px]"
                                    rows="1"
                                    onKeyDown={e => {
                                        if (e.key === 'Enter' && !e.shiftKey) { 
                                            e.preventDefault(); 
                                            handleSubmit(e);
                                        }
                                    }}
                                />
                            )}
                            {currentUser && !currentUser.isAnonymous && (
                                <button type="submit" disabled={!newComment.trim() || submitting} className="absolute bottom-2 right-2 p-1.5 bg-green-500 text-white rounded-full disabled:opacity-40 disabled:bg-gray-400 hover:bg-green-600 transition-colors shadow-sm">
                                    <svg className="w-3.5 h-3.5 transform -rotate-45 ml-0.5 mb-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                                </button>
                            )}
                        </div>
                    </form>
                </div>
            );
        };

        const LikeButton = ({ itemId, currentUser, setShowLoginModal }) => {
            const { count, isLiked, toggleLike } = useLikes(itemId, currentUser, setShowLoginModal);
            const [isAnimating, setIsAnimating] = useState(false);

            const handleClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsAnimating(true);
                setTimeout(() => setIsAnimating(false), 300);
                toggleLike();
            };

            return (
                <button onClick={handleClick} className={`flex items-center gap-1 text-xs font-bold transition-transform ${isLiked ? 'text-red-500' : 'text-gray-400 hover:text-red-400'} ${isAnimating ? 'scale-125' : 'scale-100'}`}>
                    <Heart size={14} className={isLiked ? 'fill-current text-red-500' : ''} /> {count > 0 ? count : ''}
                </button>
            );
        };

        const ProfileEditModal = ({
            profile, currentUser, saveProfile, setToastMessage,
            showProfileModal, setShowProfileModal, profileForceOpen, setProfileForceOpen
        }) => {
            const [pNickname, setPNickname] = useState(profile?.nickname || currentUser?.displayName || '');
            const [pFirstName, setPFirstName] = useState(profile?.firstName || '');
            const [pLastName, setPLastName] = useState(profile?.lastName || '');
            const [pMobile, setPMobile] = useState(profile?.mobile || '');
            const [pProvince, setPProvince] = useState(profile?.province || '');
            const [pPhotoURL, setPPhotoURL] = useState(profile?.photoURL || currentUser?.photoURL || null);
            const [pErrors, setPErrors] = useState({});
            const [pSaving, setPSaving] = useState(false);
            const [showNicknameRequest, setShowNicknameRequest] = useState(false);
            const [reqNickname, setReqNickname] = useState('');
            const [reqReason, setReqReason] = useState('');
            const [reqSubmitting, setReqSubmitting] = useState(false);

            const nicknameLocked = !!profile?.nicknameChangedAt;
            const pendingRequest = profile?.nicknameChangeRequest?.status === 'pending';
            const rejectedRequest = profile?.nicknameChangeRequest?.status === 'rejected';

            // Auto-approve nickname change if approved by admin
            useEffect(() => {
                if (profile?.nicknameChangeRequest?.status === 'approved') {
                    const newNick = profile.nicknameChangeRequest.requestedNickname;
                    saveProfile({ nickname: newNick, nicknameChangedAt: Date.now(), nicknameChangeRequest: null });
                    // Update all user's posts
                    getDocs(query(collection(db, 'items'), where('userId', '==', currentUser?.uid))).then(snap => {
                        snap.docs.forEach(d => updateDoc(doc(db, 'items', d.id), { userDisplayName: newNick }));
                    });
                    setToastMessage('คำขอได้รับการอนุมัติแล้ว ชื่อของคุณถูกเปลี่ยนเรียบร้อย');
                }
            }, [profile?.nicknameChangeRequest?.status]);

            const formatMobile = (val) => {
                const digits = val.replace(/\D/g, '').slice(0, 10);
                if (digits.length <= 3) return digits;
                if (digits.length <= 6) return digits.slice(0,3) + '-' + digits.slice(3);
                return digits.slice(0,3) + '-' + digits.slice(3,6) + '-' + digits.slice(6);
            };

            const validateMobile = (m) => {
                const digits = m.replace(/\D/g, '');
                return digits.length === 10 && digits.startsWith('0');
            };

            const handleAvatarUpload = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxSize = 400;
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setPPhotoURL(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const validate = () => {
                const errs = {};
                if (!nicknameLocked && !pNickname.trim()) errs.nickname = 'กรุณากรอกชื่อที่แสดงในแอป';
                if (!pFirstName.trim()) errs.firstName = 'กรุณากรอกชื่อ';
                if (!pLastName.trim()) errs.lastName = 'กรุณากรอกนามสกุล';
                if (!pMobile.trim()) errs.mobile = 'กรุณากรอกเบอร์โทรศัพท์';
                else if (!validateMobile(pMobile)) errs.mobile = 'รูปแบบไม่ถูกต้อง (0XX-XXX-XXXX)';
                if (!pProvince) errs.province = 'กรุณาเลือกจังหวัด';
                setPErrors(errs);
                return Object.keys(errs).length === 0;
            };

            const handleSave = async () => {
                if (!validate()) return;
                setPSaving(true);
                try {
                    const isFirstNicknameSet = !profile?.nicknameChangedAt && !profile?.nickname;
                    const data = {
                        firstName: pFirstName.trim(), lastName: pLastName.trim(),
                        mobile: pMobile.replace(/\D/g, ''), province: pProvince,
                        photoURL: pPhotoURL,
                    };
                    if (!nicknameLocked) {
                        data.nickname = pNickname.trim();
                        if (!isFirstNicknameSet || (profile?.nickname && profile.nickname !== pNickname.trim())) {
                            data.nicknameChangedAt = Date.now();
                        } else if (isFirstNicknameSet) {
                            data.nicknameChangedAt = Date.now();
                        }
                    }
                    await saveProfile(data);
                    // Update display name on all existing posts
                    if (data.nickname) {
                        const snap = await getDocs(query(collection(db, 'items'), where('userId', '==', currentUser?.uid)));
                        snap.docs.forEach(d => updateDoc(doc(db, 'items', d.id), { userDisplayName: data.nickname, userPhotoURL: pPhotoURL }));
                    }
                    setToastMessage('บันทึกข้อมูลเรียบร้อยแล้ว');
                    setShowProfileModal(false);
                    setProfileForceOpen(false);
                } catch (e) { alert('เกิดข้อผิดพลาด: ' + e.message); }
                setPSaving(false);
            };

            const handleNicknameRequest = async () => {
                if (!reqNickname.trim() || !reqReason.trim()) return;
                setReqSubmitting(true);
                try {
                    await saveProfile({
                        nicknameChangeRequest: {
                            requestedNickname: reqNickname.trim(),
                            reason: reqReason.trim(),
                            requestedAt: Date.now(),
                            status: 'pending',
                            adminNote: ''
                        }
                    });
                    setShowNicknameRequest(false);
                    setToastMessage('ส่งคำขอเปลี่ยนชื่อเรียบร้อยแล้ว');
                } catch (e) { alert('เกิดข้อผิดพลาด: ' + e.message); }
                setReqSubmitting(false);
            };

            const isFormValid = (() => {
                if (!nicknameLocked && !pNickname.trim()) return false;
                if (!pFirstName.trim() || !pLastName.trim()) return false;
                if (!validateMobile(pMobile)) return false;
                if (!pProvince) return false;
                return true;
            })();

            const avatarInputRef = useRef(null);

            if (!showProfileModal) return null;

            return (
                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center animate-fade-in">
                    <div className="bg-white w-full max-w-md h-full max-h-[100dvh] overflow-y-auto flex flex-col">
                        {/* Header */}
                        <div className="p-5 border-b border-gray-100 flex items-center justify-between flex-shrink-0 bg-gradient-to-r from-green-500 to-green-600 text-white">
                            <div className="flex items-center gap-2">
                                <Shield size={20} />
                                <h2 className="text-lg font-bold">แก้ไขข้อมูลส่วนตัว</h2>
                            </div>
                            {!profileForceOpen && <button onClick={() => setShowProfileModal(false)} className="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center hover:bg-white/30"><X size={18} /></button>}
                        </div>

                        {profileForceOpen && (
                            <div className="bg-orange-50 border-b border-orange-200 p-3 text-center">
                                <p className="text-sm font-bold text-orange-600">กรุณากรอกข้อมูลส่วนตัวให้ครบก่อนใช้งาน</p>
                            </div>
                        )}

                        <div className="flex-1 p-5 space-y-6">
                            {/* Avatar Section */}
                            <div className="flex flex-col items-center gap-3">
                                <div className="relative">
                                    {pPhotoURL ? (
                                        <img src={pPhotoURL} className="w-24 h-24 rounded-full object-cover border-4 border-green-100 shadow-lg" />

                                        <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center border-4 border-green-100 shadow-lg"><User size={40} className="text-gray-300" /></div>

                                    <button onClick={() => avatarInputRef.current?.click()} className="absolute -bottom-1 -right-1 w-8 h-8 bg-green-500 text-white rounded-full flex items-center justify-center shadow-md hover:bg-green-600 transition-colors">
                                        <Camera size={14} />
                                    </button>

                                <input ref={avatarInputRef} type="file" accept="image/*" className="hidden" onChange={handleAvatarUpload} />
                                <button onClick={() => avatarInputRef.current?.click()} className="text-xs text-green-600 font-bold">เปลี่ยนรูป</button>
                            </div>

                            {/* Nickname */}
                            <div className="space-y-1.5">
                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest flex items-center gap-1">
                                    ชื่อที่แสดงในแอป <span className="text-red-500">*</span>
                                    {nicknameLocked && <Lock size={10} className="text-orange-500" />}
                                </label>
                                {nicknameLocked ? (
                                    <div>
                                        <div className="w-full p-3 bg-gray-100 rounded-xl text-sm font-bold text-gray-600 border-2 border-gray-200 flex items-center justify-between">
                                            <span>{profile?.nickname}</span>
                                            <Lock size={14} className="text-gray-400" />
                                        </div>
                                        <p className="text-[10px] text-orange-500 font-medium mt-1">คุณเปลี่ยนชื่อแสดงไปแล้วครั้งหนึ่ง</p>
                                        {pendingRequest ? (
                                            <div className="mt-2 bg-yellow-50 border border-yellow-200 rounded-xl p-3">
                                                <p className="text-xs font-bold text-yellow-700">คำขอเปลี่ยนชื่อของคุณกำลังรอการอนุมัติ</p>
                                                <p className="text-[10px] text-gray-500 italic mt-1">ชื่อใหม่ที่ขอ: {profile?.nicknameChangeRequest?.requestedNickname}</p>
                                            </div>
                                        ) : rejectedRequest ? (
                                            <div className="mt-2 bg-red-50 border border-red-200 rounded-xl p-3">
                                                <p className="text-xs font-bold text-red-600">คำขอถูกปฏิเสธ: {profile?.nicknameChangeRequest?.adminNote || 'ไม่ระบุเหตุผล'}</p>
                                                <button onClick={() => { saveProfile({ nicknameChangeRequest: null }); }} className="mt-1 text-[10px] text-blue-600 font-bold underline">ส่งคำขอใหม่</button>
                                            </div>
                                        ) : (
                                            <button onClick={() => setShowNicknameRequest(true)} className="mt-2 text-xs text-blue-600 font-bold bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-200 hover:bg-blue-100 transition-colors">
                                                ขอเปลี่ยนชื่อใหม่ (ต้องรออนุมัติจาก Admin)
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <div>
                                        <input type="text" value={pNickname} onChange={e => setPNickname(e.target.value)} placeholder="ชื่อที่แสดงในแอป"
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold text-gray-800 border-2 border-transparent focus:border-green-400 outline-none" />
                                        {pErrors.nickname && <p className="text-xs text-red-500 mt-1">{pErrors.nickname}</p>}
                                    </div>
                                )}
                            </div>

                            {/* Personal Details */}
                            <div className="space-y-4">
                                <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100 pb-2">ข้อมูลส่วนตัว</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 block">ชื่อ <span className="text-red-500">*</span></label>
                                        <input type="text" value={pFirstName} onChange={e => setPFirstName(e.target.value)} placeholder="ชื่อ"
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold text-gray-800 border-2 border-transparent focus:border-green-400 outline-none" />
                                        {pErrors.firstName && <p className="text-xs text-red-500 mt-1">{pErrors.firstName}</p>}
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 block">นามสกุล <span className="text-red-500">*</span></label>
                                        <input type="text" value={pLastName} onChange={e => setPLastName(e.target.value)} placeholder="นามสกุล"
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold text-gray-800 border-2 border-transparent focus:border-green-400 outline-none" />
                                        {pErrors.lastName && <p className="text-xs text-red-500 mt-1">{pErrors.lastName}</p>}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 mb-1 block">เบอร์โทรศัพท์ <span className="text-red-500">*</span></label>
                                    <input type="tel" value={formatMobile(pMobile)} onChange={e => setPMobile(e.target.value.replace(/\D/g, ''))} placeholder="0XX-XXX-XXXX" inputMode="tel"
                                        className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold text-gray-800 border-2 border-transparent focus:border-green-400 outline-none" />
                                    {pErrors.mobile && <p className="text-xs text-red-500 mt-1">{pErrors.mobile}</p>}
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 mb-1 block">จังหวัด <span className="text-red-500">*</span></label>
                                    <select value={pProvince} onChange={e => setPProvince(e.target.value)}
                                        className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold text-gray-800 border-2 border-transparent focus:border-green-400 outline-none">
                                        <option value="">เลือกจังหวัด</option>
                                        {THAI_PROVINCES.map(p => <option key={p} value={p}>{p}</option>)}
                                    </select>
                                    {pErrors.province && <p className="text-xs text-red-500 mt-1">{pErrors.province}</p>}
                                </div>
                            </div>

                            {/* Account Info */}
                            <div className="space-y-2">
                                <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100 pb-2">ข้อมูลบัญชี</h3>
                                {currentUser?.email && (
                                    <div className="flex items-center justify-between py-2">
                                        <span className="text-xs text-gray-500">อีเมล</span>
                                        <span className="text-xs font-bold text-gray-700">{currentUser.email}</span>
                                    </div>
                                )}
                                {profile?.createdAt && (
                                    <div className="flex items-center justify-between py-2">
                                        <span className="text-xs text-gray-500">สมาชิกตั้งแต่</span>
                                        <span className="text-xs font-bold text-gray-700">{new Date(profile.createdAt).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
                                    </div>
                                )}
                            </div>

                            {/* Save Button */}
                            <button onClick={handleSave} disabled={pSaving || !isFormValid}
                                className="w-full py-4 bg-gradient-to-r from-green-500 to-green-600 text-white rounded-2xl font-bold text-base shadow-lg shadow-green-200 active:scale-95 transition-transform disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                                <CheckCircle2 size={20} />
                                {pSaving ? 'กำลังบันทึก...' : 'บันทึกข้อมูล'}
                            </button>
                        </div>

                        {/* Nickname Change Request Modal */}
                        {showNicknameRequest && (
                            <div className="absolute inset-0 bg-black/50 z-[70] flex items-center justify-center p-6" onClick={() => setShowNicknameRequest(false)}>
                                <div className="bg-white rounded-2xl w-full max-w-sm p-5 space-y-4 shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <h3 className="font-bold text-gray-800">ขอเปลี่ยนชื่อแสดง</h3>
                                    <div>
                                        <p className="text-xs text-gray-500 mb-1">ชื่อปัจจุบัน: <span className="font-bold">{profile?.nickname}</span></p>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 block">ชื่อใหม่ที่ต้องการ <span className="text-red-500">*</span></label>
                                        <input type="text" value={reqNickname} onChange={e => setReqNickname(e.target.value)} placeholder="ชื่อใหม่"
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm border-2 border-transparent focus:border-green-400 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 block">เหตุผลที่ต้องการเปลี่ยน <span className="text-red-500">*</span></label>
                                        <textarea value={reqReason} onChange={e => setReqReason(e.target.value)} placeholder="เหตุผล..." rows={2}
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm border-2 border-transparent focus:border-green-400 outline-none resize-none" />
                                    </div>
                                    <button onClick={handleNicknameRequest} disabled={reqSubmitting || !reqNickname.trim() || !reqReason.trim()}
                                        className="w-full py-3 bg-green-500 text-white rounded-xl font-bold text-sm disabled:opacity-50 active:scale-95 transition-transform">
                                        {reqSubmitting ? 'กำลังส่ง...' : 'ส่งคำขอ'}
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const [currentView, setCurrentView] = useState('feed');
            const [showShippingInFeed, setShowShippingInFeed] = useState(false);
            const [showVolumeInFeed, setShowVolumeInFeed] = useState(false);
            const [profileTab, setProfileTab] = useState('posts');
            const [adminNews, setAdminNews] = useState([]); // ── NEW: admin news from Firebase
            const [viewedNewsIds, setViewedNewsIds] = useState([]); // ── NEW: track viewed news
            const [unreadAdminNewsCount, setUnreadAdminNewsCount] = useState(0); // ── NEW: count of unread admin news
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [deals, setDeals] = useState([]);
            const [groupedDeals, setGroupedDeals] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [showAllVariants, setShowAllVariants] = useState(false);
            const [zoomedImage, setZoomedImage] = useState(null);
            const [expandedComments, setExpandedComments] = useState({});

            // ── NEW: active category filter for search page ──
            const [activeCategoryFilter, setActiveCategoryFilter] = useState(null); // null = all
            const [activeBrandFilter, setActiveBrandFilter] = useState(null); // null = all
            const [searchFilterMode, setSearchFilterMode] = useState('all'); // 'all' | 'category' | 'brand'

            const uniqueProductsWithBrand = useMemo(() => {
                const map = new Map();
                deals.forEach(d => {
                    if (!map.has(d.name)) map.set(d.name, d.brand || '');
                });
                return Array.from(map.entries()).map(([name, brand]) => ({ name, brand })).sort((a, b) => a.name.localeCompare(b.name, 'th'));
            }, [deals]);

            const [stores, setStores] = useState([]);
            const [selectedStore, setSelectedStore] = useState(null);
            const [selectedStoreForDetail, setSelectedStoreForDetail] = useState(null);
            const [storeSearchQuery, setStoreSearchQuery] = useState('');
            const [selectedBrandForDetail, setSelectedBrandForDetail] = useState(null);
            const [brandSearchQuery, setBrandSearchQuery] = useState('');
            const [selectedCategoryForDetail, setSelectedCategoryForDetail] = useState(null);
            const [categorySearchQuery, setCategorySearchQuery] = useState('');
            const [isDescriptionExpanded, setIsDescriptionExpanded] = useState(false);
            const [variantGroups, setVariantGroups] = useState([]);
            const [selectedDealDetail, setSelectedDealDetail] = useState(null);
            const [categories, setCategories] = useState([]); // ── NEW: real categories from Firestore
            const [isItemLocked, setIsItemLocked] = useState(false); // ── NEW: lock name/brand/unit for reporting existing items

            // Auth State
            const [currentUser, setCurrentUser] = useState(null);
            const [authLoading, setAuthLoading] = useState(true);
            const [showLoginModal, setShowLoginModal] = useState(false);

            // Report State
            const [showReportModal, setShowReportModal] = useState(false);
            const [reportText, setReportText] = useState('');
            const [reportImages, setReportImages] = useState([]);
            const [isSubmittingReport, setIsSubmittingReport] = useState(false);

            // Per-post report state
            const [postReportDeal, setPostReportDeal] = useState(null);
            const [postReportReason, setPostReportReason] = useState(null);
            const [postReportText, setPostReportText] = useState('');
            const [isSubmittingPostReport, setIsSubmittingPostReport] = useState(false);
            const [toastMessage, setToastMessage] = useState(null);

            // Profile state
            const [showProfileModal, setShowProfileModal] = useState(false);
            const [profileForceOpen, setProfileForceOpen] = useState(false);

            // Fetch liked items
            const { likedItemIds, loadingLikes } = useUserLikes(currentUser);

            useEffect(() => {
                if (toastMessage) {
                    const t = setTimeout(() => setToastMessage(null), 3000);
                    return () => clearTimeout(t);
                }
            }, [toastMessage]);

            const pendingActionRef = useRef(null);

            useEffect(() => {
                const unsubscribeAuth = onAuthStateChanged(auth, async (user) => {
                    setCurrentUser(user);
                    setAuthLoading(false);
                    // Execute pending action after upgrade
                    if (user && !user.isAnonymous && pendingActionRef.current) {
                        const action = pendingActionRef.current;
                        pendingActionRef.current = null;
                        action();
                    }
                    // Track user in Firestore
                    if (user) {
                        try {
                            await setDoc(doc(db, 'users', user.uid), {
                                displayName: user.displayName || (user.isAnonymous ? 'ผู้เยี่ยมชม' : 'ผู้ใช้'),
                                photoURL: user.photoURL || null,
                                email: user.email || null,
                                isAnonymous: user.isAnonymous || false,
                                lastSeen: Date.now(),
                                provider: user.providerData?.[0]?.providerId || 'anonymous'
                            }, { merge: true });
                        } catch (e) { console.error('Track user error:', e); }
                        // Profile completeness check for non-guest users
                        if (!user.isAnonymous) {
                            try {
                                const snap = await getDoc(doc(db, 'users', user.uid));
                                const data = snap.exists() ? snap.data() : {};
                                if (!data.nickname || !data.firstName || !data.lastName || !data.mobile || !data.province) {
                                    setShowProfileModal(true);
                                    setProfileForceOpen(true);
                                }
                            } catch (e) { console.error('Profile check error:', e); }
                        }
                    }
                });
                // Track page view
                try {
                    const today = new Date().toISOString().slice(0, 10);
                    setDoc(doc(db, 'analytics', today), { views: increment(1), date: today }, { merge: true });
                } catch (e) { console.error('Track pageview error:', e); }
                return () => unsubscribeAuth();
            }, []);

            const handleUpgradeToGoogle = async () => {
                if (!currentUser || !currentUser.isAnonymous) {
                    // Not a guest — just do normal sign in
                    try { await signInWithPopup(auth, googleProvider); setShowLoginModal(false); }
                    catch (error) { alert('เกิดข้อผิดพลาดในการเข้าสู่ระบบด้วย Google: ' + error.message); }
                    return;
                }
                try {
                    const provider = new GoogleAuthProvider();
                    const result = await linkWithPopup(currentUser, provider);
                    // Linked successfully — update existing posts with new display info
                    const user = result.user;
                    try {
                        const q = query(collection(db, "items"), where("userId", "==", user.uid));
                        const snap = await getDocs(q);
                        const updates = snap.docs.map(d => updateDoc(doc(db, "items", d.id), {
                            userDisplayName: user.displayName || 'ผู้ใช้',
                            userPhotoURL: user.photoURL || null
                        }));
                        await Promise.all(updates);
                    } catch (e) { console.error('Batch update posts error:', e); }
                    setShowLoginModal(false);
                } catch (error) {
                    if (error.code === 'auth/credential-already-in-use') {
                        const proceed = confirm('บัญชี Google นี้มีอยู่แล้ว โพสต์ที่โพสต์ในฐานะ Guest จะไม่ถูกย้าย\nต้องการเข้าสู่ระบบด้วยบัญชีที่มีอยู่แทนไหม?');
                        if (proceed) {
                            try { await signInWithPopup(auth, googleProvider); setShowLoginModal(false); }
                            catch (e2) { alert('เกิดข้อผิดพลาด: ' + e2.message); }
                        }
                    } else {
                        alert('เกิดข้อผิดพลาด: ' + error.message);
                    }
                }
            };

            const handleGoogleLogin = async () => {
                if (currentUser?.isAnonymous) {
                    return handleUpgradeToGoogle();
                }
                try { await signInWithPopup(auth, googleProvider); setShowLoginModal(false); }
                catch (error) { alert('เกิดข้อผิดพลาดในการเข้าสู่ระบบด้วย Google: ' + error.message); }
            };

            const handleGuestLogin = async () => {
                try { await signInAnonymously(auth); setShowLoginModal(false); }
                catch (error) { alert('เกิดข้อผิดพลาดในการเข้าสู่ระบบ'); }
            };

            const handleLogout = async () => {
                try { await signOut(auth); } catch (error) { console.error('Logout error:', error); }
            };

            const isGuestUser = currentUser?.isAnonymous === true;
            const isLoggedIn = currentUser !== null;
            const { profile, loading: profileLoading, saveProfile } = useUserProfile(currentUser);
            const userDisplayName = profile?.nickname || currentUser?.displayName || (isGuestUser ? 'ผู้เยี่ยมชม (Guest)' : 'ผู้ใช้');
            const userPhotoURL = profile?.photoURL || currentUser?.photoURL || null;

            const ImagePlaceholder = () => (
                <div className="w-full h-full flex flex-col items-center justify-center bg-gray-100/80 text-gray-400">
                    <ImageOff size={24} className="mb-1" />
                    <span className="text-[10px] font-bold">ไม่มีรูปภาพ</span>
                </div>
            );

            const StoreLogo = ({ storeId, size = 'sm' }) => {
                const meta = stores.find(s => s.id === storeId);
                const logoUrl = meta?.logoUrl;
                const sizeMap = { xs: 'w-5 h-5', sm: 'w-8 h-8', md: 'w-10 h-10', lg: 'w-16 h-16', xl: 'w-20 h-20' };
                const iconMap = { xs: 10, sm: 14, md: 18, lg: 24, xl: 32 };
                const box = sizeMap[size] || sizeMap.sm;
                const iconSz = iconMap[size] || 14;
                if (logoUrl) {
                    return (
                        <div className={`${box} rounded-lg bg-white border border-gray-100 flex items-center justify-center overflow-hidden flex-shrink-0 shadow-sm`}>
                            <img src={logoUrl} alt={storeId} className="w-full h-full object-contain p-0.5"
                                onError={e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                            <div style={{ display: 'none' }} className="w-full h-full items-center justify-center text-orange-400"><Store size={iconSz} /></div>
                        </div>
                    );
                }
                return (
                    <div className={`${box} rounded-lg bg-orange-50 border border-orange-100 flex items-center justify-center text-orange-400 flex-shrink-0 shadow-sm`}>
                        <Store size={iconSz} />
                    </div>
                );
            };

            // Store alias resolution
            const storeAliasMap = {};
            stores.forEach(s => {
                // Map ID itself (case-insensitive) to official ID for consistency
                storeAliasMap[s.id.toLowerCase().trim()] = s.id;
                if (s.aliases && s.aliases.length > 0) {
                    s.aliases.forEach(alias => { storeAliasMap[alias.toLowerCase().trim()] = s.id; });
                }
            });
            const resolveStoreName = (name) => {
                if (!name) return name;
                return storeAliasMap[name.toLowerCase().trim()] || name.trim();
            };

            // ── Helper: get categories for a product name ──
            const getCategoriesForProduct = (productName) => {
                return categories.filter(c => (c.items || []).includes(productName)).map(c => c.name);
            };

            const formatUnitDetail = (deal) => {
                const subMode = deal.subUnitMode || 'one';

                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        const canvas = document.createElement('canvas');

                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
