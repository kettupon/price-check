    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Noto Sans Thai', sans-serif;

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);

        .animate-fade-in {
            animation: fadeIn 0.25s ease-out forwards;
        }

        .animate-scale-in {
            animation: scaleIn 0.2s ease-out forwards;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.92);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes pulseOrangeYellow {

            0%,
            100% {
                background-color: #F97316;

            }

            50% {
                background-color: #FBBF24;
                box-shadow: 0 0 18px rgba(251, 191, 36, 0.6);
            }
        }

        .animate-pulse-oy {
            animation: pulseOrangeYellow 1.5s ease-in-out infinite;

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createPortal } from 'react-dom';
        import { createRoot } from 'react-dom/client';
        import {
            MapPin, Users, Tag, AlertCircle, Plus, Trophy, Heart, MessageSquare,
            Share2, Search, Zap, Home, ListPlus, Calculator, ChevronLeft, ChevronRight, Image as ImageIcon,
            Coffee, ShoppingCart, Store, Package, User, X, ShoppingBag, ImageOff, Camera, FileText,
            Grid, Folder, Bell, Clock, Link2, MoreVertical, Flag, CheckCircle2, XCircle, Edit3, Lock, Shield, ShieldCheck, Trash2, Check, Settings, Upload, CheckCircle
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, updateDoc, where, doc, setDoc, increment, deleteDoc, getDoc, collectionGroup } from 'firebase/firestore';
        import { getAuth, signInWithPopup, linkWithPopup, GoogleAuthProvider, signInAnonymously, onAuthStateChanged, signOut } from 'firebase/auth';
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from 'firebase/storage';

        const firebaseConfig = {
            apiKey: "AIzaSyByDvi-wyekFdKMiMv_Cb2yUq9yF0Tw3Uc",
            authDomain: "price-check-86915.firebaseapp.com",
            projectId: "price-check-86915",
            storageBucket: "price-check-86915.firebasestorage.app",
            messagingSenderId: "510258152666",
            appId: "1:510258152666:web:bc24bd3f34e704488e91e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const googleProvider = new GoogleAuthProvider();
        const UNIT_OPTIONS = {
            volume: ['ml', 'ลิตร', 'L', 'cc'],
            weight: ['g', 'กรัม', 'kg', 'กิโลกรัม'],
            count: ['ชิ้น', 'แพ็ค', 'ถุง', 'กล่อง', 'อัน', 'ใบ', 'คู่']
        };
        const TO_BASE = {
            ml: 1, cc: 1, ลิตร: 1000, L: 1000,
            g: 1, กรัม: 1, kg: 1000, กิโลกรัม: 1000
        };
        const detectCategory = (u) => {
            if (['ml', 'cc', 'ลิตร', 'L'].includes(u)) return 'volume';
            if (['g', 'กรัม', 'kg', 'กิโลกรัม'].includes(u)) return 'weight';
            return 'count';
        };
        const QUICK_SIZES = {
            volume: [60, 100, 200, 250, 330, 500, 1000],
            weight: [50, 100, 200, 500, 1000]
        };
        const THAI_PROVINCES = [
            'กระบี่', 'กรุงเทพมหานคร', 'กาญจนบุรี', 'กาฬสินธุ์', 'กำแพงเพชร', 'ขอนแก่น', 'จันทบุรี', 'ฉะเชิงเทรา',
            'ชลบุรี', 'ชัยนาท', 'ชัยภูมิ', 'ชุมพร', 'เชียงราย', 'เชียงใหม่', 'ตรัง', 'ตราด', 'ตาก', 'นครนายก',
            'นครปฐม', 'นครพนม', 'นครราชสีมา', 'นครศรีธรรมราช', 'นครสวรรค์', 'นนทบุรี', 'นราธิวาส', 'น่าน',
            'บึงกาฬ', 'บุรีรัมย์', 'ปทุมธานี', 'ประจวบคีรีขันธ์', 'ปราจีนบุรี', 'ปัตตานี', 'พระนครศรีอยุธยา',
            'พะเยา', 'พังงา', 'พัทลุง', 'พิจิตร', 'พิษณุโลก', 'เพชรบุรี', 'เพชรบูรณ์', 'แพร่', 'ภูเก็ต',
            'มหาสารคาม', 'มุกดาหาร', 'แม่ฮ่องสอน', 'ยโสธร', 'ยะลา', 'ร้อยเอ็ด', 'ระนอง', 'ระยอง', 'ราชบุรี',
            'ลพบุรี', 'ลำปาง', 'ลำพูน', 'เลย', 'ศรีสะเกษ', 'สกลนคร', 'สงขลา', 'สตูล', 'สมุทรปราการ',
            'สมุทรสงคราม', 'สมุทรสาคร', 'สระแก้ว', 'สระบุรี', 'สิงห์บุรี', 'สุโขทัย', 'สุพรรณบุรี',
            'สุราษฎร์ธานี', 'สุรินทร์', 'หนองคาย', 'หนองบัวลำภู', 'อ่างทอง', 'อำนาจเจริญ', 'อุดรธานี',
            'อุตรดิตถ์', 'อุทัยธานี', 'อุบลราชธานี'
        ];

        const useUserProfile = (currentUser) => {
            const [profile, setProfile] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!currentUser || currentUser.isAnonymous) { setProfile(null); setLoading(false); return; }
                const unsub = onSnapshot(doc(db, 'users', currentUser.uid), (snap) => {
                    setProfile(snap.exists() ? { id: snap.id, ...snap.data() } : null);
                    setLoading(false);
                });
                return () => unsub();
            }, [currentUser]);

            const saveProfile = async (data) => {
                if (!currentUser) return;
                await setDoc(doc(db, 'users', currentUser.uid), {
                    ...data,
                    updatedAt: Date.now(),
                    ...(!profile?.createdAt ? { createdAt: Date.now() } : {})
                }, { merge: true });
            };

            return { profile, loading, saveProfile };
        };

        const useLikes = (itemId, currentUser, setShowLoginModal, initialCount = 0) => {
            const [count, setCount] = useState(initialCount);
            const [isLiked, setIsLiked] = useState(false);

            useEffect(() => {
                if (!itemId) return;
                const unsub = onSnapshot(collection(db, "items", itemId, "likes"), (snapshot) => {
                    setCount(snapshot.size);
                    if (currentUser && !currentUser.isAnonymous) {
                        setIsLiked(snapshot.docs.some(d => d.id === currentUser.uid));
                    } else {
                        setIsLiked(false);
                    }
                });
                return () => unsub();
            }, [itemId, currentUser]);

            const toggleLike = async () => {
                if (!currentUser || currentUser.isAnonymous) {
                    setShowLoginModal(true);
                    return;
                }
                const prevLiked = isLiked;
                const prevCount = count;
                setIsLiked(!prevLiked);
                setCount(prevCount + (prevLiked ? -1 : 1));
                try {
                    const itemLikeRef = doc(db, "items", itemId, "likes", currentUser.uid);
                    const userLikeRef = doc(db, "users", currentUser.uid, "likedItems", itemId);
                    if (prevLiked) {
                        await deleteDoc(itemLikeRef);
                        await deleteDoc(userLikeRef);
                    } else {
                        const likeData = {
                            likedAt: new Date().toISOString(),
                            userId: currentUser.uid,
                            itemId: itemId
                        };
                        await setDoc(itemLikeRef, likeData);
                        await setDoc(userLikeRef, likeData);
                    }
                } catch (e) {
                    console.error("Error toggling like:", e);
                    setIsLiked(prevLiked);
                    setCount(prevCount);
                }
            };
            return { count, isLiked, toggleLike };
        };

        const useUserLikes = (currentUser) => {
            const [likedItemIds, setLikedItemIds] = useState([]);
            const [loadingLikes, setLoadingLikes] = useState(true);

            useEffect(() => {
                if (!currentUser || currentUser.isAnonymous) {
                    setLikedItemIds([]);
                    setLoadingLikes(false);
                    return;
                }
                const q = query(
                    collection(db, "users", currentUser.uid, "likedItems"),
                    orderBy('likedAt', 'desc')
                );
                const unsub = onSnapshot(q, (snapshot) => {
                    const ids = [];
                    snapshot.forEach(doc => {
                        if (doc.data().itemId) ids.push(doc.data().itemId);
                    });
                    setLikedItemIds(ids);
                    setLoadingLikes(false);
                }, (error) => {
                    console.error("Error fetching likes:", error);
                    setLoadingLikes(false);
                });
                return () => unsub();
            }, [currentUser]);

            return { likedItemIds, loadingLikes };
        };

        const useComments = (itemId, profile) => {
            const [comments, setComments] = useState([]);
            const [loadingComments, setLoadingComments] = useState(true);

            useEffect(() => {
                if (!itemId) {
                    setComments([]);
                    setLoadingComments(false);
                    return;
                }
                const q = query(
                    collection(db, "items", itemId, "comments"),
                    orderBy("createdAt", "asc")
                );
                const unsub = onSnapshot(q, (snapshot) => {
                    const loaded = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (!data.deleted) {
                            loaded.push({ id: doc.id, ...data });
                        }
                    });
                    setComments(loaded.slice(-30)); // limit to 30 on client for ease
                    setLoadingComments(false);
                }, (err) => {
                    console.error("Error fetching comments:", err);
                    setLoadingComments(false);
                });
                return () => unsub();
            }, [itemId]);

            const addComment = async (text) => {
                // LAZY_AUTH_GATE
                if (!auth.currentUser) {
                    await signInAnonymously(auth);
                }
                const activeUser = auth.currentUser;

                try {
                    await addDoc(collection(db, "items", itemId, "comments"), {
                        text,
                        userId: activeUser.uid,
                        userDisplayName: profile?.nickname || activeUser.displayName || (activeUser.isAnonymous ? 'ผู้เยี่ยมชม' : 'ผู้ใช้'),
                        userPhotoURL: activeUser.photoURL || null,
                        createdAt: new Date().toISOString(),
                        deleted: false
                    });
                    await updateDoc(doc(db, "items", itemId), { comments: increment(1) });

                    if (activeUser.isAnonymous) {
                        setTopToastMessage({ title: 'บันทึกแล้ว! สมัครบัญชีเพื่อไม่ให้ข้อมูลหาย', isSuccess: false });
                        setShowTopToast(true);
                        setTimeout(() => setShowTopToast(false), 6000);
                    }
                } catch (e) {
                    console.error("Error adding comment:", e);
                    throw e;
                }
            };

            const deleteComment = async (commentId, userId, currentUser) => {
                if (!currentUser || currentUser.uid !== userId) throw new Error('Unauthorized');
                try {
                    await updateDoc(doc(db, "items", itemId, "comments", commentId), { deleted: true });
                    await updateDoc(doc(db, "items", itemId), { comments: increment(-1) });
                } catch (e) {
                    console.error("Error deleting comment:", e);
                    throw e;
                }
            };

            return { comments, loadingComments, addComment, deleteComment };
        };

        const CommentSection = ({ itemId, currentUser, setShowLoginModal, expanded, setExpanded, onCountUpdate, profile }) => {
            const { comments, loadingComments, addComment, deleteComment } = useComments(expanded ? itemId : null, profile);
            const [newComment, setNewComment] = useState('');
            const [submitting, setSubmitting] = useState(false);
            const [showFullModal, setShowFullModal] = useState(false);
            const [optionsCommentId, setOptionsCommentId] = useState(null);
            const [reportingComment, setReportingComment] = useState(null);
            const [reportReason, setReportReason] = useState('ข้อมูลเท็จ');
            const [reportDetail, setReportDetail] = useState('');
            const modalListRef = useRef(null);

            const MIN_CHARS = 20;
            const MAX_COMMENTS_PER_USER = 3;

            // Count how many comments this user has on this post
            const userCommentCount = currentUser && !currentUser.isAnonymous
                ? comments.filter(c => c.userId === currentUser.uid).length
                : 0;
            const remainingComments = MAX_COMMENTS_PER_USER - userCommentCount;
            const isLimitReached = remainingComments <= 0;
            const charCount = newComment.trim().length;
            const isTooShort = charCount > 0 && charCount < MIN_CHARS;

            useEffect(() => {
                if (showFullModal && modalListRef.current) {
                    setTimeout(() => {
                        if (modalListRef.current) modalListRef.current.scrollTop = modalListRef.current.scrollHeight;
                    }, 50);
                }
            }, [comments, showFullModal]);

            // Report live comment count to parent
            useEffect(() => {
                if (onCountUpdate && expanded) onCountUpdate(comments.length);
            }, [comments.length, expanded]);

            // Close dropdown when clicking outside
            useEffect(() => {
                if (!optionsCommentId) return;
                const handler = () => setOptionsCommentId(null);
                document.addEventListener('click', handler);
                return () => document.removeEventListener('click', handler);
            }, [optionsCommentId]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                const trimmed = newComment.trim();
                if (!trimmed || submitting) return;
                if (!currentUser || currentUser.isAnonymous) {
                    setShowLoginModal(true);
                    return;
                }
                if (trimmed.length < MIN_CHARS) {
                    alert(`ความคิดเห็นต้องมีอย่างน้อย ${MIN_CHARS} ตัวอักษร (ตอนนี้ ${trimmed.length} ตัวอักษร)`);
                    return;
                }
                if (isLimitReached) {
                    alert(`คุณแสดงความเห็นได้สูงสุด ${MAX_COMMENTS_PER_USER} ครั้งต่อโพสต์`);
                    return;
                }
                setSubmitting(true);
                try {
                    await addComment(trimmed);
                    setNewComment('');
                } catch (e) {
                    alert('เกิดข้อผิดพลาดในการส่งความเห็น: ' + e.message);
                }
                setSubmitting(false);
            };

            const handleReportComment = (c) => {
                if (!currentUser || currentUser.isAnonymous) {
                    setShowLoginModal(true);
                    return;
                }
                setReportingComment(c);
                setReportReason('ข้อมูลเท็จ');
                setReportDetail('');
                setOptionsCommentId(null);
            };

            const confirmReport = async () => {
                if (!reportingComment) return;
                setSubmitting(true);
                try {
                    await addDoc(collection(db, "reports"), {
                        type: 'comment_report',
                        commentId: reportingComment.id,
                        commentText: reportingComment.text,
                        commentUserId: reportingComment.userId,
                        itemId: itemId,
                        reporterId: currentUser.uid,
                        reason: reportReason,
                        detail: reportDetail.trim(),
                        status: 'pending',
                        createdAt: Date.now()
                    });
                    setReportingComment(null);
                    alert('ส่งรายงานเรียบร้อยแล้ว ขอบคุณครับ');
                } catch (e) {
                    alert('เกิดข้อผิดพลาด: ' + e.message);
                }
                setSubmitting(false);
            };

            const handleDelete = async (commentId, userId) => {
                if (!confirm("ต้องการลบความคิดเห็นนี้หรือไม่?")) return;
                try {
                    await deleteComment(commentId, userId, currentUser);
                } catch (e) {
                    alert('ลบไม่สำเร็จ: ' + e.message);
                }
            };

            if (!expanded) return null;

            const visibleComments = comments.slice(-3);

            // Shared comment input renderer (used in both inline and modal)
            const renderCommentInput = (isModal = false) => {
                if (!currentUser || currentUser.isAnonymous) {
                    return isModal ? (
                        <div onClick={() => setShowLoginModal(true)} className="w-full bg-gray-50 border border-gray-200 rounded-full py-2.5 px-4 text-xs text-gray-500 cursor-pointer shadow-sm text-center font-bold">เข้าสู่ระบบเพื่อแสดงความเห็น</div>
                    ) : (
                        <div onClick={() => setShowLoginModal(true)} className="w-full bg-white border border-gray-200 rounded-full py-1.5 px-3 text-[10px] text-gray-400 cursor-pointer shadow-sm text-left">เพิ่มความคิดเห็น...</div>
                    );
                }
                if (isLimitReached) {
                    return (
                        <div className={isModal ? "w-full bg-gray-100 border border-gray-200 rounded-full py-2.5 px-4 text-xs text-gray-400 text-center font-medium" : "w-full bg-gray-100 border border-gray-200 rounded-full py-1.5 px-3 text-[10px] text-gray-400 text-center font-medium"}>
                            คุณแสดงความเห็นครบ {MAX_COMMENTS_PER_USER}/{MAX_COMMENTS_PER_USER} แล้ว
                        </div>
                    );
                }
                return (
                    <div>
                        <div className={isModal ? "flex items-center bg-gray-50 border border-gray-200 rounded-full shadow-inner overflow-hidden pr-1.5 focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-100 transition-all text-xs" : "flex items-center bg-white border border-gray-200 rounded-full shadow-sm overflow-hidden pr-1 text-[11px]"}>
                            <input
                                type="text"
                                value={newComment}
                                onChange={e => setNewComment(e.target.value)}
                                placeholder={`เพิ่มความคิดเห็น (ขั้นต่ำ ${MIN_CHARS} ตัวอักษร)...`}
                                className={isModal ? "flex-1 py-2.5 px-4 outline-none min-w-0 bg-transparent" : "flex-1 py-1.5 px-3 outline-none min-w-0 bg-transparent"}
                                maxLength={500}
                            />
                            <span className={`text-[9px] px-1 whitespace-nowrap ${isTooShort ? 'text-orange-400' : 'text-gray-300'}`}>{charCount}/{MIN_CHARS}+</span>
                            <button type="submit" disabled={!newComment.trim() || isTooShort || submitting} className={isModal ? "p-1.5 px-3 text-blue-500 disabled:opacity-40 disabled:text-gray-400 font-bold transition-colors" : "p-1 px-2 text-blue-500 disabled:opacity-40 disabled:text-gray-400 font-bold transition-colors"}>
                                ส่ง
                            </button>
                        </div>
                        <div className="flex justify-between items-center mt-1 px-1">
                            {isTooShort && <span className="text-[9px] text-orange-400">ต้องมีอย่างน้อย {MIN_CHARS} ตัวอักษร</span>}
                            {!isTooShort && <span />}
                            <span className={`text-[9px] font-bold ${remainingComments === 1 ? 'text-orange-400' : 'text-gray-300'}`}>{userCommentCount}/{MAX_COMMENTS_PER_USER}</span>
                        </div>
                    </div>
                );
            };

            // Render the dropdown menu for a comment
            const renderOptionsMenu = (c) => (
                <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, zIndex: 9998 }} onClick={(e) => { e.stopPropagation(); setOptionsCommentId(null); }}>
                    <div style={{ position: 'absolute', zIndex: 9999 }} className="w-40 bg-white rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.18)] border border-gray-100 overflow-hidden py-1 animate-fade-in" ref={(el) => {
                        if (!el) return;
                        const btn = document.querySelector(`[data-comment-opt="${c.id}"]`);
                        if (btn) {
                            const r = btn.getBoundingClientRect();
                            el.style.top = (r.bottom + 4) + 'px';
                            el.style.right = (window.innerWidth - r.right) + 'px';
                            el.style.left = 'auto';
                        }
                    }} onClick={e => e.stopPropagation()}>
                        <button onClick={() => { setOptionsCommentId(null); handleReportComment(c); }} className="w-full text-left px-4 py-3 text-xs font-bold text-orange-600 hover:bg-orange-50 flex items-center gap-2">
                            <Flag size={14} /> รายงาน
                        </button>
                        {currentUser && currentUser.uid === c.userId && (
                            <button onClick={() => { setOptionsCommentId(null); handleDelete(c.id, c.userId); }} className="w-full text-left px-4 py-3 text-xs font-bold text-red-500 hover:bg-red-50 flex items-center gap-2 border-t border-gray-100">
                                <Trash2 size={14} /> ลบความเห็น
                            </button>
                        )}
                    </div>
                </div>
            );

            // Full comment modal rendered via portal
            const fullModal = showFullModal ? createPortal(
                <div className="fixed inset-0 bg-black/60 z-[9990] flex items-end sm:items-center justify-center animate-fade-in" onClick={() => { setShowFullModal(false); setOptionsCommentId(null); }}>
                    <div className="bg-white w-full sm:max-w-md sm:rounded-2xl rounded-t-2xl flex flex-col animate-slide-up" style={{ maxHeight: '85dvh', height: '85dvh' }} onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-gray-100 flex items-center justify-between shadow-sm shrink-0">
                            <h3 className="font-bold text-gray-800 flex items-center gap-2"><MessageSquare size={18} className="text-blue-500" /> ความคิดเห็น ({comments.length})</h3>
                            <button onClick={() => { setShowFullModal(false); setOptionsCommentId(null); }} className="w-8 h-8 flex items-center justify-center bg-gray-100 hover:bg-gray-200 text-gray-500 rounded-full transition-colors"><X size={16} /></button>
                        </div>

                        <div ref={modalListRef} className="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50/50">
                            {comments.map(c => (
                                <div key={c.id} className="flex items-start justify-between text-xs relative">
                                    <div className="flex gap-2 min-w-0 flex-1">
                                        <div className="font-bold text-gray-800 whitespace-nowrap">{c.userDisplayName}:</div>
                                        <div className="text-gray-700 break-words min-w-0">{c.text}</div>
                                    </div>
                                    <div className="flex items-center gap-1.5 shrink-0 ml-3">
                                        <span className="text-[10px] text-gray-400 whitespace-nowrap">{new Date(c.createdAt).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}</span>
                                        <button data-comment-opt={c.id} onClick={(e) => { e.stopPropagation(); setOptionsCommentId(optionsCommentId === c.id ? null : c.id); }} className="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded hover:bg-gray-100">
                                            <MoreVertical size={14} />
                                        </button>
                                    </div>
                                </div>
                            ))}
                            {comments.length === 0 && <div className="text-center py-8 text-xs text-gray-400 italic">ยังไม่มีความคิดเห็น มาร่วมเป็นคนแรกเลย!</div>}
                        </div>

                        <div className="p-3 border-t border-gray-100 bg-white shrink-0" style={{ paddingBottom: 'max(12px, env(safe-area-inset-bottom))' }}>
                            <form onSubmit={handleSubmit}>
                                {renderCommentInput(true)}
                            </form>
                        </div>
                    </div>
                </div>,
                document.body
            ) : null;

            // Options dropdown rendered via portal
            const optionsPortal = optionsCommentId ? createPortal(
                renderOptionsMenu(comments.find(c => c.id === optionsCommentId)),
                document.body
            ) : null;

            return (
                <div className="bg-gray-50/50 border-t border-gray-100 p-3 pt-3 flex flex-col mt-2 rounded-b-xl" onClick={(e) => e.stopPropagation()}>
                    {loadingComments ? (
                        <div className="text-center py-2 text-[10px] text-gray-400">กำลังโหลด...</div>
                    ) : (
                        <div className="space-y-1.5 mb-2">
                            {comments.length > 3 && (
                                <button onClick={() => setShowFullModal(true)} className="text-[10px] font-bold text-gray-500 hover:text-gray-700 transition-colors py-1 w-full text-left">
                                    อ่านความคิดเห็นเพิ่มเติม ({comments.length} ความเห็น) ...
                                </button>
                            )}
                            {comments.length === 0 ? (
                                <div className="text-[10px] text-gray-400 italic py-1">ยังไม่มีความคิดเห็น มาร่วมเป็นคนแรกเลย!</div>
                            ) : (
                                visibleComments.map(c => (
                                    <div key={c.id} className="flex items-baseline justify-between text-[11px] group">
                                        <div className="flex items-baseline gap-1.5 min-w-0 pr-4">
                                            <span className="font-bold text-gray-800 whitespace-nowrap">{c.userDisplayName}:</span>
                                            <span className="text-gray-700 truncate">{c.text}</span>
                                        </div>
                                        <div className="flex items-baseline gap-2 shrink-0">
                                            <span className="text-[9px] text-gray-400 whitespace-nowrap">{new Date(c.createdAt).toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}</span>
                                            <button data-comment-opt={c.id} onClick={(e) => { e.stopPropagation(); setOptionsCommentId(optionsCommentId === c.id ? null : c.id); }} className="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded hover:bg-gray-100 ml-1">
                                                <MoreVertical size={12} />
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}

                    {/* Inline comment form */}
                    <form onSubmit={handleSubmit} className="mt-1">
                        {renderCommentInput(false)}
                    </form>

                    {/* Portal-rendered modal */}
                    {fullModal}
                    {optionsPortal}
                    {reportingComment && createPortal(
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm animate-fade-in" onClick={() => setReportingComment(null)}>
                            <div className="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden animate-scale-in" onClick={e => e.stopPropagation()}>
                                <div className="bg-orange-500 p-6 text-white text-center">
                                    <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3">
                                        <AlertCircle size={24} />
                                    </div>
                                    <h3 className="text-lg font-bold">รายงานความคิดเห็น</h3>
                                    <p className="text-orange-100 text-[11px] mt-1 line-clamp-1 italic">"{reportingComment.text}"</p>
                                </div>

                                <div className="p-5 space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-2">เลือกเหตุผล</label>
                                        <div className="space-y-2">
                                            {['ข้อมูลเท็จ', 'คำหยาบ', 'เนื้อหาไม่เหมาะสม'].map(r => (
                                                <button key={r} onClick={() => setReportReason(r)} className={`w-full flex items-center justify-between p-3 rounded-xl border text-xs font-bold transition-all ${reportReason === r ? 'bg-orange-50 border-orange-200 text-orange-600' : 'bg-gray-50 border-gray-100 text-gray-500 hover:border-gray-200'}`}>
                                                    {r}
                                                    {reportReason === r && <Check size={14} />}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div>
                                        <div className="flex justify-between items-center mb-1.5">
                                            <label className="text-[10px] font-bold text-gray-400 uppercase tracking-wider block">รายละเอียดเพิ่มเติม</label>
                                            <span className={`text-[9px] font-bold ${reportDetail.length > 50 ? 'text-red-500' : 'text-gray-300'}`}>{reportDetail.length}/50</span>
                                        </div>
                                        <textarea
                                            value={reportDetail}
                                            onChange={e => setReportDetail(e.target.value.slice(0, 50))}
                                            placeholder="บอกรายละเอียดเพิ่มเติมเพื่อให้เราตรวจสอบได้ง่ายขึ้น..."
                                            className="w-full h-20 p-3 bg-gray-50 border border-gray-100 rounded-xl text-xs outline-none focus:border-orange-300 focus:ring-1 focus:ring-orange-100 transition-all resize-none"
                                        />
                                    </div>
                                </div>

                                <div className="p-4 bg-gray-50 flex gap-3">
                                    <button onClick={() => setReportingComment(null)} className="flex-1 py-3 text-sm font-bold text-gray-400 bg-white border border-gray-200 rounded-xl hover:bg-gray-100 transition-colors">ยกเลิก</button>
                                    <button onClick={confirmReport} disabled={submitting} className="flex-1 py-3 text-sm font-bold text-white bg-orange-500 rounded-xl hover:bg-orange-600 shadow-lg shadow-orange-200 transition-all active:scale-95 disabled:opacity-50">
                                        {submitting ? 'กำลังส่ง...' : 'ส่งรายงาน'}
                                    </button>
                                </div>
                            </div>
                        </div>,
                        document.body
                    )}
                </div>
            );
        };

        const LikeButton = ({ itemId, currentUser, setShowLoginModal, initialCount = 0 }) => {
            const { count, isLiked, toggleLike } = useLikes(itemId, currentUser, setShowLoginModal, initialCount);
            const [isAnimating, setIsAnimating] = useState(false);

            const handleClick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsAnimating(true);
                setTimeout(() => setIsAnimating(false), 300);
                toggleLike();
            };

            return (
                <button onClick={handleClick} className={`flex items-center gap-1 text-xs font-bold transition-transform ${isLiked ? 'text-red-500' : 'text-gray-400 hover:text-red-400'} ${isAnimating ? 'scale-125' : 'scale-100'}`}>
                    <Heart size={14} className={isLiked ? 'fill-current text-red-500' : ''} /> {count > 0 ? count : ''}
                </button>
            );
        };

        const ProfileEditModal = ({
            profile, currentUser, saveProfile, setToastMessage,
            showProfileModal, setShowProfileModal, profileForceOpen, setProfileForceOpen
        }) => {
            const [pNickname, setPNickname] = useState(profile?.nickname || currentUser?.displayName || '');
            const [pFirstName, setPFirstName] = useState(profile?.firstName || '');
            const [pLastName, setPLastName] = useState(profile?.lastName || '');
            const [pMobile, setPMobile] = useState(profile?.mobile || '');
            const [pProvince, setPProvince] = useState(profile?.province || '');
            const [pPhotoURL, setPPhotoURL] = useState(profile?.photoURL || currentUser?.photoURL || null);
            const [pErrors, setPErrors] = useState({});
            const [pSaving, setPSaving] = useState(false);

            // Sync form fields when profile data loads asynchronously
            useEffect(() => {
                if (profile) {
                    setPNickname(prev => prev || profile.nickname || currentUser?.displayName || '');
                    setPFirstName(prev => prev || profile.firstName || '');
                    setPLastName(prev => prev || profile.lastName || '');
                    setPMobile(prev => prev || profile.mobile || '');
                    setPProvince(prev => prev || profile.province || '');
                    setPPhotoURL(prev => prev || profile.photoURL || currentUser?.photoURL || null);
                }
            }, [profile]);
            const [showNicknameRequest, setShowNicknameRequest] = useState(false);
            const [reqNickname, setReqNickname] = useState('');
            const [reqReason, setReqReason] = useState('');
            const [reqSubmitting, setReqSubmitting] = useState(false);

            const nicknameLocked = !!profile?.nicknameChangedAt;
            const pendingRequest = profile?.nicknameChangeRequest?.status === 'pending';
            const rejectedRequest = profile?.nicknameChangeRequest?.status === 'rejected';

            // Auto-approve nickname change if approved by admin
            useEffect(() => {
                if (profile?.nicknameChangeRequest?.status === 'approved') {
                    const newNick = profile.nicknameChangeRequest.requestedNickname;
                    saveProfile({ nickname: newNick, nicknameChangedAt: Date.now(), nicknameChangeRequest: null });
                    // Update all user's posts
                    getDocs(query(collection(db, 'items'), where('userId', '==', currentUser?.uid))).then(snap => {
                        snap.docs.forEach(d => updateDoc(doc(db, 'items', d.id), { userDisplayName: newNick }));
                    });
                    setToastMessage('คำขอได้รับการอนุมัติแล้ว ชื่อของคุณถูกเปลี่ยนเรียบร้อย');
                }
            }, [profile?.nicknameChangeRequest?.status]);

            const formatMobile = (val) => {
                const digits = val.replace(/\D/g, '').slice(0, 10);
                if (digits.length <= 3) return digits;
                if (digits.length <= 6) return digits.slice(0, 3) + '-' + digits.slice(3);
                return digits.slice(0, 3) + '-' + digits.slice(3, 6) + '-' + digits.slice(6);
            };

            const validateMobile = (m) => {
                const digits = m.replace(/\D/g, '');
                return digits.length === 10 && digits.startsWith('0');
            };

            const handleAvatarUpload = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const maxSize = 400;
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setPPhotoURL(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            const validate = () => {
                const errs = {};
                if (!nicknameLocked && !pNickname.trim()) errs.nickname = 'กรุณากรอกชื่อที่แสดงในแอป';
                if (!pFirstName.trim()) errs.firstName = 'กรุณากรอกชื่อ';
                if (!pLastName.trim()) errs.lastName = 'กรุณากรอกนามสกุล';
                if (!pMobile.trim()) errs.mobile = 'กรุณากรอกเบอร์โทรศัพท์';
                else if (!validateMobile(pMobile)) errs.mobile = 'รูปแบบไม่ถูกต้อง (0XX-XXX-XXXX)';
                if (!pProvince) errs.province = 'กรุณาเลือกจังหวัด';
                setPErrors(errs);
                return Object.keys(errs).length === 0;
            };

            const handleSave = async () => {
                if (!validate()) return;
                setPSaving(true);
                try {
                    const isFirstNicknameSet = !profile?.nicknameChangedAt && !profile?.nickname;
                    const data = {
                        firstName: pFirstName.trim(), lastName: pLastName.trim(),
                        mobile: pMobile.replace(/\D/g, ''), province: pProvince,
                        photoURL: pPhotoURL,
                    };
                    if (!nicknameLocked) {
                        data.nickname = pNickname.trim();
                        if (!isFirstNicknameSet || (profile?.nickname && profile.nickname !== pNickname.trim())) {
                            data.nicknameChangedAt = Date.now();
                        } else if (isFirstNicknameSet) {
                            data.nicknameChangedAt = Date.now();
                        }
                    }
                    await saveProfile(data);
                    // Update display name on all existing posts
                    if (data.nickname) {
                        const snap = await getDocs(query(collection(db, 'items'), where('userId', '==', currentUser?.uid)));
                        snap.docs.forEach(d => updateDoc(doc(db, 'items', d.id), { userDisplayName: data.nickname, userPhotoURL: pPhotoURL }));
                    }
                    setToastMessage('บันทึกข้อมูลเรียบร้อยแล้ว');
                    setShowProfileModal(false);
                    setProfileForceOpen(false);
                } catch (e) { alert('เกิดข้อผิดพลาด: ' + e.message); }
                setPSaving(false);
            };

            const handleNicknameRequest = async () => {
                if (!reqNickname.trim() || !reqReason.trim()) return;
                setReqSubmitting(true);
                try {
                    await saveProfile({
                        nicknameChangeRequest: {
                            requestedNickname: reqNickname.trim(),
                            reason: reqReason.trim(),
                            requestedAt: Date.now(),
                            status: 'pending',
                            adminNote: ''
                        }
                    });
                    setShowNicknameRequest(false);
                    setToastMessage('ส่งคำขอเปลี่ยนชื่อเรียบร้อยแล้ว');
                } catch (e) { alert('เกิดข้อผิดพลาด: ' + e.message); }
                setReqSubmitting(false);
            };

            const isFormValid = (() => {
                if (!nicknameLocked && !pNickname.trim()) return false;
                if (!pFirstName.trim() || !pLastName.trim()) return false;
                if (!validateMobile(pMobile)) return false;
                if (!pProvince) return false;
                return true;
            })();

            const avatarInputRef = useRef(null);

            if (!showProfileModal) return null;

            return (
                <div onClick={() => { setShowProfileModal(false); setProfileForceOpen(false); }} className="absolute inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center animate-fade-in">
                    <div onClick={e => e.stopPropagation()} className="bg-white w-full max-w-md h-full max-h-[100dvh] overflow-y-auto flex flex-col">
                        {/* Header */}
                        <div className="p-5 border-b border-gray-100 flex items-center justify-between flex-shrink-0 bg-gradient-to-r from-green-500 to-green-600 text-white">
                            <div className="flex items-center gap-2">
                                <Shield size={20} />
                                <h2 className="text-lg font-bold">แก้ไขข้อมูลส่วนตัว</h2>
                            </div>
                            <button onClick={() => { setShowProfileModal(false); setProfileForceOpen(false); }} className="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center hover:bg-white/30"><X size={18} /></button>
                        </div>

                        {profileForceOpen && (
                            <div className="bg-orange-50 border-b border-orange-200 p-3 text-center">
                                <p className="text-sm font-bold text-orange-600">กรุณากรอกข้อมูลส่วนตัวให้ครบก่อนใช้งาน</p>
                            </div>
                        )}

                        <div className="flex-1 p-5 space-y-6">
                            {/* Avatar Section */}
                            <div className="flex flex-col items-center gap-3">
                                <div className="relative">
                                    {pPhotoURL ? (
                                        <img src={pPhotoURL} className="w-24 h-24 rounded-full object-cover border-4 border-green-100 shadow-lg" />
                                    ) : (
                                        <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center border-4 border-green-100 shadow-lg"><User size={40} className="text-gray-300" /></div>
                                    )}
                                    <button onClick={() => avatarInputRef.current?.click()} className="absolute -bottom-1 -right-1 w-8 h-8 bg-green-500 text-white rounded-full flex items-center justify-center shadow-md hover:bg-green-600 transition-colors">
                                        <Camera size={14} />
                                    </button>
                                </div>
                                <input ref={avatarInputRef} type="file" accept="image/*" className="hidden" onChange={handleAvatarUpload} />
                                <button onClick={() => avatarInputRef.current?.click()} className="text-xs text-green-600 font-bold">เปลี่ยนรูป</button>
                            </div>

                            {/* Nickname */}
                            <div className="space-y-1.5">
                                <label className="text-[10px] font-bold text-gray-400 uppercase tracking-widest flex items-center gap-1">
                                    ชื่อที่แสดงในแอป <span className="text-red-500">*</span>
                                    {nicknameLocked && <Lock size={10} className="text-orange-500" />}
                                </label>
                                {nicknameLocked ? (
                                    <div>
                                        <div className="w-full p-3 bg-gray-100 rounded-xl text-sm font-bold text-gray-600 border-2 border-gray-200 flex items-center justify-between">
                                            <span>{profile?.nickname}</span>
                                            <Lock size={14} className="text-gray-400" />
                                        </div>
                                        <p className="text-[10px] text-orange-500 font-medium mt-1">คุณเปลี่ยนชื่อแสดงไปแล้วครั้งหนึ่ง</p>
                                        {pendingRequest ? (
                                            <div className="mt-2 bg-yellow-50 border border-yellow-200 rounded-xl p-3">
                                                <p className="text-xs font-bold text-yellow-700">คำขอเปลี่ยนชื่อของคุณกำลังรอการอนุมัติ</p>
                                                <p className="text-[10px] text-gray-500 italic mt-1">ชื่อใหม่ที่ขอ: {profile?.nicknameChangeRequest?.requestedNickname}</p>
                                            </div>
                                        ) : rejectedRequest ? (
                                            <div className="mt-2 bg-red-50 border border-red-200 rounded-xl p-3">
                                                <p className="text-xs font-bold text-red-600">คำขอถูกปฏิเสธ: {profile?.nicknameChangeRequest?.adminNote || 'ไม่ระบุเหตุผล'}</p>
                                                <button onClick={() => { saveProfile({ nicknameChangeRequest: null }); }} className="mt-1 text-[10px] text-blue-600 font-bold underline">ส่งคำขอใหม่</button>
                                            </div>
                                        ) : (
                                            <button onClick={() => setShowNicknameRequest(true)} className="mt-2 text-xs text-blue-600 font-bold bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-200 hover:bg-blue-100 transition-colors">
                                                ขอเปลี่ยนชื่อใหม่ (ต้องรออนุมัติจาก Admin)
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <div>
                                        <input type="text" value={pNickname} onChange={e => setPNickname(e.target.value)} placeholder="ชื่อที่แสดงในแอป"
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold text-gray-800 border-2 border-transparent focus:border-green-400 outline-none" />
                                        {pErrors.nickname && <p className="text-xs text-red-500 mt-1">{pErrors.nickname}</p>}
                                    </div>
                                )}
                            </div>

                            {/* Personal Details */}
                            <div className="space-y-4">
                                <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-widest border-b border-gray-100 pb-2">ข้อมูลส่วนตัว</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 block">ชื่อ <span className="text-red-500">*</span></label>
                                        <input type="text" value={pFirstName} onChange={e => setPFirstName(e.target.value)} placeholder="ชื่อ"
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold text-gray-800 border-2 border-transparent focus:border-green-400 outline-none" />
                                        {pErrors.firstName && <p className="text-xs text-red-500 mt-1">{pErrors.firstName}</p>}
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-gray-400 mb-1 block">นามสกุล <span className="text-red-500">*</span></label>
                                        <input type="text" value={pLastName} onChange={e => setPLastName(e.target.value)} placeholder="นามสกุล"
                                            className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold text-gray-800 border-2 border-transparent focus:border-green-400 outline-none" />
                                        {pErrors.lastName && <p className="text-xs text-red-500 mt-1">{pErrors.lastName}</p>}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 mb-1 block">เบอร์โทรศัพท์ <span className="text-red-500">*</span></label>
                                    <input type="tel" value={formatMobile(pMobile)} onChange={e => setPMobile(e.target.value.replace(/\D/g, ''))} placeholder="0XX-XXX-XXXX" inputMode="tel"
                                        className="w-full p-3 bg-gray-50 rounded-xl text-sm font-bold text-gray-800 border-2 border-transparent focus:border-green-400 outline-none" />
                                    {pErrors.mobile && <p className="text-xs text-red-500 mt-1">{pErrors.mobile}</p>}
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-gray-400 mb-1 block">จังหวัด <span className="text-red-500">*</span></label>
                                    <select value={pProvince} onChange={e => setPProvince(e.target.value)}

                            {/* Account Info */}

                                {profile?.createdAt && (
                                    <div className="flex items-center justify-between py-2">
                                        <span className="text-xs text-gray-500">สมาชิกตั้งแต่</span>
                                        <span className="text-xs font-bold text-gray-700">{new Date(profile.createdAt).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' })}</span>
