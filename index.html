                                                {d.promoCodeUsed && d.promoCode && (
                                                    <div className="flex justify-between items-center border-t border-gray-200 pt-2">
                                                        <span className="text-sm text-blue-600 flex items-center gap-1">โค้ดส่วนลด: <span className="font-mono bg-blue-50 px-1.5 py-0.5 rounded text-[11px]">{d.promoCode}</span></span>
                                                        <span className="text-[10px] text-blue-500 font-bold">ใช้แล้ว</span>
                                                    </div>
                                                )}

                                                {/* Member price badge */}
                                                {d.isMemberPrice && (
                                                    <div className="flex justify-between items-center border-t border-gray-200 pt-2">
                                                        <span className="text-sm text-purple-600">ราคาสมาชิก</span>
                                                        <span className="text-[10px] bg-purple-100 text-purple-600 font-bold px-2 py-0.5 rounded">เฉพาะสมาชิก</span>
                                                    </div>
                                                )}

                                                {/* Shipping */}
                                                <div className="flex justify-between items-center border-t border-gray-200 pt-2">
                                                    <span className="text-sm text-gray-600">ค่าขนส่ง</span>
                                                    {shipFee > 0 ? (
                                                        <span className="text-sm font-bold text-orange-500">+ ฿{shipFee.toLocaleString()}</span>
                                                    ) : (
                                                        <span className="text-sm font-bold text-green-500">ส่งฟรี / รวมแล้ว</span>
                                                    )}
                                                </div>

                                                {/* Total & PPU */}
                                                <div className="border-t-2 border-gray-300 pt-3 mt-1">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm font-bold text-gray-700">ราคาสุทธิ (หลังหักค่าใช้จ่าย)</span>
                                                        <span className={`text-lg font-black ${(d.status ?? 'active') === 'expired' ? 'text-[#9CA3AF]' : 'text-gray-900'}`}>฿{priceAfterCashback.toLocaleString()}</span>
                                                    </div>
                                                    {shipFee > 0 && (
                                                        <div className="flex justify-between items-center mt-1">
                                                            <span className="text-xs text-gray-500">รวมค่าส่ง</span>
                                                            <span className="text-sm font-bold text-gray-700">฿{totalWithShipping.toLocaleString()}</span>
                                                        </div>
                                                    )}
                                                    <div className="flex justify-between items-center mt-2 bg-orange-50 p-2.5 rounded-xl border border-orange-100">
                                                        <span className="text-xs font-bold text-orange-600">ตกชิ้นละ ({d.unitType})</span>
                                                        <span className="text-base font-black text-orange-600">฿{d.ppu?.toFixed(2)}</span>
                                                    </div>
                                                    {shipFee > 0 && (
                                                        <div className="flex justify-between items-center mt-1.5 bg-blue-50 p-2 rounded-xl border border-blue-100">
                                                            <span className="text-[11px] font-bold text-blue-600">ตกชิ้นละ (รวมค่าส่ง)</span>
                                                            <span className="text-sm font-black text-blue-600">฿{d.ppuWithShipping?.toFixed(2)}</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            {/* Tags */}
                                            {d.tags && d.tags.length > 0 && (
                                                <div className="flex flex-wrap gap-1.5 mt-4">
                                                    {d.tags.map(tag => (
                                                        <span key={tag} onClick={() => { setSelectedDealDetail(null); setSearchQuery(tag); setCurrentView('search'); }} className="px-2 py-1 bg-gray-100 text-gray-600 rounded-lg text-[10px] font-bold cursor-pointer hover:bg-gray-200">#{tag}</span>
                                                    ))}
                                                </div>
                                            )}

                                            {/* Product URL */}
                                            {d.productUrl && (
                                                <a href={d.productUrl} target="_blank" rel="noopener noreferrer"
                                                    className="mt-4 flex items-center gap-2 text-sm text-indigo-600 font-bold bg-indigo-50 px-4 py-3 rounded-xl border border-indigo-100 hover:bg-indigo-100 transition-colors">
                                                    <Link2 size={16} />
                                                    <span className="truncate">ดูสินค้าที่ร้าน</span>
                                                    <ChevronRight size={16} className="ml-auto flex-shrink-0 text-indigo-400" />
                                                </a>
                                            )}

                                            {/* Posted info */}
                                            <div className="mt-4 flex items-center justify-center gap-2 text-[11px] text-gray-400">
                                                {d.userPhotoURL ? <img src={d.userPhotoURL} className="w-5 h-5 rounded-full object-cover" /> : <User size={14} className="text-gray-300" />}
                                                <span>{d.userDisplayName}</span>
                                                <span>·</span>
                                                <span>โพสต์เมื่อ {d.timePosted}</span>
                                            </div>

                                            {/* Comments */}
                                            <div className="mt-6">
                                                <button onClick={() => setExpandedComments(prev => ({ ...prev, [d.id]: !prev[d.id] }))} className="w-full flex items-center justify-center gap-2 py-3 bg-gray-50 border border-gray-100 rounded-xl text-gray-600 font-bold hover:bg-gray-100 transition-colors shadow-sm">
                                                    <MessageSquare size={16} />
                                                    {expandedComments[d.id] ? 'ซ่อนความคิดเห็น' : `แสดงความคิดเห็น (${commentCounts[d.id] ?? d.comments ?? 0})`}
                                                </button>
                                                <div className="mt-2">
                                                    <CommentSection
                                                        itemId={d.id}
                                                        currentUser={currentUser}
                                                        setShowLoginModal={setShowLoginModal}
                                                        expanded={!!expandedComments[d.id]}
                                                        setExpanded={(val) => setExpandedComments(prev => ({ ...prev, [d.id]: val }))}
                                                        onCountUpdate={(cnt) => setCommentCounts(prev => ({ ...prev, [d.id]: cnt }))}
                                                        profile={profile}
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                        {/* STORE MINI MODAL */}
                        {selectedStore && (
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-6 animate-fade-in" onClick={() => setSelectedStore(null)}>
                                <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl relative" onClick={e => e.stopPropagation()}>
                                    <button onClick={() => setSelectedStore(null)} className="absolute top-4 right-4 w-8 h-8 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors"><X size={20} /></button>
                                    <div className="p-8 pb-4 flex flex-col items-center border-b border-gray-50">
                                        {(() => { const meta = stores.find(s => s.id === selectedStore.id); return meta?.logoUrl ? <div className="w-24 h-16 bg-white rounded-2xl border border-gray-100 shadow-sm flex items-center justify-center overflow-hidden mb-4 p-2"><img src={meta.logoUrl} alt={selectedStore.id} className="w-full h-full object-contain" /></div> : <div className="w-20 h-20 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500 mb-4 shadow-inner"><Store size={40} /></div>; })()}
                                        <h2 className="text-2xl font-bold text-gray-800 text-center">{selectedStore.id}</h2>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <div className="flex items-center gap-4 p-3 bg-gray-50 rounded-2xl border border-gray-100"><div className="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-green-500 border border-gray-100"><ShoppingBag size={20} /></div><div><div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">สินค้าในระบบ</div><div className="text-sm font-bold text-gray-700">{getStoreDeals(selectedStore.id).length} รายการ</div></div></div>
                                        <div className="flex items-center gap-4 p-3 bg-gray-50 rounded-2xl border border-gray-100"><div className="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-400 border border-gray-100"><MapPin size={20} /></div><div><div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">จังหวัด</div><div className="text-sm font-bold text-gray-700">{selectedStore.province || 'ไม่ระบุ'}</div></div></div>
                                        <div className="flex items-center gap-4 p-3 bg-gray-50 rounded-2xl border border-gray-100"><div className="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-400 border border-gray-100"><Zap size={20} /></div><div><div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">เบอร์โทรศัพท์</div>{selectedStore.phone ? <a href={`tel:${selectedStore.phone}`} className="text-sm font-bold text-blue-500 hover:underline">{selectedStore.phone}</a> : <div className="text-sm font-bold text-gray-700">ไม่ระบุ</div>}</div></div>
                                        {getStoreDeals(selectedStore.id).length > 0 && <button onClick={() => { setSelectedStoreForDetail(selectedStore); setStoreSearchQuery(''); setSelectedStore(null); setCurrentView('store_detail'); }} className="w-full py-3.5 bg-gradient-to-r from-orange-500 to-orange-600 text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-orange-100 active:scale-95 transition-all"><Store size={16} /> ดูสินค้าทั้งหมดของร้านนี้</button>}
                                        {selectedStore.mapsUrl && <a href={selectedStore.mapsUrl} target="_blank" className="w-full py-3.5 bg-slate-900 text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-gray-400 active:scale-95 transition-all"><MapPin size={16} /> ดูแผนที่บน Google Maps</a>}
                                    </div>
                                    <div className="h-6"></div>
                                </div>
                            </div>
                        )}

                        {/* REPORT MODAL */}
                        {showReportModal && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                                        <div className="flex items-center gap-2 text-gray-800">
                                            <svg className="w-5 h-5 text-orange-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                                            <h2 className="font-bold text-lg">รายงานปัญหา / เสนอแนะ</h2>
                                        </div>
                                        <button onClick={() => setShowReportModal(false)} className="p-2 hover:bg-gray-200 rounded-full transition-colors text-gray-500"><X size={20} /></button>
                                    </div>
                                    <div className="p-5 overflow-y-auto max-h-[70vh]">
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-bold text-gray-700 mb-1">รายละเอียด</label>
                                                <textarea value={reportText} onChange={(e) => setReportText(e.target.value)} placeholder="พิมพ์ปัญหาหรือข้อเสนอแนะที่นี่..." className="w-full p-3 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none h-28 resize-none" />
                                            </div>
                                            <div>
                                                <div className="flex justify-between items-center mb-1"><label className="block text-sm font-bold text-gray-700">แนบรูปภาพ</label><span className="text-xs text-gray-400 font-medium">{reportImages.length}/2 รูป</span></div>
                                                <div className="flex gap-2 mb-2">
                                                    {reportImages.map((img, idx) => (
                                                        <div key={idx} className="relative w-20 h-20 rounded-xl overflow-hidden border border-gray-200 bg-gray-50">
                                                            <img src={img} alt={`Report ${idx}`} className="w-full h-full object-cover" />
                                                            <button onClick={() => setReportImages(reportImages.filter((_, i) => i !== idx))} className="absolute top-1 right-1 bg-black/50 text-white rounded-full p-1 w-6 h-6 flex items-center justify-center backdrop-blur hover:bg-black/70 transition-colors"><X size={12} /></button>
                                                        </div>
                                                    ))}
                                                    {reportImages.length < 2 && (
                                                        <label className="w-20 h-20 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center text-gray-400 hover:bg-gray-50 hover:border-gray-400 hover:text-gray-500 cursor-pointer transition-colors shrink-0">
                                                            <Camera size={20} className="mb-1" /><span className="text-[10px] font-bold">เพิ่มรูป</span>
                                                            <input type="file" accept="image/*" multiple onChange={handleReportImageUpload} className="hidden" />
                                                        </label>
                                                    )}
                                                </div>
                                                <p className="text-[10px] text-gray-400 leading-tight">รองรับไฟล์ภาพสูงสุด 2 รูปภาพ สำหรับอธิบายปัญหาหรือหน้าจอของคุณ</p>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-4 border-t border-gray-100 bg-gray-50 flex gap-3">
                                        <button onClick={() => setShowReportModal(false)} className="flex-1 py-3 bg-white text-gray-700 rounded-xl font-bold text-sm border border-gray-200 shadow-sm hover:bg-gray-50 active:scale-95 transition-all">ยกเลิก</button>
                                        <button onClick={handleSubmitReport} disabled={isSubmittingReport || (!reportText.trim() && reportImages.length === 0)} className="flex-1 py-3 bg-orange-500 text-white rounded-xl font-bold text-sm shadow-md shadow-orange-200 hover:bg-orange-600 active:scale-95 transition-all disabled:opacity-50 disabled:active:scale-100 flex items-center justify-center gap-2">
                                            {isSubmittingReport ? <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> : <>ส่งรายงาน</>}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SETTINGS MODAL */}
                        {showSettingsModal && (
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                                        <div className="flex items-center gap-2 text-gray-800">
                                            <Settings className="w-5 h-5 text-gray-500" />
                                            <h2 className="font-bold text-lg">ตั้งค่าระบบ</h2>
                                        </div>
                                        <button onClick={() => setShowSettingsModal(false)} className="p-2 hover:bg-gray-200 rounded-full transition-colors text-gray-500"><X size={20} /></button>
                                    </div>
                                    <div className="p-5 space-y-6">
                                        {/* Language Toggle */}
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-3">ภาษา (Language)</label>
                                            <div className="flex bg-gray-100 p-1 rounded-xl">
                                                <button className="flex-1 py-2 text-sm font-bold rounded-lg bg-white text-orange-500 shadow-sm transition-all focus:outline-none">TH</button>
                                                <button onClick={() => alert('not support yet')} className="flex-1 py-2 text-sm font-bold rounded-lg text-gray-500 hover:text-gray-700 transition-all focus:outline-none">EN</button>
                                            </div>
                                        </div>
                                        {/* Font Toggle */}
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-3">แบบอักษร</label>
                                            <button
                                                onClick={() => setAppFont(appFont === 'noto' ? 'sans' : 'noto')}
                                                className="w-full relative flex flex-col items-center justify-center py-4 bg-gray-50 hover:bg-blue-50 border-2 border-gray-100 hover:border-blue-200 rounded-xl transition-all font-bold group"
                                            >
                                                <span className="text-xs text-gray-400 mb-1">คลิกเพื่อเปลี่ยนฟอนต์เป็น</span>
                                                <span className="text-lg text-gray-700 group-hover:text-blue-600 transition-colors" style={{ fontFamily: appFont === 'noto' ? undefined : '"Noto Sans Thai", sans-serif' }}>เปลี่ยนฟอนต์</span>
                                            </button>
                                        </div>

                                        {/* Auth Actions in Settings */}
                                        <div className="pt-4 border-t border-gray-100">
                                            {isLoggedIn && !isGuestUser && (
                                                <button onClick={() => { handleLogout(); setShowSettingsModal(false); }} className="w-full px-6 py-3 bg-gray-100 hover:bg-red-50 text-gray-600 hover:text-red-500 text-sm font-bold rounded-xl transition-colors flex items-center justify-center gap-2"><Lock size={16} /> ออกจากระบบ</button>
                                            )}
                                            {isLoggedIn && isGuestUser && (
                                                <button onClick={() => { handleLogout(); setShowSettingsModal(false); }} className="w-full px-6 py-3 bg-red-50 hover:bg-red-100 text-red-500 text-sm font-bold rounded-xl transition-colors flex items-center justify-center gap-2"><Lock size={16} /> ออกจากระบบ Guest (ข้อมูลจะสูญหาย)</button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
