<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Price Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: {
                            50: '#f0f9eb', 100: '#dbf2ce', 200: '#bae6a1', 300: '#92d571',
                            400: '#6dc147', 500: '#48A111', 600: '#387e0d', 700: '#2c610b',
                            800: '#214709', 900: '#183107',
                        },
                        orange: {
                            50: '#fffcf1', 100: '#fff6db', 200: '#ffebb5', 300: '#ffdc89',
                            400: '#ffbd45', 500: '#FF8C00', 600: '#e67300', 700: '#bf5700',
                            800: '#994000', 900: '#7d3300',
                        }
                    }
                }
            }
        }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    body { font-family: 'Noto Sans Thai', sans-serif; background: #f1f5f9; min-height: 100vh; }
    .mono { font-family: 'IBM Plex Mono', monospace; }

    .fade { animation: fade .22s ease; }
    @keyframes fade { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

    input[type=number] { -moz-appearance:textfield; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }

    .modal-bg { position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:center;justify-content:center;padding:1rem; }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:9px; }

    .sku-panel { display:grid; grid-template-columns:230px 1fr; }
    .store-row-grid { display:grid; grid-template-columns:130px 1fr; }
    .card-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
    @media(max-width:1200px){ .card-grid{ grid-template-columns:repeat(3,1fr); } }
    @media(max-width:900px) { .card-grid{ grid-template-columns:repeat(2,1fr); } }

    .img-placeholder { background:linear-gradient(140deg,#f8fafc,#e2e8f0); border:1.5px solid #e2e8f0; border-radius:10px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .img-placeholder img { width:100%; height:100%; object-fit:cover; }

    .dot-lotus{background:#00a650;} .dot-makro{background:#1a3faa;} .dot-bigc{background:#e30613;}
    .pill-lotus{background:#e6f7ed;color:#00843d;border:1px solid #a7e3c0;}
    .pill-makro{background:#e8edf9;color:#1a3faa;border:1px solid #b0c0ee;}
    .pill-bigc {background:#fdeaea;color:#c0001a;border:1px solid #f5b3bb;}
    .dot-fallback{background:#94a3b8;}
    .pill-fallback{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1;}
  </style>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
import React, { useState, useMemo, useRef, useEffect } from 'react';
import { createRoot } from 'react-dom/client';
import { Package, Store, Search, ChevronLeft, ChevronRight, Check, X, Tag, ShoppingBag, AlertTriangle, Sprout, ShieldCheck, Plus, Edit2 } from 'lucide-react';
import { initializeApp } from 'firebase/app';
import { getFirestore, collection, onSnapshot, query, orderBy, addDoc, updateDoc, doc } from 'firebase/firestore';

const firebaseConfig = {
    apiKey: "AIzaSyByDvi-wyekFdKMiMv_Cb2yUq9yF0Tw3Uc",
    authDomain: "price-check-86915.firebaseapp.com",
    projectId: "price-check-86915",
    storageBucket: "price-check-86915.firebasestorage.app",
    messagingSenderId: "510258152666",
    appId: "1:510258152666:web:bc24bd3f34e704488e91e3"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── DATA ─────────────────────────────────────────────────────────────────────
const PAGE = 20;
const fmt = n => n==null?'—':`฿${Number(n).toLocaleString('th-TH',{minimumFractionDigits:2})}`;
const dotCls  = s => s==='Lotus'?'dot-lotus':s==='Makro'?'dot-makro':s==='BigC'?'dot-bigc':'dot-fallback';
const pillCls = s => s==='Lotus'?'pill-lotus':s==='Makro'?'pill-makro':s==='BigC'?'pill-bigc':'pill-fallback';

// ── IMG ───────────────────────────────────────────────────────────────────────
const ImgBox = ({w=200,h=200,r=10, src=null}) => (
  <div className="img-placeholder flex-shrink-0" style={{width:w,height:h,borderRadius:r}}>
    {src ? <img src={src} alt="Product"/> : <ShoppingBag size={w*.38} color="#94a3b8"/>}
  </div>
);

// ── ADD SKU MODAL ─────────────────────────────────────────────────────────────
function AddSkuModal({ editData, items, onSave, onClose }) {
  const isEdit = !!editData;
  const [step, setStep] = useState(1);
  const [form, setForm] = useState({
    masterProduct: editData?.masterProduct || '',
    minorProduct: editData?.minorProduct || '',
    name: editData?.name || '',
    brand: editData?.brand || '',
    category: editData?.category || '',
    image: editData?.image || '',
    size: editData?.size || '',
    unitType: editData?.unitType || '',
    subUnitCount: editData?.subUnitCount || '',
    subUnit: editData?.subUnit || '',
    weightVolume: editData?.weightVolume || '',
    subUnitSizeType: editData?.subUnitSizeType || 'g',
    barcode: editData?.barcode || ''
  });
  const [imgMode, setImgMode] = useState(editData?.image && !editData.image.startsWith('data:') ? 'url' : 'upload');
  const [saving, setSaving] = useState(false);
  const [relatedCount, setRelatedCount] = useState(0);

  const slugify = (text) => {
    return text.toString().toLowerCase()
      .replace(/\s+/g, '-')
      .replace(/[^\w\u0E00-\u0E7F\-]+/g, '')
      .replace(/\-\-+/g, '-')
      .replace(/^-+/, '')
      .replace(/-+$/, '');
  };

  const handleGenerateSlug = () => {
    setForm({ ...form, masterProduct: slugify(form.name) });
  };

  const handleMasterProductBlur = () => {
    if (!form.masterProduct) return;
    const existing = items.find(i => i.masterProduct === form.masterProduct && i.id !== editData?.id && i.image);
    if (existing && !form.image) {
      setForm(f => ({ ...f, image: existing.image }));
      setImgMode(existing.image.startsWith('data:') ? 'upload' : 'url');
    }
  };

  useEffect(() => {
    if (!form.masterProduct) {
      setRelatedCount(0);
      return;
    }
    const count = items.filter(i => i.masterProduct === form.masterProduct && i.id !== editData?.id).length;
    setRelatedCount(count);
  }, [form.masterProduct, form.image, items, editData]);

  useEffect(() => {
    if (editData) {
      setForm({
        masterProduct: editData.masterProduct || '',
        minorProduct: editData.minorProduct || '',
        name: editData.name || '',
        brand: editData.brand || '',
        category: editData.category || '',
        image: editData.image || '',
        size: editData.size || '',
        unitType: editData.unitType || '',
        subUnitCount: editData.subUnitCount || '',
        subUnit: editData.subUnit || '',
        weightVolume: editData.weightVolume || '',
        subUnitSizeType: editData.subUnitSizeType || 'g',
        barcode: editData.barcode || ''
      });
      setImgMode(editData.image && !editData.image.startsWith('data:') ? 'url' : 'upload');
    }
  }, [editData]);

  const handleClose = () => {
    const isDirty = Object.keys(form).some(key => {
      let initialVal = editData?.[key] ?? '';
      if (typeof initialVal === 'number') initialVal = String(initialVal);
      return String(form[key]) !== String(initialVal);
    });

    if (isDirty) {
      if (confirm("ยกเลิกการกรอกข้อมูล? ข้อมูลที่กรอกไว้จะหายทั้งหมด")) {
        onClose();
      }
    } else {
      onClose();
    }
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const MAX_PIXELS = 1000000;
        let width = img.width;
        let height = img.height;
        let pixels = width * height;

        if (pixels > MAX_PIXELS) {
          const ratio = Math.sqrt(MAX_PIXELS / pixels);
          width = width * ratio;
          height = height * ratio;
        }

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        setForm({ ...form, image: dataUrl });
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };

  const handleNext = (e) => {
    e.preventDefault();
    if (!form.name || !form.masterProduct || !form.unitType) return;
    setStep(2);
  };

  const handleSave = async () => {
    setSaving(true);
    const relatedIds = (form.image !== editData?.image && relatedCount > 0) 
        ? items.filter(i => i.masterProduct === form.masterProduct && i.id !== editData?.id).map(i => i.id) 
        : [];
        
    await onSave({
      ...form,
      subUnitCount: form.subUnitCount ? Number(form.subUnitCount) : null,
      size: form.size ? Number(form.size) : null,
      weightVolume: form.weightVolume ? Number(form.weightVolume) : null,
    }, relatedIds);
    setSaving(false);
  };

  return (
    <div className="modal-bg" style={{zIndex: 400}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden fade flex flex-col" style={{maxHeight: '90vh'}} onClick={e=>e.stopPropagation()}>
        <div className="px-5 py-4 flex items-center justify-between bg-indigo-600 text-white flex-shrink-0">
          <div className="flex items-center gap-3">
            <Package size={20}/>
            <div>
              <div className="font-bold text-base">{isEdit ? 'แก้ไขสินค้า (Edit SKU)' : 'เพิ่มสินค้าใหม่ (Main SKU)'}</div>
              <div className="text-xs text-indigo-200">{isEdit ? 'แก้ไขข้อมูลสินค้าใน Catalog' : 'สร้างรายการสินค้าเข้าสู่ Catalog หลัก'}</div>
            </div>
          </div>
          <button onClick={handleClose} className="text-white/60 hover:text-white transition-colors">
            <X size={24} />
          </button>
        </div>
        
        {step === 1 ? (
          <form onSubmit={handleNext} className="p-5 overflow-y-auto flex-1 space-y-6">
            
            {/* Group 1: ข้อมูลสินค้า */}
            <div className="space-y-4">
              <h3 className="text-sm font-bold text-slate-800 border-b border-slate-200 pb-1">1. ข้อมูลสินค้า</h3>
              <div className="grid grid-cols-2 gap-4">
                <div className="col-span-2 sm:col-span-1">
                  <label className="block text-xs font-bold text-slate-500 mb-1">ชื่อสินค้า* (Name)</label>
                  <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} required autoFocus
                    className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                </div>
                <div className="col-span-2 sm:col-span-1">
                  <label className="block text-xs font-bold text-slate-500 mb-1">MasterProduct*</label>
                  <div className="flex gap-2">
                    <input value={form.masterProduct} onChange={e=>setForm({...form, masterProduct:e.target.value})} onBlur={handleMasterProductBlur} required
                      className="flex-1 w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none min-w-0" />
                    <button type="button" onClick={handleGenerateSlug} className="px-3 py-2 bg-indigo-50 text-indigo-600 border border-indigo-200 rounded-lg text-sm font-semibold hover:bg-indigo-100 flex-shrink-0">
                      Generate
                    </button>
                  </div>
                </div>
                <div className="col-span-2 sm:col-span-1">
                  <label className="block text-xs font-bold text-slate-500 mb-1">MinorProduct</label>
                  <input value={form.minorProduct} onChange={e=>setForm({...form, minorProduct:e.target.value})}
                    className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                </div>
                <div className="col-span-2 sm:col-span-1">
                  <label className="block text-xs font-bold text-slate-500 mb-1">ยี่ห้อ (Brand)</label>
                  <input value={form.brand} onChange={e=>setForm({...form, brand:e.target.value})}
                    className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                </div>
                <div className="col-span-2 sm:col-span-1">
                  <label className="block text-xs font-bold text-slate-500 mb-1">หมวดหมู่ (Category)</label>
                  <input value={form.category} onChange={e=>setForm({...form, category:e.target.value})}
                    className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                </div>
                <div className="col-span-2 sm:col-span-1">
                  <label className="block text-xs font-bold text-slate-500 mb-1">BARCODE</label>
                  <input value={form.barcode} onChange={e=>setForm({...form, barcode:e.target.value})}
                    className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                </div>
              </div>
            </div>

            {/* Group 2: บรรจุภัณฑ์ */}
            <div className="space-y-4">
              <h3 className="text-sm font-bold text-slate-800 border-b border-slate-200 pb-1">2. บรรจุภัณฑ์</h3>
              <div className="space-y-3">
                {/* Row A */}
                <div className="flex gap-4">
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-500 mb-1">ขนาด</label>
                    <input type="number" value={form.size} onChange={e=>setForm({...form, size:e.target.value})}
                      className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                  </div>
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-500 mb-1">หน่วยหลัก* (เช่น ซอง, แพ็ค)</label>
                    <input value={form.unitType} onChange={e=>setForm({...form, unitType:e.target.value})} required
                      className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                  </div>
                </div>
                {/* Row B */}
                <div className="flex gap-4">
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-500 mb-1">จำนวนในหน่วย</label>
                    <input type="number" value={form.subUnitCount} onChange={e=>setForm({...form, subUnitCount:e.target.value})}
                      className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                  </div>
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-500 mb-1">หน่วยย่อย</label>
                    <input value={form.subUnit} onChange={e=>setForm({...form, subUnit:e.target.value})}
                      className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                  </div>
                </div>
                {/* Row C */}
                <div className="flex gap-4">
                  <div className="flex-[2]">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Weight/Volume</label>
                    <input type="number" value={form.weightVolume} onChange={e=>setForm({...form, weightVolume:e.target.value})}
                      className="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                  </div>
                  <div className="flex-1">
                    <label className="block text-xs font-bold text-slate-500 mb-1">หน่วยวัด</label>
                    <select value={form.subUnitSizeType} onChange={e=>setForm({...form, subUnitSizeType:e.target.value})}
                      className="w-full px-2 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none">
                      <option value="g">g</option>
                      <option value="ml">ml</option>
                      <option value="kg">kg</option>
                      <option value="l">l</option>
                      <option value="ชิ้น">ชิ้น</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            {/* Group 3: รูปภาพ master */}
            <div className="space-y-4">
              <h3 className="text-sm font-bold text-slate-800 border-b border-slate-200 pb-1">3. รูปภาพ master</h3>
              <div>
                <div className="border border-slate-200 rounded-lg overflow-hidden">
                  <div className="flex bg-slate-50 border-b border-slate-200">
                    <button type="button" onClick={()=>setImgMode('url')} className={`flex-1 py-1.5 text-xs font-bold ${imgMode==='url'?'bg-white text-indigo-600 border-b-2 border-indigo-600':'text-slate-500 hover:bg-slate-100'}`}>วาง URL</button>
                    <button type="button" onClick={()=>setImgMode('upload')} className={`flex-1 py-1.5 text-xs font-bold ${imgMode==='upload'?'bg-white text-indigo-600 border-b-2 border-indigo-600':'text-slate-500 hover:bg-slate-100'}`}>อัปโหลดไฟล์</button>
                    <button type="button" onClick={()=>setForm({...form, image: ''})} className="px-3 py-1.5 text-xs font-bold text-red-500 hover:bg-red-50 border-l border-slate-200">ลบรูป</button>
                  </div>
                  <div className="p-3 flex items-center gap-3">
                    {imgMode === 'url' ? (
                      <input value={form.image} onChange={e=>setForm({...form, image:e.target.value})} placeholder="https://..."
                        className="flex-1 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none" />
                    ) : (
                      <input type="file" accept="image/*" onChange={handleImageUpload}
                        className="flex-1 w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100" />
                    )}
                    {form.image && (
                      <div className="w-[60px] h-[60px] rounded border border-slate-200 overflow-hidden flex-shrink-0 bg-slate-50 flex items-center justify-center p-1">
                        <img src={form.image} className="max-w-full max-h-full object-contain" alt="preview" />
                      </div>
                    )}
                  </div>
                </div>
                {form.image !== editData?.image && relatedCount > 0 && (
                  <div className="text-xs text-indigo-600 mt-2 font-semibold">
                    * อัปเดตรูปให้ {relatedCount} SKU ในกลุ่มนี้ด้วย
                  </div>
                )}
              </div>
            </div>

            <div className="flex gap-3 pt-3 border-t border-slate-100 mt-4">
              <button type="button" onClick={handleClose} className="flex-1 py-2.5 rounded-xl text-sm font-bold text-slate-500 border border-slate-200 bg-white hover:bg-slate-50">ยกเลิก</button>
              <button type="submit" className="flex-1 py-2.5 rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 flex items-center justify-center gap-2">
                ไปหน้าสรุปเพื่อบันทึก →
              </button>
            </div>
          </form>
        ) : (
          <div className="p-5 overflow-y-auto flex-1 space-y-4 fade">
            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 text-sm space-y-2">
              <div className="font-bold text-slate-800 border-b border-slate-200 pb-2 mb-2 flex gap-3 items-center">
                 สรุปข้อมูลสินค้า
                 {form.image && <img src={form.image} className="w-8 h-8 rounded border border-slate-200 object-contain bg-white ml-auto p-0.5"/>}
              </div>
              <div className="grid grid-cols-[110px_1fr] gap-1">
                <span className="text-slate-500">MasterProduct:</span><span className="font-semibold">{form.masterProduct}</span>
                <span className="text-slate-500">ชื่อสินค้า:</span><span className="font-semibold">{form.name}</span>
                <span className="text-slate-500">ยี่ห้อ:</span><span className="font-semibold">{form.brand || '-'}</span>
                <span className="text-slate-500">หมวดหมู่:</span><span className="font-semibold">{form.category || '-'}</span>
                <span className="text-slate-500">หน่วยหลัก:</span><span className="font-semibold">{form.unitType || '-'}</span>
                <span className="text-slate-500">ขนาด:</span><span className="font-semibold">{form.size || '-'}</span>
                <span className="text-slate-500">จำนวนย่อย:</span><span className="font-semibold">{form.subUnitCount ? `${form.subUnitCount} ${form.subUnit}` : '-'}</span>
                <span className="text-slate-500">Weight/Vol:</span><span className="font-semibold">{form.weightVolume ? `${form.weightVolume}${form.subUnitSizeType}` : '-'}</span>
                <span className="text-slate-500">Barcode:</span><span className="font-semibold">{form.barcode || '-'}</span>
              </div>
              {form.image !== editData?.image && relatedCount > 0 && (
                <div className="mt-2 text-indigo-600 text-xs font-semibold">
                  * จะถูกนำไปอัปเดตรูปให้ {relatedCount} SKU อื่นๆ ใน MasterProduct เดียวกัน
                </div>
              )}
            </div>

            {!isEdit && (

// ── CSV IMPORT MODAL ─────────────────────────────────────────────────────────
function CsvImportModal({ onImport, onClose }) {
  const [csvText, setCsvText] = useState('');
  const [rows, setRows] = useState([]);
  const [saving, setSaving] = useState(false);
  const [progress, setProgress] = useState(0);

  const parseCSV = (text) => {
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const parsed = lines.map((line, i) => {
      const cols = line.split(',');
      return {
        _rawIndex: i,
        masterProduct: cols[0]?.trim() || '',
        minorProduct: cols[1]?.trim() || '',
        name: cols[2]?.trim() || '',
        brand: cols[3]?.trim() || '',
        category: cols[4]?.trim() || '',
        store: cols[5]?.trim() || '',
        image: cols[6]?.trim() || '',
        size: cols[7]?.trim() || '',
        unitType: cols[8]?.trim() || '',
        subUnitCount: cols[9]?.trim() || '',
        subUnit: cols[10]?.trim() || '',
        weightVolume: cols[11]?.trim() || '',
        subUnitSizeType: cols[12]?.trim() || 'g',
        barcode: cols[13]?.trim() || ''
      };
    });
    if (parsed.length > 0 && parsed[0].masterProduct.toLowerCase() === 'masterproduct') {
      parsed.shift();
    }
    setRows(parsed);
  };

  useEffect(() => {
    if (csvText) {
      parseCSV(csvText);
    } else {
      setRows([]);
    }
  }, [csvText]);

  const validRows = rows.filter(r => r.masterProduct && r.name && r.unitType);

  const handleImport = async () => {
    if (validRows.length === 0) return;
    setSaving(true);
    let count = 0;
    for (const row of validRows) {
      count++;
      setProgress(count);
      await onImport({
        masterProduct: row.masterProduct,
        minorProduct: row.minorProduct,
        name: row.name,
        brand: row.brand,
        category: row.category,
        store: row.store,
        image: row.image,
        size: row.size ? Number(row.size) : null,
        unitType: row.unitType,
        subUnitCount: row.subUnitCount ? Number(row.subUnitCount) : null,
        subUnit: row.subUnit,
        weightVolume: row.weightVolume ? Number(row.weightVolume) : null,
        subUnitSizeType: row.subUnitSizeType || 'g',
        barcode: row.barcode
      });
    }
    setSaving(false);
    onClose();
  };

  return (
    <div className="modal-bg" onClick={onClose} style={{zIndex: 400}}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl overflow-hidden fade flex flex-col" style={{maxHeight: '90vh'}} onClick={e=>e.stopPropagation()}>
        <div className="px-5 py-4 flex items-center gap-3 bg-indigo-600 text-white flex-shrink-0">
          <Package size={20}/>
          <div>
            <div className="font-bold text-base">นำเข้า CSV (Main SKU)</div>
            <div className="text-xs text-indigo-200">ลำดับคอลัมน์: MasterProduct, MinorProduct, ชื่อสินค้า, ยี่ห้อ, หมวดหมู่, ร้านค้า, ลิงก์รูปmaster, ขนาด, หน่วยหลัก, จำนวนในหน่วย, หน่วยย่อย, Weight/Volume, หน่วยวัด, BARCODE</div>
          </div>
        </div>

        <div className="p-5 flex-1 overflow-y-auto flex flex-col gap-4">
          <textarea 
            value={csvText} 
            onChange={e => setCsvText(e.target.value)}
            placeholder="วางข้อมูล CSV ที่นี่..."
            className="w-full h-32 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:border-indigo-400 focus:ring-1 focus:ring-indigo-200 outline-none font-mono text-xs whitespace-pre"
            disabled={saving}
          />
          
          {rows.length > 0 && (
            <div className="flex-1 min-h-[200px] border border-slate-200 rounded-lg overflow-hidden flex flex-col">
              <div className="bg-slate-50 px-3 py-2 border-b border-slate-200 text-xs font-bold text-slate-600 flex justify-between">
                <span>Preview ({validRows.length} valid / {rows.length} total)</span>
                {rows.length > validRows.length && <span className="text-red-500">Highlight red = missing MasterProduct, ชื่อสินค้า or หน่วยหลัก</span>}
              </div>
              <div className="overflow-auto flex-1 max-h-[300px]">
                <table className="w-full text-left text-xs whitespace-nowrap">
                  <thead className="bg-slate-50 sticky top-0 shadow-sm">
                    <tr>
                      <th className="px-3 py-2 font-semibold border-b border-slate-200">#</th>
                      <th className="px-3 py-2 font-semibold border-b border-slate-200">MasterProduct</th>
                      <th className="px-3 py-2 font-semibold border-b border-slate-200">ชื่อสินค้า</th>
                      <th className="px-3 py-2 font-semibold border-b border-slate-200">ร้านค้า</th>
                      <th className="px-3 py-2 font-semibold border-b border-slate-200">ยี่ห้อ</th>
                      <th className="px-3 py-2 font-semibold border-b border-slate-200">หน่วยหลัก</th>
                      <th className="px-3 py-2 font-semibold border-b border-slate-200">Weight/Vol</th>
                      <th className="px-3 py-2 font-semibold border-b border-slate-200">หน่วยวัด</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rows.map((row, i) => {
                      const valid = row.masterProduct && row.name && row.unitType;
                      return (
                        <tr key={i} className={`border-b border-slate-100 last:border-0 ${valid ? 'hover:bg-slate-50' : 'bg-red-50'}`}>
                          <td className="px-3 py-1.5 text-slate-400">{i+1}</td>
                          <td className={`px-3 py-1.5 ${!row.masterProduct ? 'text-red-500 font-bold' : ''}`}>{row.masterProduct || '-'}</td>
                          <td className={`px-3 py-1.5 ${!row.name ? 'text-red-500 font-bold' : ''}`}>{row.name || '-'}</td>
                          <td className="px-3 py-1.5">{row.store || '-'}</td>
                          <td className="px-3 py-1.5">{row.brand}</td>
                          <td className={`px-3 py-1.5 ${!row.unitType ? 'text-red-500 font-bold' : ''}`}>{row.unitType || '-'}</td>
                          <td className="px-3 py-1.5">{row.weightVolume}</td>
                          <td className="px-3 py-1.5">{row.subUnitSizeType}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>

        <div className="px-5 py-4 border-t border-slate-100 bg-slate-50 flex gap-3 flex-shrink-0">
          <button type="button" onClick={onClose} disabled={saving} className="flex-1 py-2.5 rounded-xl text-sm font-bold text-slate-500 border border-slate-200 bg-white hover:bg-slate-100 disabled:opacity-50">ยกเลิก</button>
          <button type="button" onClick={handleImport} disabled={saving || validRows.length === 0} className="flex-1 py-2.5 rounded-xl text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 flex items-center justify-center gap-2 disabled:opacity-50">
            {saving ? `กำลังบันทึก ${progress}/${validRows.length}...` : `นำเข้า ${validRows.length} รายการ`}
          </button>
        </div>
      </div>
    </div>
  );
}

          </button>

// ── MAIN SKU VIEW ─────────────────────────────────────────────────────────────
function MainSkuView({skus,stores,onSaveReq,onEditReq}) {
  const [q,setQ] = useState('');
  const [page,setPage] = useState(1);

  const filtered = useMemo(()=>{
    const t=q.toLowerCase().trim();
    return !t?skus:skus.filter(s=>s.name.toLowerCase().includes(t)||s.id.toLowerCase().includes(t)||(s.brand||'').toLowerCase().includes(t));
  },[skus,q]);

  const total = Math.ceil(filtered.length/PAGE);
  const paged = filtered.slice((page-1)*PAGE, page*PAGE);

  return (
    <div className="fade space-y-4">
      <div className="flex items-center gap-3">
        <div className="relative flex-1 max-w-xs">
          <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
          <input value={q} onChange={e=>{setQ(e.target.value);setPage(1);}} placeholder="ค้นหาชื่อ / รหัส / แบรนด์..."
            className="w-full pl-9 pr-3 py-2 rounded-xl border border-slate-200 text-sm bg-white shadow-sm focus:border-orange-400 focus:ring-1 focus:ring-orange-200 focus:outline-none"/>
        </div>
        <span className="text-xs text-slate-400">{filtered.length} รายการ · หน้า {page}/{total||1}</span>
      </div>

      <div className="space-y-3">
        {paged.map((sku,i)=>(
          <SkuRow key={sku.id} sku={sku} stores={stores} delay={i*0.025}
            onSave={(sku,store,old,nw)=>onSaveReq({sku,store,oldPrice:old,newPrice:nw})}
            onEdit={onEditReq} />
        ))}
        {!paged.length && <div className="bg-white rounded-2xl border border-slate-100 py-16 text-center text-slate-400 text-sm">ไม่พบสินค้า</div>}
      </div>

      {total>1 && (
        <div className="flex items-center justify-center gap-1.5 pt-2">
          <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}
            className="w-9 h-9 rounded-xl border border-slate-200 bg-white flex items-center justify-center text-slate-500 hover:border-orange-300 disabled:opacity-40 disabled:cursor-not-allowed">
            <ChevronLeft size={15}/>
          </button>
          {Array.from({length:total},(_,i)=>i+1)
            .filter(p=>p===1||p===total||Math.abs(p-page)<=1)
            .reduce((a,p,i,arr)=>{if(i>0&&p-arr[i-1]>1)a.push('…');a.push(p);return a;},[])
            .map((p,i)=>p==='…'
              ?<span key={`e${i}`} className="w-9 h-9 flex items-center justify-center text-slate-400 text-xs">…</span>
              :<button key={p} onClick={()=>setPage(p)}
                  className={`w-9 h-9 rounded-xl text-xs font-bold transition-colors ${page===p?'bg-orange-500 text-white shadow-sm':'border border-slate-200 bg-white text-slate-600 hover:border-orange-300'}`}>{p}</button>
            )}
          <button onClick={()=>setPage(p=>Math.min(total,p+1))} disabled={page===total}
            className="w-9 h-9 rounded-xl border border-slate-200 bg-white flex items-center justify-center text-slate-500 hover:border-orange-300 disabled:opacity-40 disabled:cursor-not-allowed">
            <ChevronRight size={15}/>
          </button>
        </div>
      )}
    </div>
  );
}

    if(!selectedStoreId) return [];
    const t=q.toLowerCase().trim();
    return skus.filter(s=>{
      const ok = !t||s.name.toLowerCase().includes(t)||s.id.toLowerCase().includes(t);
      const sp=s.storePrices[selectedStoreId] || { status: 'none' };
      if(f==='missing') return ok&&sp.status==='none';
      if(f==='has')     return ok&&sp.status!=='none';
      return ok;
    });
  },[skus,selectedStoreId,q,f]);

  const miss = selectedStoreId ? skus.filter(s=>(s.storePrices[selectedStoreId]?.status||'none')==='none').length : 0;
  const has  = skus.length - miss;

  const total = Math.ceil(rows.length/PAGE);
  const paged = rows.slice((page-1)*PAGE, page*PAGE);

  const handleStoreChange = (id) => { setSelectedStoreId(id); setPage(1); };
  const handleFilterChange = (val) => { setF(val); setPage(1); };
  const handleSearch = (e) => { setQ(e.target.value); setPage(1); };

  const activeStoreObj = stores.find(s => s.id === selectedStoreId);

  return (
    <div className="fade space-y-4">
      <div className="flex items-center gap-2 flex-wrap">
        {stores.map(s=>(
          <button key={s.id} onClick={()=>handleStoreChange(s.id)}
            className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold border-2 transition-all
              ${selectedStoreId===s.id?'bg-slate-900 text-white border-slate-900 shadow-md scale-[1.03]':'bg-white text-slate-600 border-slate-200 hover:border-slate-300'}`}>
            {s.logoUrl ? (
                <img src={s.logoUrl} alt={s.name} className="w-4 h-4 rounded-full object-cover" />
            ) : (
                <span className={`w-2.5 h-2.5 rounded-full ${dotCls(s.id)}`}/>
            )}
            {s.name}
          </button>
        ))}
        <div className="ml-auto flex items-center gap-2 text-xs font-semibold">
          <span className="bg-green-100 text-green-700 px-2.5 py-1 rounded-lg border border-green-200">✓ มี {has}</span>
          <span className="bg-red-100 text-red-500 px-2.5 py-1 rounded-lg border border-red-200">✗ ขาด {miss}</span>
        </div>
      </div>
      <div className="flex items-center gap-3 flex-wrap">
        <div className="relative">
          <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
          <input value={q} onChange={handleSearch} placeholder="ค้นหาสินค้า..."
            className="pl-9 pr-3 py-2 rounded-xl border border-slate-200 text-sm bg-white shadow-sm focus:border-orange-400 focus:ring-1 focus:ring-orange-200 focus:outline-none w-52"/>
        </div>
        <div className="flex rounded-xl border border-slate-200 bg-white overflow-hidden shadow-sm">
          {[['all','ทั้งหมด'],['missing','ขาดอยู่'],['has','มีแล้ว']].map(([v,l])=>(
            <button key={v} onClick={()=>handleFilterChange(v)}
              className={`px-3 py-1.5 text-xs font-bold border-r border-slate-100 last:border-0 transition-colors
                ${f===v?'bg-slate-900 text-white':'text-slate-500 hover:bg-slate-50'}`}>{l}</button>
          ))}
        </div>
        <span className="text-xs text-slate-400">{rows.length} รายการ · หน้า {page}/{total||1}</span>
      </div>
      <div className="card-grid">
        {paged.map(sku=>(
          <StoreCard key={sku.id} sku={sku} store={activeStoreObj} onSaveReq={onSaveReq}/>
        ))}
        {!paged.length && (
          <div className="col-span-5 bg-white rounded-2xl border border-slate-100 py-16 text-center text-slate-400 text-sm">ไม่พบสินค้า</div>
        )}
      </div>

      {total>1 && (
        <div className="flex items-center justify-center gap-1.5 pt-2">
          <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}
            className="w-9 h-9 rounded-xl border border-slate-200 bg-white flex items-center justify-center text-slate-500 hover:border-orange-300 disabled:opacity-40 disabled:cursor-not-allowed">
            <ChevronLeft size={15}/>
          </button>
          {Array.from({length:total},(_,i)=>i+1)
            .filter(p=>p===1||p===total||Math.abs(p-page)<=1)
            .reduce((a,p,i,arr)=>{if(i>0&&p-arr[i-1]>1)a.push('…');a.push(p);return a;},[])
            .map((p,i)=>p==='…'
              ?<span key={`e${i}`} className="w-9 h-9 flex items-center justify-center text-slate-400 text-xs">…</span>
              :<button key={p} onClick={()=>setPage(p)}

            )}

            className="w-9 h-9 rounded-xl border border-slate-200 bg-white flex items-center justify-center text-slate-500 hover:border-orange-300 disabled:opacity-40 disabled:cursor-not-allowed">
            <ChevronRight size={15}/>

        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab] = useState('seed');
  const [items,setItems] = useState([]);
  const [stores,setStores] = useState([]);
  const [skus,setSkus] = useState([]);
  const [seedTarget,setSeedTarget] = useState(null);
  const [showAddSku,setShowAddSku] = useState(false);
  const [editingSku,setEditingSku] = useState(null);
  const [showCsvImport,setShowCsvImport] = useState(false);
  const [confirm,setConfirm] = useState(null);
  const [loadingItems, setLoadingItems] = useState(true);
  const [loadingStores, setLoadingStores] = useState(true);

  // Fetch stores dynamically
  useEffect(() => {
    const unsub = onSnapshot(collection(db, "stores"), snapshot => {
      const fbStores = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(s => !s.deleted);
      setStores(fbStores);
      setLoadingStores(false);
    });
    return () => unsub();
  }, []);

  useEffect(() => {
    if (loadingStores) return; // Wait for stores
    const q = query(collection(db, "items"), orderBy("lastUpdated", "desc"));
    const unsub = onSnapshot(q, (snapshot) => {
        const fbItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(i => !i.deleted);
        setItems(fbItems);
        
        const grouped = {};
        fbItems.forEach(item => {
            const name = item.name || 'Unknown';
            if (!grouped[name]) {
                grouped[name] = {
                    id: item.id, // using first item's id for general id
                    name: name,
                    brand: item.brand || '',
                    unit: `${item.unitQuantity || 1} ${item.subUnit || item.unitType || 'ชิ้น'}`,
                    mainSku: name,
                    tags: item.tags || '',
                    storePrices: {},
                    baseItem: item
                };
                stores.forEach(s => { grouped[name].storePrices[s.id] = { price: null, status: 'none' }; });
            }
            const storeId = item.store;
            if (storeId && grouped[name].storePrices[storeId]) {
                grouped[name].storePrices[storeId] = { price: item.price, status: 'active' };
            }
        });
        setSkus(Object.values(grouped));
        setLoadingItems(false);
    });
    return () => unsub();
  }, [loadingStores, stores]);

  const handleSaveSeed = async (seedData, sku) => {
      try {
          const priceVal = parseFloat(seedData.price) || 0;
          const statusVal = (priceVal > 0 && seedData.store) ? 'active' : 'catalog';

          const masterItem = items.find(i => i.masterProduct === sku?.baseItem?.masterProduct && i.image);
          const inheritedImage = sku?.baseItem?.image || masterItem?.image || '';

          const itemData = {
              name: seedData.name,
              brand: seedData.brand || '',
              store: seedData.store,
              price: priceVal,
              unitQuantity: seedData.unitQuantity || '1',
              subUnit: seedData.subUnit || 'ชิ้น',
              tags: seedData.tags || '',
              image: inheritedImage,
              status: statusVal,
              userId: 'ADMIN_SHEEP',
              userDisplayName: 'ADMIN_SHEEP',
              lastUpdated: Date.now()
          };
          
          const existingItem = items.find(i => i.name === itemData.name && i.store === itemData.store);
          if (existingItem) {
              await updateDoc(doc(db, "items", existingItem.id), itemData);
          } else {
              await addDoc(collection(db, "items"), itemData);
          }
      } catch (err) {
          alert('Error saving seed: ' + err.message);
      }
  };

  const handleConfirmUpdate = async () => {
    const {sku,store,newPrice} = confirm;
    const priceVal = parseFloat(newPrice) || 0;
    const statusVal = (priceVal > 0 && store.id) ? 'active' : 'catalog';

    const masterItem = items.find(i => i.masterProduct === sku?.baseItem?.masterProduct && i.image);
    const inheritedImage = sku?.baseItem?.image || masterItem?.image || '';

    const itemData = {
        name: sku.name,
        brand: sku.brand || '',
        store: store.id,
        price: priceVal,
        unitQuantity: sku.baseItem?.unitQuantity || '1',
        subUnit: sku.baseItem?.subUnit || sku.baseItem?.unitType || 'ชิ้น',
        tags: sku.tags || '',
        image: inheritedImage,
        status: statusVal,
        userId: 'ADMIN_SHEEP',
        userDisplayName: 'ADMIN_SHEEP',
        lastUpdated: Date.now()
    };
    try {
        const existingItem = items.find(i => i.name === itemData.name && i.store === store.id);
        if (existingItem) {
            await updateDoc(doc(db, "items", existingItem.id), itemData);
        } else {
            await addDoc(collection(db, "items"), itemData);
        }
    } catch(e) {
        alert(e);
    }
    setConfirm(null);
  };

  const handleAddNewSku = async (data, relatedIds) => {
      try {
          if (editingSku) {
              await updateDoc(doc(db, "items", editingSku.id), data);
              if (relatedIds && relatedIds.length > 0) {
                  for (let id of relatedIds) {
                      await updateDoc(doc(db, "items", id), { image: data.image });
                  }
              }
              setEditingSku(null);
          } else {
              const itemData = {
                  ...data,
                  price: 0,
                  store: '',
                  status: 'catalog',
                  userId: 'ADMIN_SHEEP',
                  userDisplayName: 'ADMIN_SHEEP',
                  lastUpdated: Date.now()
              };
              await addDoc(collection(db, "items"), itemData);
              if (relatedIds && relatedIds.length > 0) {
                  for (let id of relatedIds) {
                      await updateDoc(doc(db, "items", id), { image: data.image });
                  }
              }
              setShowAddSku(false);
          }
      } catch (err) {
          alert('Error saving SKU: ' + err.message);
      }
  };

  const handleImportCsv = async (row) => {
      try {
          const itemData = {
              ...row,
              price: 0,
              store: '',
              status: 'catalog',
              userId: 'ADMIN_SHEEP',
              userDisplayName: 'ADMIN_SHEEP',
              lastUpdated: Date.now()
          };
          await addDoc(collection(db, "items"), itemData);
      } catch (err) {
          console.error('Error importing CSV row:', err);
      }
  };

  if (loadingItems || loadingStores) {
      return <div className="min-h-screen flex items-center justify-center bg-slate-50"><div className="text-slate-400 font-bold flex items-center gap-2"><div className="w-5 h-5 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div> Loading Data...</div></div>;
  }

  return (
    <div style={{minHeight:'100vh',background:'#f1f5f9'}}>
      <header style={{background:'#0f172a'}} className="shadow-xl sticky top-0 z-40">
        <div className="max-w-screen-xl mx-auto px-5 py-3 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 bg-gradient-to-br from-indigo-500 to-indigo-600 shadow-lg shadow-indigo-500/30">
                <Sprout size={20} color="#fff"/>
              </div>
              <div>
                <div className="text-white font-bold text-sm">Seed Admin</div>
                <div className="text-xs" style={{color:'rgba(255,255,255,.4)'}}>ระบบจัดการราคาสินค้า — Data Seeding</div>
              </div>
          </div>
          <div className="flex items-center gap-3">
              <div className="text-xs hidden sm:block" style={{color:'rgba(255,255,255,.3)'}}>
                {skus.length} SKUs · {stores.length} Stores
              </div>
              <a href="priceadmin.html" className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-700 transition-colors">
                  <ShieldCheck size={14} /> ไปยัง Dashboard
              </a>
          </div>
        </div>
      </header>

      <div className="bg-white border-b border-slate-200 shadow-sm sticky top-[64px] z-30">
        <div className="max-w-screen-xl mx-auto px-5 flex overflow-x-auto hide-scrollbar">
          {[
            {id:'seed', Icon:Sprout, label:'Set up Main SKU', sub:'จัดการและ Seed ราคาที่ขาด'},
            {id:'sku', Icon:Package, label:'Main SKU View', sub:'กรอกราคาแต่ละร้านตาม SKU'},
            {id:'store',Icon:Store,  label:'Store View',    sub:'ดูสินค้าที่ขาดในแต่ละร้าน'},
          ].map(({id,Icon,label,sub})=>(
            <button key={id} onClick={()=>setTab(id)}
              className={`flex items-center gap-2.5 px-5 py-3.5 border-b-[3px] text-sm font-semibold transition-colors whitespace-nowrap
                ${tab===id?(id==='seed'?'border-indigo-600 text-indigo-700':'border-orange-500 text-orange-600'):'border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-200'}`}>
              <Icon size={16}/>
              <div className="text-left">
                <div className="leading-none">{label}</div>
                <div className={`text-[10px] font-normal mt-0.5 ${tab===id?(id==='seed'?'text-indigo-400':'text-orange-400'):'text-slate-400'}`}>{sub}</div>
              </div>
            </button>
          ))}
        </div>
      </div>

      <main className="max-w-screen-xl mx-auto px-5 py-6 pb-20">
        {tab==='seed' && <SeedSkuView skus={skus} stores={stores} onSeedReq={setSeedTarget} onAddNewReq={()=>setShowAddSku(true)} onImportCsvReq={()=>setShowCsvImport(true)}/>}
        {tab==='sku'  && <MainSkuView skus={skus} stores={stores} onSaveReq={setConfirm} onEditReq={(s) => setEditingSku(s)}/>}
        {tab==='store'&& <StoreView   skus={skus} stores={stores} onSaveReq={setConfirm}/>}
      </main>

      {(showAddSku || editingSku) && <AddSkuModal editData={editingSku} items={items} onSave={handleAddNewSku} onClose={()=>{setShowAddSku(false);setEditingSku(null);}} />}
      {showCsvImport && <CsvImportModal onImport={handleImportCsv} onClose={()=>setShowCsvImport(false)} />}
      {seedTarget && <SeedModal sku={seedTarget} stores={stores} onSave={handleSaveSeed} onClose={()=>setSeedTarget(null)}/>}
      {confirm && <Confirm d={confirm} onOk={handleConfirmUpdate} onCancel={()=>setConfirm(null)}/>}
    </div>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
