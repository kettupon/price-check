<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Price Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: {
                            50: '#f0f9eb',
                            100: '#dbf2ce',
                            200: '#bae6a1',
                            300: '#92d571',
                            400: '#6dc147',
                            500: '#48A111',
                            600: '#387e0d',
                            700: '#2c610b',
                            800: '#214709',
                            900: '#183107',
                        },
                        orange: {
                            50: '#fffcf1',
                            100: '#fff6db',
                            200: '#ffebb5',
                            300: '#ffdc89',
                            400: '#ffbd45',
                            500: '#FF8C00',
                            600: '#e67300',
                            700: '#bf5700',
                            800: '#994000',
                            900: '#7d3300',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.294.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { LayoutDashboard, Edit2, Image as ImageIcon, Save, X, Search, AlertCircle, RefreshCw, CheckSquare, Bell, Store, ArrowRight, Check, XCircle, Tag, Trash2, ToggleLeft, ToggleRight } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyByDvi-wyekFdKMiMv_Cb2yUq9yF0Tw3Uc",
            authDomain: "price-check-86915.firebaseapp.com",
            projectId: "price-check-86915",
            storageBucket: "price-check-86915.firebasestorage.app",
            messagingSenderId: "510258152666",
            appId: "1:510258152666:web:bc24bd3f34e704488e91e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function AdminApp() {
            const [deals, setDeals] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [newImageUrl, setNewImageUrl] = useState('');
            const [editingDescId, setEditingDescId] = useState(null);
            const [newDesc, setNewDesc] = useState('');
            const [expandedGroups, setExpandedGroups] = useState([]); // array of group IDs

            const [adminTab, setAdminTab] = useState('dashboard'); // 'dashboard' | 'merge' | 'manage' | 'notifications'
            const [selectedForMerge, setSelectedForMerge] = useState([]);
            const [showMergeModal, setShowMergeModal] = useState(false);
            const [isDeleteMode, setIsDeleteMode] = useState(false);

            // Raw items (ungrouped) for notifications tab
            const [rawItems, setRawItems] = useState([]);

            // Soft delete and bin state
            const [deletedItems, setDeletedItems] = useState([]);
            const [deleteModalTarget, setDeleteModalTarget] = useState(null); // { type: 'post' | 'group', id?: string, group?: object }

            // Notification tab editing state
            const [editingStoreItemId, setEditingStoreItemId] = useState(null);
            const [editStoreValue, setEditStoreValue] = useState('');
            const [storeSearchQuery, setStoreSearchQuery] = useState('');
            const [moveItemId, setMoveItemId] = useState(null);
            const [moveTargetName, setMoveTargetName] = useState('');
            const [adminTagItemId, setAdminTagItemId] = useState(null);
            const [adminTagValue, setAdminTagValue] = useState('');

            // For editing product name inline in Manage tab
            const [editingNameId, setEditingNameId] = useState(null);
            const [newName, setNewName] = useState('');

            const toggleExpand = (groupId) => {
                setExpandedGroups(prev =>
                    prev.includes(groupId) ? prev.filter(id => id !== groupId) : [...prev, groupId]
                );
            };

            useEffect(() => {
                const q = query(collection(db, "items"), orderBy("lastUpdated", "desc"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const fbDeals = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));

                    // Group by name
                    const grouped = {};
                    const binned = [];
                    const activeRawItems = [];

                    fbDeals.forEach(deal => {
                        if (deal.deleted === true) {
                            binned.push(deal);
                            return; // skip grouping for bin items
                        }

                        activeRawItems.push(deal);

                        const name = deal.name || 'Unknown';

                        // Calculate PPU
                        const numPrice = parseFloat(deal.price) || 0;
                        const numCashback = deal.cashbackUsed ? (parseFloat(deal.cashbackAmount) || 0) : 0;
                        const totalPrice = Math.max(0, numPrice - numCashback);
                        const unitQty = parseInt(deal.unitQuantity) || 1;
                        const ppu = totalPrice / unitQty;
                        deal.ppu = ppu; // store on item for later rendering

                        if (!grouped[name]) {
                            grouped[name] = {
                                id: deal.id, // reference ID for the group leader
                                name: name,
                                brand: deal.brand,
                                category: deal.category,
                                masterImage: deal.masterImage || '',
                                postsCount: 1,
                                lowestPrice: deal.price,
                                highestPrice: deal.price,
                                lowestPpu: ppu,
                                highestPpu: ppu,
                                unitType: deal.unitType || 'ชิ้น',
                                description: deal.description || '',
                                originalItems: [deal]
                            };
                        } else {
                            grouped[name].postsCount += 1;
                            grouped[name].originalItems.push(deal);
                            grouped[name].lowestPrice = Math.min(grouped[name].lowestPrice, deal.price);
                            grouped[name].highestPrice = Math.max(grouped[name].highestPrice, deal.price);
                            grouped[name].lowestPpu = Math.min(grouped[name].lowestPpu, ppu);
                            grouped[name].highestPpu = Math.max(grouped[name].highestPpu, ppu);

                            if (deal.masterImage && !grouped[name].masterImage) {
                                grouped[name].masterImage = deal.masterImage;
                            }
                            if (deal.description && !grouped[name].description) {
                                grouped[name].description = deal.description;
                            }
                        }
                    });

                    setDeals(Object.values(grouped));
                    setRawItems(activeRawItems); // Store raw items for notifications
                    setDeletedItems(binned); // Store binned items
                });
                return () => unsubscribe();
            }, []);

            const handleSaveImage = async (dealGroup) => {
                try {
                    // Update all items in this group with the new masterImage
                    const updatePromises = dealGroup.originalItems.map(item => {
                        const itemRef = doc(db, "items", item.id);
                        return updateDoc(itemRef, {
                            masterImage: newImageUrl
                        });
                    });

                    await Promise.all(updatePromises);

                    setEditingId(null);
                    setNewImageUrl('');
                } catch (error) {
                    console.error("Error updating document: ", error);
                    alert("Failed to update image.");
                }
            };

            const handleDeleteImage = async (dealGroup) => {
                if (!confirm('ยืนยันลบรูปภาพสินค้านี้?')) return;
                try {
                    const updatePromises = dealGroup.originalItems.map(item => {
                        const itemRef = doc(db, "items", item.id);
                        return updateDoc(itemRef, {
                            masterImage: ''
                        });
                    });

                    await Promise.all(updatePromises);
                } catch (error) {
                    console.error("Error omitting image: ", error);
                    alert("Failed to delete image.");
                }
            };

            const handleDeletePost = (id, itemName) => {
                setDeleteModalTarget({ type: 'post', id, itemName });
            };

            const handleDeleteGroup = (dealGroup) => {
                setDeleteModalTarget({ type: 'group', group: dealGroup, itemName: dealGroup.name });
            };

            const confirmDelete = async () => {
                if (!deleteModalTarget) return;

                try {
                    if (deleteModalTarget.type === 'post') {
                        const itemRef = doc(db, "items", deleteModalTarget.id);
                        await updateDoc(itemRef, { deleted: true });
                    } else if (deleteModalTarget.type === 'group') {
                        const updatePromises = deleteModalTarget.group.originalItems.map(item => {
                            const itemRef = doc(db, "items", item.id);
                            return updateDoc(itemRef, { deleted: true });
                        });
                        await Promise.all(updatePromises);
                    }
                    setDeleteModalTarget(null);
                } catch (error) {
                    console.error("Error deleting: ", error);
                    alert("เกิดข้อผิดพลาดในการลบข้อมูล");
                }
            };

            const handleRecoverPost = async (id) => {
                try {
                    const itemRef = doc(db, "items", id);
                    await updateDoc(itemRef, { deleted: false });
                } catch (error) {
                    console.error("Error recovering item: ", error);
                    alert("เกิดข้อผิดพลาดในการกู้คืน");
                }
            };

            const handlePermanentDeletePost = async (id) => {
                if (!confirm('ยืนยันที่จะลบข้อมูลนี้ถาวร? (ไม่สามารถกู้คืนได้)')) return;
                try {
                    await deleteDoc(doc(db, "items", id));
                } catch (error) {
                    console.error("Error permanently deleting: ", error);
                    alert("เกิดข้อผิดพลาดในการลบแบบถาวร");
                }
            };

            const startEditing = (dealGroup) => {
                setEditingId(dealGroup.id);
                setNewImageUrl(dealGroup.masterImage || '');
            };

            const handleSaveDesc = async (dealGroup) => {
                try {
                    const updatePromises = dealGroup.originalItems.map(item => {
                        const itemRef = doc(db, "items", item.id);
                        return updateDoc(itemRef, {
                            description: newDesc
                        });
                    });
                    await Promise.all(updatePromises);
                    setEditingDescId(null);
                    setNewDesc('');
                } catch (error) {
                    console.error("Error updating desc: ", error);
                    alert("Failed to update description.");
                }
            };

            const startEditingDesc = (dealGroup) => {
                setEditingDescId(dealGroup.id);
                setNewDesc(dealGroup.description || '');
            };

            const handleSaveName = async (dealGroup) => {
                if (!newName.trim()) {
                    alert('ชื่อสินค้าไม่สามารถเว้นว่างได้');
                    return;
                }
                if (!confirm(`ยืนยันการเปลี่ยนชื่อสินค้าจาก "${dealGroup.name}" เป็น "${newName}" ? \n(ข้อมูลทั้งหมดในกลุ่มนี้จะถูกเปลี่ยนชื่อ)`)) return;

                try {
                    const updatePromises = dealGroup.originalItems.map(item => {
                        const itemRef = doc(db, "items", item.id);
                        return updateDoc(itemRef, {
                            name: newName
                        });
                    });
                    await Promise.all(updatePromises);
                    setEditingNameId(null);
                    setNewName('');
                } catch (error) {
                    console.error("Error updating name: ", error);
                    alert("Failed to update name.");
                }
            };

            const startEditingName = (dealGroup) => {
                setEditingNameId(dealGroup.id);
                setNewName(dealGroup.name || '');
            };

            const filteredDeals = deals.filter(deal =>
                (deal.name && deal.name.toLowerCase().includes(searchQuery.toLowerCase())) ||
                (deal.brand && deal.brand.toLowerCase().includes(searchQuery.toLowerCase())) ||
                (deal.store && deal.store.toLowerCase().includes(searchQuery.toLowerCase()))
            );

            // Unique product names for move-to dropdown
            const uniqueProductNames = [...new Set(deals.map(d => d.name))].sort();

            // All unique store names from system for searchable dropdown
            const allStoreNames = [...new Set(rawItems.map(i => i.store).filter(Boolean))].sort();

            // Items pending review (not yet approved)
            const pendingItems = rawItems.filter(i => i.adminStatus !== 'approved');

            // Save edited store name for a single item
            const handleSaveStore = async (itemId) => {
                try {
                    const itemRef = doc(db, "items", itemId);
                    await updateDoc(itemRef, { store: editStoreValue });
                    setEditingStoreItemId(null);
                    setEditStoreValue('');
                    setStoreSearchQuery('');
                } catch (error) {
                    console.error("Error updating store: ", error);
                    alert("Failed to update store.");
                }
            };

            // Add admin tag to an item
            const handleAddAdminTag = async (itemId, existingTags) => {
                const val = adminTagValue.trim().replace(',', '').toLowerCase();
                if (!val) return;
                const updatedTags = [...(existingTags || []), val].filter((t, i, a) => a.indexOf(t) === i);
                try {
                    const itemRef = doc(db, "items", itemId);
                    await updateDoc(itemRef, { tags: updatedTags });
                    setAdminTagItemId(null);
                    setAdminTagValue('');
                } catch (error) {
                    console.error("Error adding tag: ", error);
                    alert("Failed to add tag.");
                }
            };

            // Remove a tag from an item
            const handleRemoveTag = async (itemId, existingTags, tagToRemove) => {
                const updatedTags = (existingTags || []).filter(t => t !== tagToRemove);
                try {
                    const itemRef = doc(db, "items", itemId);
                    await updateDoc(itemRef, { tags: updatedTags });
                } catch (error) {
                    console.error("Error removing tag: ", error);
                }
            };

            // Move a single item to a different product group
            const handleMoveItem = async (itemId) => {
                if (!moveTargetName) {
                    alert('กรุณาเลือกสินค้าปลายทาง');
                    return;
                }
                if (!confirm(`ย้ายรายการนี้ไปกลุ่ม "${moveTargetName}" ?`)) return;
                try {
                    const itemRef = doc(db, "items", itemId);
                    await updateDoc(itemRef, { name: moveTargetName });
                    setMoveItemId(null);
                    setMoveTargetName('');
                } catch (error) {
                    console.error("Error moving item: ", error);
                    alert("Failed to move item.");
                }
            };

            // Approve / Disapprove an item
            const handleSetAdminStatus = async (itemId, status) => {
                try {
                    const itemRef = doc(db, "items", itemId);
                    await updateDoc(itemRef, { adminStatus: status });
                } catch (error) {
                    console.error("Error updating admin status: ", error);
                    alert("Failed to update status.");
                }
            };

            const toggleMergeSelection = (groupId) => {
                setSelectedForMerge(prev =>
                    prev.includes(groupId) ? prev.filter(id => id !== groupId) : [...prev, groupId]
                );
            };

            const [mergeFinalName, setMergeFinalName] = useState('');
            const [mergeFinalImage, setMergeFinalImage] = useState('');

            // When Modal Opens, pre-populate options
            useEffect(() => {
                if (showMergeModal && selectedForMerge.length > 0) {
                    const selectedGroups = deals.filter(d => selectedForMerge.includes(d.id));
                    if (selectedGroups.length > 0) {
                        setMergeFinalName(selectedGroups[0].name); // Default to first name
                    }
                }
            }, [showMergeModal]);

            const handleMergeConfirm = async () => {
                if (!mergeFinalName) {
                    alert('กรุณาระบุชื่อสินค้า Final');
                    return;
                }

                try {
                    const selectedGroups = deals.filter(d => selectedForMerge.includes(d.id));

                    // Gather ALL original item IDs across all selected groups
                    let allItemIDsToUpdate = [];
                    selectedGroups.forEach(group => {
                        group.originalItems.forEach(item => {
                            allItemIDsToUpdate.push(item.id);
                        });
                    });

                    // Update all those original items
                    const updatePromises = allItemIDsToUpdate.map(id => {
                        const itemRef = doc(db, "items", id);
                        return updateDoc(itemRef, {
                            name: mergeFinalName,
                            masterImage: mergeFinalImage
                        });
                    });

                    await Promise.all(updatePromises);

                    // Cleanup & Success state
                    setSelectedForMerge([]);
                    setShowMergeModal(false);
                    setMergeFinalName('');
                    setMergeFinalImage('');
                    alert('รวมข้อมูลเสร็จสิ้น!');
                    setAdminTab('dashboard'); // take them back after fix
                } catch (e) {
                    console.error("Error merging docs: ", e);
                    alert("Error merging docs: " + e.message);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center px-8">
                        <div className="flex items-center gap-3">
                            <LayoutDashboard className="text-orange-500" size={28} />
                            <h1 className="text-xl font-bold">DealHunter <span className="text-orange-500">Admin</span></h1>
                        </div>
                        <div className="relative w-96">
                            <input
                                type="text" placeholder="ค้นหาสินค้า, ยี่ห้อ, หรือร้านค้า..."
                                value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full py-2 pl-10 pr-4 rounded-lg bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:border-orange-500"
                            />
                            <Search className="absolute left-3 top-2.5 text-slate-400" size={16} />
                        </div>
                    </header>

                    {/* Navigation Tabs */}
                    <div className="bg-white border-b border-gray-200 px-8 flex gap-6 overflow-x-auto">
                        <button
                            onClick={() => { setAdminTab('dashboard'); setSelectedForMerge([]); }}
                            className={`py-4 font-bold text-sm border-b-2 flex items-center gap-2 transition-colors whitespace-nowrap ${adminTab === 'dashboard' ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-500 hover:text-gray-800'}`}
                        >
                            <LayoutDashboard size={18} /> ภาพรวม (Dashboard)
                        </button>
                        <button
                            onClick={() => { setAdminTab('manage'); setSelectedForMerge([]); }}
                            className={`py-4 font-bold text-sm border-b-2 flex items-center gap-2 transition-colors whitespace-nowrap ${adminTab === 'manage' ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-500 hover:text-gray-800'}`}
                        >
                            <Edit2 size={18} /> จัดการข้อมูล (Manage Data)
                        </button>
                        <button
                            onClick={() => setAdminTab('merge')}
                            className={`py-4 font-bold text-sm border-b-2 flex items-center gap-2 transition-colors whitespace-nowrap ${adminTab === 'merge' ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-500 hover:text-gray-800'}`}
                        >
                            <RefreshCw size={18} /> รวมข้อมูลซ้ำซ้อน (Merge)
                            {selectedForMerge.length > 0 && <span className="bg-orange-500 text-white text-[10px] px-1.5 py-0.5 rounded-full">{selectedForMerge.length}</span>}
                        </button>
                        <button
                            onClick={() => { setAdminTab('notifications'); setSelectedForMerge([]); setIsDeleteMode(false); }}
                            className={`py-4 font-bold text-sm border-b-2 flex items-center gap-2 transition-colors whitespace-nowrap ${adminTab === 'notifications' ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-500 hover:text-gray-800'}`}
                        >
                            <Bell size={18} /> แจ้งเตือน
                            {pendingItems.length > 0 && <span className="text-[10px] px-1.5 py-0.5 rounded-full bg-red-100 text-red-600 animate-pulse">{pendingItems.length}</span>}
                        </button>
                        <button
                            onClick={() => { setAdminTab('bin'); setSelectedForMerge([]); setIsDeleteMode(false); setExpandedGroups([]); }}
                            className={`py-4 font-bold text-sm border-b-2 flex items-center gap-2 transition-colors whitespace-nowrap ${adminTab === 'bin' ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-500 hover:text-gray-800'}`}
                        >
                            <Trash2 size={18} /> ถังขยะ
                            {deletedItems.length > 0 && <span className="bg-gray-100 text-gray-500 text-[10px] px-1.5 py-0.5 rounded-full">{deletedItems.length}</span>}
                        </button>
                    </div>

                    {/* Manage Tab Actions Bar (Delete Mode) */}
                    {adminTab === 'manage' && (
                        <div className="bg-slate-50 border-b border-gray-200 px-8 py-3 flex justify-end items-center shadow-sm z-10 relative">
                            <button
                                onClick={() => setIsDeleteMode(!isDeleteMode)}
                                className={`flex items-center gap-2 px-3 py-1.5 rounded-full font-bold text-sm transition-colors ${isDeleteMode ? 'bg-red-100 text-red-600 border border-red-200 shadow-inner' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}
                            >
                                {isDeleteMode ? <ToggleRight size={18} /> : <ToggleLeft size={18} />} Delete mode : {isDeleteMode ? 'ON' : 'OFF'}
                            </button>
                        </div>
                    )}

                    {/* Content */}
                    <main className="flex-1 p-8 overflow-y-auto relative">
                        {adminTab !== 'notifications' && adminTab !== 'bin' && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 text-slate-600 font-bold border-b border-gray-200">
                                        <tr>
                                            {adminTab === 'merge' && <th className="p-4 w-12 text-center">เลือก</th>}
                                            <th className="p-4 w-20">รูปภาพกลุ่มสินคัา</th>
                                            <th className="p-4">รายละเอียดสินค้า</th>
                                            {adminTab !== 'manage' && <th className="p-4 w-32 text-right">ช่วงราคา (฿)</th>}
                                            {adminTab !== 'manage' && <th className="p-4 w-48">จำนวนโพสต์บอกต่อ</th>}
                                            {adminTab === 'manage' && <th className="p-4 w-48">จัดการรูปรวม</th>}
                                            {adminTab === 'manage' && isDeleteMode && <th className="p-4 w-20 text-center text-red-500"><Trash2 size={16} className="mx-auto" /></th>}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {filteredDeals.length === 0 ? (
                                            <tr>
                                                <td colSpan={adminTab === 'merge' ? "7" : (adminTab === 'manage' ? "4" : "6")} className="p-10 text-center text-gray-400">
                                                    <AlertCircle size={32} className="mx-auto mb-2 text-gray-300" />
                                                    ไม่มีข้อมูลสินค้า
                                                </td>
                                            </tr>
                                        ) : filteredDeals.map(dealGroup => (
                                            <React.Fragment key={dealGroup.id}>
                                                <tr className={`hover:bg-slate-50 transition-colors border-b border-gray-100 ${selectedForMerge.includes(dealGroup.id) ? 'bg-orange-50/30' : ''}`}>
                                                    {adminTab === 'merge' && (
                                                        <td className="p-4 text-center">
                                                            <input
                                                                type="checkbox"
                                                                checked={selectedForMerge.includes(dealGroup.id)}
                                                                onChange={() => toggleMergeSelection(dealGroup.id)}
                                                                className="w-5 h-5 rounded border-gray-300 text-orange-500 focus:ring-orange-500 cursor-pointer"
                                                            />
                                                        </td>
                                                    )}
                                                    <td className="p-4 text-center">
                                                        {dealGroup.masterImage ? (
                                                            <img src={dealGroup.masterImage} alt={dealGroup.name} className="w-16 h-16 object-cover rounded shadow-sm mx-auto cursor-pointer" onClick={() => toggleExpand(dealGroup.id)} />
                                                        ) : (

                                                    <div className="mt-2 flex flex-wrap items-center gap-1">
                                                        <Tag size={10} className="text-gray-400" />
                                                        {(item.tags && item.tags.length > 0) ? item.tags.map(tag => (
                                                            <span key={tag} className="px-1.5 py-0.5 bg-gray-100 text-gray-600 rounded text-[9px] flex items-center gap-1 group">
                                                                #{tag}
                                                                <button onClick={() => handleRemoveTag(item.id, item.tags, tag)} className="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-opacity">
                                                                    <X size={8} />
                                                                </button>
                                                            </span>
                                                        )) : <span className="text-[9px] text-gray-300 italic">ไม่มีแท็ก</span>}
                                                        {adminTagItemId === item.id ? (
                                                            <div className="flex items-center gap-1">
                                                                <input
                                                                    type="text"
                                                                    value={adminTagValue}
                                                                    onChange={e => setAdminTagValue(e.target.value)}
                                                                    onKeyDown={e => { if (e.key === 'Enter') handleAddAdminTag(item.id, item.tags); }}
                                                                    placeholder="เพิ่มแท็ก..."
                                                                    className="text-[9px] px-1.5 py-0.5 border border-orange-300 rounded focus:outline-none focus:border-orange-500 w-20"
                                                                    autoFocus
                                                                />
                                                                <button onClick={() => handleAddAdminTag(item.id, item.tags)} className="bg-orange-500 text-white text-[8px] px-1.5 py-0.5 rounded font-bold">เพิ่ม</button>
                                                                <button onClick={() => { setAdminTagItemId(null); setAdminTagValue(''); }} className="text-gray-400 hover:text-gray-600"><X size={10} /></button>
                                                            </div>
                                                        ) : (
                                                            <button
                                                                onClick={() => setAdminTagItemId(item.id)}
                                                                className="text-[9px] text-orange-500 hover:text-orange-700 font-bold px-1"
                                                            >+ เพิ่มแท็ก</button>
                                                        )}
                                                    </div>

                                                    {/* Date & shipping & promo */}
                                                    <div className="mt-1 flex flex-wrap items-center gap-2 text-[10px] text-gray-400">
                                                        <span>{item.lastUpdated ? new Date(item.lastUpdated).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-'}</span>
                                                        {item.shippingType === 'excluded' && item.shippingFee > 0 && <span className="text-blue-500">+ค่าส่ง ฿{item.shippingFee}</span>}
                                                        {item.cashbackUsed && <span className="text-green-600">cashback ฿{item.cashbackAmount}</span>}
                                                        {item.promoCodeUsed && item.promoCode && <span className="text-blue-600">promo: {item.promoCode}</span>}
                                                        {item.adminStatus === 'disapproved' && <span className="text-red-500 font-bold">✗ ไม่อนุมัติ</span>}
                                                    </div>

                                                    {/* Move to Group action */}
                                                    <div className="mt-3 border-t border-gray-100 pt-2">
                                                        {moveItemId === item.id ? (
                                                            <div className="flex items-center gap-2">
                                                                <select
                                                                    value={moveTargetName}
                                                                    onChange={e => setMoveTargetName(e.target.value)}
                                                                    className="flex-1 text-xs p-1.5 border border-blue-300 rounded focus:border-blue-500 focus:outline-none bg-white"
                                                                >
                                                                    <option value="">-- เลือกกลุ่มสินค้าปลายทาง --</option>
                                                                    {uniqueProductNames.filter(n => n !== item.name).map(n => (
                                                                        <option key={n} value={n}>{n}</option>
                                                                    ))}
                                                                </select>
                                                                <button onClick={() => handleMoveItem(item.id)} className="bg-blue-500 text-white text-[10px] px-2 py-1 rounded font-bold flex items-center gap-1"><ArrowRight size={12} /> ย้าย</button>
                                                                <button onClick={() => { setMoveItemId(null); setMoveTargetName(''); }} className="bg-gray-200 text-gray-600 text-[10px] px-2 py-1 rounded font-bold">ยกเลิก</button>
                                                            </div>
                                                        ) : (
                                                            <button
                                                                onClick={() => setMoveItemId(item.id)}
                                                                className="text-[10px] text-blue-500 hover:text-blue-700 font-bold flex items-center gap-1 transition-colors"
                                                            >
                                                                <ArrowRight size={12} /> ย้ายไปกลุ่มอื่น
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* RIGHT: Disapprove Capsule Button */}
                                        <button
                                            onClick={() => handleSetAdminStatus(item.id, item.adminStatus === 'disapproved' ? '' : 'disapproved')}
                                            className={`flex-shrink-0 w-10 flex items-center justify-center transition-colors ${item.adminStatus === 'disapproved' ? 'bg-red-500 text-white' : 'bg-red-100 text-red-400 hover:bg-red-200'}`}
                                            title="ไม่อนุมัติ"
                                        >
                                            <XCircle size={18} />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* ============ BIN TAB ============ */}
                        {adminTab === 'bin' && (
                            <div className="space-y-3">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2"><Trash2 size={20} className="text-gray-500" /> ถังขยะ (รายการที่ถูกลบ)</h2>
                                    <span className="text-sm text-gray-400">{deletedItems.length} รายการในถังขยะ</span>
                                </div>
                                {deletedItems.length === 0 ? (
                                    <div className="text-center text-gray-400 py-16 bg-white rounded-xl border border-gray-200 border-dashed">
                                        <Trash2 size={48} className="mx-auto mb-3 text-gray-200" />
                                        <p className="text-gray-500 font-bold">ถังขยะว่างเปล่า</p>
                                        <p className="text-xs text-gray-400 mt-1">ไม่มีข้อมูลที่ถูกลบในขณะนี้</p>
                                    </div>
                                ) : deletedItems.map(item => (
                                    <div key={item.id} className="rounded-xl shadow-sm border border-gray-200 bg-white flex overflow-hidden opacity-75 hover:opacity-100 transition-opacity grayscale hover:grayscale-0">
                                        {/* LEFT: Recover Button */}
                                        <button
                                            onClick={() => handleRecoverPost(item.id)}
                                            className="flex-shrink-0 w-12 flex flex-col items-center justify-center transition-colors bg-green-50 text-green-600 hover:bg-green-500 hover:text-white border-r border-gray-100"
                                            title="กู้คืนข้อมูลนี้"
                                        >
                                            <RefreshCw size={16} strokeWidth={2.5} className="mb-1" />
                                            <span className="text-[9px] font-bold">กู้คืน</span>
                                        </button>

                                        {/* CENTER: Content */}
                                        <div className="flex-1 p-4">
                                            <div className="flex gap-4">
                                                {/* Image Preview */}
                                                <div className="w-16 h-16 rounded-lg bg-gray-100 flex-shrink-0 overflow-hidden border border-gray-200">
                                                    {item.image ? <img src={item.image} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-gray-300"><ImageIcon size={20} /></div>}
                                                </div>

                                                {/* Info */}
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-start justify-between gap-2">
                                                        <div>
                                                            <div className="font-bold text-gray-800 text-sm line-through decoration-red-400">{item.name}</div>
                                                            {item.brand && <div className="text-[10px] text-gray-500 uppercase tracking-wider">{item.brand}</div>}
                                                        </div>
                                                        <div className="text-right flex-shrink-0">
                                                            <div className="font-bold text-gray-500 text-sm">฿{item.price}</div>
                                                            <div className="text-[10px] text-gray-400">{item.unitQuantity || 1} {item.unitType || 'ชิ้น'}</div>
                                                        </div>
                                                    </div>

                                                    <div className="mt-2 text-xs text-gray-500">
                                                        <Store size={12} className="inline mr-1" /> {item.store || 'ไม่ระบุร้าน'}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* RIGHT: Permanent Delete Button */}
                                        <button
                                            onClick={() => handlePermanentDeletePost(item.id)}
                                            className="flex-shrink-0 w-12 flex flex-col items-center justify-center transition-colors bg-red-50 text-red-600 hover:bg-red-600 hover:text-white border-l border-gray-100"
                                            title="ลบถาวร"
                                        >
                                            <Trash2 size={16} className="mb-1" />
                                            <span className="text-[9px] font-bold">ลบถาวร</span>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                        {adminTab === 'merge' && selectedForMerge.length >= 2 && (
                            <div className="fixed bottom-10 inset-x-0 flex justify-center z-20 animate-fade-in pointer-events-none">
                                <button
                                    onClick={() => setShowMergeModal(true)}
                                    className="bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-full shadow-2xl font-bold text-lg flex items-center gap-3 transition-transform hover:scale-105 pointer-events-auto"
                                >
                                    <CheckSquare size={24} /> รวมข้อมูล {selectedForMerge.length} รายการที่เลือก
                                </button>
                            </div>
                        )}

                        {/* DELETE CONFIRMATION MODAL */}
                        {deleteModalTarget && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl flex flex-col">
                                    <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-red-50">
                                        <h2 className="text-xl font-bold flex items-center gap-2 text-red-600"><AlertCircle className="text-red-500" /> ยืนยันการลบข้อมูล</h2>
                                        <button onClick={() => setDeleteModalTarget(null)} className="text-gray-400 hover:text-gray-600"><X size={24} /></button>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <p className="text-gray-600">
                                            คุณแน่ใจหรือไม่ว่าต้องการลบ <strong>{deleteModalTarget.itemName}</strong>?
                                        </p>
                                        <p className="text-xs text-gray-500 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                            ข้อมูลนี้จะถูกย้ายไปที่ <Trash2 size={12} className="inline mr-1" /><strong>ถังขยะ</strong> คุณสามารถกู้คืนได้ภายหลังหรือลบอย่างถาวรในถังขยะ
                                        </p>
                                    </div>
                                    <div className="p-6 border-t border-gray-100 bg-slate-50 flex justify-end gap-3">
                                        <button onClick={() => setDeleteModalTarget(null)} className="px-6 py-2.5 rounded-lg font-bold text-gray-600 bg-white border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors">
                                            ยกเลิก
                                        </button>
                                        <button onClick={confirmDelete} className="px-6 py-2.5 rounded-lg font-bold text-white bg-red-500 hover:bg-red-600 shadow-md hover:shadow-lg transition-all flex items-center gap-2">
                                            <Trash2 size={18} /> ลบข้อมูล
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* MERGE MODAL PROMPT */}
                        {showMergeModal && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                                    <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-slate-50">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><RefreshCw className="text-orange-500" /> ยืนยันการรวมข้อมูล ({selectedForMerge.length} กลุ่ม)</h2>
                                        <button onClick={() => setShowMergeModal(false)} className="text-gray-400 hover:text-gray-600"><X size={24} /></button>
                                    </div>

                                    <div className="p-6 overflow-y-auto flex-1 space-y-6">
                                        {/* Name Selection */}
                                        <div className="space-y-2">
                                            <label className="font-bold text-gray-700 text-sm">ชื่อสินค้าที่ถูกต้อง (Final Name)</label>
                                            <p className="text-xs text-gray-500 mb-2">เมื่อกดยืนยัน ข้อมูลที่เลือกทั้งหมดจะถูกเปลี่ยนเป็นชื่อนี้</p>
                                            <div className="flex flex-col gap-2">
                                                <input
                                                    type="text"
                                                    value={mergeFinalName}
                                                    onChange={(e) => setMergeFinalName(e.target.value)}
                                                    className="w-full p-3 border-2 border-orange-200 rounded-lg font-bold text-lg focus:border-orange-500 focus:outline-none"
                                                />
                                                <div className="flex flex-wrap gap-2 mt-2">
                                                    {deals.filter(d => selectedForMerge.includes(d.id)).map(d => (
                                                        <button
                                                            key={d.id}
                                                            onClick={() => setMergeFinalName(d.name)}
                                                            className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full transition-colors"
                                                        >
                                                            {d.name}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        {/* Image Selection */}
                                        <div className="space-y-2">
                                            <label className="font-bold text-gray-700 text-sm">เลือกรูปภาพหลัก (Master Thumbnail)</label>
                                            <p className="text-xs text-gray-500 mb-2">แตะเลือกรูปภาพที่ดีที่สุด 1 รูป (หรือไม่เลือกก็ได้)</p>
                                            <div className="grid grid-cols-4 sm:grid-cols-5 gap-3">
                                                {/* Button to remove image / select none */}
                                                <button
                                                    onClick={() => setMergeFinalImage('')}
                                                    className={`aspect-square rounded-xl border-2 flex flex-col items-center justify-center text-xs gap-1 transition-all ${mergeFinalImage === '' ? 'border-orange-500 bg-orange-50 text-orange-600 font-bold' : 'border-dashed border-gray-300 text-gray-400 hover:bg-gray-50'}`}
                                                >
                                                    <X size={20} /> ไม่ระบุรูป
                                                </button>

                                                {/* ALL IMAGES available from selected groups */}
                                                {function () {
                                                    const selectedGroups = deals.filter(d => selectedForMerge.includes(d.id));
                                                    let allImages = [];
                                                    selectedGroups.forEach(g => {
                                                        if (g.masterImage && !allImages.includes(g.masterImage)) allImages.push(g.masterImage);
                                                        g.originalItems.forEach(item => {
                                                            if (item.image && !allImages.includes(item.image)) allImages.push(item.image);
                                                        });
                                                    });
                                                    return allImages.map((img, idx) => (
                                                        <div
                                                            key={idx}
                                                            onClick={() => setMergeFinalImage(img)}
                                                            className={`aspect-square rounded-xl overflow-hidden border-4 cursor-pointer relative group transition-all ${mergeFinalImage === img ? 'border-orange-500 shadow-md transform scale-105 z-10' : 'border-transparent hover:border-orange-200'}`}
                                                        >
                                                            {mergeFinalImage === img && <div className="absolute top-1 right-1 bg-orange-500 text-white rounded-full p-0.5"><CheckSquare size={14} /></div>}
                                                            <img src={img} className="w-full h-full object-cover" />
                                                        </div>
                                                    ));
                                                }()}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="p-4 bg-slate-50 border-t border-gray-100 flex justify-end gap-3">
                                        <button onClick={() => setShowMergeModal(false)} className="px-6 py-2.5 rounded-lg text-gray-600 font-bold hover:bg-gray-200 transition-colors">ยกเลิก</button>
                                        <button onClick={handleMergeConfirm} className="px-6 py-2.5 rounded-lg bg-orange-600 text-white font-bold shadow-md hover:bg-orange-700 transition-colors flex items-center gap-2">
                                            <Save size={18} /> ยืนยันการรวมข้อมูล
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )
                        }

                    </main >
                </div >
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>

</html>
