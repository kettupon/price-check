<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Price Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        green: {
                            50: '#f0f9eb', 100: '#dbf2ce', 200: '#bae6a1', 300: '#92d571',
                            400: '#6dc147', 500: '#48A111', 600: '#387e0d', 700: '#2c610b',
                            800: '#214709', 900: '#183107',
                        },
                        orange: {
                            50: '#fffcf1', 100: '#fff6db', 200: '#ffebb5', 300: '#ffdc89',
                            400: '#ffbd45', 500: '#FF8C00', 600: '#e67300', 700: '#bf5700',
                            800: '#994000', 900: '#7d3300',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background-color: #f3f4f6;
        }

        .animate-fade-in {
            animation: fadeIn 0.25s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-added-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .new-pulse {
            animation: newPulse 2s ease-in-out infinite;
        }

        @keyframes newPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4);
            }

            50% {
                box-shadow: 0 0 0 6px rgba(102, 126, 234, 0);
            }
        }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.294.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            LayoutDashboard, Edit2, Image as ImageIcon, Save, X, Search, AlertCircle,
            RefreshCw, CheckSquare, Bell, Store, ArrowRight, Check, XCircle, Tag,
            Trash2, ToggleLeft, ToggleRight, Upload, Link2, ChevronDown, ChevronRight,
            User, MessageSquare, Plus, ZoomIn, ChevronLeft, FolderPlus, Clock, Sparkles,
            List, Package, Eye
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import {
            getFirestore, collection, onSnapshot, query, orderBy,
            doc, updateDoc, deleteDoc, setDoc, addDoc
        } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyByDvi-wyekFdKMiMv_Cb2yUq9yF0Tw3Uc",
            authDomain: "price-check-86915.firebaseapp.com",
            projectId: "price-check-86915",
            storageBucket: "price-check-86915.firebasestorage.app",
            messagingSenderId: "510258152666",
            appId: "1:510258152666:web:bc24bd3f34e704488e91e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        /* ─────────────────────────── helpers ─────────────────────────── */

        function StoreLogo({ logoUrl, storeName, size = 'md', className = '' }) {
            const sizeMap = { xs: 'w-6 h-6', sm: 'w-8 h-8', md: 'w-10 h-10', lg: 'w-16 h-16', xl: 'w-20 h-20', '2xl': 'w-24 h-24' };
            const iconSizeMap = { xs: 12, sm: 14, md: 18, lg: 24, xl: 32, '2xl': 40 };
            const box = sizeMap[size] || sizeMap.md;
            const iconSz = iconSizeMap[size] || 18;
            if (logoUrl) {
                return (
                    <div className={`${box} rounded-xl bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm flex-shrink-0 ${className}`}>
                        <img src={logoUrl} alt={storeName} className="w-full h-full object-contain p-0.5"
                            onError={e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                        <div style={{ display: 'none' }} className="w-full h-full items-center justify-center bg-orange-50 text-orange-400"><Store size={iconSz} /></div>
                    </div>
                );
            }
            return (
                <div className={`${box} rounded-xl bg-orange-50 border border-orange-100 flex items-center justify-center text-orange-400 shadow-sm flex-shrink-0 ${className}`}>
                    <Store size={iconSz} />
                </div>
            );
        }

        function LogoUploadSection({ currentLogoUrl, onLogoChange }) {
            const fileInputRef = useRef(null);
            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new window.Image();
                    img.onload = () => {
                        const MAX = 400;
                        let w = img.width, h = img.height;
                        if (w > MAX || h > MAX) {
                            if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
                            else { w = Math.round(w * MAX / h); h = MAX; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
                        ctx.drawImage(img, 0, 0, w, h);
                        onLogoChange(canvas.toDataURL('image/png', 0.92));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };
            return (
                <div className="space-y-2">
                    <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">โลโก้ร้าน (Logo)</label>
                    <div className="flex items-start gap-4">
                        <div className="w-24 h-24 rounded-2xl border-2 border-dashed border-gray-200 bg-gray-50 flex items-center justify-center overflow-hidden flex-shrink-0 shadow-inner">
                            {currentLogoUrl ? <img src={currentLogoUrl} alt="logo preview" className="w-full h-full object-contain p-1" /> : (
                                <div className="flex flex-col items-center text-gray-300 gap-1"><Store size={28} /><span className="text-[9px] font-bold uppercase tracking-widest">No Logo</span></div>
                            )}
                        </div>
                        <div className="flex-1 space-y-2">
                            <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />
                            <button type="button" onClick={() => fileInputRef.current?.click()}
                                className="w-full py-2.5 border-2 border-dashed border-orange-300 bg-orange-50 hover:bg-orange-100 text-orange-600 font-bold text-xs rounded-xl flex items-center justify-center gap-2 transition-colors active:scale-95">
                                <Upload size={14} /> อัพโหลดโลโก้
                            </button>
                            {currentLogoUrl && (
                                <button type="button" onClick={() => onLogoChange('')}
                                    className="w-full py-2 text-xs font-bold text-red-400 hover:text-red-600 border border-red-100 rounded-xl hover:bg-red-50 transition-colors">
                                    ลบโลโก้
                                </button>
                            )}
                            <p className="text-[9px] text-gray-400 leading-relaxed">รองรับ PNG, JPG, WebP · ระบบจะปรับขนาดโดยอัตโนมัติ · รองรับทุก aspect ratio</p>
                        </div>
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════════════════
           Show User Added Toggle Bar
        ═══════════════════════════════════════════════════════════════ */
        function ShowUserAddedBar({ enabled, onToggle, count }) {
            return (
                <div className={`flex items-center justify-between px-4 py-2.5 rounded-xl border transition-all ${enabled ? 'bg-purple-50 border-purple-200' : 'bg-white border-gray-200'}`}>
                    <div className="flex items-center gap-2.5">
                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${enabled ? 'user-added-badge text-white' : 'bg-gray-100 text-gray-400'}`}>
                            <Clock size={16} />
                        </div>
                        <div>
                            <div className={`text-xs font-bold ${enabled ? 'text-purple-800' : 'text-gray-600'}`}>
                                แสดงโพสต์ผู้ใช้ล่าสุด
                                {enabled && count > 0 && (
                                    <span className="ml-2 bg-purple-600 text-white text-[9px] px-1.5 py-0.5 rounded-full">{count} รายการ</span>
                                )}
                            </div>
                            <div className={`text-[10px] ${enabled ? 'text-purple-500' : 'text-gray-400'}`}>
                                {enabled ? 'เรียงตามเวลาที่ผู้ใช้เพิ่มล่าสุด' : 'คลิกเพื่อกรองโพสต์ล่าสุดจากผู้ใช้'}
                            </div>
                        </div>
                    </div>
                    <button
                        onClick={onToggle}
                        className={`relative w-11 h-6 rounded-full transition-all duration-300 focus:outline-none ${enabled ? 'bg-purple-600' : 'bg-gray-300'}`}
                    >
                        <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow-md transition-all duration-300 ${enabled ? 'left-5' : 'left-0.5'}`} />
                    </button>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════════════════
           NEW: Category Items Modal — view + remove items from category
        ═══════════════════════════════════════════════════════════════ */
        function CategoryItemsModal({ category, allItems, onClose, onRemoveItem }) {
            const [search, setSearch] = useState('');
            const [removing, setRemoving] = useState(null);

            const items = (category.items || []);
            const filtered = search
                ? items.filter(name => name.toLowerCase().includes(search.toLowerCase()))
                : items;

            const handleRemove = async (productName) => {
                setRemoving(productName);
                await onRemoveItem(category.id, category.items, productName);
                setRemoving(null);
            };

            // Get product info from allItems for each name
            const getProductInfo = (name) => {
                return allItems.find(i => i.name === name);
            };

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[130] flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl flex flex-col max-h-[88vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                        {/* Header */}
                        <div className="p-5 border-b border-gray-100 bg-gradient-to-r from-blue-600 to-blue-700 text-white flex justify-between items-start flex-shrink-0">
                            <div>
                                <h2 className="text-base font-bold flex items-center gap-2">
                                    <List size={18} className="text-blue-200" />
                                    รายการสินค้าในหมวด
                                </h2>
                                <p className="text-blue-200 font-bold text-lg mt-0.5">{category.name}</p>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-white/20 backdrop-blur-sm px-3 py-1.5 rounded-full">
                                    <span className="text-xs font-bold">{items.length} รายการ</span>
                                </div>
                                <button onClick={onClose} className="text-white/60 hover:text-white w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center transition-colors">
                                    <X size={18} />
                                </button>
                            </div>
                        </div>

                        {/* Search */}
                        <div className="p-4 border-b border-gray-100 flex-shrink-0 bg-gray-50">
                            <div className="relative">
                                <input
                                    type="text"
                                    placeholder="ค้นหาสินค้าในหมวดหมู่นี้..."
                                    value={search}
                                    onChange={e => setSearch(e.target.value)}
                                    autoFocus
                                    className="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:outline-none font-medium shadow-sm"
                                />
                                <Search size={15} className="absolute left-3 top-3 text-gray-400" />
                                {search && (
                                    <button onClick={() => setSearch('')} className="absolute right-3 top-3 text-gray-400 hover:text-gray-600">
                                        <X size={14} />
                                    </button>
                                )}
                            </div>
                            {search && (
                                <p className="text-[10px] text-gray-400 mt-1.5 ml-1">พบ {filtered.length} จาก {items.length} รายการ</p>
                            )}
                        </div>

                        {/* Items list */}
                        <div className="overflow-y-auto flex-1 p-3 space-y-2">
                            {filtered.length === 0 ? (
                                <div className="text-center py-12 text-gray-400">
                                    <Package size={40} className="mx-auto mb-3 text-gray-200" />
                                    <p className="text-sm font-medium">{search ? 'ไม่พบสินค้าที่ค้นหา' : 'ยังไม่มีสินค้าในหมวดหมู่นี้'}</p>
                                </div>
                            ) : filtered.map((productName, idx) => {
                                const info = getProductInfo(productName);
                                const isRemoving = removing === productName;
                                return (
                                    <div
                                        key={productName}
                                        className={`flex items-center gap-3 p-3 rounded-xl border transition-all ${isRemoving ? 'opacity-50 scale-95 border-red-200 bg-red-50' : 'border-gray-100 bg-white hover:border-blue-200 hover:shadow-sm'}`}
                                    >
                                        {/* Product image */}
                                        <div className="w-10 h-10 rounded-lg bg-gray-100 flex-shrink-0 overflow-hidden border border-gray-200">
                                            {info?.masterImage || info?.image
                                                ? <img src={info.masterImage || info.image} className="w-full h-full object-cover" />
                                                : <div className="w-full h-full flex items-center justify-center text-gray-300"><Package size={16} /></div>
                                            }
                                        </div>

                                        {/* Info */}
                                        <div className="flex-1 min-w-0">
                                            <div className="font-bold text-sm text-gray-800 truncate">{productName}</div>
                                            {info?.brand && (
                                                <div className="text-[10px] text-gray-400 font-medium">{info.brand}</div>
                                            )}
                                            <div className="text-[10px] text-gray-400 mt-0.5 flex items-center gap-1">
                                                <span className="w-1.5 h-1.5 rounded-full bg-green-400 inline-block"></span>
                                                {info ? `฿${info.price}` : 'ไม่พบข้อมูลราคา'}
                                            </div>
                                        </div>

                                        {/* Remove button */}
                                        <button
                                            onClick={() => handleRemove(productName)}
                                            disabled={isRemoving}
                                            className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${isRemoving
                                                    ? 'bg-red-100 text-red-400 border-red-200 cursor-not-allowed'
                                                    : 'bg-white text-red-500 border-red-200 hover:bg-red-500 hover:text-white hover:border-red-500'
                                                }`}
                                        >
                                            {isRemoving ? (
                                                <RefreshCw size={12} className="animate-spin" />
                                            ) : (
                                                <X size={12} />
                                            )}
                                            {isRemoving ? 'กำลังลบ...' : 'ลบออก'}
                                        </button>
                                    </div>
                                );
                            })}
                        </div>

                        {/* Footer */}
                        <div className="p-4 border-t border-gray-100 bg-gray-50 flex-shrink-0 flex items-center justify-between">
                            <p className="text-[10px] text-gray-400">
                                การลบออกจากหมวดหมู่ไม่ได้ลบสินค้า
                            </p>
                            <button
                                onClick={onClose}
                                className="px-5 py-2 bg-white border border-gray-200 text-gray-600 font-bold text-sm rounded-xl hover:bg-gray-100 transition-colors"
                            >
                                ปิด
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════════════════
           Category Assign Modal
        ═══════════════════════════════════════════════════════════════ */
        function AssignCategoryModal({ product, categories, onClose, onSave }) {
            const [search, setSearch] = useState('');
            const [selected, setSelected] = useState(() => {
                return categories.filter(c => (c.items || []).includes(product.name)).map(c => c.id);
            });
            const [newCatName, setNewCatName] = useState('');
            const [creating, setCreating] = useState(false);

            const filtered = search
                ? categories.filter(c => c.name.toLowerCase().includes(search.toLowerCase()))
                : categories;

            const toggle = (id) => setSelected(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const handleSave = () => onSave(product.name, selected, newCatName.trim());

            return (
                <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[120] flex items-center justify-center p-4 animate-fade-in">
                    <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl flex flex-col max-h-[88vh] overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="p-5 border-b border-gray-100 bg-slate-900 text-white flex justify-between items-start flex-shrink-0">
                            <div>
                                <h2 className="text-base font-bold flex items-center gap-2">
                                    <FolderPlus size={18} className="text-orange-400" /> จัดหมวดหมู่สินค้า
                                </h2>
                                <p className="text-xs text-slate-400 mt-0.5 truncate max-w-[300px]">{product.name}</p>
                            </div>
                            <button onClick={onClose} className="text-white/60 hover:text-white mt-0.5"><X size={20} /></button>
                        </div>
                        <div className="p-4 border-b border-gray-100 flex-shrink-0">
                            <div className="relative">
                                <input type="text" placeholder="ค้นหาหมวดหมู่..." value={search} onChange={e => setSearch(e.target.value)} autoFocus
                                    className="w-full pl-9 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:border-blue-500 focus:outline-none font-medium" />
                                <Search size={15} className="absolute left-3 top-3 text-gray-400" />
                            </div>
                            {selected.length > 0 && (
                                <div className="mt-2 flex flex-wrap gap-1.5">
                                    {selected.map(id => {
                                        const cat = categories.find(c => c.id === id);
                                        return cat ? (
                                            <span key={id} className="inline-flex items-center gap-1 bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded-full">
                                                {cat.name}
                                                <button onClick={() => toggle(id)} className="hover:text-red-500"><X size={10} /></button>
                                            </span>
                                        ) : null;
                                    })}
                                </div>
                            )}
                        </div>
                        <div className="overflow-y-auto flex-1 divide-y divide-gray-50 p-2">
                            {filtered.length === 0 && !creating && (
                                <div className="text-center py-8 text-gray-400 text-sm italic">ไม่พบหมวดหมู่ที่ค้นหา</div>
                            )}
                            {filtered.map(cat => {
                                const isSelected = selected.includes(cat.id);
                                return (
                                    <button key={cat.id} onClick={() => toggle(cat.id)}
                                        className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all text-left ${isSelected ? 'bg-blue-50 border border-blue-200' : 'hover:bg-gray-50 border border-transparent'}`}>
                                        <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 transition-all ${isSelected ? 'bg-blue-600 border-blue-600' : 'border-gray-300'}`}>
                                            {isSelected && <Check size={12} className="text-white" strokeWidth={3} />}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className={`text-sm font-bold truncate ${isSelected ? 'text-blue-800' : 'text-gray-700'}`}>{cat.name}</div>
                                            <div className="text-[10px] text-gray-400">{(cat.items || []).length} รายการ</div>
                                        </div>
                                        {isSelected && <Check size={16} className="text-blue-500 flex-shrink-0" />}
                                    </button>
                                );
                            })}
                        </div>
                        <div className="p-4 border-t border-gray-100 bg-gray-50 flex-shrink-0 space-y-3">
                            {creating ? (
                                <div className="flex gap-2">
                                    <input type="text" value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder="ชื่อหมวดหมู่ใหม่..." autoFocus
                                        onKeyDown={e => { if (e.key === 'Enter' && newCatName.trim()) setCreating(false); if (e.key === 'Escape') { setCreating(false); setNewCatName(''); } }}
                                        className="flex-1 px-3 py-2 border border-blue-300 rounded-lg text-sm focus:border-blue-500 focus:outline-none font-medium" />
                                    <button onClick={() => { if (newCatName.trim()) setCreating(false); }} className="bg-blue-600 text-white px-3 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition-colors"><Check size={16} /></button>
                                    <button onClick={() => { setCreating(false); setNewCatName(''); }} className="bg-gray-200 text-gray-600 px-3 py-2 rounded-lg text-sm font-bold hover:bg-gray-300 transition-colors"><X size={16} /></button>
                                </div>
                            ) : (
                                <button onClick={() => setCreating(true)} className="w-full py-2 border-2 border-dashed border-blue-300 bg-white hover:bg-blue-50 text-blue-600 font-bold text-xs rounded-xl flex items-center justify-center gap-2 transition-colors">
                                    <Plus size={14} /> สร้างหมวดหมู่ใหม่
                                </button>
                            )}
                            {newCatName.trim() && !creating && (
                                <div className="flex items-center gap-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">
                                    <FolderPlus size={14} className="text-blue-500 flex-shrink-0" />
                                    <span className="text-xs font-bold text-blue-700 flex-1">สร้างใหม่: <span className="text-blue-900">"{newCatName}"</span></span>
                                    <button onClick={() => setNewCatName('')} className="text-blue-400 hover:text-red-500"><X size={12} /></button>
                                </div>
                            )}
                            <div className="flex gap-2">
                                <button onClick={onClose} className="flex-1 py-2.5 bg-white border border-gray-200 text-gray-600 font-bold text-sm rounded-xl hover:bg-gray-50 transition-colors">ยกเลิก</button>
                                <button onClick={handleSave} disabled={selected.length === 0 && !newCatName.trim()}
                                    className="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-200 disabled:text-gray-400 text-white font-bold text-sm rounded-xl transition-colors shadow-sm">
                                    บันทึก ({selected.length}{newCatName.trim() ? '+1' : ''})
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════════════════
           Image Lightbox
        ═══════════════════════════════════════════════════════════════ */
        function ImageLightbox({ images, initialIndex = 0, onClose }) {
            const [current, setCurrent] = useState(initialIndex);
            const total = images.length;

            useEffect(() => {
                const handler = (e) => {
                    if (e.key === 'Escape') onClose();
                    if (e.key === 'ArrowRight') setCurrent(c => (c + 1) % total);
                    if (e.key === 'ArrowLeft') setCurrent(c => (c - 1 + total) % total);
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [total]);

            return (
                <div className="fixed inset-0 bg-black/90 z-[200] flex items-center justify-center animate-fade-in" onClick={onClose}>
                    <div className="relative flex items-center justify-center w-full h-full p-4" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 z-10 w-10 h-10 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center transition-colors backdrop-blur-sm"><X size={20} /></button>
                        {total > 1 && <div className="absolute top-4 left-1/2 -translate-x-1/2 bg-black/50 text-white text-xs font-bold px-3 py-1.5 rounded-full backdrop-blur-sm">{current + 1} / {total}</div>}
                        {total > 1 && <button onClick={() => setCurrent(c => (c - 1 + total) % total)} className="absolute left-4 w-10 h-10 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center transition-colors backdrop-blur-sm z-10"><ChevronLeft size={20} /></button>}
                        <img key={current} src={images[current]} alt={`report image ${current + 1}`} className="max-w-full max-h-[85vh] object-contain rounded-xl shadow-2xl animate-fade-in" />
                        {total > 1 && <button onClick={() => setCurrent(c => (c + 1) % total)} className="absolute right-4 w-10 h-10 bg-white/10 hover:bg-white/20 text-white rounded-full flex items-center justify-center transition-colors backdrop-blur-sm z-10"><ChevronDown size={20} className="rotate-[-90deg]" /></button>}
                        {total > 1 && (
                            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2">
                                {images.map((img, idx) => (
                                    <button key={idx} onClick={() => setCurrent(idx)} className={`w-12 h-12 rounded-lg overflow-hidden border-2 transition-all ${idx === current ? 'border-white scale-110' : 'border-white/30 opacity-60 hover:opacity-90'}`}>
                                        <img src={img} className="w-full h-full object-cover" />
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        /* ═══════════════════════════════════════════════════════════════
           MAIN APP
        ═══════════════════════════════════════════════════════════════ */
        function AdminApp() {

            const [rawItems, setRawItems] = useState([]);
            const [deletedItems, setDeletedItems] = useState([]);
            const [deleteModalTarget, setDeleteModalTarget] = useState(null);

            const [editingStoreItemId, setEditingStoreItemId] = useState(null);
            const [editStoreValue, setEditStoreValue] = useState('');
            const [storeSearchQuery, setStoreSearchQuery] = useState('');
            const [moveItemId, setMoveItemId] = useState(null);
            const [moveTargetName, setMoveTargetName] = useState('');
            const [adminTagItemId, setAdminTagItemId] = useState(null);
            const [adminTagValue, setAdminTagValue] = useState('');

            const [editingNameId, setEditingNameId] = useState(null);
            const [newName, setNewName] = useState('');
            const [stores, setStores] = useState([]);
            const [reports, setReports] = useState([]);
            const [newsText, setNewsText] = useState(''); // ── NEW: push news text input
            const [submittedNews, setSubmittedNews] = useState([]); // ── NEW: list of submitted news
            const [showNewsReviewModal, setShowNewsReviewModal] = useState(false); // ── NEW: review modal
            const [newsToReview, setNewsToReview] = useState(null); // ── NEW: news being reviewed
            const [editingStoreDetail, setEditingStoreDetail] = useState(null);

            const [storeSortMode, setStoreSortMode] = useState('newest');
            const [expandedStores, setExpandedStores] = useState([]);
            const [relatingStore, setRelatingStore] = useState(null);
            const [relateSearchQuery, setRelateSearchQuery] = useState('');

            const [mergeFinalName, setMergeFinalName] = useState('');
            const [mergeFinalImage, setMergeFinalImage] = useState('');

            const [variantGroups, setVariantGroups] = useState([]);
            const [showVariantModal, setShowVariantModal] = useState(false);
            const [editingVariantGroup, setEditingVariantGroup] = useState(null);
            const [variantSearchQuery, setVariantSearchQuery] = useState('');

            const [categories, setCategories] = useState([]);
            const [editingCategory, setEditingCategory] = useState(null);
            const [categorySearchQuery, setCategorySearchQuery] = useState('');
            const [uncategorizedSearchQuery, setUncategorizedSearchQuery] = useState('');

            const [editingUnitItemId, setEditingUnitItemId] = useState(null);
            const [newUnitQty, setNewUnitQty] = useState('');
            const [newUnitType, setNewUnitType] = useState('');

            const [assignCatProduct, setAssignCatProduct] = useState(null);
            const [lightbox, setLightbox] = useState(null);

            // NEW: Category items modal state
            const [viewingCategoryItems, setViewingCategoryItems] = useState(null);

            const toggleExpand = (groupId) => {
                setExpandedGroups(prev => prev.includes(groupId) ? prev.filter(id => id !== groupId) : [...prev, groupId]);
            };

            useEffect(() => {
                const q = query(collection(db, "items"), orderBy("lastUpdated", "desc"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const fbDeals = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const grouped = {};
                    const binned = [];
                    const activeRawItems = [];

                    fbDeals.forEach(deal => {
                        if (deal.deleted === true) { binned.push(deal); return; }
                        activeRawItems.push(deal);
                        const name = deal.name || 'Unknown';
                        const numPrice = parseFloat(deal.price) || 0;
                        const numCashback = deal.cashbackUsed ? (parseFloat(deal.cashbackAmount) || 0) : 0;
                        const totalPrice = Math.max(0, numPrice - numCashback);
                        const unitQty = parseInt(deal.unitQuantity) || 1;
                        const ppu = totalPrice / unitQty;
                        deal.ppu = ppu;

                        if (!grouped[name]) {
                            grouped[name] = {
                                id: deal.id, name, brand: deal.brand,
                                masterImage: deal.masterImage || '',
                                postsCount: 1,
                                lowestPrice: deal.price, highestPrice: deal.price,
                                lowestPpu: ppu, highestPpu: ppu,
                                unitType: deal.unitType || 'ชิ้น',
                                description: deal.description || '',
                                latestUpdated: deal.lastUpdated || 0,
                                originalItems: [deal]
                            };
                        } else {
                            grouped[name].postsCount += 1;
                            grouped[name].originalItems.push(deal);
                            grouped[name].lowestPrice = Math.min(grouped[name].lowestPrice, deal.price);
                            grouped[name].highestPrice = Math.max(grouped[name].highestPrice, deal.price);
                            grouped[name].lowestPpu = Math.min(grouped[name].lowestPpu, ppu);
                            grouped[name].highestPpu = Math.max(grouped[name].highestPpu, ppu);
                            // track the latest update across all items in group
                            if ((deal.lastUpdated || 0) > grouped[name].latestUpdated) {
                                grouped[name].latestUpdated = deal.lastUpdated || 0;
                            }
                            if (deal.masterImage && !grouped[name].masterImage) grouped[name].masterImage = deal.masterImage;
                            if (deal.description && !grouped[name].description) grouped[name].description = deal.description;
                        }
                    });

                    setDeals(Object.values(grouped));
                    setRawItems(activeRawItems);
                    setDeletedItems(binned);
                });

                const storesUnsub = onSnapshot(collection(db, "stores"), (snapshot) => {
                    setStores(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const reportsUnsub = onSnapshot(query(collection(db, "reports"), orderBy("createdAt", "desc")), (snapshot) => {
                    setReports(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const variantsUnsub = onSnapshot(collection(db, "variantGroups"), (snapshot) => {
                    setVariantGroups(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const categoriesUnsub = onSnapshot(collection(db, "categories"), (snapshot) => {
                    setCategories(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                const newsUnsub = onSnapshot(query(collection(db, "adminNews"), orderBy("createdAt", "desc")), (snapshot) => {
                    setSubmittedNews(snapshot.docs.map(doc => ({ id: doc.id, text: doc.data().text, createdAt: doc.data().createdAt })));
                });

                return () => { unsubscribe(); storesUnsub(); reportsUnsub(); variantsUnsub(); categoriesUnsub(); newsUnsub(); };
            }, []);

            /* ── category assign save handler ── */
            const handleAssignCategory = async (productName, selectedIds, newCatName) => {
                try {
                    const ops = [];
                    for (const id of selectedIds) {
                        const cat = categories.find(c => c.id === id);
                        if (!cat) continue;
                        const existing = cat.items || [];
                        if (!existing.includes(productName)) {
                            ops.push(updateDoc(doc(db, "categories", id), { items: [...existing, productName] }));
                        }
                    }
                    for (const cat of categories) {
                        if (selectedIds.includes(cat.id)) continue;
                        const existing = cat.items || [];
                        if (existing.includes(productName)) {
                            ops.push(updateDoc(doc(db, "categories", cat.id), { items: existing.filter(n => n !== productName) }));
                        }
                    }
                    if (newCatName) {
                        ops.push(addDoc(collection(db, "categories"), { name: newCatName, items: [productName] }));
                    }
                    await Promise.all(ops);
                } catch (e) { alert("เกิดข้อผิดพลาด: " + e.message); }
                setAssignCatProduct(null);
            };

            /* ── NEW: remove item from category ── */
            const handleRemoveFromCategory = async (categoryId, currentItems, productName) => {
                try {
                    await updateDoc(doc(db, "categories", categoryId), {
                        items: currentItems.filter(n => n !== productName)
                    });
                    // Update the local viewingCategoryItems to reflect change immediately in modal
                    setViewingCategoryItems(prev => prev ? {
                        ...prev,
                        items: (prev.items || []).filter(n => n !== productName)
                    } : null);
                } catch (e) { alert("เกิดข้อผิดพลาด: " + e.message); }
            };

            const handleSaveImage = async (dealGroup) => {
                try {
                    await Promise.all(dealGroup.originalItems.map(item => updateDoc(doc(db, "items", item.id), { masterImage: newImageUrl })));
                    setEditingId(null); setNewImageUrl('');
                } catch (e) { alert("Failed to update image."); }
            };

            const handleDeleteImage = async (dealGroup) => {
                if (!confirm('ยืนยันลบรูปภาพสินค้านี้?')) return;
                try {
                    await Promise.all(dealGroup.originalItems.map(item => updateDoc(doc(db, "items", item.id), { masterImage: '' })));
                } catch (e) { alert("Failed to delete image."); }
            };

            const handleDeletePost = (id, itemName) => setDeleteModalTarget({ type: 'post', id, itemName });
            const handleDeleteGroup = (dealGroup) => setDeleteModalTarget({ type: 'group', group: dealGroup, itemName: dealGroup.name });

            const confirmDelete = async () => {
                if (!deleteModalTarget) return;
                try {
                    await updateDoc(doc(db, "items", deleteModalTarget.itemId), { deleted: true });
                    setDeleteModalTarget(null);
                } catch (e) { alert("Failed to delete."); }
            };

            const handleRecoverPost = async (itemId) => {
                if (!confirm('ต้องการกู้คืนโพสต์นี้หรือไม่?')) return;
                try { await updateDoc(doc(db, "items", itemId), { deleted: false }); }
                catch (e) { alert("Failed to recover item."); }
            };

            const handlePermanentDeletePost = async (itemId) => {
                if (!confirm('ยืนยัน! ต้องการลบโพสต์นี้ ❝ถาวร❞ หรือไม่? (ไม่สามารถกู้คืนได้)')) return;
                try {
                    const itemDoc = deletedItems.find(i => i.id === itemId);
                    if (itemDoc && itemDoc.name) {
                        const allGroupItems = rawItems.filter(i => i.name === itemDoc.name);
                        if (allGroupItems.length <= 1) {
                            const vg = variantGroups.find(g => g.items && g.items.includes(itemDoc.name));
                            if (vg) {
                                const newItems = vg.items.filter(n => n !== itemDoc.name);
                                await updateDoc(doc(db, "variantGroups", vg.id), { items: newItems });
                            }
                        }
                    }
                    await deleteDoc(doc(db, "items", itemId));
                    setSelectedBinItems(prev => prev.filter(id => id !== itemId));
                } catch (e) { alert("Failed to delete permanently."); console.error(e); }
            };

            const handleBatchPermanentDeleteItems = async () => {
                if (selectedBinItems.length === 0) return;
                if (!confirm(`ยืนยัน! ต้องการลบข้อมูลที่เลือกทั้ง ${selectedBinItems.length} รายการ ❝ถาวร❞ หรือไม่?`)) return;
                try {
                    await Promise.all(selectedBinItems.map(id => handlePermanentDeletePost(id)));
                    setSelectedBinItems([]);
                } catch (e) { alert("Failed to batch delete items."); }
            };

            const handleRecoverReport = async (reportId) => {
                if (!confirm('ต้องการกู้คืนรายงานนี้หรือไม่?')) return;
                try { await updateDoc(doc(db, "reports", reportId), { deleted: false }); }
                catch (e) { alert("Failed to recover report."); }
            };

            const handlePermanentDeleteReport = async (reportId) => {
                if (!confirm('ยืนยัน! ต้องการลบรายงานนี้ ❝ถาวร❞ หรือไม่? (ไม่สามารถกู้คืนได้)')) return;
                try {
                    await deleteDoc(doc(db, "reports", reportId));
                    setSelectedBinReports(prev => prev.filter(id => id !== reportId));
                } catch (e) { alert("Failed to delete report permanently."); }
            };

            const handleBatchPermanentDeleteReports = async () => {
                if (selectedBinReports.length === 0) return;
                if (!confirm(`ยืนยัน! ต้องการลบรายงานที่เลือกทั้ง ${selectedBinReports.length} รายการ ❝ถาวร❞ หรือไม่?`)) return;
                try {
                    await Promise.all(selectedBinReports.map(id => deleteDoc(doc(db, "reports", id))));
                    setSelectedBinReports([]);
                } catch (e) { alert("Failed to batch delete reports."); }
            };

            const handleSaveDesc = async (dealGroup) => {
                try {
                    await Promise.all(dealGroup.originalItems.map(item => updateDoc(doc(db, "items", item.id), { description: newDesc })));
                    setEditingDescId(null); setNewDesc('');
                } catch (e) { alert("Failed to update description."); }
            };

            const handleSaveName = async (dealGroup) => {
                if (!newName.trim()) { alert('ชื่อสินค้าไม่สามารถเว้นว่างได้'); return; }
                if (!confirm(`ยืนยันการเปลี่ยนชื่อ "${dealGroup.name}" → "${newName}" ?`)) return;
                try {
                    await Promise.all(dealGroup.originalItems.map(item => updateDoc(doc(db, "items", item.id), { name: newName })));
                    setEditingNameId(null); setNewName('');
                } catch (e) { alert("Failed to update name."); }
            };

            const handleSaveUnit = async (item) => {
                const qtyValue = parseInt(newUnitQty);
                if (isNaN(qtyValue) || !newUnitType.trim()) { alert('กรุณาระบุจำนวนและประเภทหน่วยให้ครบถ้วน'); return; }
                try {
                    await updateDoc(doc(db, "items", item.id), { unitQuantity: qtyValue, unitType: newUnitType.trim() });
                    setEditingUnitItemId(null);

            const handleSaveStore = async (itemId) => {
                try {
                    await updateDoc(doc(db, "items", itemId), { store: editStoreValue });

            const handleAddAdminTag = async (itemId, existingTags) => {
                const val = adminTagValue.trim().replace(',', '').toLowerCase();

                try {
                    await updateDoc(doc(db, "items", itemId), { tags: updatedTags });
                    setAdminTagItemId(null); setAdminTagValue('');
                } catch (e) { alert("Failed to add tag."); }

            const handleRemoveTag = async (itemId, existingTags, tagToRemove) => {
                try { await updateDoc(doc(db, "items", itemId), { tags: (existingTags || []).filter(t => t !== tagToRemove) }); }
                catch (e) { console.error(e); }
            };

            const handleMoveItem = async (itemId) => {
                if (!moveTargetName) { alert('กรุณาเลือกสินค้าปลายทาง'); return; }
                if (!confirm(`ย้ายรายการนี้ไปกลุ่ม "${moveTargetName}" ?`)) return;
                try {
                    await updateDoc(doc(db, "items", itemId), { name: moveTargetName });
                    setMoveItemId(null); setMoveTargetName('');
