        const firebaseConfig = {

        function StoreLogo({ logoUrl, storeName, size = 'md', className = '' }) {
            const sizeMap = {
                xs: 'w-6 h-6', sm: 'w-8 h-8', md: 'w-10 h-10',
                lg: 'w-16 h-16', xl: 'w-20 h-20', '2xl': 'w-24 h-24',
            };
            const iconSizeMap = { xs: 12, sm: 14, md: 18, lg: 24, xl: 32, '2xl': 40 };
            const box = sizeMap[size] || sizeMap.md;
            const iconSz = iconSizeMap[size] || 18;

            if (logoUrl) {
                return (
                    <div className={`${box} rounded-xl bg-white border border-gray-100 flex items-center justify-center overflow-hidden shadow-sm flex-shrink-0 ${className}`}>
                        <img src={logoUrl} alt={storeName} className="w-full h-full object-contain p-0.5"
                            onError={e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                        <div style={{ display: 'none' }} className="w-full h-full items-center justify-center bg-orange-50 text-orange-400">
                            <Store size={iconSz} />
                        </div>
                    </div>
                );
            }
            return (
                <div className={`${box} rounded-xl bg-orange-50 border border-orange-100 flex items-center justify-center text-orange-400 shadow-sm flex-shrink-0 ${className}`}>
                    <Store size={iconSz} />
                </div>
            );
        }

        function LogoUploadSection({ currentLogoUrl, onLogoChange }) {
            const fileInputRef = useRef(null);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new window.Image();
                    img.onload = () => {
                        const MAX = 400;
                        let w = img.width, h = img.height;
                        if (w > MAX || h > MAX) {
                            if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
                            else { w = Math.round(w * MAX / h); h = MAX; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(0, 0, w, h);
                        ctx.drawImage(img, 0, 0, w, h);
                        onLogoChange(canvas.toDataURL('image/png', 0.92));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            };

            return (
                <div className="space-y-2">
                    <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">โลโก้ร้าน (Logo)</label>
                    <div className="flex items-start gap-4">
                        <div className="w-24 h-24 rounded-2xl border-2 border-dashed border-gray-200 bg-gray-50 flex items-center justify-center overflow-hidden flex-shrink-0 shadow-inner">
                            {currentLogoUrl ? (
                                <img src={currentLogoUrl} alt="logo preview" className="w-full h-full object-contain p-1" />
                            ) : (
                                <div className="flex flex-col items-center text-gray-300 gap-1">
                                    <Store size={28} />
                                    <span className="text-[9px] font-bold uppercase tracking-widest">No Logo</span>
                                </div>
                            )}
                        </div>
                        <div className="flex-1 space-y-2">
                            <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFile} className="hidden" />
                            <button type="button" onClick={() => fileInputRef.current?.click()}
                                className="w-full py-2.5 border-2 border-dashed border-orange-300 bg-orange-50 hover:bg-orange-100 text-orange-600 font-bold text-xs rounded-xl flex items-center justify-center gap-2 transition-colors active:scale-95">
                                <Upload size={14} /> อัพโหลดโลโก้
                            </button>
                            {currentLogoUrl && (
                                <button type="button" onClick={() => onLogoChange('')}
                                    className="w-full py-2 text-xs font-bold text-red-400 hover:text-red-600 border border-red-100 rounded-xl hover:bg-red-50 transition-colors">
                                    ลบโลโก้
                                </button>
                            )}
                            <p className="text-[9px] text-gray-400 leading-relaxed">
                                รองรับ PNG, JPG, WebP · ระบบจะปรับขนาดโดยอัตโนมัติ · รองรับทุก aspect ratio
                            </p>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminApp() {
            const [deals, setDeals] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [newImageUrl, setNewImageUrl] = useState('');
            const [editingDescId, setEditingDescId] = useState(null);
            const [newDesc, setNewDesc] = useState('');
            const [expandedGroups, setExpandedGroups] = useState([]);

            const [adminTab, setAdminTab] = useState('dashboard');
            const [selectedForMerge, setSelectedForMerge] = useState([]);
            const [showMergeModal, setShowMergeModal] = useState(false);
            const [isDeleteMode, setIsDeleteMode] = useState(false);

            const [rawItems, setRawItems] = useState([]);
            const [deletedItems, setDeletedItems] = useState([]);
            const [deleteModalTarget, setDeleteModalTarget] = useState(null);

            const [editingStoreItemId, setEditingStoreItemId] = useState(null);
            const [editStoreValue, setEditStoreValue] = useState('');
            const [storeSearchQuery, setStoreSearchQuery] = useState('');
            const [moveItemId, setMoveItemId] = useState(null);
            const [moveTargetName, setMoveTargetName] = useState('');
            const [adminTagItemId, setAdminTagItemId] = useState(null);
            const [adminTagValue, setAdminTagValue] = useState('');

            const [editingNameId, setEditingNameId] = useState(null);
            const [newName, setNewName] = useState('');
            const [stores, setStores] = useState([]);
            const [editingStoreDetail, setEditingStoreDetail] = useState(null);
            const [showStoreModal, setShowStoreModal] = useState(false);

            const [storeSortMode, setStoreSortMode] = useState('newest');
            const [expandedStores, setExpandedStores] = useState([]);
            const [relatingStore, setRelatingStore] = useState(null);
            const [relateSearchQuery, setRelateSearchQuery] = useState('');

            const [mergeFinalName, setMergeFinalName] = useState('');
            const [mergeFinalImage, setMergeFinalImage] = useState('');

            const toggleExpand = (groupId) => {
                setExpandedGroups(prev =>
                    prev.includes(groupId) ? prev.filter(id => id !== groupId) : [...prev, groupId]
                );
            };

            useEffect(() => {
                const q = query(collection(db, "items"), orderBy("lastUpdated", "desc"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const fbDeals = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const grouped = {};
                    const binned = [];
                    const activeRawItems = [];

                    fbDeals.forEach(deal => {
                        if (deal.deleted === true) { binned.push(deal); return; }
                        activeRawItems.push(deal);
                        const name = deal.name || 'Unknown';
                        const numPrice = parseFloat(deal.price) || 0;
                        const numCashback = deal.cashbackUsed ? (parseFloat(deal.cashbackAmount) || 0) : 0;
                        const totalPrice = Math.max(0, numPrice - numCashback);
                        const unitQty = parseInt(deal.unitQuantity) || 1;
                        const ppu = totalPrice / unitQty;
                        deal.ppu = ppu;

                        if (!grouped[name]) {
                            grouped[name] = {
                                id: deal.id, name, brand: deal.brand,
                                masterImage: deal.masterImage || '',
                                postsCount: 1,
                                lowestPrice: deal.price, highestPrice: deal.price,
                                lowestPpu: ppu, highestPpu: ppu,
                                unitType: deal.unitType || 'ชิ้น',
                                description: deal.description || '',
                                originalItems: [deal]
                            };
                        } else {
                            grouped[name].postsCount += 1;
                            grouped[name].originalItems.push(deal);
                            grouped[name].lowestPrice = Math.min(grouped[name].lowestPrice, deal.price);
                            grouped[name].highestPrice = Math.max(grouped[name].highestPrice, deal.price);
                            grouped[name].lowestPpu = Math.min(grouped[name].lowestPpu, ppu);
                            grouped[name].highestPpu = Math.max(grouped[name].highestPpu, ppu);
                            if (deal.masterImage && !grouped[name].masterImage) grouped[name].masterImage = deal.masterImage;
                            if (deal.description && !grouped[name].description) grouped[name].description = deal.description;
                        }
                    });

                    setDeals(Object.values(grouped));
                    setRawItems(activeRawItems);
                    setDeletedItems(binned);
                });

                const storesUnsub = onSnapshot(collection(db, "stores"), (snapshot) => {
                    setStores(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });

                return () => { unsubscribe(); storesUnsub(); };
            }, []);

            const handleSaveImage = async (dealGroup) => {
                try {
                    await Promise.all(dealGroup.originalItems.map(item =>
                        updateDoc(doc(db, "items", item.id), { masterImage: newImageUrl })
                    ));
                    setEditingId(null); setNewImageUrl('');
                } catch (e) { alert("Failed to update image."); }
            };

            const handleDeleteImage = async (dealGroup) => {
                if (!confirm('ยืนยันลบรูปภาพสินค้านี้?')) return;
                try {
                    await Promise.all(dealGroup.originalItems.map(item =>
                        updateDoc(doc(db, "items", item.id), { masterImage: '' })
                    ));
                } catch (e) { alert("Failed to delete image."); }
            };

            const handleDeletePost = (id, itemName) => setDeleteModalTarget({ type: 'post', id, itemName });
            const handleDeleteGroup = (dealGroup) => setDeleteModalTarget({ type: 'group', group: dealGroup, itemName: dealGroup.name });

            const confirmDelete = async () => {
                if (!deleteModalTarget) return;
                try {
                    if (deleteModalTarget.type === 'post') {
                        await updateDoc(doc(db, "items", deleteModalTarget.id), { deleted: true });
                    } else {
                        await Promise.all(deleteModalTarget.group.originalItems.map(item =>
                            updateDoc(doc(db, "items", item.id), { deleted: true })
                        ));
                    }
                    setDeleteModalTarget(null);
                } catch (e) { alert("เกิดข้อผิดพลาดในการลบข้อมูล"); }
            };

            const handleRecoverPost = async (id) => {
                try { await updateDoc(doc(db, "items", id), { deleted: false }); }
                catch (e) { alert("เกิดข้อผิดพลาดในการกู้คืน"); }
            };

            const handlePermanentDeletePost = async (id) => {
                if (!confirm('ยืนยันที่จะลบข้อมูลนี้ถาวร? (ไม่สามารถกู้คืนได้)')) return;
                try { await deleteDoc(doc(db, "items", id)); }
                catch (e) { alert("เกิดข้อผิดพลาดในการลบแบบถาวร"); }
            };

            const handleSaveDesc = async (dealGroup) => {
                try {
                    await Promise.all(dealGroup.originalItems.map(item =>
                        updateDoc(doc(db, "items", item.id), { description: newDesc })
                    ));
                    setEditingDescId(null); setNewDesc('');
                } catch (e) { alert("Failed to update description."); }
            };

            const handleSaveName = async (dealGroup) => {
                if (!newName.trim()) { alert('ชื่อสินค้าไม่สามารถเว้นว่างได้'); return; }
                if (!confirm(`ยืนยันการเปลี่ยนชื่อ "${dealGroup.name}" → "${newName}" ?`)) return;
                try {
                    await Promise.all(dealGroup.originalItems.map(item =>
                        updateDoc(doc(db, "items", item.id), { name: newName })
                    ));
                    setEditingNameId(null); setNewName('');
                } catch (e) { alert("Failed to update name."); }
            };

            const handleSaveStore = async (itemId) => {
                try {
                    await updateDoc(doc(db, "items", itemId), { store: editStoreValue });
                    setEditingStoreItemId(null); setEditStoreValue(''); setStoreSearchQuery('');
                } catch (e) { alert("Failed to update store."); }
            };

            const handleAddAdminTag = async (itemId, existingTags) => {
                const val = adminTagValue.trim().replace(',', '').toLowerCase();
                if (!val) return;
                const updatedTags = [...(existingTags || []), val].filter((t, i, a) => a.indexOf(t) === i);
                try {
                    await updateDoc(doc(db, "items", itemId), { tags: updatedTags });
                    setAdminTagItemId(null); setAdminTagValue('');
                } catch (e) { alert("Failed to add tag."); }
            };

            const handleRemoveTag = async (itemId, existingTags, tagToRemove) => {
                try {
                    await updateDoc(doc(db, "items", itemId), {
                        tags: (existingTags || []).filter(t => t !== tagToRemove)
                    });
                } catch (e) { console.error(e); }
            };

            const handleMoveItem = async (itemId) => {
                if (!moveTargetName) { alert('กรุณาเลือกสินค้าปลายทาง'); return; }
                if (!confirm(`ย้ายรายการนี้ไปกลุ่ม "${moveTargetName}" ?`)) return;
                try {
                    await updateDoc(doc(db, "items", itemId), { name: moveTargetName });
                    setMoveItemId(null); setMoveTargetName('');
                } catch (e) { alert("Failed to move item."); }
            };

            const handleSetAdminStatus = async (itemId, status) => {
                try { await updateDoc(doc(db, "items", itemId), { adminStatus: status }); }
                catch (e) { alert("Failed to update status."); }
            };

            const handleUpdateStoreDetail = async (e) => {
                e.preventDefault();
                const { name, originalName, mapsUrl, province, phone, isVisible, logoUrl, isOfficial, manualAliases } = editingStoreDetail;
                let newAliases = [];
                if (manualAliases) {
                    newAliases = manualAliases.split(',').map(s => s.trim()).filter(Boolean);
                }
                const payload = {
                    mapsUrl: mapsUrl || "", province: province || "", phone: phone || "",
                    isVisible: isVisible !== false, isOfficial: !!isOfficial,
                    logoUrl: logoUrl || "", lastUpdated: Date.now()
                };
                const existingStore = stores.find(s => s.id === (originalName || name));
                const existingAliases = existingStore?.aliases || [];
                payload.aliases = [...new Set([...existingAliases, ...newAliases])];

                try {
                    if (originalName && originalName !== name) {
                        if (confirm(`คุณกำลังเปลี่ยนชื่อร้านจาก "${originalName}" เป็น "${name}"\nรายการสินค้าทั้งหมดจะถูกย้ายไปด้วย ยืนยันหรือไม่?`)) {
                            await setDoc(doc(db, "stores", name), payload);
                            const itemsToUpdate = rawItems.filter(i => i.store === originalName);
                            await Promise.all(itemsToUpdate.map(item =>
                                updateDoc(doc(db, "items", item.id), { store: name })
                            ));
                            await deleteDoc(doc(db, "stores", originalName));
                        }
                    } else {
                        await setDoc(doc(db, "stores", name), payload, { merge: true });
                    }
                } catch (err) {
                    console.error(err);
                    alert("Failed to save store details: " + err.message);
                    return;
                }
                setShowStoreModal(false);
                setEditingStoreDetail(null);
            };

            const handleRelateStore = async (wrongName, canonicalName) => {
                if (!wrongName || !canonicalName) return;
                const cleanWrong = wrongName.trim();
                const cleanCanonical = canonicalName.trim();
                if (cleanWrong.toLowerCase() === cleanCanonical.toLowerCase()) return;
                if (!confirm(`เชื่อมร้าน "${cleanWrong}" → "${cleanCanonical}"\nรายการทั้งหมดจาก "${cleanWrong}" จะถูกย้ายไป "${cleanCanonical}"\nและ "${cleanWrong}" จะถูกบันทึกเป็นชื่อเก่า (alias)`)) return;
                try {
                    const canonicalMeta = stores.find(s => s.id === cleanCanonical) || {};
                    const existingAliases = canonicalMeta.aliases || [];
                    const newAliases = [...new Set([...existingAliases, cleanWrong])];
                    await setDoc(doc(db, 'stores', cleanCanonical), {
                        ...canonicalMeta, aliases: newAliases,
                        adminStoreUpdatedAt: Date.now(), lastUpdated: Date.now(),
                    }, { merge: true });
                    const itemsToUpdate = rawItems.filter(i => (i.store || "").trim().toLowerCase() === cleanWrong.toLowerCase());
                    await Promise.all(itemsToUpdate.map(item =>
                        updateDoc(doc(db, 'items', item.id), { store: cleanCanonical })
                    ));
                    const wrongMeta = stores.find(s => s.id.trim().toLowerCase() === cleanWrong.toLowerCase());
                    if (wrongMeta) {
                        const wrongAliases = wrongMeta.aliases || [];
                        if (wrongAliases.length > 0) {
                            const mergedAliases = [...new Set([...newAliases, ...wrongAliases])];
                            await setDoc(doc(db, 'stores', cleanCanonical), { aliases: mergedAliases }, { merge: true });
                        }
                        await deleteDoc(doc(db, 'stores', wrongMeta.id));
                    }
                    setRelatingStore(null);
                } catch (e) {
                    console.error(e);
                    alert('เกิดข้อผิดพลาดในการเชื่อมร้าน: ' + e.message);
                }
            };

            const handleRemoveAlias = async (storeName, aliasToRemove) => {
                if (!confirm(`ต้องการลบชื่อเก่า (alias) "${aliasToRemove}" ออกจากร้าน "${storeName}" หรือไม่?`)) return;
                try {
                    const storeMeta = stores.find(s => s.id === storeName) || {};
                    const existingAliases = storeMeta.aliases || [];
                    const newAliases = existingAliases.filter(a => a !== aliasToRemove);
                    await updateDoc(doc(db, 'stores', storeName), { aliases: newAliases, adminStoreUpdatedAt: Date.now() });
                } catch (e) { alert("Failed to remove alias: " + e.message); }
            };

            const toggleMergeSelection = (groupId) => {
                setSelectedForMerge(prev =>
                    prev.includes(groupId) ? prev.filter(id => id !== groupId) : [...prev, groupId]
                );
            };

            useEffect(() => {
                if (showMergeModal && selectedForMerge.length > 0) {
                    const sel = deals.filter(d => selectedForMerge.includes(d.id));
                    if (sel.length > 0) setMergeFinalName(sel[0].name);
                }
            }, [showMergeModal]);

            const handleMergeConfirm = async () => {
                if (!mergeFinalName) { alert('กรุณาระบุชื่อสินค้า Final'); return; }
                try {
                    const selGroups = deals.filter(d => selectedForMerge.includes(d.id));
                    let allIds = [];
                    selGroups.forEach(g => g.originalItems.forEach(item => allIds.push(item.id)));
                    await Promise.all(allIds.map(id =>
                        updateDoc(doc(db, "items", id), { name: mergeFinalName, masterImage: mergeFinalImage })
                    ));
                    setSelectedForMerge([]); setShowMergeModal(false);
                    setMergeFinalName(''); setMergeFinalImage('');
                    alert('รวมข้อมูลเสร็จสิ้น!');
                    setAdminTab('dashboard');
                } catch (e) { alert("Error merging docs: " + e.message); }
            };

            const storeAliasMap = {};
            stores.forEach(s => {
                if (s.aliases && s.aliases.length > 0) {
                    s.aliases.forEach(alias => { storeAliasMap[alias.toLowerCase().trim()] = s.id; });
                }
            });
            const resolveStoreName = (name) => {
                if (!name) return name;
                return storeAliasMap[name.toLowerCase().trim()] || name.trim();
            };

            const filteredDeals = deals.filter(deal =>
                (deal.name || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
                (deal.brand || '').toLowerCase().includes(searchQuery.toLowerCase())
            );
            const uniqueProductNames = [...new Set(deals.map(d => d.name))].sort();
            const allStoreNamesRaw = [...new Set(rawItems.map(i => resolveStoreName(i.store)).filter(Boolean))];

            const allStoreNames = (() => {
                const names = [...allStoreNamesRaw];
                if (storeSortMode === 'alphabet') return names.sort((a, b) => a.localeCompare(b, 'th'));
                if (storeSortMode === 'adminUpdated') {
                    return names.sort((a, b) => {
                        const metaA = stores.find(s => s.id === a) || {};
                        const metaB = stores.find(s => s.id === b) || {};
                        return (metaB.adminStoreUpdatedAt || 0) - (metaA.adminStoreUpdatedAt || 0);
                    });
                }
                return names.sort((a, b) => {
                    const latestA = Math.max(...rawItems.filter(i => i.store === a).map(i => i.lastUpdated || 0));
                    const latestB = Math.max(...rawItems.filter(i => i.store === b).map(i => i.lastUpdated || 0));
                    return latestB - latestA;
                });
            })();
            const pendingItems = rawItems.filter(i => i.adminStatus !== 'approved');

            // ── Compute colSpan for the expanded sub-row based on current tab ──
            const getExpandedColSpan = () => {
                if (adminTab === 'manage') return isDeleteMode ? 4 : 3;
                if (adminTab === 'merge') return 5;
                return 4; // dashboard
            };

            return (

                                                        <div className="mt-1 flex flex-wrap items-center gap-2 text-[10px] text-gray-400">
                                                            <span>{item.lastUpdated ? new Date(item.lastUpdated).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-'}</span>
                                                            {item.shippingType === 'excluded' && item.shippingFee > 0 && <span className="text-blue-500">+ค่าส่ง ฿{item.shippingFee}</span>}
                                                            {item.cashbackUsed && <span className="text-green-600">cashback ฿{item.cashbackAmount}</span>}
                                                            {item.promoCodeUsed && item.promoCode && <span className="text-blue-600">promo: {item.promoCode}</span>}
                                                            {item.adminStatus === 'disapproved' && <span className="text-red-500 font-bold">✗ ไม่อนุมัติ</span>}
                                                        </div>
                                                        <div className="mt-3 border-t border-gray-100 pt-2">
                                                            {moveItemId === item.id ? (
                                                                <div className="flex items-center gap-2">
                                                                    <select value={moveTargetName} onChange={e => setMoveTargetName(e.target.value)}
                                                                        className="flex-1 text-xs p-1.5 border border-blue-300 rounded focus:border-blue-500 focus:outline-none bg-white">
                                                                        <option value="">-- เลือกกลุ่มสินค้าปลายทาง --</option>
                                                                        {uniqueProductNames.filter(n => n !== item.name).map(n => <option key={n} value={n}>{n}</option>)}
                                                                    </select>
                                                                    <button onClick={() => handleMoveItem(item.id)} className="bg-blue-500 text-white text-[10px] px-2 py-1 rounded font-bold flex items-center gap-1"><ArrowRight size={12} /> ย้าย</button>
                                                                    <button onClick={() => { setMoveItemId(null); setMoveTargetName(''); }} className="bg-gray-200 text-gray-600 text-[10px] px-2 py-1 rounded font-bold">ยกเลิก</button>
                                                                </div>
                                                            ) : (
                                                                <button onClick={() => setMoveItemId(item.id)} className="text-[10px] text-blue-500 hover:text-blue-700 font-bold flex items-center gap-1">
                                                                    <ArrowRight size={12} /> ย้ายไปกลุ่มอื่น
                                                                </button>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <button onClick={() => handleSetAdminStatus(item.id, item.adminStatus === 'disapproved' ? '' : 'disapproved')}
                                                className={`flex-shrink-0 w-10 flex items-center justify-center transition-colors ${item.adminStatus === 'disapproved' ? 'bg-red-500 text-white' : 'bg-red-100 text-red-400 hover:bg-red-200'}`}>
                                                <XCircle size={18} />
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* ========== BIN TAB ========== */}
                        {adminTab === 'bin' && (
                            <div className="space-y-3">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2"><Trash2 size={20} className="text-gray-500" /> ถังขยะ (รายการที่ถูกลบ)</h2>
                                    <span className="text-sm text-gray-400">{deletedItems.length} รายการในถังขยะ</span>
                                </div>
                                {deletedItems.length === 0 ? (
                                    <div className="text-center text-gray-400 py-16 bg-white rounded-xl border border-gray-200 border-dashed">
                                        <Trash2 size={48} className="mx-auto mb-3 text-gray-200" />
                                        <p className="text-gray-500 font-bold">ถังขยะว่างเปล่า</p>
                                        <p className="text-xs text-gray-400 mt-1">ไม่มีข้อมูลที่ถูกลบในขณะนี้</p>
                                    </div>
                                ) : deletedItems.map(item => {
                                    const storeMeta = stores.find(s => s.id === item.store) || {};
                                    return (
                                        <div key={item.id} className="rounded-xl shadow-sm border border-gray-200 bg-white flex overflow-hidden opacity-75 hover:opacity-100 transition-opacity grayscale hover:grayscale-0">
                                            <button onClick={() => handleRecoverPost(item.id)}
                                                className="flex-shrink-0 w-12 flex flex-col items-center justify-center bg-green-50 text-green-600 hover:bg-green-500 hover:text-white border-r border-gray-100 transition-colors"
                                                title="กู้คืนข้อมูลนี้">
                                                <RefreshCw size={16} strokeWidth={2.5} className="mb-1" />
                                                <span className="text-[9px] font-bold">กู้คืน</span>
                                            </button>
                                            <div className="flex-1 p-4">
                                                <div className="flex gap-4">
                                                    <div className="w-16 h-16 rounded-lg bg-gray-100 flex-shrink-0 overflow-hidden border border-gray-200">
                                                        {item.image ? <img src={item.image} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-gray-300"><ImageIcon size={20} /></div>}
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <div className="flex items-start justify-between gap-2">
                                                            <div>
                                                                <div className="font-bold text-gray-800 text-sm line-through decoration-red-400">{item.name}</div>
                                                                {item.brand && <div className="text-[10px] text-gray-500 uppercase tracking-wider">{item.brand}</div>}
                                                            </div>
                                                            <div className="text-right flex-shrink-0">
                                                                <div className="font-bold text-gray-500 text-sm">฿{item.price}</div>
                                                                <div className="text-[10px] text-gray-400">{item.unitQuantity || 1} {item.unitType || 'ชิ้น'}</div>
                                                            </div>
                                                        </div>
                                                        <div className="mt-2 flex items-center gap-2">
                                                            <StoreLogo logoUrl={storeMeta.logoUrl} storeName={item.store} size="xs" />
                                                            <span className="text-xs text-gray-500">{item.store || 'ไม่ระบุร้าน'}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <button onClick={() => handlePermanentDeletePost(item.id)}
                                                className="flex-shrink-0 w-12 flex flex-col items-center justify-center bg-red-50 text-red-600 hover:bg-red-600 hover:text-white border-l border-gray-100 transition-colors"
                                                title="ลบถาวร">
                                                <Trash2 size={16} className="mb-1" />
                                                <span className="text-[9px] font-bold">ลบถาวร</span>
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {/* Merge float button */}
                        {adminTab === 'merge' && selectedForMerge.length >= 2 && (
                            <div className="fixed bottom-10 inset-x-0 flex justify-center z-20 animate-fade-in pointer-events-none">
                                <button onClick={() => setShowMergeModal(true)}
                                    className="bg-orange-600 hover:bg-orange-700 text-white px-8 py-4 rounded-full shadow-2xl font-bold text-lg flex items-center gap-3 transition-transform hover:scale-105 pointer-events-auto">
                                    <CheckSquare size={24} /> รวมข้อมูล {selectedForMerge.length} รายการที่เลือก
                                </button>
                            </div>
                        )}

                        {/* Delete confirmation modal */}
                        {deleteModalTarget && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl flex flex-col">
                                    <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-red-50">
                                        <h2 className="text-xl font-bold flex items-center gap-2 text-red-600"><AlertCircle className="text-red-500" /> ยืนยันการลบข้อมูล</h2>
                                        <button onClick={() => setDeleteModalTarget(null)} className="text-gray-400 hover:text-gray-600"><X size={24} /></button>
                                    </div>
                                    <div className="p-6 space-y-4">
                                        <p className="text-gray-600">คุณแน่ใจหรือไม่ว่าต้องการลบ <strong>{deleteModalTarget.itemName}</strong>?</p>
                                        <p className="text-xs text-gray-500 bg-gray-50 p-3 rounded-lg border border-gray-100">
                                            ข้อมูลนี้จะถูกย้ายไปที่ <Trash2 size={12} className="inline mr-1" /><strong>ถังขยะ</strong> คุณสามารถกู้คืนได้ภายหลัง
                                        </p>
                                    </div>
                                    <div className="p-6 border-t border-gray-100 bg-slate-50 flex justify-end gap-3">
                                        <button onClick={() => setDeleteModalTarget(null)} className="px-6 py-2.5 rounded-lg font-bold text-gray-600 bg-white border border-gray-200 shadow-sm hover:bg-gray-50">ยกเลิก</button>
                                        <button onClick={confirmDelete} className="px-6 py-2.5 rounded-lg font-bold text-white bg-red-500 hover:bg-red-600 shadow-md flex items-center gap-2"><Trash2 size={18} /> ลบข้อมูล</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Merge modal */}
                        {showMergeModal && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                                    <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-slate-50">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><RefreshCw className="text-orange-500" /> ยืนยันการรวมข้อมูล ({selectedForMerge.length} กลุ่ม)</h2>
                                        <button onClick={() => setShowMergeModal(false)} className="text-gray-400 hover:text-gray-600"><X size={24} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto flex-1 space-y-6">
                                        <div className="space-y-2">
                                            <label className="font-bold text-gray-700 text-sm">ชื่อสินค้าที่ถูกต้อง (Final Name)</label>
                                            <p className="text-xs text-gray-500 mb-2">เมื่อกดยืนยัน ข้อมูลที่เลือกทั้งหมดจะถูกเปลี่ยนเป็นชื่อนี้</p>
                                            <input type="text" value={mergeFinalName} onChange={e => setMergeFinalName(e.target.value)}
                                                className="w-full p-3 border-2 border-orange-200 rounded-lg font-bold text-lg focus:border-orange-500 focus:outline-none" />
                                            <div className="flex flex-wrap gap-2 mt-2">
                                                {deals.filter(d => selectedForMerge.includes(d.id)).map(d => (
                                                    <button key={d.id} onClick={() => setMergeFinalName(d.name)}
                                                        className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-full transition-colors">{d.name}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="font-bold text-gray-700 text-sm">เลือกรูปภาพหลัก (Master Thumbnail)</label>
                                            <div className="grid grid-cols-4 sm:grid-cols-5 gap-3">
                                                <button onClick={() => setMergeFinalImage('')}
                                                    className={`aspect-square rounded-xl border-2 flex flex-col items-center justify-center text-xs gap-1 transition-all ${mergeFinalImage === '' ? 'border-orange-500 bg-orange-50 text-orange-600 font-bold' : 'border-dashed border-gray-300 text-gray-400 hover:bg-gray-50'}`}>
                                                    <X size={20} /> ไม่ระบุรูป
                                                </button>
                                                {(() => {
                                                    const selGroups = deals.filter(d => selectedForMerge.includes(d.id));
                                                    let imgs = [];
                                                    selGroups.forEach(g => {
                                                        if (g.masterImage && !imgs.includes(g.masterImage)) imgs.push(g.masterImage);
                                                        g.originalItems.forEach(item => { if (item.image && !imgs.includes(item.image)) imgs.push(item.image); });
                                                    });
                                                    return imgs.map((img, idx) => (
                                                        <div key={idx} onClick={() => setMergeFinalImage(img)}
                                                            className={`aspect-square rounded-xl overflow-hidden border-4 cursor-pointer relative transition-all ${mergeFinalImage === img ? 'border-orange-500 shadow-md scale-105 z-10' : 'border-transparent hover:border-orange-200'}`}>
                                                            {mergeFinalImage === img && <div className="absolute top-1 right-1 bg-orange-500 text-white rounded-full p-0.5"><CheckSquare size={14} /></div>}
                                                            <img src={img} className="w-full h-full object-cover" />
                                                        </div>
                                                    ));
                                                })()}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-4 bg-slate-50 border-t border-gray-100 flex justify-end gap-3">
                                        <button onClick={() => setShowMergeModal(false)} className="px-6 py-2.5 rounded-lg text-gray-600 font-bold hover:bg-gray-200">ยกเลิก</button>
                                        <button onClick={handleMergeConfirm} className="px-6 py-2.5 rounded-lg bg-orange-600 text-white font-bold shadow-md hover:bg-orange-700 flex items-center gap-2"><Save size={18} /> ยืนยันการรวมข้อมูล</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Relate Store modal */}
                        {relatingStore && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 animate-fade-in">
                                <div className="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                                    <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-blue-50">
                                        <h2 className="text-xl font-bold flex items-center gap-2 text-blue-700"><Link2 className="text-blue-500" /> เชื่อมร้านค้า</h2>
                                        <button onClick={() => { setRelatingStore(null); setRelateSearchQuery(''); }} className="text-gray-400 hover:text-gray-600"><X size={24} /></button>
                                    </div>
                                    <div className="p-6 overflow-y-auto flex-1 flex flex-col gap-4">
                                        <div className="text-sm text-gray-600">
                                            เลือกชื่อร้านหลักสำหรับ <strong className="text-red-500 font-bold px-1 py-0.5 bg-red-50 rounded">"{relatingStore}"</strong>
                                            <p className="text-xs text-gray-500 mt-1">สินค้าทั้งหมดจะถูกย้ายไปร้านใหม่ และบันทึกชื่อนี้เป็นนามแฝง (Alias)</p>
                                        </div>
                                        <div className="relative">
                                            <input type="text" placeholder="ค้นหาร้านค้าที่ถูกต้อง..." value={relateSearchQuery}
                                                onChange={(e) => setRelateSearchQuery(e.target.value)} autoFocus
                                                className="w-full py-3 pl-10 pr-4 bg-gray-50 border-2 border-transparent focus:border-blue-500 rounded-xl text-sm font-semibold text-gray-800 outline-none transition-all" />
                                            <Search className="absolute left-3 top-3.5 text-gray-400" size={18} />
                                        </div>
                                        <div className="flex-1 overflow-y-auto min-h-[200px] border border-gray-100 rounded-xl divide-y divide-gray-50">
                                            {allStoreNames.filter(s => s !== relatingStore && s.toLowerCase().includes(relateSearchQuery.toLowerCase()))
                                                .map(targetStore => {
                                                    const meta = stores.find(s => s.id === targetStore) || {};
                                                    return (
                                                        <div key={targetStore} className="flex items-center justify-between p-3 hover:bg-blue-50 transition-colors">
                                                            <div className="flex items-center gap-3">
                                                                <StoreLogo logoUrl={meta.logoUrl} storeName={targetStore} size="sm" />
                                                                <div>
                                                                    <div className="font-bold text-gray-800 text-sm flex items-center gap-2">
                                                                        {targetStore}
                                                                        {meta.isFamous && <span className="text-[10px] bg-orange-500 text-white px-1.5 py-0.5 rounded-sm">★</span>}
                                                                    </div>
                                                                    {meta.province && <div className="text-[10px] text-gray-400">{meta.province}</div>}
                                                                </div>
                                                            </div>
                                                            <button onClick={() => { handleRelateStore(relatingStore, targetStore); setRelateSearchQuery(''); }}
                                                                className="px-4 py-1.5 bg-white border border-blue-200 text-blue-600 font-bold text-xs rounded-lg hover:bg-blue-500 hover:text-white transition-colors shadow-sm">
                                                                เชื่อมไปร้านนี้
                                                            </button>
                                                        </div>
                                                    );
                                                })}
                                            {allStoreNames.filter(s => s !== relatingStore && s.toLowerCase().includes(relateSearchQuery.toLowerCase())).length === 0 && (
                                                <div className="text-center text-gray-400 py-8 text-sm italic">ไม่พบร้านค้าที่ค้นหา</div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>

</html>
