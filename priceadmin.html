                try { await updateDoc(doc(db, "items", itemId), { adminStatus: status }); }
                catch (e) { alert("Failed to update status."); }
            };

            const handleSoftDeleteItem = async (itemId) => {
                if (!confirm('ต้องการย้ายรายการนี้ลงถังขยะหรือไม่?')) return;
                try { await updateDoc(doc(db, "items", itemId), { deleted: true }); }
                catch (e) { alert("Failed to delete item."); }
            };

            const handleAcknowledgeReport = async (reportId, newStatus) => {
                try { await updateDoc(doc(db, "reports", reportId), { status: newStatus }); }
                catch (e) { alert("Failed to update report status."); }
            };

            const handleSoftDeleteReport = async (reportId) => {
                if (!confirm('ต้องการย้ายรายงานนี้ลงถังขยะหรือไม่?')) return;
                try { await updateDoc(doc(db, "reports", reportId), { deleted: true }); }
                catch (e) { alert("Failed to delete report."); }
            };

            const handleUpdateStoreDetail = async (e) => {
                e.preventDefault();
                const { name, originalName, mapsUrl, province, phone, isVisible, logoUrl, isOfficial, manualAliases } = editingStoreDetail;
                let newAliases = [];
                if (manualAliases) newAliases = manualAliases.split(',').map(s => s.trim()).filter(Boolean);
                const payload = {
                    mapsUrl: mapsUrl || "", province: province || "", phone: phone || "",
                    isVisible: isVisible !== false, isOfficial: !!isOfficial,
                    logoUrl: logoUrl || "", lastUpdated: Date.now()
                };
                const existingStore = stores.find(s => s.id === (originalName || name));
                payload.aliases = [...new Set([...(existingStore?.aliases || []), ...newAliases])];
                try {
                    if (originalName && originalName !== name) {
                        if (confirm(`คุณกำลังเปลี่ยนชื่อร้านจาก "${originalName}" เป็น "${name}"\nรายการสินค้าทั้งหมดจะถูกย้ายไปด้วย ยืนยันหรือไม่?`)) {
                            await setDoc(doc(db, "stores", name), payload);
                            const itemsToUpdate = rawItems.filter(i => i.store === originalName);
                            await Promise.all(itemsToUpdate.map(item => updateDoc(doc(db, "items", item.id), { store: name })));
                            await deleteDoc(doc(db, "stores", originalName));
                        }
                    } else {
                        await setDoc(doc(db, "stores", name), payload, { merge: true });
                    }
                } catch (err) { console.error(err); alert("Failed to save store details: " + err.message); return; }
                setShowStoreModal(false); setEditingStoreDetail(null);
            };

            const handleRelateStore = async (wrongName, canonicalName) => {
                if (!wrongName || !canonicalName) return;
                const cleanWrong = wrongName.trim(), cleanCanonical = canonicalName.trim();
                if (cleanWrong.toLowerCase() === cleanCanonical.toLowerCase()) return;
                if (!confirm(`เชื่อมร้าน "${cleanWrong}" → "${cleanCanonical}"\nรายการทั้งหมดจาก "${cleanWrong}" จะถูกย้ายไป "${cleanCanonical}"\nและ "${cleanWrong}" จะถูกบันทึกเป็นชื่อเก่า (alias)`)) return;
                try {
                    const canonicalMeta = stores.find(s => s.id === cleanCanonical) || {};
                    const newAliases = [...new Set([...(canonicalMeta.aliases || []), cleanWrong])];
                    await setDoc(doc(db, 'stores', cleanCanonical), { ...canonicalMeta, aliases: newAliases, adminStoreUpdatedAt: Date.now(), lastUpdated: Date.now() }, { merge: true });
                    const itemsToUpdate = rawItems.filter(i => (i.store || "").trim().toLowerCase() === cleanWrong.toLowerCase());
                    await Promise.all(itemsToUpdate.map(item => updateDoc(doc(db, 'items', item.id), { store: cleanCanonical })));
                    const wrongMeta = stores.find(s => s.id.trim().toLowerCase() === cleanWrong.toLowerCase());
                    if (wrongMeta) {
                        if ((wrongMeta.aliases || []).length > 0) {
                            await setDoc(doc(db, 'stores', cleanCanonical), { aliases: [...new Set([...newAliases, ...wrongMeta.aliases])] }, { merge: true });
                        }
                        await deleteDoc(doc(db, 'stores', wrongMeta.id));
                    }
                    setRelatingStore(null);
                } catch (e) { console.error(e); alert('เกิดข้อผิดพลาดในการเชื่อมร้าน: ' + e.message); }
            };

            const handleRemoveAlias = async (storeName, aliasToRemove) => {
                if (!confirm(`ต้องการลบชื่อเก่า (alias) "${aliasToRemove}" ออกจากร้าน "${storeName}" หรือไม่?`)) return;
                try {
                    const storeMeta = stores.find(s => s.id === storeName) || {};
                    await updateDoc(doc(db, 'stores', storeName), { aliases: (storeMeta.aliases || []).filter(a => a !== aliasToRemove), adminStoreUpdatedAt: Date.now() });
                } catch (e) { alert("Failed to remove alias: " + e.message); }
            };

            const toggleMergeSelection = (groupId) => {
                setSelectedForMerge(prev => prev.includes(groupId) ? prev.filter(id => id !== groupId) : [...prev, groupId]);
            };

            useEffect(() => {
                if (showMergeModal && selectedForMerge.length > 0) {
                    const sel = deals.filter(d => selectedForMerge.includes(d.id));
                    if (sel.length > 0) setMergeFinalName(sel[0].name);
                }
            }, [showMergeModal]);

            const handleMergeConfirm = async () => {
                if (!mergeFinalName) { alert('กรุณาระบุชื่อสินค้า Final'); return; }
                try {
                    const selGroups = deals.filter(d => selectedForMerge.includes(d.id));
                    let allIds = [];
                    selGroups.forEach(g => g.originalItems.forEach(item => allIds.push(item.id)));
                    await Promise.all(allIds.map(id => updateDoc(doc(db, "items", id), { name: mergeFinalName, masterImage: mergeFinalImage })));
                    setSelectedForMerge([]); setShowMergeModal(false); setMergeFinalName(''); setMergeFinalImage('');
                    alert('รวมข้อมูลเสร็จสิ้น!'); setAdminTab('dashboard');
                } catch (e) { alert("Error merging docs: " + e.message); }
            };

            const storeAliasMap = {};
            stores.forEach(s => { (s.aliases || []).forEach(alias => { storeAliasMap[alias.toLowerCase().trim()] = s.id; }); });
            const resolveStoreName = (name) => { if (!name) return name; return storeAliasMap[name.toLowerCase().trim()] || name.trim(); };

            /* ── "Show User Added" filtered + sorted deals ── */
            const filteredDeals = useMemo(() => {
                let list = deals.filter(deal =>
                    (deal.name || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
                    (deal.brand || '').toLowerCase().includes(searchQuery.toLowerCase())
                );
                if (showUserAdded) {
                    // sort by the most recent item update timestamp descending
                    list = [...list].sort((a, b) => (b.latestUpdated || 0) - (a.latestUpdated || 0));
                }
                return list;
            }, [deals, searchQuery, showUserAdded]);

            /* ── "Show User Added" for stores: sort by most recent item in that store ── */
            const userAddedCount = useMemo(() => {
                // how many product groups have a post in the last 24h
                const threshold = Date.now() - 24 * 60 * 60 * 1000;
                return deals.filter(d => (d.latestUpdated || 0) > threshold).length;
            }, [deals]);

            const uniqueProductNames = [...new Set(deals.map(d => d.name))].sort();
            const uniqueProductsWithBrand = useMemo(() => {
                const map = new Map();
                deals.forEach(d => { if (!map.has(d.name)) map.set(d.name, d.brand || ''); });
                return Array.from(map.entries()).map(([name, brand]) => ({ name, brand })).sort((a, b) => a.name.localeCompare(b.name, 'th'));
            }, [deals]);

            /* ── "Show User Added" for stores ── */
            const allStoreNamesRaw = [...new Set(rawItems.map(i => resolveStoreName(i.store)).filter(Boolean))];
            const allStoreNames = (() => {
                const names = [...allStoreNamesRaw];
                if (showUserAdded) {
                    // sort by most recent item in that store
                    return names.sort((a, b) => {
                        const latestA = Math.max(...rawItems.filter(i => resolveStoreName(i.store) === a).map(i => i.lastUpdated || 0));
                        const latestB = Math.max(...rawItems.filter(i => resolveStoreName(i.store) === b).map(i => i.lastUpdated || 0));
                        return latestB - latestA;
                    });
                }
                if (storeSortMode === 'alphabet') return names.sort((a, b) => a.localeCompare(b, 'th'));
                if (storeSortMode === 'adminUpdated') {
                    return names.sort((a, b) => {
                        const metaA = stores.find(s => s.id === a) || {};
                        const metaB = stores.find(s => s.id === b) || {};
                        return (metaB.adminStoreUpdatedAt || 0) - (metaA.adminStoreUpdatedAt || 0);
                    });
                }
                return names.sort((a, b) => {
                    const latestA = Math.max(...rawItems.filter(i => i.store === a).map(i => i.lastUpdated || 0));
                    const latestB = Math.max(...rawItems.filter(i => i.store === b).map(i => i.lastUpdated || 0));
                    return latestB - latestA;
                });
            })();

            /* ── "Show User Added" for variants ── */
            const filteredVariantGroups = useMemo(() => {
                if (!showUserAdded) return variantGroups;
                // sort variant groups by most recent item timestamp in their items list
                return [...variantGroups].sort((a, b) => {
                    const getLatest = (vg) => {
                        if (!vg.items) return 0;
                        const times = rawItems.filter(i => vg.items.includes(i.name)).map(i => i.lastUpdated || 0);
                        return times.length > 0 ? Math.max(...times) : 0;
                    };
                    return getLatest(b) - getLatest(a);
                });
            }, [variantGroups, rawItems, showUserAdded]);

            /* ── "Show User Added" for uncategorized ── */
            const filteredUncategorizedByUserAdded = useMemo(() => {
                const categorizedNames = new Set();
                categories.forEach(c => (c.items || []).forEach(name => categorizedNames.add(name)));
                let list = uniqueProductsWithBrand.filter(p => !categorizedNames.has(p.name));
                if (showUserAdded) {
                    list = [...list].sort((a, b) => {
                        const latestA = Math.max(...rawItems.filter(i => i.name === a.name).map(i => i.lastUpdated || 0), 0);
                        const latestB = Math.max(...rawItems.filter(i => i.name === b.name).map(i => i.lastUpdated || 0), 0);
                        return latestB - latestA;
                    });
                }
                return list;
            }, [categories, uniqueProductsWithBrand, rawItems, showUserAdded]);

            const pendingItems = rawItems.filter(i => i.adminStatus !== 'approved');

            const getExpandedColSpan = () => {
                if (adminTab === 'dashboard') return 4;
                if (adminTab === 'manage') {
                    if (manageSubTab === 'edit') return isDeleteMode ? 5 : 4;
                    if (manageSubTab === 'merge') return 5;
                    return 3;
                }
                return 4;
            };

            // Time-ago helper
            const timeAgo = (ts) => {
                if (!ts) return '';
                const diff = Date.now() - ts;
                const mins = Math.floor(diff / 60000);
                if (mins < 60) return `${mins} นาทีที่แล้ว`;
                const hrs = Math.floor(mins / 60);
                if (hrs < 24) return `${hrs} ชั่วโมงที่แล้ว`;
                const days = Math.floor(hrs / 24);
                return `${days} วันที่แล้ว`;
            };

            return (
                <div className="min-h-screen flex flex-col">

                    {/* ── Image Lightbox ── */}
                    {lightbox && (
                        <ImageLightbox images={lightbox.images} initialIndex={lightbox.index} onClose={() => setLightbox(null)} />
                    )}

                    {/* ── Category Assign Modal ── */}
                    {assignCatProduct && (
                        <AssignCategoryModal
                            product={assignCatProduct}
                            categories={categories}
                            onClose={() => setAssignCatProduct(null)}
                            onSave={handleAssignCategory}
                        />
                    )}

                    {/* ── NEW: Category Items Modal ── */}
                    {viewingCategoryItems && (
                        <CategoryItemsModal
                            category={viewingCategoryItems}
                            allItems={rawItems}
                            onClose={() => setViewingCategoryItems(null)}
                            onRemoveItem={handleRemoveFromCategory}
                        />
                    )}

                    {/* ── Store Edit Modal ── */}
                    {showStoreModal && editingStoreDetail && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-md overflow-hidden shadow-2xl animate-fade-in max-h-[90vh] flex flex-col">
                                <div className="p-6 border-b border-gray-100 flex justify-between items-center bg-slate-900 text-white flex-shrink-0">
                                    <div className="flex items-center gap-3">
                                        <StoreLogo logoUrl={editingStoreDetail.logoUrl} storeName={editingStoreDetail.name} size="sm" />
                                        <h2 className="text-lg font-bold">แก้ไขข้อมูลร้าน: <span className="text-orange-400">{editingStoreDetail.name}</span></h2>
                                    </div>
                                    <button onClick={() => setShowStoreModal(false)} className="text-white/60 hover:text-white"><X size={24} /></button>
                                </div>
                                <form onSubmit={handleUpdateStoreDetail} className="p-6 space-y-5 overflow-y-auto flex-1">
                                    <LogoUploadSection currentLogoUrl={editingStoreDetail.logoUrl} onLogoChange={(url) => setEditingStoreDetail({ ...editingStoreDetail, logoUrl: url })} />
                                    <div className="border-t border-gray-100 pt-4 space-y-4">
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">ชื่อร้าน (Rename)</label>
                                            <input type="text" value={editingStoreDetail.name} onChange={e => setEditingStoreDetail({ ...editingStoreDetail, name: e.target.value })}
                                                placeholder="ชื่อร้าน..." className="w-full p-3 bg-white border-2 border-orange-100 rounded-xl text-sm font-bold focus:border-orange-500 focus:outline-none" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">จังหวัด</label>
                                            <input type="text" value={editingStoreDetail.province} onChange={e => setEditingStoreDetail({ ...editingStoreDetail, province: e.target.value })}
                                                placeholder="เช่น กรุงเทพฯ, เชียงใหม่" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:border-orange-500 focus:outline-none" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">เบอร์โทรศัพท์</label>
                                            <input type="text" value={editingStoreDetail.phone} onChange={e => setEditingStoreDetail({ ...editingStoreDetail, phone: e.target.value })}
                                                placeholder="02-XXX-XXXX" className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:border-orange-500 focus:outline-none" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest">Google Maps URL</label>
                                            <input type="text" value={editingStoreDetail.mapsUrl} onChange={e => setEditingStoreDetail({ ...editingStoreDetail, mapsUrl: e.target.value })}
                                                placeholder="https://goo.gl/maps/..." className="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:border-orange-500 focus:outline-none" />
                                        </div>
                                        <div className="flex gap-4 pt-2">
                                            <label className="flex-1 p-3 bg-gray-50 rounded-xl border border-gray-200 flex items-center justify-between cursor-pointer active:scale-95 transition-transform">
                                                <span className="text-xs font-bold text-gray-600">ชื่อทางการ (Official)</span>
                                                <input type="checkbox" checked={editingStoreDetail.isOfficial} onChange={e => setEditingStoreDetail({ ...editingStoreDetail, isOfficial: e.target.checked })} className="w-5 h-5 accent-blue-500" />
                                            </label>
                                            <label className="flex-1 p-3 bg-gray-50 rounded-xl border border-gray-200 flex items-center justify-between cursor-pointer active:scale-95 transition-transform">
                                                <span className="text-xs font-bold text-gray-600">แสดงผล (Visible)</span>
                                                <input type="checkbox" checked={editingStoreDetail.isVisible} onChange={e => setEditingStoreDetail({ ...editingStoreDetail, isVisible: e.target.checked })} className="w-5 h-5 accent-green-500" />
                                            </label>
                                        </div>
                                        <div className="space-y-1 pt-2 border-t border-gray-100">
                                            <label className="text-xs font-bold text-blue-600 uppercase tracking-widest flex items-center gap-1"><Link2 size={12} /> เพิ่มนามแฝง (Manual Aliases)</label>
                                            <p className="text-[10px] text-gray-400 font-medium pb-1">พิมพ์ชื่อผิดที่พบบ่อย คั่นด้วยเครื่องหมายจุลภาค (,) เช่น Cj, cj, ซีเจ</p>
                                            <input type="text" value={editingStoreDetail.manualAliases} onChange={e => setEditingStoreDetail({ ...editingStoreDetail, manualAliases: e.target.value })}
                                                placeholder="ชื่อที่ 1, ชื่อที่ 2..." className="w-full p-3 bg-blue-50/50 border border-blue-200 rounded-xl text-sm focus:border-blue-500 focus:outline-none" />
                                        </div>
                                    </div>
                                    <div className="pt-4 flex gap-3">
                                        <button type="submit" className="flex-1 bg-orange-500 py-3 text-white font-bold rounded-xl shadow-lg shadow-orange-200 hover:bg-orange-600 active:scale-95 transition-all">บันทึกข้อมูล</button>
                                        <button type="button" onClick={() => setShowStoreModal(false)} className="flex-1 bg-gray-100 py-3 text-gray-500 font-bold rounded-xl hover:bg-gray-200 active:scale-95 transition-all">ยกเลิก</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center px-8">
                        <div className="flex items-center gap-3">
                            <LayoutDashboard className="text-orange-500" size={28} />
                            <h1 className="text-xl font-bold">DealHunter <span className="text-orange-500">Admin</span></h1>
                        </div>
                        <div className="relative w-96">
                            <input type="text" placeholder="ค้นหาสินค้า, ยี่ห้อ..."
                                value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full py-2 pl-10 pr-4 rounded-lg bg-slate-800 border border-slate-700 text-sm text-white focus:outline-none focus:border-orange-500" />
                            <Search className="absolute left-3 top-2.5 text-slate-400" size={16} />
                        </div>
                    </header>

                    {/* Nav Tabs */}
                    <div className="bg-white border-b border-gray-200 px-8 flex gap-6 overflow-x-auto shadow-sm">
                        {[
                            { key: 'dashboard', icon: <LayoutDashboard size={18} />, label: 'ภาพรวม' },
                            { key: 'manage', icon: <Edit2 size={18} />, label: 'จัดการข้อมูล', badge: adminTab !== 'manage' ? (selectedForMerge.length > 0 ? selectedForMerge.length : null) : null, badgeColor: 'bg-orange-500 text-white' },
                            { key: 'notifications', icon: <Bell size={18} />, label: 'แจ้งเตือน', badge: pendingItems.length > 0 ? pendingItems.length : null, badgeColor: 'bg-red-100 text-red-600 animate-pulse' },
                            { key: 'reports', icon: <MessageSquare size={18} />, label: 'รายงานปัญหา', badge: reports.filter(r => r.status === 'pending').length > 0 ? reports.filter(r => r.status === 'pending').length : null, badgeColor: 'bg-red-500 text-white animate-pulse' },
                            { key: 'pushnews', icon: <Bell size={18} />, label: 'แจ้งข่าวสาร', badge: submittedNews.length > 0 ? submittedNews.length : null, badgeColor: 'bg-blue-500 text-white' },
                            { key: 'bin', icon: <Trash2 size={18} />, label: 'ถังขยะ', badge: deletedItems.length > 0 ? deletedItems.length : null, badgeColor: 'bg-gray-100 text-gray-500' },
                        ].map(tab => (
                            <button key={tab.key}
                                onClick={() => { setAdminTab(tab.key); if (tab.key !== 'manage') setSelectedForMerge([]); setIsDeleteMode(false); setExpandedGroups([]); }}
                                className={`py-4 font-bold text-sm border-b-2 flex items-center gap-2 transition-all whitespace-nowrap ${adminTab === tab.key ? 'border-orange-500 text-orange-600' : 'border-transparent text-gray-400 hover:text-gray-600'}`}>
                                {tab.icon} {tab.label}
                                {tab.badge && <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${tab.badgeColor}`}>{tab.badge}</span>}
                            </button>
                        ))}
                    </div>

                    {/* Manage Sub-Tabs */}
                    {adminTab === 'manage' && (
                        <div className="bg-slate-50 border-b border-gray-200 px-8 flex gap-4 overflow-x-auto">
                            {[
                                { key: 'edit', label: 'แก้ไขข้อมูล' },
                                { key: 'variants', label: 'จัดกลุ่มรุ่นย่อย' },
                                { key: 'categories', label: 'จัดหมวดหมู่' },
                                { key: 'merge', label: 'รวมข้อมูลซ้ำซ้อน', badge: selectedForMerge.length > 0 ? selectedForMerge.length : null },
                                { key: 'stores', label: 'จัดการสาขา' },
                            ].map(sub => (
                                <button key={sub.key} onClick={() => { setManageSubTab(sub.key); setExpandedGroups([]); }}
                                    className={`py-2.5 px-3 text-xs font-bold transition-all border-b-2 flex items-center gap-1.5 ${manageSubTab === sub.key ? 'border-blue-600 text-blue-700' : 'border-transparent text-gray-400 hover:text-gray-600'}`}>
                                    {sub.label}
                                    {sub.badge && <span className="text-[9px] bg-orange-500 text-white px-1.5 py-0.5 rounded-full">{sub.badge}</span>}
                                </button>
                            ))}
                        </div>
                    )}

                    {/* ── MANAGE: Show User Added bar + Delete mode bar ── */}
                    {adminTab === 'manage' && (
                        <div className="bg-slate-50 border-b border-gray-200 px-8 py-2.5 flex items-center justify-between gap-4 shadow-sm z-10 relative">
                            {/* Show User Added Toggle */}
                            <div className="flex-1 max-w-md">
                                <ShowUserAddedBar
                                    enabled={showUserAdded}
                                    onToggle={() => setShowUserAdded(v => !v)}
                                    count={userAddedCount}
                                />
                            </div>

                            {/* Delete mode (only for edit sub-tab) */}
                            <button onClick={() => setIsDeleteMode(!isDeleteMode)}
                                className={`flex items-center gap-2 px-3 py-1.5 rounded-full font-bold text-sm transition-colors flex-shrink-0 ${isDeleteMode ? 'bg-red-100 text-red-600 border border-red-200 shadow-inner' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}>
                                {isDeleteMode ? <ToggleRight size={18} /> : <ToggleLeft size={18} />} Delete mode : {isDeleteMode ? 'ON' : 'OFF'}
                            </button>
                        </div>
                    )}

                    <main className="flex-1 p-8 overflow-y-auto relative">

                        {/* ═══════ STORES TAB ═══════ */}
                        {adminTab === 'manage' && manageSubTab === 'stores' && (
                            <div className="animate-fade-in space-y-4">
                                <div className="flex items-center justify-between">
                                    <h2 className="font-bold text-slate-800 text-lg">
                                        ร้านค้าทั้งหมด ({allStoreNames.length})
                                        {showUserAdded && <span className="ml-2 text-xs font-normal text-purple-600 bg-purple-100 px-2 py-0.5 rounded-full">เรียงตามโพสต์ล่าสุด</span>}
                                    </h2>
                                    {!showUserAdded && (
                                        <div className="flex bg-white rounded-full border border-gray-200 shadow-sm p-0.5">
                                            {[{ key: 'newest', label: 'ใหม่ล่าสุด' }, { key: 'alphabet', label: 'ก-ฮ A-Z' }, { key: 'adminUpdated', label: 'Admin Updated' }].map(s => (
                                                <button key={s.key} onClick={() => setStoreSortMode(s.key)}
                                                    className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all ${storeSortMode === s.key ? 'bg-orange-500 text-white shadow-sm' : 'text-gray-500 hover:text-gray-800'}`}>
                                                    {s.label}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                    <div className="divide-y divide-gray-100">
                                        {allStoreNames.map((storeName, idx) => {
                                            const meta = stores.find(s => s.id === storeName) || {};
                                            const isExpanded = expandedStores.includes(storeName);
                                            const storeItems = rawItems.filter(i => resolveStoreName(i.store) === storeName);
                                            const aliases = meta.aliases || [];
                                            const latestTs = Math.max(...storeItems.map(i => i.lastUpdated || 0), 0);
                                            const isNew = showUserAdded && idx < 5 && (Date.now() - latestTs < 24 * 60 * 60 * 1000);
                                            return (
                                                <React.Fragment key={storeName}>
                                                    <div className={`flex items-center gap-3 px-4 py-3 hover:bg-slate-50 transition-colors cursor-pointer ${isExpanded ? 'bg-slate-50' : ''}`}
                                                        onClick={() => setExpandedStores(prev => prev.includes(storeName) ? prev.filter(s => s !== storeName) : [...prev, storeName])}>
                                                        <div className="text-gray-400 flex-shrink-0">{isExpanded ? <ChevronDown size={18} /> : <ChevronRight size={18} />}</div>
                                                        <StoreLogo logoUrl={meta.logoUrl} storeName={storeName} size="md" />
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex items-center gap-2 flex-wrap">
                                                                <span className="font-bold text-gray-800 flex items-center gap-1">{storeName}{meta.isOfficial && <span className="text-[10px] bg-blue-500 text-white px-1 rounded-sm shadow-sm ml-1">★</span>}</span>
                                                                <span className="text-[10px] text-gray-400 bg-gray-100 px-1.5 py-0.5 rounded-full">{storeItems.length} รายการ</span>
                                                                {meta.isVisible === false && <span className="bg-gray-100 text-gray-400 text-[9px] font-bold px-1.5 py-0.5 rounded">ซ่อนอยู่</span>}
                                                                {isNew && <span className="text-[9px] bg-purple-100 text-purple-600 font-bold px-1.5 py-0.5 rounded-full flex items-center gap-0.5"><Sparkles size={9} /> ใหม่</span>}
                                                            </div>
                                                            {aliases.length > 0 && <div className="flex items-center gap-1 mt-0.5 flex-wrap"><Link2 size={10} className="text-blue-400" />{aliases.map(a => <span key={a} className="text-[9px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded font-medium">{a}</span>)}</div>}
                                                            {meta.province && <div className="text-[10px] text-gray-400 mt-0.5">{meta.province}</div>}
                                                            {showUserAdded && latestTs > 0 && <div className="text-[10px] text-purple-500 mt-0.5 flex items-center gap-0.5"><Clock size={9} /> {timeAgo(latestTs)}</div>}
                                                        </div>
                                                        <div className="flex items-center gap-2 flex-shrink-0" onClick={e => e.stopPropagation()}>
                                                            <button onClick={() => setRelatingStore(storeName)} className="text-blue-500 hover:bg-blue-50 px-2.5 py-1.5 rounded-lg font-bold text-[10px] border border-blue-200 flex items-center gap-1 transition-colors"><Link2 size={12} /> เชื่อมร้าน</button>
                                                            <button onClick={() => { setEditingStoreDetail({ name: storeName, originalName: storeName, mapsUrl: meta.mapsUrl || '', province: meta.province || '', phone: meta.phone || '', isVisible: meta.isVisible !== false, isOfficial: !!meta.isOfficial, logoUrl: meta.logoUrl || '', manualAliases: '' }); setShowStoreModal(true); }}
                                                                className="text-orange-500 hover:bg-orange-50 px-2.5 py-1.5 rounded-lg font-bold text-[10px] border border-orange-200 flex items-center gap-1 transition-colors"><Edit2 size={12} /> แก้ไขข้อมูล</button>
                                                        </div>
                                                    </div>
                                                    {isExpanded && (
                                                        <div className="bg-gray-50/80 border-t border-gray-200 px-4 py-3">
                                                            <div className="ml-8 space-y-2">
                                                                {aliases.length > 0 && (
                                                                    <div className="bg-blue-50 border border-blue-100 rounded-lg p-3 mb-3">
                                                                        <div className="text-[10px] font-bold text-blue-600 uppercase tracking-widest mb-1.5 flex items-center gap-1"><Link2 size={10} /> ชื่อเก่าที่เชื่อมไว้ (Aliases)</div>
                                                                        <div className="flex flex-wrap gap-1.5">
                                                                            {aliases.map(a => (
                                                                                <span key={a} className="bg-white text-blue-700 pl-2 pr-1 py-1 rounded text-xs font-medium border border-blue-200 shadow-sm flex items-center gap-1 group">
                                                                                    {a}
                                                                                    <button onClick={(e) => { e.stopPropagation(); handleRemoveAlias(storeName, a); }} className="text-blue-300 hover:text-red-500 hover:bg-red-50 rounded-full p-0.5 transition-colors"><X size={12} /></button>
                                                                                </span>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                                <div className="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">รายการสินค้า ({storeItems.length})</div>
                                                                {storeItems.map(item => (
                                                                    <div key={item.id} className="bg-white border border-gray-200 rounded-lg p-3 flex items-center gap-3 shadow-sm">
                                                                        <div className="w-10 h-10 rounded-lg bg-gray-100 flex-shrink-0 overflow-hidden border border-gray-200">
                                                                            {item.image ? <img src={item.image} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-gray-300"><ImageIcon size={16} /></div>}
                                                                        </div>
                                                                        <div className="flex-1 min-w-0">
                                                                            <div className="font-bold text-gray-800 text-sm truncate">{item.name}</div>
                                                                            <div className="text-[10px] text-gray-400">{item.lastUpdated ? new Date(item.lastUpdated).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' }) : '-'}</div>
                                                                        </div>
                                                                        <div className="text-right flex-shrink-0">
                                                                            <div className="font-bold text-orange-600 text-sm">฿{item.price}</div>
                                                                            <div className="text-[10px] text-gray-400">{item.unitQuantity || 1} {item.unitType || 'ชิ้น'}</div>
                                                                        </div>
                                                                    </div>
                                                                ))}
                                                                {storeItems.length === 0 && <div className="text-xs text-gray-400 italic py-2">ไม่มีรายการสินค้า</div>}
                                                            </div>
                                                        </div>
                                                    )}
                                                </React.Fragment>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ═══════ VARIANTS TAB ═══════ */}
                        {adminTab === 'manage' && manageSubTab === 'variants' && (
                            <div className="animate-fade-in space-y-4">
                                <div className="flex items-center justify-between">
                                    <h2 className="font-bold text-slate-800 text-lg">
                                        รายการกลุ่มรุ่นย่อย ({variantGroups.length})
                                        {showUserAdded && <span className="ml-2 text-xs font-normal text-purple-600 bg-purple-100 px-2 py-0.5 rounded-full">เรียงตามโพสต์ล่าสุด</span>}
                                    </h2>
                                    <button onClick={() => { setEditingVariantGroup({ name: '', items: [] }); setShowVariantModal(true); setVariantSearchQuery(''); }}
                                        className="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm flex items-center gap-2 transition-colors">
                                        <Plus size={16} /> เพิ่มกลุ่มใหม่
                                    </button>
                                </div>
                                <div className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                                    {filteredVariantGroups.length === 0 ? (
                                        <div className="p-8 text-center text-gray-400 text-sm italic">ไม่มีกลุ่มรุ่นย่อย</div>
                                    ) : (
                                        <div className="divide-y divide-gray-100">
                                            {filteredVariantGroups.map(vg => {
                                                const latestTs = showUserAdded
                                                    ? Math.max(...rawItems.filter(i => (vg.items || []).includes(i.name)).map(i => i.lastUpdated || 0), 0)
                                                    : 0;
                                                return (
                                                    <div key={vg.id} className="p-4 hover:bg-slate-50 transition-colors flex items-start flex-col sm:flex-row justify-between gap-4">
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex items-center gap-2 mb-2">
                                                                <h3 className="font-bold text-gray-800 text-base">{vg.name}</h3>
                                                                {showUserAdded && latestTs > 0 && (
                                                                    <span className="text-[9px] text-purple-500 bg-purple-50 px-1.5 py-0.5 rounded-full flex items-center gap-0.5">
                                                                        <Clock size={9} /> {timeAgo(latestTs)}
                                                                    </span>
                                                                )}
                                                            </div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {vg.items && vg.items.map(item => <span key={item} className="bg-white border border-gray-200 text-gray-600 px-2.5 py-1 rounded-md text-xs font-medium shadow-sm">{item}</span>)}
                                                                {(!vg.items || vg.items.length === 0) && <span className="text-xs text-gray-400 italic">ยังไม่มีสินค้าในกลุ่ม</span>}
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-2 flex-shrink-0 mt-2 sm:mt-0">
                                                            <button onClick={() => { setEditingVariantGroup({ ...vg }); setShowVariantModal(true); setVariantSearchQuery(''); }} className="p-2 text-blue-500 hover:bg-blue-50 rounded-lg transition-colors border border-blue-100"><Edit2 size={16} /></button>
                                                            <button onClick={async () => { if (confirm('ต้องการลบกลุ่มสินค้านี้ใช่หรือไม่?')) await deleteDoc(doc(db, "variantGroups", vg.id)); }} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors border border-red-100"><Trash2 size={16} /></button>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ═══════ CATEGORIES TAB ═══════ */}
                        {adminTab === 'manage' && manageSubTab === 'categories' && (() => {
                            const categorizedNames = new Set();
                            categories.forEach(c => (c.items || []).forEach(name => categorizedNames.add(name)));
                            const uncategorizedProducts = filteredUncategorizedByUserAdded;
                            const filteredUncategorized = uncategorizedSearchQuery
                                ? uncategorizedProducts.filter(p => p.name.toLowerCase().includes(uncategorizedSearchQuery.toLowerCase()) || (p.brand && p.brand.toLowerCase().includes(uncategorizedSearchQuery.toLowerCase())))
                                : uncategorizedProducts;
                            const filteredCategories = categorySearchQuery
                                ? categories.filter(c => c.name.toLowerCase().includes(categorySearchQuery.toLowerCase()))
                                : categories;

                            return (
                                <div className="animate-fade-in flex flex-col md:flex-row gap-6 items-start">
                                    {/* Left: Uncategorized */}
                                    <div className="w-full md:w-1/2 bg-white border border-gray-200 rounded-xl shadow-sm flex flex-col max-h-[800px]">
                                        <div className="p-4 border-b border-gray-100 bg-slate-50 rounded-t-xl sticky top-0 z-10">
                                            <h2 className="font-bold text-slate-800 text-lg flex items-center gap-2 mb-3">
                                                <AlertCircle size={18} className="text-orange-500" />
                                                สินค้าที่ยังไม่มีหมวดหมู่ ({uncategorizedProducts.length})
                                                {showUserAdded && <span className="text-xs font-normal text-purple-600 bg-purple-100 px-2 py-0.5 rounded-full">ล่าสุดก่อน</span>}
                                            </h2>
                                            <div className="relative">
                                                <input type="text" placeholder="ค้นหาสินค้าเพื่อจัดหมวดหมู่..."
                                                    className="w-full border-gray-300 rounded-lg pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm"
                                                    value={uncategorizedSearchQuery} onChange={e => setUncategorizedSearchQuery(e.target.value)} />
                                                <Search size={16} className="absolute left-3 top-2.5 text-gray-400" />
                                            </div>
                                        </div>
                                        <div className="p-4 overflow-y-auto flex-1 space-y-2">
                                            {filteredUncategorized.length === 0 ? (
                                                <div className="text-center py-10 text-gray-400 italic text-sm">ไม่มีสินค้าที่ตรงกับการค้นหา</div>
                                            ) : filteredUncategorized.map(product => {
                                                const latestTs = showUserAdded
                                                    ? Math.max(...rawItems.filter(i => i.name === product.name).map(i => i.lastUpdated || 0), 0)
                                                    : 0;
                                                return (
                                                    <div key={product.name}
                                                        className="flex items-center justify-between p-3 border border-gray-100 rounded-lg hover:border-blue-300 hover:shadow-sm transition-all bg-white group cursor-pointer"
                                                        onClick={() => setAssignCatProduct(product)}>
                                                        <div className="min-w-0 pr-2 flex-1">
                                                            <div className="font-bold text-sm text-gray-800 truncate">{product.name}</div>
                                                            <div className="flex items-center gap-2 mt-0.5">
                                                                {product.brand && <div className="text-[10px] text-gray-500 font-medium">แบรนด์: {product.brand}</div>}
                                                                {showUserAdded && latestTs > 0 && (
                                                                    <div className="text-[9px] text-purple-500 flex items-center gap-0.5">
                                                                        <Clock size={9} /> {timeAgo(latestTs)}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                        <button className="text-blue-500 bg-blue-50 hover:bg-blue-100 p-2 rounded shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <FolderPlus size={16} />
                                                        </button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Right: Categories */}
                                    <div className="w-full md:w-1/2 flex flex-col gap-4">
                                        <div className="flex items-center justify-between">
                                            <h2 className="font-bold text-slate-800 text-lg">หมวดหมู่ทั้งหมด ({categories.length})</h2>
                                            <button onClick={() => {
                                                const newCat = window.prompt("ตั้งชื่อหมวดหมู่ใหม่:");
                                                if (newCat && newCat.trim()) addDoc(collection(db, "categories"), { name: newCat.trim(), items: [] });
                                            }} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm flex items-center gap-2">
                                                <Plus size={16} /> สร้างหมวดหมู่
                                            </button>
                                        </div>
                                        <div className="relative mb-2">
                                            <input type="text" placeholder="ค้นหาหมวดหมู่..."
                                                className="w-full border-gray-200 rounded-lg pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 shadow-sm"
                                                value={categorySearchQuery} onChange={e => setCategorySearchQuery(e.target.value)} />
                                            <Search size={16} className="absolute left-3 top-2.5 text-gray-400" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            {filteredCategories.map(cat => (
                                                <div key={cat.id} className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex flex-col justify-between group">
                                                    <div>
                                                        {editingCategory?.id === cat.id ? (
                                                            <div className="flex gap-2">
                                                                <input type="text" value={editingCategory.name} onChange={e => setEditingCategory({ ...editingCategory, name: e.target.value })} className="border p-1 text-sm rounded w-full" autoFocus />
                                                                <button onClick={async () => { if (editingCategory.name.trim()) await updateDoc(doc(db, "categories", cat.id), { name: editingCategory.name.trim() }); setEditingCategory(null); }} className="bg-green-500 text-white p-1 rounded"><Check size={16} /></button>
                                                            </div>
                                                        ) : (
                                                            <h3 className="font-bold text-gray-800 text-base mb-1 cursor-pointer hover:text-blue-600" onClick={() => setEditingCategory(cat)}>
                                                                {cat.name} <Edit2 size={12} className="inline ml-1 text-gray-300 group-hover:text-blue-400" />
                                                            </h3>
                                                        )}
                                                        <div className="text-xs text-gray-500 bg-gray-50 inline-block px-2 py-0.5 rounded-full mb-3">{(cat.items || []).length} รายการ</div>
                                                    </div>
                                                    <div className="flex gap-2 text-xs mt-auto pt-2 border-t border-gray-100">
                                                        {/* ── UPDATED: open modal instead of alert ── */}
                                                        <button
                                                            className="text-blue-600 hover:text-blue-800 font-bold flex-1 text-left flex items-center gap-1 transition-colors"
                                                            onClick={() => setViewingCategoryItems(cat)}
                                                        >
                                                            <List size={12} /> ดูรายการ
                                                        </button>
                                                        <button className="text-gray-400 hover:text-red-500 px-1" onClick={async () => { if (confirm(`ต้องการลบหมวดหมู่ "${cat.name}" ใช่หรือไม่?`)) await deleteDoc(doc(db, "categories", cat.id)); }}><Trash2 size={14} /></button>
                                                    </div>
                                                </div>
                                            ))}
                                            {filteredCategories.length === 0 && <div className="col-span-2 text-center py-6 text-gray-400 text-sm">ไม่มีหมวดหมู่</div>}
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                        {/* ═══════ DASHBOARD / EDIT / MERGE TABLE ═══════ */}
                        {((adminTab === 'dashboard') || (adminTab === 'manage' && (manageSubTab === 'edit' || manageSubTab === 'merge'))) && (
                            <div className="space-y-3">
                                {/* Show User Added header banner (manage tab only) */}
                                {adminTab === 'manage' && showUserAdded && (
                                    <div className="flex items-center gap-2 bg-purple-50 border border-purple-200 rounded-xl px-4 py-2.5 animate-fade-in">
                                        <div className="w-6 h-6 user-added-badge rounded-lg flex items-center justify-center flex-shrink-0">
                                            <Sparkles size={12} className="text-white" />
                                        </div>
                                        <span className="text-sm font-bold text-purple-800">แสดงโพสต์ล่าสุดจากผู้ใช้ก่อน</span>
                                        <span className="text-xs text-purple-500">เรียงตาม lastUpdated ล่าสุด</span>
                                    </div>
                                )}

                                <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                    <table className="w-full text-left text-sm">
                                        <thead className="bg-slate-50 text-slate-600 font-bold border-b border-gray-200">
                                            <tr>
                                                {adminTab === 'manage' && manageSubTab === 'merge' && <th className="p-4 w-12 text-center">เลือก</th>}
                                                <th className="p-4 w-20">รูปภาพกลุ่มสินค้า</th>
                                                <th className="p-4">รายละเอียดสินค้า</th>
                                                {(adminTab === 'dashboard' || (adminTab === 'manage' && manageSubTab === 'merge')) && <th className="p-4 w-32 text-right">ช่วงราคา (฿)</th>}
                                                {(adminTab === 'dashboard' || (adminTab === 'manage' && manageSubTab === 'merge')) && <th className="p-4 w-48">จำนวนโพสต์บอกต่อ</th>}
                                                {adminTab === 'manage' && manageSubTab === 'edit' && <th className="p-4 w-48">จัดการรูปรวม</th>}
                                                {adminTab === 'manage' && manageSubTab === 'edit' && <th className="p-4 w-24 text-center text-gray-400 text-xs font-bold">ดูโพสต์</th>}
                                                {adminTab === 'manage' && manageSubTab === 'edit' && isDeleteMode && <th className="p-4 w-20 text-center text-red-500"><Trash2 size={16} className="mx-auto" /></th>}
                                                {adminTab === 'manage' && showUserAdded && <th className="p-4 w-32 text-purple-600 text-xs font-bold text-right"><Clock size={12} className="inline mr-1" />อัพเดต</th>}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {filteredDeals.length === 0 ? (
                                                <tr><td colSpan="6" className="p-10 text-center text-gray-400"><AlertCircle size={32} className="mx-auto mb-2 text-gray-300" />ไม่มีข้อมูลสินค้า</td></tr>
                                            ) : filteredDeals.map((dealGroup, idx) => {
                                                const isExpanded = expandedGroups.includes(dealGroup.id);
                                                const isRecentlyAdded = showUserAdded && (Date.now() - (dealGroup.latestUpdated || 0) < 24 * 60 * 60 * 1000);
                                                return (
                                                    <React.Fragment key={dealGroup.id}>
                                                        <tr className={`hover:bg-slate-50 transition-colors border-b border-gray-100 ${selectedForMerge.includes(dealGroup.id) ? 'bg-orange-50/30' : ''} ${isExpanded ? 'bg-blue-50/20' : ''} ${showUserAdded && isRecentlyAdded ? 'bg-purple-50/20' : ''}`}>
                                                            {adminTab === 'manage' && manageSubTab === 'merge' && (
                                                                <td className="p-4 text-center">
                                                                    <input type="checkbox" checked={selectedForMerge.includes(dealGroup.id)} onChange={() => toggleMergeSelection(dealGroup.id)}
                                                                        className="w-5 h-5 rounded border-gray-300 text-orange-500 focus:ring-orange-500 cursor-pointer" />
                                                                </td>
                                                            )}
                                                            <td className="p-4 text-center">
                                                                <div className="relative">
                                                                    {showUserAdded && isRecentlyAdded && (
                                                                        <div className="absolute -top-1 -right-1 z-10 w-4 h-4 user-added-badge rounded-full flex items-center justify-center new-pulse">
                                                                            <Sparkles size={8} className="text-white" />
                                                                        </div>
                                                                    )}
                                                                    {dealGroup.masterImage ? (
                                                                        <img src={dealGroup.masterImage} alt={dealGroup.name} className="w-16 h-16 object-cover rounded shadow-sm mx-auto cursor-pointer hover:opacity-80 transition-opacity" onClick={() => toggleExpand(dealGroup.id)} />
                                                                    ) : (
                                                                        <div onClick={() => toggleExpand(dealGroup.id)} className="w-16 h-16 bg-gray-100 rounded flex items-center justify-center text-gray-300 mx-auto border border-gray-200 cursor-pointer hover:bg-gray-200 transition-colors"><ImageIcon size={24} /></div>
                                                                    )}
                                                                </div>
                                                            </td>
                                                            <td className="p-4">
                                                                {adminTab === 'manage' && manageSubTab === 'edit' && editingNameId === dealGroup.id ? (
                                                                    <div className="flex flex-col gap-1 mb-2">
                                                                        <input type="text" value={newName} onChange={e => setNewName(e.target.value)} className="w-full text-base font-bold p-2 border border-orange-300 rounded focus:border-orange-500" autoFocus />
                                                                        <div className="flex gap-2 mt-1">
                                                                            <button onClick={() => handleSaveName(dealGroup)} className="bg-orange-500 text-white text-[10px] px-3 py-1.5 rounded font-bold">บันทึกชื่อ</button>
                                                                            <button onClick={() => setEditingNameId(null)} className="bg-gray-200 text-gray-700 text-[10px] px-3 py-1.5 rounded font-bold">ยกเลิก</button>
                                                                        </div>
                                                                    </div>
                                                                ) : (
                                                                    <>
                                                                        <div className="font-bold text-gray-800 text-base flex items-center gap-2 group">
                                                                            {adminTab === 'manage' && manageSubTab === 'edit' ? (
                                                                                <span className="cursor-pointer hover:text-orange-600 transition-colors" onClick={() => { setEditingNameId(dealGroup.id); setNewName(dealGroup.name || ''); }}>
                                                                                    {dealGroup.name}<span className="opacity-0 group-hover:opacity-100 transition-opacity text-orange-500 text-[10px] font-normal px-2 py-0.5 bg-orange-50 rounded ml-1">✎ แก้ไขชื่อ</span>
                                                                                </span>
                                                                            ) : (
                                                                                <span className="cursor-pointer" onClick={() => toggleExpand(dealGroup.id)}>
                                                                                    {dealGroup.name}<span className="text-gray-400 bg-gray-100 rounded px-1.5 py-0.5 text-xs ml-2">{isExpanded ? 'ย่อ ▲' : 'ขยาย ▼'}</span>
                                                                                </span>
                                                                            )}
                                                                        </div>
                                                                        {dealGroup.brand && <div className="text-xs font-semibold text-gray-500 uppercase tracking-widest mt-1">ยี่ห้อ: {dealGroup.brand}</div>}
                                                                    </>
                                                                )}
                                                                {adminTab === 'manage' && manageSubTab === 'edit' ? (
                                                                    editingDescId === dealGroup.id ? (
                                                                        <div className="mt-3 flex flex-col gap-1">
                                                                            <textarea value={newDesc} onChange={e => setNewDesc(e.target.value)} placeholder="ใส่รายละเอียดสินค้า..." className="w-full text-xs p-2 border border-blue-300 rounded focus:border-blue-500" rows="2" />
                                                                            <div className="flex gap-2 mt-1">
                                                                                <button onClick={() => handleSaveDesc(dealGroup)} className="bg-blue-500 text-white text-[10px] px-3 py-1.5 rounded font-bold">บันทึกเนื้อหา</button>
                                                                                <button onClick={() => setEditingDescId(null)} className="bg-gray-200 text-gray-700 text-[10px] px-3 py-1.5 rounded font-bold">ยกเลิก</button>
                                                                            </div>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="mt-2 text-xs text-gray-600 border-l-2 border-orange-200 pl-2 cursor-pointer hover:bg-orange-50 p-1 rounded group transition-colors" onClick={() => { setEditingDescId(dealGroup.id); setNewDesc(dealGroup.description || ''); }}>
                                                                            {dealGroup.description ? <span className="line-clamp-2">{dealGroup.description} <span className="opacity-0 group-hover:opacity-100 transition-opacity text-orange-500 ml-1">✎</span></span> : <span className="text-orange-400 font-medium italic">+ เพิ่มรายละเอียดสินค้า ✎</span>}
                                                                        </div>
                                                                    )
                                                                ) : (
                                                                    dealGroup.description && <div className="mt-2 text-xs text-gray-600 border-l-2 border-gray-200 pl-2 p-1 line-clamp-2">{dealGroup.description}</div>
                                                                )}
                                                            </td>
                                                            {(adminTab === 'dashboard' || (adminTab === 'manage' && manageSubTab === 'merge')) && (
                                                                <>
                                                                    <td className="p-4 text-right">
                                                                        <div className="text-sm font-bold text-orange-600">{dealGroup.lowestPpu === dealGroup.highestPpu ? `฿${dealGroup.lowestPpu?.toFixed(2)}` : `฿${dealGroup.lowestPpu?.toFixed(2)} - ฿${dealGroup.highestPpu?.toFixed(2)}`}</div>
                                                                        <div className="text-[10px] text-gray-500 mt-1">ต่อ {dealGroup.unitType}</div>
                                                                    </td>
                                                                    <td className="p-4"><div className="text-xs text-gray-600 font-bold bg-gray-100 px-2 py-1 rounded inline-block mt-1">{dealGroup.postsCount} โพสต์/ร้าน</div></td>
                                                                </>
                                                            )}
                                                            {adminTab === 'manage' && manageSubTab === 'edit' && (
                                                                <td className="p-4">
                                                                    {editingId === dealGroup.id ? (
                                                                        <div className="flex flex-col gap-2">
                                                                            <input type="text" value={newImageUrl} onChange={e => setNewImageUrl(e.target.value)} placeholder="วางลิงก์รูปภาพ..." autoFocus className="w-full text-xs p-2 border border-gray-300 rounded focus:border-orange-500 focus:outline-none" />
                                                                            <div className="flex gap-2">
                                                                                <button onClick={() => handleSaveImage(dealGroup)} className="flex-1 bg-green-500 text-white text-xs font-bold py-1.5 rounded hover:bg-green-600 flex justify-center items-center gap-1 shadow-sm"><Save size={12} /> บันทึก</button>
                                                                                <button onClick={() => setEditingId(null)} className="flex-1 bg-gray-200 text-gray-700 text-xs font-bold py-1.5 rounded flex justify-center items-center gap-1"><X size={12} /> ยกเลิก</button>
                                                                            </div>
                                                                        </div>
                                                                    ) : (
                                                                        <div className="flex flex-col gap-2">
                                                                            <button onClick={() => { setEditingId(dealGroup.id); setNewImageUrl(dealGroup.masterImage || ''); }}
                                                                                className="w-full bg-white border border-gray-300 text-gray-700 text-xs font-bold py-2 rounded shadow-sm hover:bg-gray-50 flex items-center justify-center gap-2 transition-colors">
                                                                                <Edit2 size={14} /> แก้ไขรูปภาพรวม
                                                                            </button>
                                                                            {dealGroup.masterImage && isDeleteMode && (
                                                                                <button onClick={() => handleDeleteImage(dealGroup)} className="w-full text-red-500 text-xs font-bold py-1 hover:underline">ลบรูปภาพ</button>
                                                                            )}
                                                                        </div>
                                                                    )}
                                                                </td>
                                                            )}
                                                            {adminTab === 'manage' && manageSubTab === 'edit' && (
                                                                <td className="p-4 text-center">
                                                                    <button onClick={() => toggleExpand(dealGroup.id)}
                                                                        className={`inline-flex flex-col items-center gap-1 px-3 py-2 rounded-lg border font-bold text-[10px] transition-all ${isExpanded ? 'bg-blue-500 text-white border-blue-500 shadow-md' : 'bg-white text-blue-600 border-blue-200 hover:bg-blue-50'}`}>
                                                                        {isExpanded ? <ChevronDown size={14} /> : <ChevronRight size={14} />}
                                                                        <span>{dealGroup.postsCount} โพสต์</span>
                                                                    </button>
                                                                </td>
                                                            )}
                                                            {adminTab === 'manage' && manageSubTab === 'edit' && isDeleteMode && (
                                                                <td className="p-4 text-center">

                                                                                            </div>

                                                                                    </div>

                                {binSubTab === 'items' && (
                                    <>

                                            </div>

                                        {deletedItems.length === 0 ? (
                                            <div className="text-center text-gray-400 py-16 bg-white rounded-xl border border-gray-200 border-dashed"><Trash2 size={48} className="mx-auto mb-3 text-gray-200" /><p className="text-gray-500 font-bold">ถังขยะว่างเปล่า</p></div>
                                        ) : deletedItems.map(item => {
                                            const storeMeta = stores.find(s => s.id === item.store) || {};
                                            const isSelected = selectedBinItems.includes(item.id);
                                            return (
                                                <div key={item.id} className={`rounded-xl shadow-sm border bg-white flex overflow-hidden transition-all ${isSelected ? 'border-blue-400 ring-1 ring-blue-100' : 'border-gray-200 opacity-75 hover:opacity-100 grayscale hover:grayscale-0'}`}>
                                                    <div className="flex items-center justify-center p-3 bg-gray-50 border-r border-gray-100 cursor-pointer" onClick={() => setSelectedBinItems(prev => prev.includes(item.id) ? prev.filter(id => id !== item.id) : [...prev, item.id])}>
                                                        <input type="checkbox" checked={isSelected} readOnly className="w-5 h-5 rounded border-gray-300 text-blue-600 pointer-events-none" />
                                                    </div>
                                                    <button onClick={() => handleRecoverPost(item.id)} className="flex-shrink-0 w-12 flex flex-col items-center justify-center bg-green-50 text-green-600 hover:bg-green-500 hover:text-white border-r border-gray-100 transition-colors"><RefreshCw size={16} strokeWidth={2.5} className="mb-1" /><span className="text-[9px] font-bold">กู้คืน</span></button>

                                                                    <div><div className="font-bold text-gray-800 text-sm line-through decoration-red-400">{item.name}</div>{item.brand && <div className="text-[10px] text-gray-500 uppercase tracking-wider">{item.brand}</div>}</div>
                                                                    <div className="text-right flex-shrink-0"><div className="font-bold text-gray-500 text-sm">฿{item.price}</div></div>
                                                                </div>
                                                                <div className="mt-2 flex items-center gap-2"><StoreLogo logoUrl={storeMeta.logoUrl} storeName={item.store} size="xs" /><span className="text-xs text-gray-500">{item.store || 'ไม่ระบุร้าน'}</span></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => handlePermanentDeletePost(item.id)} className="flex-shrink-0 w-12 flex flex-col items-center justify-center bg-red-50 text-red-600 hover:bg-red-600 hover:text-white border-l border-gray-100 transition-colors"><Trash2 size={16} className="mb-1" /><span className="text-[9px] font-bold">ลบถาวร</span></button>
                                                </div>
                                            );
                                        })}

                                {binSubTab === 'reports' && (
                                    <>

                                                </label>
                                            </div>

                                            <div className="text-center text-gray-400 py-16 bg-white rounded-xl border border-gray-200 border-dashed"><MessageSquare size={48} className="mx-auto mb-3 text-gray-200" /><p className="text-gray-500 font-bold">ถังขยะรายงานว่างเปล่า</p></div>

                                                    <button onClick={() => handleRecoverReport(report.id)} className="flex-shrink-0 w-12 flex flex-col items-center justify-center bg-green-50 text-green-600 hover:bg-green-500 hover:text-white border-r border-gray-100 transition-colors"><RefreshCw size={16} strokeWidth={2.5} className="mb-1" /><span className="text-[9px] font-bold">กู้คืน</span></button>
                                                    <div className="flex-1 p-4 cursor-pointer" onClick={() => setSelectedBinReports(prev => prev.includes(report.id) ? prev.filter(id => id !== report.id) : [...prev, report.id])}>
                                                        <div className="flex justify-between items-start gap-4 mb-2">
                                                            <div><div className="font-bold text-sm text-gray-800 line-through decoration-red-400">{report.userDisplayName}</div><div className="text-[10px] text-gray-400 mt-0.5">ID: {report.userId}</div></div>
                                                            <div className="text-[10px] font-medium px-2 py-1 rounded-lg bg-gray-50 text-gray-400">{new Date(report.createdAt).toLocaleString('th-TH')}</div>
                                                        </div>
