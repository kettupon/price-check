<body class="bg-stone-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            MapPin, Users, Tag, AlertCircle, Plus, Trophy, Heart, MessageSquare,
            Share2, Search, Zap, Home, ListPlus, Calculator, ChevronLeft, Image as ImageIcon,
            Coffee, ShoppingCart, Store, Package, User, X, ShoppingBag, ImageOff, Camera, FileText
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyByDvi-wyekFdKMiMv_Cb2yUq9yF0Tw3Uc",
            authDomain: "price-check-86915.firebaseapp.com",
            projectId: "price-check-86915",
            storageBucket: "price-check-86915.firebasestorage.app",
            messagingSenderId: "510258152666",
            appId: "1:510258152666:web:bc24bd3f34e704488e91e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function App() {
            const [currentView, setCurrentView] = useState('feed'); // 'feed' | 'search' | 'add' | 'profile' | 'product_detail' | 'store_detail'
            const [activeTab, setActiveTab] = useState('ทั้งหมด');
            const [showShippingInFeed, setShowShippingInFeed] = useState(false);
            const [profileTab, setProfileTab] = useState('posts');
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [deals, setDeals] = useState([]);
            const [groupedDeals, setGroupedDeals] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [zoomedImage, setZoomedImage] = useState(null);
            const [stores, setStores] = useState([]);
            const [selectedStore, setSelectedStore] = useState(null);
            const [selectedStoreForDetail, setSelectedStoreForDetail] = useState(null); // For store_detail view
            const [storeSearchQuery, setStoreSearchQuery] = useState('');
            const [isDescriptionExpanded, setIsDescriptionExpanded] = useState(false);

            const ImagePlaceholder = () => (
                <div className="w-full h-full flex flex-col items-center justify-center bg-gray-100/80 text-gray-400">
                    <ImageOff size={24} className="mb-1" />
                    <span className="text-[10px] font-bold">ไม่มีรูปภาพ</span>
                </div>
            );

            // --- Firebase Fetch ---
            useEffect(() => {
                const q = query(collection(db, "items"), orderBy("lastUpdated", "desc"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const fbDeals = snapshot.docs
                        .filter(doc => doc.data().deleted !== true)
                        .map(doc => {
                            const data = doc.data();
                            const numPrice = parseFloat(data.price) || 0;
                            const numCashback = data.cashbackUsed ? (parseFloat(data.cashbackAmount) || 0) : 0;
                            const totalPrice = Math.max(0, numPrice - numCashback);
                            const unitQty = parseInt(data.unitQuantity) || 1;
                            const ppu = totalPrice / unitQty;
                            const shipFee = (data.shippingType === 'excluded') ? (parseFloat(data.shippingFee) || 0) : 0;
                            const ppuWithShipping = (totalPrice + shipFee) / unitQty;

                            return {
                                id: doc.id,
                                name: data.name,
                                brand: data.brand || "",
                                price: data.price,
                                ppu: ppu,
                                ppuWithShipping: ppuWithShipping,
                                totalPrice: totalPrice,
                                unitQuantity: unitQty,
                                unitType: data.unitType || "ชิ้น",
                                normalPrice: Math.round(data.price * 1.2),
                                shop: data.store || "ไม่ระบุร้าน",
                                distance: "? km",
                                masterImage: data.masterImage || "",
                                stickers: ppu < 10 ? ["🔥 คุ้มสุด!"] : [],
                                likes: 0,
                                comments: 0,
                                image: data.image || "",
                                timePosted: new Date(data.lastUpdated).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' }),
                                reporter: "Live User",
                                cashbackUsed: data.cashbackUsed || false,
                                tags: data.tags || [],
                                shippingType: data.shippingType || 'included',
                                shippingFee: data.shippingFee || 0,
                                description: data.description || ""
                            };
                        });
                    setDeals(fbDeals);

                    const grouped = {};
                    fbDeals.forEach(deal => {
                        const name = deal.name || 'Unknown';
                        if (!grouped[name]) {
                            grouped[name] = {
                                id: deal.id,
                                name: name,
                                brand: deal.brand,
                                masterImage: deal.masterImage || deal.image,
                                lowestPrice: deal.price,
                                lowestPpu: deal.ppu,
                                lowestPpuWithShipping: deal.ppuWithShipping,
                                lowestPpuUnit: deal.unitType,
                                normalPrice: deal.normalPrice,
                                postsCount: 1,
                                stickers: deal.stickers,
                                tags: [...deal.tags],
                                description: deal.description || ""
                            };
                        } else {
                            grouped[name].postsCount += 1;
                            grouped[name].lowestPrice = Math.min(grouped[name].lowestPrice, deal.price);
                            grouped[name].lowestPpu = Math.min(grouped[name].lowestPpu, deal.ppu);
                            grouped[name].lowestPpuWithShipping = Math.min(grouped[name].lowestPpuWithShipping, deal.ppuWithShipping);
                            if (deal.masterImage && (!grouped[name].masterImage || grouped[name].masterImage === grouped[name].image)) {
                                grouped[name].masterImage = deal.masterImage;
                            }
                            if (deal.description && !grouped[name].description) {
                                grouped[name].description = deal.description;
                            }
                            if (deal.tags && deal.tags.length > 0) {
                                deal.tags.forEach(tag => {
                                    if (!grouped[name].tags.includes(tag)) {
                                        grouped[name].tags.push(tag);
                                    }
                                });
                            }
                        }
                    });
                    setGroupedDeals(Object.values(grouped));
                });

                const storesUnsubscribe = onSnapshot(collection(db, "stores"), (snapshot) => {
                    const fbStores = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setStores(fbStores);
                });

                return () => {
                    unsubscribe();
                    storesUnsubscribe();
                };
            }, []);

            // --- Add Deal Form State ---
            const [itemName, setItemName] = useState('');
            const [brand, setBrand] = useState('');
            const [store, setStore] = useState('');
            const [price, setPrice] = useState('');
            const [unit, setUnit] = useState(1);
            const [unitDisplay, setUnitDisplay] = useState('1');
            const [unitType, setUnitType] = useState('ชิ้น');
            const [shippingType, setShippingType] = useState('included');
            const [shippingFee, setShippingFee] = useState('');
            const [tags, setTags] = useState([]);
            const [tagInput, setTagInput] = useState('');
            const [usePromo, setUsePromo] = useState(false);
            const [promoCode, setPromoCode] = useState('');
            const [useCashback, setUseCashback] = useState(false);
            const [cashbackAmount, setCashbackAmount] = useState('');
            const [includeShippingInPpu, setIncludeShippingInPpu] = useState(false);
            const [imageBase64, setImageBase64] = useState(null);
            const fileInputRef = useRef(null);

            const handleImageCapture = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new window.Image();
                    img.onload = () => {
                        const maxSize = 800;
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setImageBase64(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const numPrice = parseFloat(price) || 0;
            const numCashback = useCashback ? (parseFloat(cashbackAmount) || 0) : 0;
            const addedShipping = (shippingType === 'excluded' && includeShippingInPpu) ? (parseFloat(shippingFee) || 0) : 0;
            const totalPrice = Math.max(0, numPrice - numCashback + addedShipping);
            const ppu = unit > 0 ? (totalPrice / unit) : 0;

            const handleAddTag = (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const val = tagInput.trim().replace(',', '').toLowerCase();
                    if (val && !tags.includes(val) && tags.length < 5) {
                        setTags([...tags, val]);
                    }
                    setTagInput('');
                }
            };
            const removeTag = (tagToRemove) => {
                setTags(tags.filter(t => t !== tagToRemove));
            };

            const handleSaveDeal = () => {
                if (!itemName || !price) {
                    alert('กรุณากรอกชื่อสินค้าและราคา');
                    return;
                }
                setShowConfirmModal(true);
            };

            const executeSaveDeal = async () => {
                try {
                    await addDoc(collection(db, "items"), {
                        name: itemName,
                        brand: brand,
                        store: store,
                        price: parseFloat(price),
                        unitQuantity: parseInt(unit) || 1,
                        unitType: unitType,
                        shippingType: shippingType,
                        shippingFee: shippingType === 'excluded' ? (parseFloat(shippingFee) || 0) : 0,
                        tags: tags,
                        promoCodeUsed: usePromo,
                        promoCode: usePromo ? promoCode : '',
                        cashbackUsed: useCashback,
                        cashbackAmount: useCashback ? (parseFloat(cashbackAmount) || 0) : 0,
                        image: imageBase64 || '',
                        lastUpdated: Date.now()
                    });

                    setItemName(''); setBrand(''); setPrice(''); setUnit(1); setUnitDisplay('1'); setStore('');
                    setUseCashback(false); setCashbackAmount(''); setUsePromo(false); setPromoCode('');
                    setImageBase64(null); setTags([]); setTagInput(''); setShippingType('included');
                    setShippingFee(''); setIncludeShippingInPpu(false);

                    setShowConfirmModal(false);
                    setCurrentView('feed');
                } catch (e) {
                    console.error(e);
                    alert("Error saving: " + e.message);
                }
            };

            // --- Helper: get items for a specific store ---
            const getStoreDeals = (storeId) => {
                return deals.filter(d => d.shop === storeId);
            };

            // --- Helper: compute best-ranked items for a store (compare PPU cross-store) ---
            const getStoreBestRankedItems = (storeId) => {
                const storeDeals = deals.filter(d => d.shop === storeId);

                // For each item in this store, find the min PPU across ALL stores
                // Then compute a "rank score" = how much cheaper vs global min PPU
                const ranked = storeDeals.map(deal => {
                    const allSameItem = deals.filter(d => d.name === deal.name);
                    const globalMinPpu = Math.min(...allSameItem.map(d => d.ppu));
                    const savingVsOthers = globalMinPpu > 0 ? ((deal.ppu - globalMinPpu) / globalMinPpu) : 0;
                    // Lower savingVsOthers = better (0 means this IS the cheapest)
                    return { ...deal, globalMinPpu, savingVsOthers, isCheapestGlobal: deal.ppu <= globalMinPpu };
                });

                // Sort: first those that are globally cheapest, then by PPU ascending
                ranked.sort((a, b) => {
                    if (a.isCheapestGlobal && !b.isCheapestGlobal) return -1;
                    if (!a.isCheapestGlobal && b.isCheapestGlobal) return 1;
                    return a.savingVsOthers - b.savingVsOthers;
                });

                // Deduplicate by name (keep best per product name)
                const seen = new Set();
                const deduped = [];
                for (const d of ranked) {
                    if (!seen.has(d.name)) {
                        seen.add(d.name);
                        deduped.push(d);
                    }
                }
                return deduped.slice(0, 3);
            };

            // ===================== VIEWS =====================

            const renderProfile = () => (
                <div className="flex-1 overflow-y-auto bg-gray-50 pb-24 animate-fade-in">
                    <div className="bg-white p-6 border-b border-gray-100 flex flex-col items-center">
                        <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center text-gray-300 text-4xl mb-3 border-4 border-white outline outline-gray-100">
                            <User size={40} />
                        </div>
                        <h2 className="text-xl font-bold text-gray-800">ผู้เยี่ยมชม (Guest)</h2>
                        <button onClick={() => alert('ฟังก์ชันเข้าสู่ระบบจะเปิดให้บริการเร็วๆนี้')} className="mt-3 px-6 py-2 bg-green-500 hover:bg-green-600 text-white text-sm font-bold rounded-full transition-colors">
                            เข้าสู่ระบบ / สมัครสมาชิก
                        </button>
                        <div className="flex gap-6 mt-6 w-full justify-center opacity-50">
                            <div className="text-center">
                                <div className="text-2xl font-bold text-gray-800">0</div>
                                <div className="text-[10px] text-gray-400 uppercase tracking-widest font-bold">บอกต่อ</div>
                            </div>
                            <div className="w-px bg-gray-200"></div>
                            <div className="text-center">
                                <div className="text-2xl font-bold text-gray-800">0</div>
                                <div className="text-[10px] text-gray-400 uppercase tracking-widest font-bold">ถูกใจรวม</div>
                            </div>
                        </div>
                    </div>

                    <div className="flex bg-white border-b border-gray-100 sticky top-0 z-10">
                        <button
                            onClick={() => setProfileTab('posts')}
                            className={`flex-1 py-4 text-sm font-bold transition-colors border-b-2 ${profileTab === 'posts' ? 'border-orange-500 text-orange-500' : 'border-transparent text-gray-400 hover:bg-gray-50'}`}
                        >
                            โพสต์บอกต่อ (1)
                        </button>
                        <button
                            onClick={() => setProfileTab('likes')}
                            className={`flex-1 py-4 text-sm font-bold transition-colors border-b-2 ${profileTab === 'likes' ? 'border-orange-500 text-orange-500' : 'border-transparent text-gray-400 hover:bg-gray-50'}`}
                        >
                            ที่ถูกใจ (2)
                        </button>
                    </div>

                    <div className="p-4 space-y-3">
                        {deals.filter(d => profileTab === 'posts' ? d.reporter === 'Get_Hunter' : true).map((deal, idx) => (
                            <div key={deal.id + idx} className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex gap-3 relative overflow-hidden">
                                <div className="w-24 h-24 rounded-xl bg-gray-100 flex-shrink-0 overflow-hidden">
                                    {deal.image ? <img src={deal.image} alt={deal.name} className="w-full h-full object-cover" /> : <ImagePlaceholder />}
                                </div>
                                <div className="flex-1 flex flex-col justify-between py-1">
                                    <div>
                                        <h4 className="font-bold text-gray-800 text-sm leading-tight line-clamp-2">{deal.name}</h4>
                                        <div className="text-xs text-gray-500 mt-1 flex items-center gap-1">
                                            <MapPin size={10} /> {deal.shop}
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-end">
                                        <div className="text-lg font-bold text-red-500">฿{deal.price}</div>
                                        <div className="flex items-center gap-3 text-xs text-gray-400">
                                            <span onClick={() => alert('กรุณาลงทะเบียนเข้าสู่ระบบเพื่อใช้งานฟังก์ชันนี้')} className="flex items-center gap-1 cursor-pointer hover:text-red-500 transition-colors">
                                                <Heart size={14} className={profileTab === 'likes' ? 'fill-red-500 text-red-500' : ''} /> {deal.likes}
                                            </span>
                                            <span onClick={() => alert('กรุณาลงทะเบียนเข้าสู่ระบบเพื่อใช้งานฟังก์ชันนี้')} className="flex items-center gap-1 cursor-pointer hover:text-blue-500 transition-colors">
                                                <MessageSquare size={14} /> {deal.comments}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {profileTab === 'posts' && deals.filter(d => d.reporter === 'Get_Hunter').length === 0 && (
                            <div className="text-center text-gray-400 py-10 text-sm">ยังไม่มีโพสต์บอกต่อ</div>
                        )}
                    </div>
                </div>
            );

            const renderFeed = () => (
                <div className="flex-1 overflow-y-auto p-3 bg-gray-100 pb-24 animate-fade-in">
                    <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-3 mb-1">
                        <button
                            onClick={() => setShowShippingInFeed(v => !v)}
                            className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-sm flex items-center gap-1 ${showShippingInFeed
                                ? 'bg-blue-500 text-white'
                                : 'bg-white text-blue-500 border border-blue-300 hover:bg-blue-50'
                                }`}
                        >
                            {"\u{1F69A}"} รวมราคาขนส่ง
                        </button>
                        {['ทั้งหมด', 'ใกล้ฉัน (5km)', 'สกินแคร์', 'ของกิน', 'ของใช้ในบ้าน'].map(tab => (
                            <button
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-sm ${activeTab === tab
                                    ? 'bg-orange-500 text-white'
                                    : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'
                                    }`}
                            >
                                {tab}
                            </button>
                        ))}
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        {groupedDeals.map(deal => (
                            <div key={deal.id} onClick={() => { setSelectedProduct(deal); setIsDescriptionExpanded(false); setCurrentView('product_detail'); }} className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden flex flex-col hover:shadow-md transition-shadow cursor-pointer">
                                <div className="relative aspect-square bg-gray-200 flex-shrink-0">
                                    {deal.masterImage ? <img src={deal.masterImage} alt={deal.name} className="w-full h-full object-cover" /> : <ImagePlaceholder />}
                                    <div className="absolute top-1 left-1 flex flex-col gap-0.5">
                                        {deal.stickers && deal.stickers.map((sticker, idx) => (
                                            <span key={idx} className={`px-1.5 py-0.5 text-[9px] font-bold rounded shadow-sm ${idx === 0 ? 'bg-red-500 text-white' : 'bg-green-500 text-white'}`}>
                                                {sticker}
                                            </span>
                                        ))}
                                    </div>
                                    <div className="absolute bottom-0 right-0 bg-white/90 backdrop-blur px-1.5 py-0.5 rounded-tl-lg font-bold text-orange-500 flex flex-col items-end shadow-sm">
                                        {showShippingInFeed ? (
                                            <>
                                                <span className="text-[8px] text-blue-500 font-bold leading-none">{"\u{1F69A}"} รวมค่าส่ง</span>
                                                <span className="text-xs leading-none mt-0.5">คุ้มสุด ฿{deal.lowestPpuWithShipping?.toFixed(2)}/{deal.lowestPpuUnit}</span>
                                            </>
                                        ) : (
                                            <>
                                                <span className="text-[9px] text-gray-400 line-through leading-none">฿{deal.normalPrice}</span>
                                                <span className="text-xs leading-none mt-0.5">คุ้มสุด ฿{deal.lowestPpu?.toFixed(2)}/{deal.lowestPpuUnit}</span>
                                            </>
                                        )}
                                    </div>
                                </div>
                                <div className="p-2 flex-1 flex flex-col">
                                    <h3 className="font-bold text-gray-800 text-[11px] leading-tight mb-1 line-clamp-2 min-h-[1.5rem]">{deal.name}</h3>
                                    <div className="mt-auto pt-1 border-t border-gray-50 flex items-center justify-between gap-1 text-[9px] text-gray-500">
                                        <div className="flex items-center gap-1">
                                            <ShoppingBag size={10} className="shrink-0 text-orange-400" />
                                            <span className="truncate">{deal.postsCount} โพสต์ชี้เป้า</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderAddDeal = () => (
                <div className="flex-1 flex flex-col bg-white overflow-hidden animate-fade-in relative z-0 pb-20">
                    <div className="flex-none bg-green-50/50 border-b border-green-100 p-6 flex flex-col justify-end items-end min-h-[160px] relative transition-all shadow-inner">
                        <div className="absolute top-4 left-4 flex gap-2">
                            {store && (
                                <span className="px-2 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest bg-gray-200 text-gray-600">
                                    {store}
                                </span>
                            )}
                        </div>

                        <div className="w-full text-right space-y-1">
                            <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">ราคาต่อหน่วย (PPU)</div>
                            <div className="text-2xl font-bold text-green-600">

                                        </div>
                                        <h2 className="text-2xl font-bold text-gray-800 text-center">{selectedStore.id}</h2>
                                        {selectedStore.isFamous && (
                                            <div className="mt-2 bg-orange-500 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter shadow-sm flex items-center gap-1">
                                                ★ สาขายอดนิยม
                                            </div>
                                        )}
                                    </div>

                                    <div className="p-6 space-y-4">
                                        {/* Item count */}
                                        <div className="flex items-center gap-4 p-3 bg-gray-50 rounded-2xl border border-gray-100">
                                            <div className="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-green-500 border border-gray-100">
                                                <ShoppingBag size={20} />
                                            </div>
                                            <div>
                                                <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">สินค้าในระบบ</div>
                                                <div className="text-sm font-bold text-gray-700">
                                                    {getStoreDeals(selectedStore.id).length} รายการ
                                                </div>
                                            </div>
                                        </div>

                                        <div className="flex items-center gap-4 p-3 bg-gray-50 rounded-2xl border border-gray-100">
                                            <div className="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-400 border border-gray-100">
                                                <MapPin size={20} />
                                            </div>
                                            <div>
                                                <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">จังหวัด</div>
                                                <div className="text-sm font-bold text-gray-700">{selectedStore.province || 'ไม่ระบุ'}</div>
                                            </div>
                                        </div>

                                        <div className="flex items-center gap-4 p-3 bg-gray-50 rounded-2xl border border-gray-100">
                                            <div className="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-gray-400 border border-gray-100">
                                                <Zap size={20} />
                                            </div>
                                            <div>
                                                <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest">เบอร์โทรศัพท์</div>
                                                {selectedStore.phone ? (
                                                    <a href={`tel:${selectedStore.phone}`} className="text-sm font-bold text-blue-500 hover:underline">{selectedStore.phone}</a>
                                                ) : (
                                                    <div className="text-sm font-bold text-gray-700">ไม่ระบุ</div>
                                                )}
                                            </div>
                                        </div>

                                        {/* View all store items button */}
                                        {getStoreDeals(selectedStore.id).length > 0 && (
                                            <button
                                                onClick={() => {
                                                    setSelectedStoreForDetail(selectedStore);
                                                    setStoreSearchQuery('');
                                                    setSelectedStore(null);
                                                    setCurrentView('store_detail');
                                                }}
                                                className="w-full py-3.5 bg-gradient-to-r from-orange-500 to-orange-600 text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-orange-100 active:scale-95 transition-all"
                                            >
                                                <Store size={16} /> ดูสินค้าทั้งหมดของร้านนี้
                                            </button>
                                        )}

                                        {selectedStore.mapsUrl && (
                                            <a
                                                href={selectedStore.mapsUrl}
                                                target="_blank"
                                                className="w-full py-3.5 bg-slate-900 text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-gray-400 active:scale-95 transition-all"
                                            >
                                                <MapPin size={16} /> ดูแผนที่บน Google Maps
                                            </a>
                                        )}
                                    </div>
                                    <div className="h-6"></div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
