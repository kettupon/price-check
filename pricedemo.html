        tailwind.config = {

                extend: {
                    colors: {
                        green: {

                        },
                        orange: {

                            700: '#bf5700',
                            800: '#994000',

                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Noto Sans Thai', sans-serif;

        .hide-scrollbar {

        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;

        @keyframes fadeIn {

    <!-- React & Babel via CDN -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.294.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<body class="bg-stone-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            MapPin, Users, Tag, AlertCircle, Plus, Trophy, Heart, MessageSquare,
            Share2, Search, Zap, Home, ListPlus, Calculator, ChevronLeft, Image as ImageIcon,
            Coffee, ShoppingCart, Store, Package, User, X, ShoppingBag, ImageOff, Camera
        } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: "AIzaSyByDvi-wyekFdKMiMv_Cb2yUq9yF0Tw3Uc",
            authDomain: "price-check-86915.firebaseapp.com",
            projectId: "price-check-86915",
            storageBucket: "price-check-86915.firebasestorage.app",
            messagingSenderId: "510258152666",
            appId: "1:510258152666:web:bc24bd3f34e704488e91e3"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Live Firebase Data State Only ---

        function App() {
            const [currentView, setCurrentView] = useState('feed'); // 'feed' | 'search' | 'add' | 'profile' | 'product_detail'
            const [activeTab, setActiveTab] = useState('ทั้งหมด');
            const [showShippingInFeed, setShowShippingInFeed] = useState(false);
            const [profileTab, setProfileTab] = useState('posts'); // 'posts' | 'likes'
            const [showDuplicatePrompt, setShowDuplicatePrompt] = useState(false);
            const [deals, setDeals] = useState([]);
            const [groupedDeals, setGroupedDeals] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [zoomedImage, setZoomedImage] = useState(null); // Image URL for full screen zoom

            const ImagePlaceholder = () => (
                <div className="w-full h-full flex flex-col items-center justify-center bg-gray-100/80 text-gray-400">
                    <ImageOff size={24} className="mb-1" />
                    <span className="text-[10px] font-bold">ไม่มีรูปภาพ</span>
                </div>
            );

            // --- Firebase Fetch ---
            useEffect(() => {
                const q = query(collection(db, "items"), orderBy("lastUpdated", "desc"));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const fbDeals = snapshot.docs.map(doc => {
                        const data = doc.data();

                        // Calculate PPU properly from raw numeric data
                        const numPrice = parseFloat(data.price) || 0;
                        const numCashback = data.cashbackUsed ? (parseFloat(data.cashbackAmount) || 0) : 0;
                        const totalPrice = Math.max(0, numPrice - numCashback);
                        const unitQty = parseInt(data.unitQuantity) || 1;
                        const ppu = totalPrice / unitQty;
                        const shipFee = (data.shippingType === 'excluded') ? (parseFloat(data.shippingFee) || 0) : 0;
                        const ppuWithShipping = (totalPrice + shipFee) / unitQty;

                        return {
                            id: doc.id,
                            name: data.name,
                            brand: data.brand || "",
                            price: data.price, // Raw price
                            ppu: ppu, // Price Per Unit
                            ppuWithShipping: ppuWithShipping, // PPU including shipping
                            totalPrice: totalPrice, // Price after cashback
                            unitQuantity: unitQty,
                            unitType: data.unitType || "ชิ้น",
                            normalPrice: Math.round(data.price * 1.2), // Mock normal price based on 20% off
                            shop: data.store || "ไม่ระบุร้าน",
                            distance: "? km",
                            type: data.category || "General",
                            masterImage: data.masterImage || "",
                            stickers: ppu < 10 ? ["🔥 คุ้มสุด!"] : [],
                            likes: 0,
                            comments: 0,
                            image: data.image || "", // Empty if no image
                            timePosted: new Date(data.lastUpdated).toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' }),
                            reporter: "Live User",
                            cashbackUsed: data.cashbackUsed || false,
                            tags: data.tags || [],
                            shippingType: data.shippingType || 'included',
                            shippingFee: data.shippingFee || 0
                        };
                    });
                    setDeals(fbDeals);

                    // Create Grouped Deals for Feed/Search
                    const grouped = {};
                    fbDeals.forEach(deal => {
                        const name = deal.name || 'Unknown';
                        if (!grouped[name]) {
                            grouped[name] = {
                                id: deal.id,
                                name: name,
                                brand: deal.brand,
                                category: deal.category,
                                masterImage: deal.masterImage || deal.image,
                                lowestPrice: deal.price,
                                lowestPpu: deal.ppu, // Use PPU for Best Value
                                lowestPpuWithShipping: deal.ppuWithShipping,
                                lowestPpuUnit: deal.unitType,
                                normalPrice: deal.normalPrice,
                                postsCount: 1,
                                stickers: deal.stickers,
                                tags: [...deal.tags] // Keep track of unique tags per group
                            };
                        } else {
                            grouped[name].postsCount += 1;
                            grouped[name].lowestPrice = Math.min(grouped[name].lowestPrice, deal.price);
                            grouped[name].lowestPpu = Math.min(grouped[name].lowestPpu, deal.ppu);
                            grouped[name].lowestPpuWithShipping = Math.min(grouped[name].lowestPpuWithShipping, deal.ppuWithShipping);
                            if (deal.masterImage && (!grouped[name].masterImage || grouped[name].masterImage === grouped[name].image)) {
                                grouped[name].masterImage = deal.masterImage;
                            }
                            if (deal.tags && deal.tags.length > 0) {
                                deal.tags.forEach(tag => {
                                    if (!grouped[name].tags.includes(tag)) {
                                        grouped[name].tags.push(tag);
                                    }
                                });
                            }
                        }
                    });
                    setGroupedDeals(Object.values(grouped));
                });
                return () => unsubscribe();
            }, []);

            // --- State สำหรับหน้า Add Deal (Tracker Form) ---
            const [itemName, setItemName] = useState('');
            const [brand, setBrand] = useState('');
            const [category, setCategory] = useState('Grocery');
            const [store, setStore] = useState('');
            const [price, setPrice] = useState('');
            const [unit, setUnit] = useState(1);
            const [unitDisplay, setUnitDisplay] = useState('1'); // String used only for the input field
            const [unitType, setUnitType] = useState('ชิ้น');
            const [shippingType, setShippingType] = useState('included'); // 'included', 'excluded', null
            const [shippingFee, setShippingFee] = useState('');
            const [tags, setTags] = useState([]);
            const [tagInput, setTagInput] = useState('');
            const [usePromo, setUsePromo] = useState(false);
            const [promoCode, setPromoCode] = useState(''); // New state for Promo Code text
            const [useCashback, setUseCashback] = useState(false);
            const [cashbackAmount, setCashbackAmount] = useState('');
            const [includeShippingInPpu, setIncludeShippingInPpu] = useState(false); // Toggle to see real price with shipping
            const [imageBase64, setImageBase64] = useState(null); // Photo capture
            const fileInputRef = useRef(null);

            // Handle image capture / upload
            const handleImageCapture = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new window.Image();
                    img.onload = () => {
                        const maxSize = 800;
                        let w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        const canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setImageBase64(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            // คำนวณ PPU (Price Per Unit) Real-time
            const numPrice = parseFloat(price) || 0;
            const numCashback = useCashback ? (parseFloat(cashbackAmount) || 0) : 0;
            const addedShipping = (shippingType === 'excluded' && includeShippingInPpu) ? (parseFloat(shippingFee) || 0) : 0;
            const totalPrice = Math.max(0, numPrice - numCashback + addedShipping);
            const ppu = unit > 0 ? (totalPrice / unit) : 0;

            const handleAddTag = (e) => {
                if (e.key === 'Enter' || e.key === ',') {
                    e.preventDefault();
                    const val = tagInput.trim().replace(',', '').toLowerCase();
                    if (val && !tags.includes(val) && tags.length < 5) {
                        setTags([...tags, val]);
                    }
                    setTagInput('');
                }
            };
            const removeTag = (tagToRemove) => {
                setTags(tags.filter(t => t !== tagToRemove));
            };

            // --- Handlers ---
            const handleSaveDeal = async () => {
                if (!itemName || !price) {
                    alert('กรุณากรอกชื่อสินค้าและราคา');
                    return;
                }
                try {
                    await addDoc(collection(db, "items"), {
                        name: itemName,
                        brand: brand,
                        category: category,
                        store: store,
                        price: parseFloat(price),
                        unitQuantity: parseInt(unit) || 1,
                        unitType: unitType,
                        shippingType: shippingType,
                        shippingFee: shippingType === 'excluded' ? (parseFloat(shippingFee) || 0) : 0,
                        tags: tags,
                        promoCodeUsed: usePromo,
                        promoCode: usePromo ? promoCode : '',
                        cashbackUsed: useCashback,
                        cashbackAmount: useCashback ? (parseFloat(cashbackAmount) || 0) : 0,
                        image: imageBase64 || '',
                        lastUpdated: Date.now()
                    });
                    setShowDuplicatePrompt(true);
                } catch (e) {
                    console.error(e);
                    alert("Error saving: " + e.message);
                }
            };

            const handlePromptAction = () => {
                setShowDuplicatePrompt(false);
                setCurrentView('feed'); // กลับไปหน้าหลัก
                // Reset Form
                setItemName(''); setBrand(''); setPrice(''); setUnit(1); setUnitDisplay('1'); setStore(''); setUseCashback(false); setCashbackAmount('');
                setUsePromo(false); setPromoCode(''); setImageBase64(null);
                setTags([]); setTagInput(''); setShippingType('included'); setShippingFee(''); setIncludeShippingInPpu(false);
            };

            // --- Views Components ---
            const renderProfile = () => (
                <div className="flex-1 overflow-y-auto bg-gray-50 pb-24 animate-fade-in">
                    {/* Profile Header */}
                    <div className="bg-white p-6 border-b border-gray-100 flex flex-col items-center">
                        <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center text-gray-300 text-4xl mb-3 border-4 border-white outline outline-gray-100">
                            <User size={40} />
                        </div>
                        <h2 className="text-xl font-bold text-gray-800">ผู้เยี่ยมชม (Guest)</h2>
                        <button onClick={() => alert('ฟังก์ชันเข้าสู่ระบบจะเปิดให้บริการเร็วๆนี้')} className="mt-3 px-6 py-2 bg-green-500 hover:bg-green-600 text-white text-sm font-bold rounded-full transition-colors">
                            เข้าสู่ระบบ / สมัครสมาชิก
                        </button>

                        {/* Quick Stats Placeholder */}
                        <div className="flex gap-6 mt-6 w-full justify-center opacity-50">
                            <div className="text-center">
                                <div className="text-2xl font-bold text-gray-800">0</div>
                                <div className="text-[10px] text-gray-400 uppercase tracking-widest font-bold">บอกต่อ</div>
                            </div>
                            <div className="w-px bg-gray-200"></div>
                            <div className="text-center">
                                <div className="text-2xl font-bold text-gray-800">0</div>
                                <div className="text-[10px] text-gray-400 uppercase tracking-widest font-bold">ถูกใจรวม</div>
                            </div>
                        </div>
                    </div>

                    {/* Profile Tabs */}
                    <div className="flex bg-white border-b border-gray-100 sticky top-0 z-10">
                        <button
                            onClick={() => setProfileTab('posts')}
                            className={`flex-1 py-4 text-sm font-bold transition-colors border-b-2 ${profileTab === 'posts' ? 'border-orange-500 text-orange-500' : 'border-transparent text-gray-400 hover:bg-gray-50'}`}
                        >
                            โพสต์บอกต่อ (1)
                        </button>
                        <button
                            onClick={() => setProfileTab('likes')}
                            className={`flex-1 py-4 text-sm font-bold transition-colors border-b-2 ${profileTab === 'likes' ? 'border-orange-500 text-orange-500' : 'border-transparent text-gray-400 hover:bg-gray-50'}`}
                        >
                            ที่ถูกใจ (2)
                        </button>
                    </div>

                    {/* Profile Feed List */}
                    <div className="p-4 space-y-3">
                        {deals.filter(d => profileTab === 'posts' ? d.reporter === 'Get_Hunter' : true).map((deal, idx) => (
                            <div key={deal.id + idx} className="bg-white p-3 rounded-2xl shadow-sm border border-gray-100 flex gap-3 relative overflow-hidden">
                                <div className="w-24 h-24 rounded-xl bg-gray-100 flex-shrink-0 overflow-hidden">
                                    {deal.image ? <img src={deal.image} alt={deal.name} className="w-full h-full object-cover" /> : <ImagePlaceholder />}
                                </div>
                                <div className="flex-1 flex flex-col justify-between py-1">
                                    <div>
                                        <h4 className="font-bold text-gray-800 text-sm leading-tight line-clamp-2">{deal.name}</h4>
                                        <div className="text-xs text-gray-500 mt-1 flex items-center gap-1">
                                            <MapPin size={10} /> {deal.shop}
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-end">
                                        <div className="text-lg font-bold text-red-500">฿{deal.price}</div>
                                        <div className="flex items-center gap-3 text-xs text-gray-400">
                                            <span onClick={() => alert('กรุณาลงทะเบียนเข้าสู่ระบบเพื่อใช้งานฟังก์ชันนี้')} className="flex items-center gap-1 cursor-pointer hover:text-red-500 transition-colors">
                                                <Heart size={14} className={profileTab === 'likes' ? 'fill-red-500 text-red-500' : ''} /> {deal.likes}
                                            </span>
                                            <span onClick={() => alert('กรุณาลงทะเบียนเข้าสู่ระบบเพื่อใช้งานฟังก์ชันนี้')} className="flex items-center gap-1 cursor-pointer hover:text-blue-500 transition-colors">
                                                <MessageSquare size={14} /> {deal.comments}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                        {profileTab === 'posts' && deals.filter(d => d.reporter === 'Get_Hunter').length === 0 && (
                            <div className="text-center text-gray-400 py-10 text-sm">ยังไม่มีโพสต์บอกต่อ</div>
                        )}
                    </div>
                </div>
            );

            const renderFeed = () => (
                <div className="flex-1 overflow-y-auto p-3 bg-gray-100 pb-24 animate-fade-in">
                    {/* Categories / Tabs */}
                    <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-3 mb-1">
                        <button
                            onClick={() => setShowShippingInFeed(v => !v)}
                            className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-sm flex items-center gap-1 ${showShippingInFeed
                                ? 'bg-blue-500 text-white'
                                : 'bg-white text-blue-500 border border-blue-300 hover:bg-blue-50'
                                }`}
                        >
                            {"\u{1F69A}"} รวมราคาขนส่ง
                        </button>
                        {['ทั้งหมด', 'ใกล้ฉัน (5km)', 'สกินแคร์', 'ของกิน', 'ของใช้ในบ้าน'].map(tab => (
                            <button
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`whitespace-nowrap px-4 py-1.5 rounded-full text-xs font-bold transition-colors shadow-sm ${activeTab === tab
                                    ? 'bg-orange-500 text-white'
                                    : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'
                                    }`}
                            >
                                {tab}
                            </button>
                        ))}
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                        {groupedDeals.map(deal => (
                            <div key={deal.id} onClick={() => { setSelectedProduct(deal); setCurrentView('product_detail'); }} className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden flex flex-col hover:shadow-md transition-shadow cursor-pointer">
                                <div className="relative aspect-square bg-gray-200 flex-shrink-0">
                                    {deal.masterImage ? <img src={deal.masterImage} alt={deal.name} className="w-full h-full object-cover" /> : <ImagePlaceholder />}
                                    <div className="absolute top-1 left-1 flex flex-col gap-0.5">
                                        {deal.stickers && deal.stickers.map((sticker, idx) => (
                                            <span key={idx} className={`px-1.5 py-0.5 text-[9px] font-bold rounded shadow-sm ${idx === 0 ? 'bg-red-500 text-white' : 'bg-green-500 text-white'
                                                }`}>
                                                {sticker}
                                            </span>
                                        ))}
                                    </div>
                                    <div className="absolute bottom-0 right-0 bg-white/90 backdrop-blur px-1.5 py-0.5 rounded-tl-lg font-bold text-orange-500 flex flex-col items-end shadow-sm">
                                        {showShippingInFeed ? (
                                            <>
                                                <span className="text-[8px] text-blue-500 font-bold leading-none">{"\u{1F69A}"} รวมค่าส่ง</span>
                                                <span className="text-xs leading-none mt-0.5">คุ้มสุด ฿{deal.lowestPpuWithShipping?.toFixed(2)}/{deal.lowestPpuUnit}</span>
                                            </>
                                        ) : (
                                            <>
                                                <span className="text-[9px] text-gray-400 line-through leading-none">฿{deal.normalPrice}</span>
                                                <span className="text-xs leading-none mt-0.5">คุ้มสุด ฿{deal.lowestPpu?.toFixed(2)}/{deal.lowestPpuUnit}</span>
                                            </>
                                        )}
                                    </div>
                                </div>
                                <div className="p-2 flex-1 flex flex-col">
                                    <h3 className="font-bold text-gray-800 text-[11px] leading-tight mb-1 line-clamp-2 min-h-[1.5rem]">{deal.name}</h3>
                                    <div className="mt-auto pt-1 border-t border-gray-50 flex items-center justify-between gap-1 text-[9px] text-gray-500">
                                        <div className="flex items-center gap-1">
                                            <ShoppingBag size={10} className="shrink-0 text-orange-400" />
                                            <span className="truncate">{deal.postsCount} โพสต์ชี้เป้า</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderAddDeal = () => (
                <div className="flex-1 flex flex-col bg-white overflow-hidden animate-fade-in relative z-0 pb-20">
                    {/* DISPLAY ZONE (PPU Calculator) */}
                    <div className="flex-none bg-green-50/50 border-b border-green-100 p-6 flex flex-col justify-end items-end min-h-[160px] relative transition-all shadow-inner">
                        <div className="absolute top-4 left-4 flex gap-2">
                            {store && (
                                <span className="px-2 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest bg-gray-200 text-gray-600">
                                    {store}
                                </span>
                            )}
                        </div>

                        <div className="w-full text-right space-y-1">
                            <div className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">ราคาต่อหน่วย (PPU)</div>
                            <div className="text-2xl font-bold text-green-600">
                                {ppu.toFixed(2)} <span className="text-xs text-green-400">฿/{unitType || 'unit'}</span>
                            </div>
                        </div>

                        <div className="flex items-baseline gap-1 mt-2">
                            <span className="text-2xl font-medium text-gray-400">฿</span>
                            <div className="text-6xl font-bold text-gray-900 tracking-tighter leading-none">{price || '0'}</div>
                        </div>
                        <div className="text-sm font-medium text-gray-400 mt-1">
                            {unit} {unitType || 'units'}
                        </div>

                        {useCashback && cashbackAmount > 0 && (
                            <div className="mt-2 text-right">
                                <span className="text-[10px] font-bold text-orange-400 uppercase tracking-widest">หักส่วนลดแล้วเหลือ</span>
                                <div className="text-xl font-bold text-orange-500">฿{Math.max(0, numPrice - numCashback)}</div>
                            </div>
                        )}

                        {shippingType === 'excluded' && (
                            <div className="mt-3 bg-white/60 p-2 rounded-xl border border-green-200">
                                <label className="flex items-center gap-2 cursor-pointer text-xs font-bold text-gray-600">
                                    <input
                                        type="checkbox"
                                        checked={includeShippingInPpu}
                                        onChange={(e) => setIncludeShippingInPpu(e.target.checked)}
                                        className="rounded text-green-500 focus:ring-green-500 w-4 h-4"
                                    />

                            <button
                                onClick={() => {
                                    setItemName(selectedProduct.name);
                                    setBrand(selectedProduct.brand || '');
                                    setCategory(selectedProduct.category || 'Grocery');
                                    setCurrentView('add');
                                }}
                                className="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold text-sm py-4 rounded-2xl shadow-lg flex items-center justify-center gap-2 transform active:scale-95 transition-transform"
                            >
                                <ListPlus size={18} /> บอกต่อราคาใหม่สำหรับสินค้านี้
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-gray-900 flex justify-center font-sans">
                    <div className="w-full max-w-md bg-gray-100 shadow-2xl relative overflow-hidden flex flex-col h-[100dvh]">

                        {/* --- Header (Shared) --- */}
                        <header className="bg-green-500 text-white p-4 rounded-b-2xl shadow-md z-10 flex-none">
                            <div className="flex justify-between items-center mb-3">
                                <h1 className="text-2xl font-bold flex items-center gap-2">
                                    <Zap className="fill-current" /> DealHunter
                                </h1>
                                <div onClick={() => alert('กรุณาลงทะเบียนเข้าสู่ระบบเพื่อใช้งานฟังก์ชันนี้')} className="flex items-center gap-2 bg-black/20 hover:bg-black/30 cursor-pointer transition-colors px-3 py-1 rounded-full backdrop-blur-sm">
                                    <User size={16} className="text-white" />
                                    <span className="text-sm font-medium">เข้าสู่ระบบ</span>
                                </div>
                            </div>

                            <div className="text-sm font-medium text-white/80 animate-fade-in flex items-center gap-1">
                                {currentView === 'feed' && <><Home size={16} /> หน้าแรก</>}
                                {currentView === 'search' && <><Search size={16} /> ค้นหา</>}
                                {currentView === 'add' && <><Calculator size={16} /> เครื่องมือเช็คราคาและบอกต่อ</>}
                                {currentView === 'profile' && <><User size={16} /> โปรไฟล์ส่วนตัว</>}
                            </div>
                            {currentView === 'profile' && (
                                <div className="text-sm font-medium text-white/80 animate-fade-in flex items-center gap-1">
                                    <User size={16} /> โปรไฟล์ส่วนตัว
                                </div>
                            )}
                        </header>

                        {/* --- MAIN CONTENT AREA --- */}
                        {currentView === 'feed' && renderFeed()}
                        {currentView === 'search' && renderSearch()}
                        {currentView === 'add' && renderAddDeal()}
                        {currentView === 'profile' && renderProfile()}
                        {currentView === 'product_detail' && renderProductDetail()}

                        {/* --- FAB (Only in Feed View) --- */}
                        {currentView === 'feed' && (
                            <button
                                onClick={() => setCurrentView('add')}
                                className="absolute bottom-20 right-6 bg-gradient-to-br from-green-400 to-green-600 text-white p-4 rounded-full shadow-lg shadow-green-200 hover:scale-105 transform transition-all flex items-center justify-center z-20 border-2 border-white"
                            >
                                <Plus size={24} />
                            </button>
                        )}

                        {/* --- Bottom Navigation --- */}
                        <nav className="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-around py-3 pb-safe z-30 text-xs text-gray-500 shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
                            <button
                                onClick={() => setCurrentView('feed')}
                                className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'feed' ? 'text-orange-500 font-bold' : 'hover:text-orange-400'}`}
                            >
                                <Home size={20} className={currentView === 'feed' ? 'fill-current' : ''} /> หน้าแรก
                            </button>
                            <button
                                onClick={() => setCurrentView('search')}
                                className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'search' ? 'text-orange-500 font-bold' : 'hover:text-orange-400'}`}
                            >
                                <Search size={20} className={currentView === 'search' ? 'border-b-2 border-orange-500 pb-0.5' : ''} /> ค้นหา
                            </button>
                            <button
                                onClick={() => setCurrentView('add')}
                                className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'add' ? 'text-green-500 font-bold' : 'hover:text-green-400'}`}
                            >
                                <ListPlus size={20} /> บอกต่อ
                            </button>
                            <button
                                onClick={() => setCurrentView('profile')}
                                className={`flex flex-col items-center gap-1 transition-colors ${currentView === 'profile' ? 'text-orange-500 font-bold' : 'hover:text-orange-400'}`}
                            >
                                <User size={20} className={currentView === 'profile' ? 'fill-current' : ''} /> โปรไฟล์
                            </button>
                        </nav>

                        {/* --- DUPLICATE DETECTION MODAL --- */}
                        {showDuplicatePrompt && (
                            <div className="absolute inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                                <div className="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
                                    <div className="bg-red-50 p-4 border-b border-red-100 flex items-start gap-3">
                                        <AlertCircle className="text-red-500 flex-shrink-0 mt-1" />
                                        <div>
                                            <h3 className="font-bold text-gray-800">พบสินค้าในระบบแล้ว!</h3>
                                            <p className="text-sm text-gray-600 mt-1">
                                                มีคนรายงานราคา <span className="font-semibold text-orange-600">{itemName || 'สินค้านี้'}</span> ที่ <span className="font-semibold text-orange-600">{store || 'ร้านนี้'}</span> ไว้เมื่อ 2 ชม. ที่แล้ว
                                            </p>
                                        </div>
                                    </div>
                                    <div className="p-4 space-y-3">
                                        <p className="text-sm text-gray-700 font-medium text-center mb-2">
                                            คุณต้องการทำอะไรกับข้อมูลนี้?
                                        </p>
                                        <button onClick={handlePromptAction} className="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-medium transition-colors flex justify-center items-center gap-2 shadow-md">
                                            <Tag size={18} /> ยืนยันว่าราคานี้จริง! (+10 Pts)
                                        </button>
                                        <div className="flex gap-2">
                                            <button onClick={handlePromptAction} className="flex-1 bg-orange-50 hover:bg-orange-100 text-orange-600 py-2 rounded-xl text-sm font-medium transition-colors border border-orange-100">
                                                คนละสาขากัน
                                            </button>
                                            <button onClick={handlePromptAction} className="flex-1 bg-red-50 hover:bg-red-100 text-red-600 py-2 rounded-xl text-sm font-medium transition-colors border border-red-100">
                                                อัปเดตราคาใหม่!
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- IMAGE ZOOM MODAL --- */}
                        {zoomedImage && (
                            <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center backdrop-blur-sm animate-fade-in" onClick={() => setZoomedImage(null)}>
                                <button className="absolute top-6 right-6 text-white/50 hover:text-white bg-black/30 w-10 h-10 rounded-full flex items-center justify-center transition-colors">
                                    <X size={24} />
                                </button>
                                <img src={zoomedImage} alt="Zoomed View" className="w-[90%] max-h-[80%] object-contain rounded-xl shadow-2xl" onClick={e => e.stopPropagation()} />
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
